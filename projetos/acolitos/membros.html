<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Membros — Acólitos JCBP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    .filtros-wrap { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
    .ficha-tabs { display:flex; border-bottom:1px solid var(--border-wine); margin-bottom:16px; overflow-x:auto; gap:0; }
    .ficha-tab {
      padding:10px 14px; background:transparent; border:none;
      border-bottom:2px solid transparent; color:var(--text-muted);
      cursor:pointer; font-size:11px; font-family:'Sora',sans-serif;
      letter-spacing:1px; text-transform:uppercase; white-space:nowrap;
      transition:all .2s; -webkit-tap-highlight-color:transparent; flex-shrink:0;
    }
    .ficha-tab.active { color:var(--gold); border-bottom-color:var(--gold); }
    .tab-content { display:none; }
    .tab-content.active { display:block; }
    .hab-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
    @media(min-width:480px){ .hab-grid { grid-template-columns:repeat(3,1fr); } }
    .hab-card {
      background:var(--surface2); border:1px solid var(--border);
      border-radius:3px; padding:10px; transition:border-color .2s;
    }
    .hab-card.nao_treinado  { border-color:var(--border); }
    .hab-card.em_formacao   { border-color:#d4a060; }
    .hab-card.apto          { border-color:var(--success); }
    .hab-card.experiente    { border-color:#4a90c4; }
    .hab-card.referencia    { border-color:#9b59d4; }
    .hab-nome  { font-size:11px; color:var(--text); font-family:'Sora',sans-serif; margin-bottom:4px; letter-spacing:.5px; }
    .hab-nivel { font-size:10px; color:var(--text-muted); margin-bottom:6px; }
    .hab-sel   { width:100%; padding:5px 8px; background:var(--surface); border:1px solid var(--border-wine); border-radius:2px; color:var(--text); font-size:11px; outline:none; }
    .ficha-header { text-align:center; padding-bottom:16px; margin-bottom:16px; border-bottom:1px solid var(--border-wine); }
    .ficha-nome { font-family:'Sora',sans-serif; font-size:16px; font-weight:700; margin-top:10px; color:var(--text); }
    .ficha-sub  { font-size:12px; color:var(--text-muted); margin-top:4px; }
    /* Alternar visualização cards/lista */
    .view-switch { display:flex; flex:none; border:1px solid var(--border-wine); border-radius:6px; overflow:hidden; }
    .view-sw { width:34px; height:34px; background:var(--surface2); border:none; color:var(--text-muted); font-size:15px; cursor:pointer; -webkit-tap-highlight-color:transparent; display:flex; align-items:center; justify-content:center; }
    .view-sw.active { background:rgba(232,185,74,.12); color:var(--gold); }
    .view-sw + .view-sw { border-left:1px solid var(--border-wine); }
    /* Visualização em lista */
    .list-view { display:flex; flex-direction:column; gap:8px; }
    .list-row { display:flex; align-items:center; gap:12px; padding:10px 12px; background:var(--surface2); border:1px solid var(--border-wine); border-radius:8px; cursor:pointer; transition:border-color .15s; }
    .list-row:hover { border-color:var(--gold-dim); }
    .list-info { flex:1; min-width:0; }
    .list-name { font-family:'Sora',sans-serif; font-size:13px; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .list-subname { font-family:'Sora',sans-serif; font-size:10.5px; font-weight:600; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .list-meta { display:flex; align-items:center; gap:8px; margin-top:3px; }
    .list-com { font-size:11px; color:var(--text-muted); }
    /* Vínculo de irmãos */
    .irmaos-lista { display:flex; flex-wrap:wrap; gap:6px; margin:8px 0 4px; }
    .irmao-chip { font-size:11px; font-weight:700; color:var(--gold); background:rgba(232,185,74,.1); border:1px solid var(--gold-dim); border-radius:12px; padding:3px 10px; }
    .irmao-row { display:flex; align-items:center; gap:10px; padding:7px 8px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; cursor:pointer; }
    .irmao-row input[type=checkbox] { width:18px; height:18px; flex:none; accent-color:var(--gold); }
    .member-card-setor { font-size:9px; color:var(--gold); font-weight:700; margin-top:3px; line-height:1.2; }
    #btn-salvar.pulse { animation:salvarPulse 1.3s ease-in-out infinite; }
    @keyframes salvarPulse { 0%,100%{ box-shadow:0 0 0 0 var(--red-glow); } 50%{ box-shadow:0 0 14px 2px var(--red-glow); } }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.106.2/dist/umd/supabase.min.js" integrity="sha384-4Cjkyy4cE1EgIS0C+Y3xzGmJ2noQFRRU91yKAW8IxtPfVtbQXPMqadSc3sYnjwou" crossorigin="anonymous"></script>
</head>
<body>
<div id="app-header"></div>
<div id="app-nav"></div>

<div class="main">
  <div class="toolbar">
    <input class="search-input" id="busca" placeholder="🔍 Buscar nome..." oninput="filtrar()">
    <div class="view-switch">
      <button class="view-sw active" id="vt-cards" onclick="setVista('cards')" title="Cards">▦</button>
      <button class="view-sw" id="vt-lista" onclick="setVista('lista')" title="Lista">☰</button>
    </div>
    <button class="btn-sm gold" onclick="window.location.href='novos.html'">+ Novo</button>
  </div>

  <div class="filtros-wrap" id="filtros">
    <button class="form-toggle active" onclick="setFiltro(this,'')">Todos</button>
    <button class="form-toggle" onclick="setFiltro(this,'cerimonario')">Cerimoniários</button>
    <button class="form-toggle" onclick="setFiltro(this,'acolito')">Acólitos</button>
    <button class="form-toggle" onclick="setFiltro(this,'coroinha')">Coroinhas</button>
    <button class="form-toggle" onclick="setFiltro(this,'aspirante')">Aspirantes</button>
  </div>

  <div class="cards-grid" id="grid">
    <span class="loading">Carregando...</span>
  </div>
</div>

<!-- Ficha do membro -->
<div class="modal-overlay" id="modal-ficha">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="ficha-header" id="ficha-header"></div>
    <div class="ficha-tabs" id="ficha-tabs"></div>
    <div id="ficha-conteudo"></div>
    <div id="ficha-msg" class="msg"></div>
    <div id="ficha-dirty" style="display:none;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--warn-text);margin-top:12px;">● Há alterações não salvas — clique em Salvar</div>
    <div class="modal-actions" style="justify-content:space-between;">
      <button class="btn-sm gray" onclick="fecharFicha()">Fechar</button>
      <button class="btn-sm gold" id="btn-salvar" onclick="salvarFicha()">Salvar</button>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
const FUNCOES = [
  {id:'apoio',          label:'Apoio',           cat:'Básica'},
  {id:'cruz',           label:'Cruz',            cat:'Básica'},
  {id:'vela',           label:'Vela',            cat:'Básica'},
  {id:'sineta',         label:'Sineta',          cat:'Básica'},
  {id:'sinao',          label:'Sinão',           cat:'Básica'},
  {id:'altar',          label:'Altar',           cat:'Intermediária'},
  {id:'turibulo',       label:'Turíbulo',        cat:'Intermediária'},
  {id:'naveta',         label:'Naveta',          cat:'Intermediária'},
  {id:'missal',         label:'Missal',          cat:'Avançada'},
  {id:'cred_altar',     label:'Cerimoniário Altar',     cat:'Avançada'},
  {id:'cred_credencia', label:'Cerimoniário Credência', cat:'Avançada'},
  {id:'mitra',          label:'Mitra',           cat:'Episcopal'},
  {id:'baculo',         label:'Báculo',          cat:'Episcopal'},
];
const PROF_NIVEIS = ['nao_treinado','em_formacao','apto','experiente','referencia']; // proficiência (não confundir com NIVEIS da jornada, em shared.js)
const NIVEL_LABEL = {
  nao_treinado:'Não Treinado', em_formacao:'Em Formação',
  apto:'Apto', experiente:'Experiente', referencia:'Referência'
};
const ROLE_LABEL = {
  cerimonario:'Cerimoniário', acolito:'Acólito', coroinha:'Coroinha',
  aspirante:'Aspirante', membro_equipe:'Equipe', subadmin:'Sub-Admin',
  coord_admin:'Coord. Admin', novo:'Novo'
};
const HORARIOS = [
  {dia:'sabado',  horario:'17h',   label:'Sábado 17h'},
  {dia:'sabado',  horario:'18h30', label:'Sáb. 18h30 (Sto. Antônio)'},
  {dia:'domingo', horario:'7h',    label:'Domingo 7h'},
  {dia:'domingo', horario:'9h',    label:'Domingo 9h'},
  {dia:'domingo', horario:'19h',   label:'Domingo 19h'},
];
const JORNADA = [
  {role:'aspirante',label:'Aspirante',icon:'✦'},
  {role:'coroinha',label:'Coroinha',icon:'♛'},
  {role:'acolito',label:'Acólito',icon:'⊕'},
  {role:'cerimonario',label:'Cerimoniário',icon:'✵'},
];

let ctx = null;
let todos = [];
let filtroAtivo = '';
let membroAtual = null;
let habAtual = {};
let roleMap = {};
let fichaEdits = {}; // alterações da ficha (Pessoal/Família/Observações) — persiste entre abas
let fichaDirty = false; // há alterações não salvas?
let fichaDisp = null;   // estado da disponibilidade (Set 'dia_horario') enquanto a ficha está aberta
let vista = localStorage.getItem('membros-vista') || 'cards'; // 'cards' | 'lista'

async function init() {
  ctx = await initModulo(['coord_admin','subadmin','membro_equipe']);
  if (!ctx) return;
  renderHeader(ctx, 'membros');
  renderBottomNav(ctx.membership.role, 'membros', ctx.membro?.nivel);
  document.getElementById('vt-cards').classList.toggle('active', vista === 'cards');
  document.getElementById('vt-lista').classList.toggle('active', vista === 'lista');
  await loadMembros();
}

async function loadMembros() {
  const { data: membros } = await sbAdmin
    .from('acolitos_membros').select('*').eq('status','ativo').order('nome');
  const { data: modulo } = await sbAdmin
    .from('pastoral_modules').select('id').eq('slug','acolitos').maybeSingle();
  if (modulo) {
    const { data: pm } = await sbAdmin
      .from('pastoral_members').select('user_id,role').eq('module_id', modulo.id);
    roleMap = {};
    (pm || []).forEach(r => { roleMap[r.user_id] = r.role; });
  }
  todos = (membros || []).map(m => ({ ...m, role: (m.user_id && roleMap[m.user_id]) || 'aspirante' }));
  renderGrid();
}

function filtrar() { renderGrid(); }
function setVista(v) {
  vista = v; localStorage.setItem('membros-vista', v);
  const c = document.getElementById('vt-cards'), l = document.getElementById('vt-lista');
  if (c) c.classList.toggle('active', v === 'cards');
  if (l) l.classList.toggle('active', v === 'lista');
  renderGrid();
}
function setFiltro(btn, role) {
  filtroAtivo = role;
  document.querySelectorAll('#filtros .form-toggle').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function renderGrid() {
  const busca = document.getElementById('busca').value.toLowerCase();
  const grid = document.getElementById('grid');
  grid.className = vista === 'lista' ? 'list-view' : 'cards-grid';
  grid.textContent = '';
  const lista = todos.filter(m =>
    m.nome.toLowerCase().includes(busca) &&
    (!filtroAtivo || nivelInfo(m.nivel || nivelFromRole(m.role)).base === filtroAtivo)
  );
  if (!lista.length) {
    const em = document.createElement('span'); em.className = 'empty';
    em.textContent = 'Nenhum membro encontrado.'; grid.appendChild(em); return;
  }
  const comLabel = (c) => c === 'matriz' ? 'Matriz' : c === 'santo_antonio' ? 'Sto. Antônio' : 'Outra';
  lista.forEach(m => {
    const slug = m.nivel || nivelFromRole(m.role);
    const ninfo = nivelInfo(slug);

    if (vista === 'lista') {
      const row = document.createElement('div'); row.className = 'list-row';
      row.onclick = () => abrirFicha(m);
      const av = buildAvatarEl(m.foto_url, m.role, 42, { nivelSlug: slug }); av.style.flexShrink = '0';
      const info = document.createElement('div'); info.className = 'list-info';
      info.appendChild(nameBlock(m.nome, m.apelido, 'list-name', 'list-subname'));
      const sub = document.createElement('div'); sub.className = 'list-meta';
      const badge = document.createElement('span'); badge.className = 'badge ' + ninfo.base; badge.textContent = ninfo.label;
      const com = document.createElement('span'); com.className = 'list-com'; com.textContent = comLabel(m.comunidade);
      sub.append(badge, com);
      if (m.eh_equipe && (m.setores || []).length) { const st = document.createElement('span'); st.className = 'list-com'; st.style.color = 'var(--gold)'; st.textContent = '· ' + m.setores.map(s => SETOR_LABEL[s] || s).join(' · '); sub.appendChild(st); }
      info.appendChild(sub);
      row.append(av, info); grid.appendChild(row);
      return;
    }

    const card = document.createElement('div'); card.className = 'member-card';
    card.onclick = () => abrirFicha(m);
    const avatarWrap = document.createElement('div'); avatarWrap.className = 'member-card-avatar';
    avatarWrap.appendChild(buildAvatarEl(m.foto_url, m.role, 60, { nivelSlug: slug }));
    const nome = nameBlock(m.nome, m.apelido, 'member-card-name', 'member-card-subname');
    const meta = document.createElement('div'); meta.className = 'member-card-meta';
    const badge = document.createElement('span'); badge.className = 'badge ' + ninfo.base;
    badge.textContent = ninfo.label; // nome segue o NÍVEL na jornada, não o papel
    meta.appendChild(badge);
    if (m.eh_equipe && (m.setores || []).length) {
      const setorEl = document.createElement('div'); setorEl.className = 'member-card-setor';
      setorEl.textContent = m.setores.map(s => SETOR_LABEL[s] || s).join(' · ');
      meta.appendChild(setorEl);
    }
    const com = document.createElement('div'); com.className = 'member-card-meta';
    com.style.marginTop = '4px'; com.textContent = comLabel(m.comunidade);
    card.append(avatarWrap, nome, meta, com);
    grid.appendChild(card);
  });
}

async function abrirFicha(membro) {
  membroAtual = membro;
  habAtual = {};
  fichaEdits = {};
  fichaDirty = false; fichaDisp = null; updateDirtyUI();
  const fmsg = document.getElementById('ficha-msg'); if (fmsg) { fmsg.className = 'msg'; fmsg.textContent = ''; }

  // Header — avatar editável (equipe sobe/edita foto do membro)
  const hdr = document.getElementById('ficha-header');
  hdr.textContent = '';
  hdr.appendChild(buildAvatarEl(membro.foto_url, membro.role, 72, {
    editable: true,
    membro,
    nivelSlug: membro.nivel || nivelFromRole(membro.role),
    onUpload: (url) => {
      membro.foto_url = url;
      const alvo = todos.find(t => t.id === membro.id);
      if (alvo) alvo.foto_url = url;
      renderGrid();
    }
  }));
  const nomeEl = nameBlock(membro.nome, membro.apelido, 'ficha-nome', 'ficha-subname');
  const subEl  = document.createElement('div'); subEl.className  = 'ficha-sub';
  let subTxt = nivelInfo(membro.nivel || nivelFromRole(membro.role)).label + ' · ' +
    (membro.comunidade === 'matriz' ? 'Matriz' : membro.comunidade === 'santo_antonio' ? 'Sto. Antônio' : 'Outra');
  if (membro.eh_equipe && (membro.setores || []).length) subTxt += ' · ' + membro.setores.map(s => SETOR_LABEL[s] || s).join(', ');
  subEl.textContent = subTxt;
  hdr.append(nomeEl, subEl);

  // Botão visual para alterar o nível (rank) na jornada
  const curNivel = membro.nivel || nivelFromRole(membro.role);
  const rankBtn = document.createElement('button'); rankBtn.className = 'btn-sm gold nivel-btn'; rankBtn.style.marginTop = '12px';
  rankBtn.textContent = '⬆  Alterar nível · ' + nivelInfo(curNivel).label;
  rankBtn.onclick = () => abrirSeletorNivel(membro, rankBtn);
  hdr.appendChild(rankBtn);

  // Tabs
  const tabs = ['Pessoal','Habilitações','Disponibilidade','Família','Frequência','Evolução','Observações'];
  if (['coord_admin','subadmin'].includes(ctx.membership.role)) tabs.push('Acessos');
  const tabsEl = document.getElementById('ficha-tabs'); tabsEl.textContent = '';
  tabs.forEach((t, i) => {
    const btn = document.createElement('button'); btn.className = 'ficha-tab' + (i === 0 ? ' active' : '');
    btn.textContent = t;
    btn.onclick = () => {
      document.querySelectorAll('.ficha-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTab(t);
    };
    tabsEl.appendChild(btn);
  });

  await renderTab('Pessoal');
  document.getElementById('modal-ficha').classList.add('open');
}

// ── Campos editáveis (gravam em fichaEdits, que sobrevive à troca de aba) ──
function fGroup(label) {
  const g = document.createElement('div'); g.className = 'form-group';
  const l = document.createElement('label'); l.className = 'form-label'; l.textContent = label;
  g.appendChild(l); return g;
}
// Valor atual do campo: o que foi editado (fichaEdits) tem prioridade sobre o do registro
function curVal(col, val) { return (col in fichaEdits) ? fichaEdits[col] : val; }
function setDirty() { fichaDirty = true; updateDirtyUI(); }
function updateDirtyUI() {
  const d = document.getElementById('ficha-dirty'); if (d) d.style.display = fichaDirty ? 'flex' : 'none';
  const b = document.getElementById('btn-salvar'); if (b) b.classList.toggle('pulse', fichaDirty);
}
function editText(label, col, val, type) {
  const g = fGroup(label);
  const i = document.createElement('input'); i.className = 'form-input'; i.type = type || 'text';
  const v0 = curVal(col, val); i.value = v0 == null ? '' : v0;
  i.oninput = () => { fichaEdits[col] = type === 'date' ? (i.value || null) : i.value; setDirty(); };
  g.appendChild(i); return g;
}
function editArea(label, col, val) {
  const g = fGroup(label);
  const v0 = curVal(col, val);
  const t = document.createElement('textarea'); t.className = 'form-textarea'; t.rows = 3; t.value = v0 || '';
  t.oninput = () => { fichaEdits[col] = t.value.trim() || null; setDirty(); };
  g.appendChild(t); return g;
}
function editSelect(label, col, val, opts) {
  const g = fGroup(label);
  const v0 = curVal(col, val);
  const s = document.createElement('select'); s.className = 'form-select';
  opts.forEach(([v, t]) => { const o = document.createElement('option'); o.value = v; o.textContent = t; if (String(v) === String(v0)) o.selected = true; s.appendChild(o); });
  s.onchange = () => { fichaEdits[col] = s.value; setDirty(); };
  g.appendChild(s); return g;
}
function editBool(label, col, val, onChange) {
  const g = fGroup(label);
  const wrap = document.createElement('div'); wrap.style.cssText = 'display:flex;gap:8px;';
  let cur = !!curVal(col, val);
  [['Sim', true], ['Não', false]].forEach(([t, v]) => {
    const b = document.createElement('button'); b.type = 'button'; b.className = 'form-toggle' + (cur === v ? ' active' : ''); b.textContent = t;
    b.onclick = () => { cur = v; fichaEdits[col] = v; wrap.querySelectorAll('.form-toggle').forEach(x => x.classList.remove('active')); b.classList.add('active'); setDirty(); if (onChange) onChange(v); };
    wrap.appendChild(b);
  });
  g.appendChild(wrap); return g;
}

function editMulti(label, col, current, options) {
  const g = fGroup(label);
  const cur = new Set(((col in fichaEdits) ? fichaEdits[col] : current) || []);
  const box = document.createElement('div'); box.style.cssText = 'display:flex;flex-direction:column;gap:6px;';
  options.forEach(([val, lab]) => {
    const row = document.createElement('label'); row.className = 'irmao-row';
    const chk = document.createElement('input'); chk.type = 'checkbox'; chk.checked = cur.has(val);
    chk.onchange = () => { if (chk.checked) cur.add(val); else cur.delete(val); fichaEdits[col] = [...cur]; setDirty(); };
    const sp = document.createElement('span'); sp.style.cssText = 'font-size:13px;'; sp.textContent = lab;
    row.append(chk, sp); box.appendChild(row);
  });
  g.appendChild(box); return g;
}

// Campos de equipe/coordenação (serve, coordenação, setores, permissões)
function appendEquipeFields(el, m) {
  el.appendChild(editBool('Serve no altar? (tem jornada/ausências)', 'serve', m.serve !== false));
  const reveal = document.createElement('div');
  reveal.style.cssText = 'display:' + (m.eh_equipe ? 'block' : 'none') + ';margin:2px 0 6px;padding:12px;background:var(--surface);border:1px solid var(--border-wine);border-radius:8px;';
  el.appendChild(editBool('É da coordenação / equipe?', 'eh_equipe', m.eh_equipe, (on) => { reveal.style.display = on ? 'block' : 'none'; }));
  const lblS = document.createElement('div'); lblS.className = 'form-label'; lblS.textContent = 'Setores (um ou mais)';
  reveal.appendChild(lblS);
  reveal.appendChild(editMulti('', 'setores', m.setores, SETORES));
  const lblP = document.createElement('div'); lblP.className = 'form-label'; lblP.style.marginTop = '10px'; lblP.textContent = 'Módulos liberados para esta pessoa';
  reveal.appendChild(lblP);
  reveal.appendChild(editMulti('', 'permissoes', m.permissoes, MODULOS_LIBERAVEIS.map(x => [x[0], x[1]])));
  el.appendChild(reveal);
}

async function renderTab(tab) {
  const el = document.getElementById('ficha-conteudo');
  el.textContent = '';
  const m = membroAtual;

  if (tab === 'Pessoal') {
    el.appendChild(editText('Apelido (opcional)', 'apelido', m.apelido));
    el.appendChild(editText('Nome', 'nome', m.nome));
    el.appendChild(editText('Data de nascimento', 'data_nascimento', m.data_nascimento, 'date'));
    if (m.data_nascimento) {
      const row = document.createElement('div'); row.className = 'stat-row';
      const lbl = document.createElement('span'); lbl.className = 'stat-label'; lbl.textContent = 'Idade';
      const val = document.createElement('span'); val.className = 'stat-value'; val.textContent = calcIdade(m.data_nascimento) + ' anos';
      row.append(lbl, val); el.appendChild(row);
    }
    el.appendChild(editText('Telefone', 'telefone', m.telefone));
    el.appendChild(editText('Responsável', 'responsavel', m.responsavel));
    el.appendChild(editSelect('Comunidade', 'comunidade', m.comunidade || 'matriz', [['matriz','Matriz'],['santo_antonio','Sto. Antônio'],['outra','Outra']]));
    el.appendChild(editBool('Pode servir em outras comunidades?', 'pode_outras_comunidades', m.pode_outras_comunidades));
    el.appendChild(editText('Cel. mãe', 'celular_mae', m.celular_mae));
    el.appendChild(editText('Cel. recado', 'celular_recado', m.celular_recado));
    el.appendChild(editText('Endereço', 'endereco', m.endereco));
    el.appendChild(editBool('Batismo', 'batismo', m.batismo));
    el.appendChild(editBool('1ª Eucaristia', 'primeira_eucaristia', m.primeira_eucaristia));
    el.appendChild(editBool('Crisma', 'crisma', m.crisma));
    el.appendChild(editBool('Túnica própria', 'tem_tunica', m.tem_tunica));
    el.appendChild(editBool('No grupo do WhatsApp', 'no_grupo_whatsapp', m.no_grupo_whatsapp));
  }

  if (tab === 'Habilitações') {
    const { data: habs } = await sbAdmin
      .from('acolitos_habilitacoes').select('*').eq('membro_id', m.id);
    habAtual = {};
    (habs || []).forEach(h => { habAtual[h.funcao] = h.proficiencia; });

    const grid = document.createElement('div'); grid.className = 'hab-grid';
    FUNCOES.forEach(fn => {
      const nivel = habAtual[fn.id] || 'nao_treinado';
      const card = document.createElement('div'); card.className = 'hab-card ' + nivel; card.id = 'hc-' + fn.id;
      const nome = document.createElement('div'); nome.className = 'hab-nome'; nome.textContent = fn.label;
      const nivelEl = document.createElement('div'); nivelEl.className = 'hab-nivel'; nivelEl.id = 'hn-' + fn.id;
      nivelEl.textContent = NIVEL_LABEL[nivel];
      const sel = document.createElement('select'); sel.className = 'hab-sel';
      PROF_NIVEIS.forEach(n => {
        const opt = document.createElement('option'); opt.value = n;
        opt.textContent = NIVEL_LABEL[n]; if (n === nivel) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.onchange = () => {
        const v = sel.value; habAtual[fn.id] = v;
        card.className = 'hab-card ' + v;
        document.getElementById('hn-' + fn.id).textContent = NIVEL_LABEL[v];
        setDirty();
      };
      card.append(nome, nivelEl, sel); grid.appendChild(card);
    });
    el.appendChild(grid);
  }

  if (tab === 'Disponibilidade') {
    if (fichaDisp === null) {
      const { data: disp } = await sbAdmin
        .from('acolitos_disponibilidade').select('*').eq('membro_id', m.id);
      fichaDisp = new Set((disp || []).map(d => d.dia + '_' + d.horario));
    }
    HORARIOS.forEach(h => {
      const key = h.dia + '_' + h.horario;
      const row = document.createElement('div'); row.className = 'toggle-row';
      const lbl = document.createElement('label'); lbl.textContent = h.label;
      const chk = document.createElement('input'); chk.type = 'checkbox';
      chk.className = 'toggle-checkbox';
      chk.checked = fichaDisp.has(key);
      chk.onchange = () => { if (chk.checked) fichaDisp.add(key); else fichaDisp.delete(key); setDirty(); };
      row.append(lbl, chk); el.appendChild(row);
    });
  }

  if (tab === 'Família') {
    el.appendChild(editBool('Pai é ministro?', 'tem_pai_ministro', m.tem_pai_ministro));
    el.appendChild(editText('Nome do pai ministro', 'nome_pai_ministro', m.nome_pai_ministro));
    el.appendChild(editBool('Mãe é ministra?', 'tem_mae_ministro', m.tem_mae_ministro));
    el.appendChild(editText('Nome da mãe ministra', 'nome_mae_ministro', m.nome_mae_ministro));
    el.appendChild(editText('Comunidade dos ministros', 'comunidade_ministro', m.comunidade_ministro));
    el.appendChild(editBool('Escalar junto com os pais?', 'escalar_com_pais', m.escalar_com_pais));

    // Irmão(s) na pastoral — habilitar libera o vínculo (janela com busca + multi-seleção)
    const reveal = document.createElement('div');
    reveal.style.cssText = 'display:' + (m.tem_irmao_pastoral ? 'block' : 'none') + ';margin:2px 0 6px;padding:12px;background:var(--surface);border:1px solid var(--border-wine);border-radius:8px;';
    el.appendChild(editBool('Tem irmão(s) na pastoral?', 'tem_irmao_pastoral', m.tem_irmao_pastoral, (on) => { reveal.style.display = on ? 'block' : 'none'; }));
    const lblIr = document.createElement('div'); lblIr.className = 'form-label'; lblIr.textContent = 'Irmãos vinculados';
    const irmaosLista = document.createElement('div'); irmaosLista.className = 'irmaos-lista';
    function renderIrmaos() {
      irmaosLista.textContent = '';
      const irmaos = m.grupo_irmaos ? todos.filter(t => t.grupo_irmaos === m.grupo_irmaos && t.id !== m.id) : [];
      if (!irmaos.length) { const e = document.createElement('span'); e.style.cssText = 'font-size:12px;color:var(--text-muted);font-style:italic;'; e.textContent = 'Nenhum irmão vinculado.'; irmaosLista.appendChild(e); return; }
      irmaos.forEach(ir => { const chip = document.createElement('span'); chip.className = 'irmao-chip'; chip.textContent = ir.apelido || ir.nome.split(' ')[0]; irmaosLista.appendChild(chip); });
    }
    renderIrmaos();
    const vincBtn = document.createElement('button'); vincBtn.className = 'btn-sm gold'; vincBtn.style.marginTop = '4px'; vincBtn.textContent = '🔗 Vincular irmãos';
    vincBtn.onclick = () => abrirSeletorIrmaos(m, renderIrmaos);
    reveal.append(lblIr, irmaosLista, vincBtn);
    el.appendChild(reveal);

    el.appendChild(editBool('Escalar junto com o irmão?', 'escalar_com_irmao', m.escalar_com_irmao));
  }

  if (tab === 'Frequência') {
    const loading = document.createElement('span'); loading.className = 'loading';
    loading.textContent = 'Calculando...'; el.appendChild(loading);
    const f = await fetchFrequencia(m.id);
    el.textContent = '';

    if (!f || !f.total_escalas) {
      const em = document.createElement('span'); em.className = 'empty';
      em.textContent = 'Sem escalas registradas para este membro ainda.';
      el.appendChild(em);
    } else {
      // Destaque da taxa
      const taxa = f.taxa != null ? f.taxa : '—';
      const dest = document.createElement('div');
      dest.style.cssText = 'text-align:center;padding:14px 0 18px;';
      const tNum = document.createElement('div');
      tNum.style.cssText = "font-family:'Sora',sans-serif;font-size:34px;font-weight:700;color:var(--gold);line-height:1;";
      tNum.textContent = taxa + (taxa === '—' ? '' : '%');
      const tLbl = document.createElement('div');
      tLbl.style.cssText = 'font-size:11px;color:var(--text-muted);font-family:Sora,sans-serif;letter-spacing:1px;text-transform:uppercase;margin-top:6px;';
      tLbl.textContent = 'Taxa de Comparecimento';
      dest.append(tNum, tLbl); el.appendChild(dest);

      // KPIs
      const grid = document.createElement('div'); grid.className = 'kpi-grid';
      grid.style.gridTemplateColumns = '1fr 1fr 1fr';
      [
        { label:'Servidas',     value:f.servidas || 0 },
        { label:'Escaladas',    value:f.total_escalas || 0 },
        { label:'Pendentes',    value:f.pendentes || 0 },
        { label:'Faltas Just.', value:f.faltas_just || 0 },
        { label:'Faltas',       value:f.faltas_nao_just || 0 },
        { label:'Atrasos',      value:f.atrasos || 0 },
      ].forEach(k => {
        const c = document.createElement('div'); c.className = 'kpi-card';
        const v = document.createElement('div'); v.className = 'kpi-value'; v.style.fontSize = '20px'; v.textContent = k.value;
        const l = document.createElement('div'); l.className = 'kpi-label'; l.textContent = k.label;
        c.append(v, l); grid.appendChild(c);
      });
      el.appendChild(grid);

      const ult = document.createElement('div'); ult.className = 'stat-row'; ult.style.marginTop = '14px';
      const ul = document.createElement('span'); ul.className = 'stat-label'; ul.textContent = 'Última participação';
      const uv = document.createElement('span'); uv.className = 'stat-value';
      uv.textContent = f.ultima_participacao ? formatDate(f.ultima_participacao) : '—';
      ult.append(ul, uv); el.appendChild(ult);

      // Gráfico — presença nos últimos 6 meses
      const seis = new Date(); seis.setMonth(seis.getMonth()-5); seis.setDate(1);
      const { data: escs } = await sb.from('acolitos_escalas')
        .select('status, acolitos_celebracoes!inner(data)')
        .eq('membro_id', m.id).gte('acolitos_celebracoes.data', seis.toISOString().slice(0,10));
      renderMesChart(el, escs||[]);
    }
  }

  if (tab === 'Evolução') {
    // Jornada do membro
    const track = document.createElement('div'); track.className = 'jornada-track';
    const roleIdx = JORNADA.findIndex(j => j.role === m.role);
    JORNADA.forEach((j,i) => {
      const step=document.createElement('div'); step.className='jornada-step';
      const dot=document.createElement('div'); dot.className='jornada-dot'+(i<roleIdx?' done':i===roleIdx?' current':'');
      dot.textContent = i<=roleIdx ? j.icon : '○';
      const lbl=document.createElement('div'); lbl.className='jornada-label'+(i===roleIdx?' current':''); lbl.textContent=j.label;
      step.append(dot,lbl); track.appendChild(step);
      if (i<JORNADA.length-1){const line=document.createElement('div');line.className='jornada-line'+(i<roleIdx?' done':'');track.appendChild(line);}
    });
    el.appendChild(track);

    // Formações concluídas (derivadas das habilitações: apto+)
    const { data: habs } = await sbAdmin.from('acolitos_habilitacoes').select('funcao,proficiencia').eq('membro_id', m.id);
    const formado = (habs||[]).filter(h=>['apto','experiente','referencia'].includes(h.proficiencia));
    const emForm = (habs||[]).filter(h=>h.proficiencia==='em_formacao');
    const fLabel = id => (FUNCOES.find(f=>f.id===id)||{}).label || id;

    const tit1=document.createElement('div'); tit1.className='section-card-title'; tit1.style.marginTop='16px'; tit1.textContent='Funções formadas ('+formado.length+')';
    el.appendChild(tit1);
    if(!formado.length){const em=document.createElement('div');em.style.cssText='font-size:12px;color:var(--text-muted);font-style:italic;';em.textContent='Nenhuma função concluída ainda.';el.appendChild(em);}
    else { const wrap=document.createElement('div'); wrap.style.cssText='display:flex;flex-wrap:wrap;gap:6px;'; formado.forEach(h=>{const c=document.createElement('span');c.className='badge acolito';c.textContent=fLabel(h.funcao);wrap.appendChild(c);}); el.appendChild(wrap); }

    if(emForm.length){
      const tit2=document.createElement('div'); tit2.className='section-card-title'; tit2.style.marginTop='16px'; tit2.textContent='Em formação ('+emForm.length+')';
      el.appendChild(tit2);
      const wrap2=document.createElement('div'); wrap2.style.cssText='display:flex;flex-wrap:wrap;gap:6px;'; emForm.forEach(h=>{const c=document.createElement('span');c.className='badge pendente';c.textContent=fLabel(h.funcao);wrap2.appendChild(c);}); el.appendChild(wrap2);
    }

    // Próxima etapa
    const tit3=document.createElement('div'); tit3.className='section-card-title'; tit3.style.marginTop='16px'; tit3.textContent='Próxima etapa';
    el.appendChild(tit3);
    const pe=document.createElement('div'); pe.style.cssText='font-size:13px;color:var(--text);'; pe.textContent = m.proxima_etapa || '— (defina na aba Observações)';
    el.appendChild(pe);
  }

  if (tab === 'Acessos') {
    const tLogin = document.createElement('div'); tLogin.className = 'section-card-title'; tLogin.textContent = 'Login'; el.appendChild(tLogin);
    const info = document.createElement('p'); info.style.cssText = 'font-size:12px;color:var(--text-muted);margin-bottom:12px;line-height:1.5;';
    el.appendChild(info);
    const msgEl = document.createElement('div'); msgEl.id = 'ac-msg'; msgEl.className = 'msg'; msgEl.style.marginTop = '12px';

    if (m.user_id) {
      info.textContent = 'Troque o usuário (login) ou redefina a senha quando precisar.';
      // Usuário atual (carregado do servidor) — confirmação visível
      const atual = document.createElement('div'); atual.className = 'acesso-atual'; atual.textContent = 'Usuário atual: carregando…';
      el.appendChild(atual);
      const setAtual = (u) => { atual.textContent = 'Usuário atual: ' + (u || '—'); };
      acGetUsuario(m.user_id).then(setAtual);

      const g1 = document.createElement('div'); g1.className = 'form-group';
      const l1 = document.createElement('label'); l1.className = 'form-label'; l1.textContent = 'Novo usuário';
      const i1 = document.createElement('input'); i1.className = 'form-input'; i1.placeholder = 'ex: joao.silva';
      const b1 = document.createElement('button'); b1.className = 'btn-sm gold'; b1.style.marginTop = '8px'; b1.textContent = 'Trocar usuário';
      b1.onclick = async () => {
        if (!i1.value.trim()) { msgEl.className = 'msg error'; msgEl.textContent = 'Digite o novo usuário.'; return; }
        const d = await acAction('username', { user_id: m.user_id, usuario: i1.value.trim() }, b1);
        if (d) { i1.value = ''; acGetUsuario(m.user_id).then(setAtual); }
      };
      g1.append(l1, i1, b1); el.appendChild(g1);

      const g2 = document.createElement('div'); g2.className = 'form-group'; g2.style.marginTop = '12px';
      const l2 = document.createElement('label'); l2.className = 'form-label'; l2.textContent = 'Nova senha';
      const i2 = document.createElement('input'); i2.className = 'form-input'; i2.type = 'text'; i2.placeholder = 'mínimo 6 caracteres';
      const b2 = document.createElement('button'); b2.className = 'btn-sm gold'; b2.style.marginTop = '8px'; b2.textContent = 'Resetar senha';
      b2.onclick = async () => {
        if ((i2.value || '').length < 6) { msgEl.className = 'msg error'; msgEl.textContent = 'Senha muito curta (mín. 6).'; return; }
        const d = await acAction('password', { user_id: m.user_id, password: i2.value }, b2);
        if (d) { msgEl.className = 'msg success'; msgEl.textContent = 'Senha atualizada! Anote: ' + i2.value; }
      };
      g2.append(l2, i2, b2); el.appendChild(g2);
    } else {
      info.textContent = 'Este membro ainda NÃO tem login. Crie um usuário e senha para ele acessar.';
      const g1 = document.createElement('div'); g1.className = 'form-group';
      const l1 = document.createElement('label'); l1.className = 'form-label'; l1.textContent = 'Usuário';
      const i1 = document.createElement('input'); i1.className = 'form-input'; i1.placeholder = 'ex: joao.silva';
      g1.append(l1, i1); el.appendChild(g1);
      const g2 = document.createElement('div'); g2.className = 'form-group';
      const l2 = document.createElement('label'); l2.className = 'form-label'; l2.textContent = 'Senha';
      const i2 = document.createElement('input'); i2.className = 'form-input'; i2.type = 'text'; i2.placeholder = 'mínimo 6 caracteres';
      g2.append(l2, i2); el.appendChild(g2);
      const b = document.createElement('button'); b.className = 'btn gold'; b.textContent = 'Criar acesso';
      b.onclick = async () => {
        const d = await acAction('create', { membro_id: m.id, usuario: i1.value.trim(), password: i2.value, nome: m.nome }, b);
        if (d) renderTab('Acessos'); // re-renderiza no modo "já tem acesso", mostrando o usuário
      };
      el.appendChild(b);
    }
    el.appendChild(msgEl);

    // Coordenação / equipe / setores
    const hr = document.createElement('div'); hr.style.cssText = 'border-top:1px solid var(--border-wine);margin:18px 0 14px;';
    el.appendChild(hr);
    const tEq = document.createElement('div'); tEq.className = 'section-card-title'; tEq.textContent = 'Coordenação & Setores'; el.appendChild(tEq);
    appendEquipeFields(el, m);
  }

  if (tab === 'Observações') {
    const nivelAtual = m.nivel || nivelFromRole(m.role);
    el.appendChild(editSelect('Nível na Jornada (rank)', 'nivel', nivelAtual, NIVEIS.map(n => [n.slug, (n.emoji ? n.emoji + ' ' : '') + n.label])));
    el.appendChild(editArea('Necessidades Especiais', 'necessidades_especiais', m.necessidades_especiais));
    el.appendChild(editArea('Observações Gerais', 'observacoes', m.observacoes));
    el.appendChild(editText('Próxima Etapa de Formação', 'proxima_etapa', m.proxima_etapa));
  }
}

function renderMesChart(el, escalas) {
  const card=document.createElement('div'); card.style.marginTop='18px';
  const t=document.createElement('div'); t.className='section-card-title'; t.textContent='Presença — últimos 6 meses'; card.appendChild(t);
  card.appendChild(buildPresencaChart(escalas)); // helper compartilhado (shared.js)
  el.appendChild(card);
}

// Seletor visual de nível (grade dos 10 patches) — salva direto no membro
function abrirSeletorNivel(membro, rankBtn) {
  let escolha = membro.nivel || nivelFromRole(membro.role);
  const ov = document.createElement('div'); ov.className = 'modal-overlay open'; ov.style.zIndex = '200';
  ov.onclick = (e) => { if (e.target === ov) ov.remove(); };
  const modal = document.createElement('div'); modal.className = 'modal';
  const handle = document.createElement('div'); handle.className = 'modal-handle';
  const tt = document.createElement('div'); tt.className = 'modal-title'; tt.textContent = 'Definir nível · ' + membro.nome.split(' ')[0];
  const sub = document.createElement('p'); sub.style.cssText = 'font-size:12px;color:var(--text-muted);margin:-8px 0 14px;font-weight:600;';
  sub.textContent = 'Toque no patch do nível desejado. O membro vê a comemoração ao subir.';
  modal.append(handle, tt, sub);

  const grid = document.createElement('div'); grid.className = 'nivelsel-grid';
  const cells = {};
  const titEl = document.createElement('div'); titEl.className = 'nivelsel-titulo';
  NIVEIS.forEach((n, i) => {
    const cell = document.createElement('button'); cell.type = 'button'; cell.className = 'nivelsel-cell' + (n.slug === escolha ? ' sel' : '');
    const num = document.createElement('span'); num.className = 'nivelsel-num'; num.textContent = i + 1;
    const emb = document.createElement('div'); emb.className = 'nivelsel-emb'; emb.innerHTML = getNivelSvg(n.slug, 46); // SVG hardcoded — seguro
    const lbl = document.createElement('div'); lbl.className = 'nivelsel-lbl'; lbl.textContent = n.label;
    cell.append(num, emb, lbl);
    cell.onclick = () => { escolha = n.slug; Object.values(cells).forEach(c => c.classList.remove('sel')); cell.classList.add('sel'); titEl.textContent = '🏆 ' + n.titulo; };
    cells[n.slug] = cell; grid.appendChild(cell);
  });
  modal.appendChild(grid);
  titEl.textContent = '🏆 ' + nivelInfo(escolha).titulo; modal.appendChild(titEl);
  const msg = document.createElement('div'); msg.className = 'msg'; modal.appendChild(msg);

  const acts = document.createElement('div'); acts.className = 'modal-actions';
  const cancel = document.createElement('button'); cancel.className = 'btn-sm gray'; cancel.textContent = 'Cancelar'; cancel.onclick = () => ov.remove();
  const conf = document.createElement('button'); conf.className = 'btn-sm gold'; conf.textContent = 'Salvar nível';
  conf.onclick = async () => {
    conf.disabled = true; conf.textContent = 'Salvando...';
    const { error } = await sbAdmin.from('acolitos_membros').update({ nivel: escolha }).eq('id', membro.id);
    if (error) { msg.className = 'msg error'; msg.textContent = 'Erro: ' + error.message; conf.disabled = false; conf.textContent = 'Salvar nível'; return; }
    membro.nivel = escolha;
    const alvo = todos.find(t => t.id === membro.id); if (alvo) alvo.nivel = escolha;
    if (rankBtn) rankBtn.textContent = '⬆  Alterar nível · ' + nivelInfo(escolha).label;
    ov.remove(); renderGrid();
  };
  acts.append(cancel, conf); modal.appendChild(acts);
  ov.appendChild(modal); document.body.appendChild(ov);
}

// Janela de vínculo de irmãos — busca + marcar uma ou mais opções (grupo compartilhado)
function abrirSeletorIrmaos(membro, onDone) {
  const ov = document.createElement('div'); ov.className = 'modal-overlay open'; ov.style.zIndex = '210';
  ov.onclick = (e) => { if (e.target === ov) ov.remove(); };
  const modal = document.createElement('div'); modal.className = 'modal';
  const handle = document.createElement('div'); handle.className = 'modal-handle';
  const tt = document.createElement('div'); tt.className = 'modal-title'; tt.textContent = 'Vincular irmãos';
  const sub = document.createElement('p'); sub.style.cssText = 'font-size:12px;color:var(--text-muted);margin:-8px 0 12px;font-weight:600;';
  sub.textContent = 'Marque um ou mais irmãos de ' + membro.nome.split(' ')[0] + '.';
  modal.append(handle, tt, sub);

  const search = document.createElement('input'); search.className = 'form-input'; search.placeholder = '🔍 Buscar nome ou apelido...'; search.style.marginBottom = '10px';
  modal.appendChild(search);
  const listEl = document.createElement('div'); listEl.style.cssText = 'max-height:46vh;overflow-y:auto;display:flex;flex-direction:column;gap:6px;';
  modal.appendChild(listEl);

  const sel = new Set(membro.grupo_irmaos ? todos.filter(t => t.grupo_irmaos === membro.grupo_irmaos && t.id !== membro.id).map(t => t.id) : []);
  function render() {
    const q = search.value.toLowerCase();
    listEl.textContent = '';
    todos.filter(t => t.id !== membro.id && (t.nome.toLowerCase().includes(q) || (t.apelido || '').toLowerCase().includes(q))).forEach(t => {
      const row = document.createElement('label'); row.className = 'irmao-row';
      const chk = document.createElement('input'); chk.type = 'checkbox'; chk.checked = sel.has(t.id);
      chk.onchange = () => { if (chk.checked) sel.add(t.id); else sel.delete(t.id); };
      const av = buildAvatarEl(t.foto_url, t.role, 30, { nivelSlug: t.nivel || nivelFromRole(t.role) }); av.style.flexShrink = '0';
      const nm = document.createElement('span'); nm.style.cssText = 'flex:1;font-size:13px;min-width:0;'; nm.textContent = (t.apelido ? t.apelido + ' · ' : '') + t.nome;
      row.append(chk, av, nm); listEl.appendChild(row);
    });
  }
  search.oninput = render; render();

  const msg = document.createElement('div'); msg.className = 'msg'; modal.appendChild(msg);
  const acts = document.createElement('div'); acts.className = 'modal-actions';
  const cancel = document.createElement('button'); cancel.className = 'btn-sm gray'; cancel.textContent = 'Cancelar'; cancel.onclick = () => ov.remove();
  const conf = document.createElement('button'); conf.className = 'btn-sm gold'; conf.textContent = 'Salvar vínculo';
  conf.onclick = async () => {
    conf.disabled = true; conf.textContent = 'Salvando...';
    const selecionados = [...sel];
    const newGid = (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : (Date.now() + '-' + Math.random().toString(16).slice(2));
    const gid = membro.grupo_irmaos || newGid;
    try {
      if (selecionados.length) {
        const ids = [membro.id, ...selecionados];
        const { error } = await sbAdmin.from('acolitos_membros').update({ grupo_irmaos: gid, tem_irmao_pastoral: true }).in('id', ids);
        if (error) throw error;
        if (membro.grupo_irmaos) {
          const removidos = todos.filter(t => t.grupo_irmaos === membro.grupo_irmaos && t.id !== membro.id && !sel.has(t.id)).map(t => t.id);
          if (removidos.length) await sbAdmin.from('acolitos_membros').update({ grupo_irmaos: null }).in('id', removidos);
          removidos.forEach(id => { const t = todos.find(x => x.id === id); if (t) t.grupo_irmaos = null; });
        }
        ids.forEach(id => { const t = todos.find(x => x.id === id); if (t) { t.grupo_irmaos = gid; t.tem_irmao_pastoral = true; } });
        membro.grupo_irmaos = gid; membro.tem_irmao_pastoral = true; fichaEdits.tem_irmao_pastoral = true;
      } else if (membro.grupo_irmaos) {
        const doGrupo = todos.filter(t => t.grupo_irmaos === membro.grupo_irmaos).map(t => t.id);
        await sbAdmin.from('acolitos_membros').update({ grupo_irmaos: null }).in('id', doGrupo);
        doGrupo.forEach(id => { const t = todos.find(x => x.id === id); if (t) t.grupo_irmaos = null; });
        membro.grupo_irmaos = null;
      }
    } catch (e) { msg.className = 'msg error'; msg.textContent = 'Erro ao salvar: ' + (e.message || ''); conf.disabled = false; conf.textContent = 'Salvar vínculo'; return; }
    ov.remove(); if (onDone) onDone();
  };
  acts.append(cancel, conf); modal.appendChild(acts);
  ov.appendChild(modal); document.body.appendChild(ov);
}

async function acAction(action, payload, btn) {
  const msgEl = document.getElementById('ac-msg');
  const prev = btn.textContent; btn.disabled = true; btn.textContent = 'Aguarde...';
  try {
    const { data: { session } } = await sb.auth.getSession();
    const r = await fetch('/api/acolito-admin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (session?.access_token || '') },
      body: JSON.stringify({ action, ...payload })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Erro');
    if (action === 'create' && d.user_id) membroAtual.user_id = d.user_id;
    if (msgEl) { msgEl.className = 'msg success'; msgEl.textContent = action === 'create' ? 'Acesso criado!' : action === 'password' ? 'Senha atualizada!' : 'Usuário atualizado!'; }
    return d;
  } catch (e) {
    if (msgEl) { msgEl.className = 'msg error'; msgEl.textContent = e.message || 'Não foi possível concluir.'; }
    return null;
  } finally {
    btn.disabled = false; btn.textContent = prev;
  }
}

// Lê o usuário (login) atual de um membro — para exibir confirmação na aba Acesso
async function acGetUsuario(user_id) {
  try {
    const { data: { session } } = await sb.auth.getSession();
    const r = await fetch('/api/acolito-admin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (session?.access_token || '') },
      body: JSON.stringify({ action: 'get', user_id })
    });
    const d = await r.json();
    return r.ok ? d.usuario : null;
  } catch (e) { return null; }
}

async function salvarFicha() {
  if (!membroAtual) return;
  const btn = document.getElementById('btn-salvar');
  const fmsg = document.getElementById('ficha-msg');
  btn.disabled = true; btn.textContent = 'Salvando...';
  try {
    // Habilitações (só se a aba foi aberta — habAtual populado)
    if (Object.keys(habAtual).length) {
      const upserts = Object.entries(habAtual).map(([funcao, proficiencia]) => ({
        membro_id: membroAtual.id, funcao, proficiencia, updated_at: new Date().toISOString()
      }));
      const { error } = await sbAdmin.from('acolitos_habilitacoes').upsert(upserts, { onConflict: 'membro_id,funcao' });
      if (error) throw error;
    }
    // Disponibilidade (só se a aba foi aberta — fichaDisp != null)
    if (fichaDisp !== null) {
      await sbAdmin.from('acolitos_disponibilidade').delete().eq('membro_id', membroAtual.id);
      const sel = [...fichaDisp].map(k => { const i = k.indexOf('_'); return { membro_id: membroAtual.id, dia: k.slice(0, i), horario: k.slice(i + 1) }; });
      if (sel.length) { const { error } = await sbAdmin.from('acolitos_disponibilidade').insert(sel); if (error) throw error; }
    }
    // Campos editáveis (Pessoal / Família / Observações / Nível) — em fichaEdits
    if (Object.keys(fichaEdits).length) {
      const { error } = await sbAdmin.from('acolitos_membros').update(fichaEdits).eq('id', membroAtual.id);
      if (error) throw error;
      Object.assign(membroAtual, fichaEdits);
    }
  } catch (e) {
    if (fmsg) { fmsg.className = 'msg error'; fmsg.textContent = 'Erro ao salvar: ' + (e.message || 'tente novamente.'); }
    btn.disabled = false; btn.textContent = 'Salvar'; return;
  }
  // Aviso informativo ao membro (mudanças que não são só de nível — nível já tem comemoração)
  const camposNaoNivel = Object.keys(fichaEdits).filter(k => k !== 'nivel');
  if (camposNaoNivel.length && membroAtual.user_id) {
    try {
      const cur = Array.isArray(membroAtual.avisos) ? membroAtual.avisos : [];
      const av = [...cur, { msg: 'A coordenação atualizou suas informações no sistema.', logout: false }];
      await sbAdmin.from('acolitos_membros').update({ avisos: av }).eq('id', membroAtual.id);
      membroAtual.avisos = av;
    } catch (e) { /* best-effort */ }
  }

  // Sucesso — NÃO fecha; zera o "não salvo" e mostra confirmação
  fichaEdits = {}; fichaDirty = false; updateDirtyUI();
  btn.disabled = false; btn.textContent = 'Salvar';
  if (fmsg) { fmsg.className = 'msg success'; fmsg.textContent = '✓ Edições salvas'; }
  renderGrid(); // atualiza os cards atrás, sem fechar a janela
}

function fecharFicha() {
  if (fichaDirty && !confirm('Há alterações não salvas. Fechar mesmo assim?')) return;
  document.getElementById('modal-ficha').classList.remove('open');
  membroAtual = null; habAtual = {}; fichaEdits = {}; fichaDirty = false; fichaDisp = null;
}

init();
</script>
