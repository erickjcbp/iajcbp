<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Destaques — Acólitos JCBP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#150a0d">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script>window.addEventListener("beforeinstallprompt",function(e){e.preventDefault();window.__bip=e;});</script>
  <style>
    .dest-tabs { display:flex; gap:6px; margin-bottom:14px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .dest-tab { flex:1; min-width:max-content; padding:9px 12px; background:var(--surface2); border:1px solid var(--border); color:var(--text-muted); border-radius:18px; font-family:'Sora',sans-serif; font-size:11px; font-weight:700; white-space:nowrap; cursor:pointer; -webkit-tap-highlight-color:transparent; }
    .dest-tab.active { border-color:var(--gold); color:var(--gold); background:rgba(232,185,74,.1); }
    .dest-head { font-family:'Sora',sans-serif; font-size:13px; color:var(--gold-light); margin-bottom:4px; }
    .dest-desc { font-size:12px; color:var(--text-muted); margin-bottom:14px; }
    .rank-row { display:flex; align-items:center; gap:12px; padding:9px 8px; border-radius:10px; margin-bottom:6px; background:var(--surface); border:1px solid var(--border); }
    .rank-row.eu { border-color:var(--gold); background:rgba(232,185,74,.07); }
    .rank-pos { width:30px; text-align:center; font-family:'Sora',sans-serif; font-weight:800; font-size:15px; color:var(--text-muted); flex:none; }
    .rank-info { flex:1; min-width:0; }
    .rank-nome { font-weight:700; font-size:14px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .rank-nivel { font-size:11px; color:var(--text-muted); }
    .rank-val { font-family:'Sora',sans-serif; font-weight:800; font-size:15px; color:var(--gold); flex:none; text-align:right; }
    .rank-val small { display:block; font-size:9px; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
  </style>
  <script src="/projetos/acolitos/vendor/supabase-js-2.106.2.min.js"></script>
</head>
<body>
<div id="app-header"></div>
<div id="app-nav"></div>
<div class="main" id="main-content">
  <span class="loading">Carregando...</span>
</div>

<script src="shared.js"></script>
<script>
let ctx = null, dados = null, euId = null;
const ABAS = [
  { key:'servos',    tab:'🕯️ Servos do Altar', head:'Servos do Altar',     desc:'Quem mais serviu nas celebrações.',        unidade:'vezes',    sing:'vez' },
  { key:'versateis', tab:'🎓 Versáteis',        head:'Os mais versáteis',   desc:'Quem domina mais funções no altar.',       unidade:'funções',  sing:'função' },
  { key:'prontos',   tab:'🙋 Sempre prontos',   head:'Sempre prontos',      desc:'Quem se disponibilizou para mais missas.', unidade:'horários', sing:'horário' },
];

async function init() {
  ctx = await initModulo();
  if (!ctx) return;
  renderHeader(ctx, 'destaques');
  renderBottomNav(ctx, 'destaques');
  euId = ctx.membro ? ctx.membro.id : null;
  const { data, error } = await sb.rpc('acolitos_destaques');
  const main = document.getElementById('main-content'); main.textContent = '';
  const title = document.createElement('h1'); title.className = 'page-title'; title.textContent = 'Destaques'; main.appendChild(title);
  const hint = document.createElement('p'); hint.style.cssText = 'font-size:12px;color:var(--text-muted);margin:-6px 0 12px;line-height:1.5;'; hint.textContent = 'Um reconhecimento à dedicação de cada um. 🙏'; main.appendChild(hint);
  if (error) { const e=document.createElement('span'); e.className='empty'; e.textContent='Não foi possível carregar.'; main.appendChild(e); return; }
  dados = data || {};

  const tabs = document.createElement('div'); tabs.className = 'dest-tabs'; main.appendChild(tabs);
  const corpo = document.createElement('div'); corpo.id = 'dest-corpo'; main.appendChild(corpo);
  ABAS.forEach((a, i) => {
    const b = document.createElement('button'); b.className = 'dest-tab' + (i===0?' active':''); b.textContent = a.tab;
    b.onclick = () => { tabs.querySelectorAll('.dest-tab').forEach(x=>x.classList.remove('active')); b.classList.add('active'); renderAba(a); };
    tabs.appendChild(b);
  });
  [['🏆 Temporada', renderTemporada], ['🏅 Campeões', renderCampeoes], ['🙋 Solícitos', renderSolicitos]].forEach(([label, fn]) => {
    const b = document.createElement('button'); b.className = 'dest-tab'; b.textContent = label;
    b.onclick = () => { tabs.querySelectorAll('.dest-tab').forEach(x=>x.classList.remove('active')); b.classList.add('active'); fn(document.getElementById('dest-corpo')); };
    tabs.appendChild(b);
  });
  renderAba(ABAS[0]);
}

const LIGA_LABEL = { iniciantes:'🟢 Iniciantes', acolitos:'🔵 Acólitos', cerimoniarios:'🟣 Cerimoniários' };
function rankRow(m, eu, valor, unidade, pos, medalhaPos) {
  const medalhas = ['🥇','🥈','🥉'];
  const row = document.createElement('div'); row.className = 'rank-row' + (m.id===eu?' eu':''); row.style.cursor = 'pointer'; row.onclick = () => abrirCard(m.id);
  const p = document.createElement('div'); p.className = 'rank-pos'; p.textContent = medalhaPos ? medalhaPos : (pos<=3 ? medalhas[pos-1] : pos);
  const av = buildAvatarEl(m.foto_url, nivelInfo(m.nivel||'aspirante').base, 38, { nivelSlug: m.nivel||'aspirante' }); av.style.flex = 'none';
  const info = document.createElement('div'); info.className = 'rank-info';
  const nmRow = document.createElement('div'); nmRow.style.cssText = 'display:flex;align-items:center;gap:5px;min-width:0;';
  const nm = document.createElement('div'); nm.className = 'rank-nome'; nm.textContent = (m.id===eu?'★ ':'') + m.nome;
  nmRow.append(nm, estrelaTagAsync(m.id));
  const nv = document.createElement('div'); nv.className = 'rank-nivel'; nv.textContent = m.subnivel || nivelInfo(m.nivel||'aspirante').label;
  info.append(nmRow, nv);
  const val = document.createElement('div'); val.className = 'rank-val'; val.innerHTML = valor + '<small>' + unidade + '</small>';
  row.append(p, av, info, val); return row;
}
async function renderTemporada(corpo) {
  corpo.textContent = ''; const ld = document.createElement('div'); ld.className = 'dest-desc'; ld.textContent = 'Carregando...'; corpo.appendChild(ld);
  const { data } = await sb.rpc('acolitos_ranking_temporada');
  corpo.textContent = '';
  if (!data || !data.temporada) { const e = document.createElement('span'); e.className = 'empty'; e.textContent = 'Nenhuma temporada rolando agora. 🙂'; corpo.appendChild(e); return; }
  const h = document.createElement('div'); h.className = 'dest-head'; h.textContent = '🏆 ' + data.temporada.nome; corpo.appendChild(h);
  const d = document.createElement('div'); d.className = 'dest-desc'; d.textContent = 'Ranking de XP da temporada, por liga. O campeão de cada liga vira Destaque!'; corpo.appendChild(d);
  const eu = data.eu_id;
  if (!(data.ligas||[]).length) { const e = document.createElement('span'); e.className = 'empty'; e.textContent = 'Ninguém pontuou ainda. Bora servir! 🕯️'; corpo.appendChild(e); return; }
  acEstrelasLote((data.ligas||[]).flatMap(lg => (lg.membros||[]).map(m => m.id)));
  (data.ligas||[]).forEach(lg => {
    const lh = document.createElement('div'); lh.style.cssText = 'font-family:Sora,sans-serif;font-weight:700;font-size:12px;color:var(--gold);margin:16px 0 6px;'; lh.textContent = LIGA_LABEL[lg.liga] || lg.liga; corpo.appendChild(lh);
    let dist = 0, last = null;
    (lg.membros||[]).forEach(m => { const v = Number(m.xp); if (v!==last) { dist++; last = v; } corpo.appendChild(rankRow(m, eu, v, 'XP', dist)); });
  });
}
async function renderCampeoes(corpo) {
  corpo.textContent = ''; const ld = document.createElement('div'); ld.className = 'dest-desc'; ld.textContent = 'Carregando...'; corpo.appendChild(ld);
  const { data } = await sb.rpc('acolitos_campeoes');
  corpo.textContent = '';
  const h = document.createElement('div'); h.className = 'dest-head'; h.textContent = '🏅 Campeões'; corpo.appendChild(h);
  const d = document.createElement('div'); d.className = 'dest-desc'; d.textContent = 'Os campeões de cada liga nas temporadas encerradas.'; corpo.appendChild(d);
  if (!data || !data.length) { const e = document.createElement('span'); e.className = 'empty'; e.textContent = 'Ainda não há campeões — a primeira temporada está rolando! 🏆'; corpo.appendChild(e); return; }
  acEstrelasLote(data.map(c => c.membro_id));
  const grupos = {}; data.forEach(c => { (grupos[c.temporada] = grupos[c.temporada] || []).push(c); });
  Object.keys(grupos).forEach(temp => {
    const th = document.createElement('div'); th.style.cssText = 'font-family:Sora,sans-serif;font-weight:700;font-size:12px;color:var(--gold);margin:16px 0 6px;'; th.textContent = '🏆 ' + temp; corpo.appendChild(th);
    grupos[temp].forEach(c => corpo.appendChild(rankRow({ id:c.membro_id, nome:c.membro, subnivel:(LIGA_LABEL[c.liga]||c.liga) }, null, c.xp, 'XP', 1, '🏅')));
  });
}

async function renderSolicitos(corpo) {
  corpo.textContent = ''; const ld = document.createElement('div'); ld.className = 'dest-desc'; ld.textContent = 'Carregando...'; corpo.appendChild(ld);
  const { data } = await sb.rpc('acolitos_solicitos');
  corpo.textContent = '';
  const h = document.createElement('div'); h.className = 'dest-head'; h.textContent = '🙋 Solícitos'; corpo.appendChild(h);
  const d = document.createElement('div'); d.className = 'dest-desc'; d.textContent = 'Quem mais serviu sem estar escalado — sempre prontos a ajudar. 🙏'; corpo.appendChild(d);
  if (!data || !data.length) { const e = document.createElement('span'); e.className = 'empty'; e.textContent = 'Ninguém serviu fora de escala ainda. Bora ser solícito! 🙌'; corpo.appendChild(e); return; }
  acEstrelasLote(data.map(m => m.membro_id));
  let dist = 0, last = null;
  data.forEach(m => { const v = Number(m.total); if (v !== last) { dist++; last = v; } corpo.appendChild(rankRow({ id: m.membro_id, nome: m.membro, foto_url: m.foto_url, nivel: m.nivel }, euId, v, v === 1 ? 'vez' : 'vezes', dist)); });
}
function renderAba(a) {
  const corpo = document.getElementById('dest-corpo'); corpo.textContent = '';
  const h = document.createElement('div'); h.className = 'dest-head'; h.textContent = a.head;
  const d = document.createElement('div'); d.className = 'dest-desc'; d.textContent = a.desc;
  corpo.append(h, d);
  const lista = (dados[a.key] || []).filter(x => Number(x.total) > 0);
  if (!lista.length) { const em = document.createElement('span'); em.className = 'empty'; em.textContent = 'Ainda sem dados por aqui.'; corpo.appendChild(em); return; }
  const medalhas = ['🥇','🥈','🥉'];
  acEstrelasLote(lista.map(m => m.id));
  let distintos = 0, ultimoTotal = null; // posição por VALOR: mesmo total = mesma posição (empate)
  lista.forEach((m) => {
    const tot = Number(m.total);
    if (tot !== ultimoTotal) { distintos++; ultimoTotal = tot; }
    const posicao = distintos;
    const row = document.createElement('div'); row.className = 'rank-row' + (m.id === euId ? ' eu' : '');
    row.style.cursor = 'pointer'; row.onclick = () => abrirCard(m.id);
    const pos = document.createElement('div'); pos.className = 'rank-pos'; pos.textContent = posicao <= 3 ? medalhas[posicao-1] : posicao;
    const av = buildAvatarEl(m.foto_url, nivelInfo(m.nivel||'aspirante').base, 38, { nivelSlug: m.nivel||'aspirante' }); av.style.flex = 'none';
    const info = document.createElement('div'); info.className = 'rank-info';
    const nmRow = document.createElement('div'); nmRow.style.cssText = 'display:flex;align-items:center;gap:5px;min-width:0;';
    const nm = document.createElement('div'); nm.className = 'rank-nome'; nm.textContent = (m.id===euId?'★ ':'') + m.nome;
    nmRow.append(nm, estrelaTagAsync(m.id));
    const nv = document.createElement('div'); nv.className = 'rank-nivel'; nv.textContent = nivelInfo(m.nivel||'aspirante').label;
    info.append(nmRow, nv);
    const val = document.createElement('div'); val.className = 'rank-val';
    val.innerHTML = tot + '<small>' + (tot===1?a.sing:a.unidade) + '</small>';
    row.append(pos, av, info, val); corpo.appendChild(row);
  });
}

const DIAS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const FUNCAO_LABEL = { cred_altar:'Cerimonial de Altar', cred_credencia:'Cerimonial de Credência', missal:'Missal', turibulo:'Turíbulo', naveta:'Naveta', altar:'Altar', cruz:'Cruz', vela:'Vela', sineta:'Sineta', sinao:'Sinão', apoio:'Apoio', mitra:'Mitra', baculo:'Báculo' };
function dataCurta(d){ const x=new Date(d+'T00:00:00'); return DIAS[x.getDay()]+' '+x.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}); }

async function abrirCard(id) {
  const ov = document.createElement('div'); ov.className = 'modal-overlay open';
  ov.onclick = (e) => { if (e.target === ov) ov.remove(); };
  const modal = document.createElement('div'); modal.className = 'modal'; modal.style.maxWidth = '380px';
  modal.innerHTML = '<div class="modal-handle"></div><div style="text-align:center;color:var(--text-muted);padding:20px;">Carregando...</div>';
  ov.appendChild(modal); document.body.appendChild(ov);

  const { data: m, error } = await sb.rpc('acolitos_membro_card', { p_id: id });
  if (error || !m) { modal.innerHTML = '<div class="modal-handle"></div><div style="color:var(--text-muted);padding:16px;text-align:center;">Não foi possível carregar.</div>'; return; }
  modal.innerHTML = ''; modal.appendChild(Object.assign(document.createElement('div'), { className:'modal-handle' }));

  // cabeçalho: foto + nome + nível
  const head = document.createElement('div'); head.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:14px;';
  head.appendChild(buildAvatarEl(m.foto_url, nivelInfo(m.nivel||'aspirante').base, 84, { nivelSlug: m.nivel||'aspirante' }));
  const nmRow = document.createElement('div'); nmRow.style.cssText = 'display:flex;align-items:center;justify-content:center;gap:6px;max-width:100%;';
  const nm = document.createElement('div'); nm.style.cssText = 'font-family:Sora,sans-serif;font-weight:700;font-size:17px;color:var(--text);text-align:center;min-width:0;'; nm.textContent = m.nome_completo || m.nome;
  const stTag = estrelaTagAsync(id); stTag.style.fontSize = '14px';
  nmRow.append(nm, stTag);
  const nv = document.createElement('div'); nv.style.cssText = 'font-size:12px;color:var(--gold);font-style:italic;'; nv.textContent = nivelInfo(m.nivel||'aspirante').label + (nivelInfo(m.nivel||'aspirante').titulo ? ' · 🏆 ' + nivelInfo(m.nivel||'aspirante').titulo : '');
  head.append(nmRow, nv); modal.appendChild(head);

  // mini indicadores
  const grid = document.createElement('div'); grid.style.cssText = 'display:flex;gap:8px;margin-bottom:14px;';
  [['Serviu', m.total_servido, 'vezes'], ['Funções', m.funcoes, 'que domina'], ['Comunidade', m.comunidade==='matriz'?'Matriz':'Sto. Antônio', '']].forEach(([l,v,s]) => {
    const c = document.createElement('div'); c.style.cssText = 'flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 6px;text-align:center;';
    const vv = document.createElement('div'); vv.style.cssText = 'font-family:Sora,sans-serif;font-weight:800;font-size:15px;color:var(--gold);'; vv.textContent = v;
    const ll = document.createElement('div'); ll.style.cssText = 'font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;margin-top:2px;'; ll.textContent = l + (s?' · '+s:'');
    c.append(vv, ll); grid.appendChild(c);
  });
  modal.appendChild(grid);

  // últimas missas
  const h2 = document.createElement('div'); h2.style.cssText = 'font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;'; h2.textContent = 'Últimas missas';
  modal.appendChild(h2);
  const ult = m.ultimas || [];
  if (!ult.length) { const e = document.createElement('div'); e.style.cssText = 'font-size:13px;color:var(--text-muted);font-style:italic;'; e.textContent = 'Ainda não foi escalado em nenhuma missa.'; modal.appendChild(e); }
  else ult.forEach(u => {
    const row = document.createElement('div'); row.style.cssText = 'display:flex;justify-content:space-between;gap:10px;font-size:13px;padding:6px 2px;border-bottom:1px solid var(--border);';
    const dt = document.createElement('span'); dt.style.color = 'var(--text)'; dt.textContent = dataCurta(u.data) + ' ' + u.horario;
    const fn = document.createElement('span'); fn.style.cssText = 'color:var(--gold);font-weight:700;text-align:right;'; fn.textContent = FUNCAO_LABEL[u.funcao] || u.funcao;
    row.append(dt, fn); modal.appendChild(row);
  });

  const close = document.createElement('button'); close.className = 'btn-sm gray'; close.style.cssText = 'margin-top:16px;width:100%;'; close.textContent = 'Fechar'; close.onclick = () => ov.remove();
  modal.appendChild(close);
}

init();
</script>
</body>
</html>
