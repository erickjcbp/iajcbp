<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Configuração — Acólitos JCBP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#150a0d">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script>window.addEventListener("beforeinstallprompt",function(e){e.preventDefault();window.__bip=e;});</script>
  <style>
    /* menu lateral esquerdo (seções) + conteúdo à direita */
    .cfg-wrap { display:flex; gap:14px; align-items:flex-start; }
    .cfg-side { flex:0 0 174px; display:flex; flex-direction:column; gap:6px; position:sticky; top:8px; }
    .cfg-item { position:relative; text-align:left; padding:11px 12px 11px 15px; background:linear-gradient(165deg, var(--surface2), var(--surface)); border:1px solid var(--border-wine); color:var(--text-muted); font-family:'Sora',sans-serif; font-weight:700; font-size:12.5px; letter-spacing:.4px; cursor:pointer; line-height:1.2; clip-path:polygon(7px 0, 100% 0, 100% calc(100% - 7px), calc(100% - 7px) 100%, 0 100%, 0 7px); transition:border-color .15s, color .15s, box-shadow .15s; }
    .cfg-item::before { content:''; position:absolute; left:0; top:3px; bottom:3px; width:3px; background:transparent; }
    .cfg-item:hover { border-color:var(--gold-dim); color:var(--text); }
    .cfg-item.on { color:var(--gold-light); border-color:var(--gold); background:linear-gradient(165deg, rgba(232,185,74,.16), var(--surface)); box-shadow:0 0 14px var(--red-glow), inset 0 0 0 1px rgba(232,185,74,.12); }
    .cfg-item.on::before { background:linear-gradient(180deg, var(--gold), var(--red-soft)); box-shadow:0 0 8px var(--red-glow); }
    .cfg-body { flex:1; min-width:0; }
    @media(max-width:560px){ .cfg-side{ flex-basis:124px; } .cfg-item{ font-size:11.5px; padding:9px 10px; } }
    /* sub-abas dentro de uma seção (continuam horizontais) */
    .cfg-nav { display:flex; gap:6px; overflow-x:auto; margin:-2px 0 12px; -webkit-overflow-scrolling:touch; }
    .cfg-nav::-webkit-scrollbar { display:none; }
    .cfg-tab { padding:7px 12px; border-radius:20px; border:1px solid var(--border-wine); background:var(--surface2); color:var(--text-muted); font-family:'Sora',sans-serif; font-weight:700; font-size:12px; white-space:nowrap; cursor:pointer; }
    .cfg-tab.on { background:linear-gradient(165deg,rgba(232,185,74,.18),var(--surface)); color:var(--gold-light); border-color:var(--gold-dim); }
    /* cards ricos (Níveis, CRM, etc.) — visual Hextech */
    .cfg-card { position:relative; background:linear-gradient(165deg, var(--surface2), var(--surface)); border:1px solid var(--border-wine); border-radius:10px; padding:12px; margin-bottom:10px; clip-path:polygon(9px 0,100% 0,100% calc(100% - 9px),calc(100% - 9px) 100%,0 100%,0 9px); }
    .cfg-card-hd { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
    .cfg-card-hd .nmwrap { flex:1; min-width:0; }
    .cfg-card-hd .stp { font-size:10px; font-weight:700; color:var(--gold-dim); text-transform:uppercase; letter-spacing:1px; }
    .cfg-patch { width:48px; height:54px; flex:none; line-height:0; filter:drop-shadow(0 0 6px var(--red-glow)); }
    .cfg-fld { margin-top:8px; }
    .cfg-fld > label { display:block; font-size:10px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:3px; }
    .cfg-mini { width:30px; height:30px; flex:none; display:inline-flex; align-items:center; justify-content:center; border:1px solid var(--border-wine); background:var(--surface2); color:var(--gold); border-radius:7px; cursor:pointer; font-size:14px; font-weight:700; }
    .cfg-mini:hover:not(:disabled) { border-color:var(--gold); box-shadow:0 0 10px var(--red-glow); }
    .cfg-mini:disabled { opacity:.25; cursor:default; }
    .cfg-mini.danger { color:var(--danger-text); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.106.2/dist/umd/supabase.min.js" integrity="sha384-4Cjkyy4cE1EgIS0C+Y3xzGmJ2noQFRRU91yKAW8IxtPfVtbQXPMqadSc3sYnjwou" crossorigin="anonymous"></script>
</head>
<body>
<div id="app-header"></div>
<div id="app-nav"></div>
<div class="main" id="main-content"><span class="loading">Carregando...</span></div>

<script src="shared.js"></script>
<script>
let ctx = null, secaoAtual = 'listas';
const SECOES = [
  ['navegacao','Navegação'], ['equipe','Equipe & Permissões'], ['tipos','Tipos & Modelos'], ['funcoes','Funções litúrgicas'],
  ['gerador','Regras do gerador'], ['comunidades','Comunidades & horários'],
  ['cadastro','Campos do cadastro'], ['tesouraria','Categorias da Tesouraria'], ['crm','Etapas do CRM'], ['niveis','Níveis / Jornada'], ['missoes','Missões & XP'], ['logins','Logins (usuário/senha)'], ['admins','Admins & superadmin'],
];
async function init(){
  ctx = await initModulo();
  if (!ctx) return;
  if (!isSuperadmin(ctx)) { window.location.href = 'index.html'; return; }
  renderHeader(ctx, 'config'); renderBottomNav(ctx, 'config');
  render();
}
function render(){
  const main = document.getElementById('main-content'); main.textContent='';
  const t = document.createElement('h1'); t.className='page-title'; t.textContent='Configuração'; main.appendChild(t);
  const wrap = document.createElement('div'); wrap.className='cfg-wrap';
  const side = document.createElement('div'); side.className='cfg-side';
  SECOES.forEach(([id,label])=>{ const b=document.createElement('button'); b.className='cfg-item'+(id===secaoAtual?' on':''); b.textContent=label; b.onclick=()=>{secaoAtual=id;render();}; side.appendChild(b); });
  const body = document.createElement('div'); body.id='cfg-body'; body.className='cfg-body';
  wrap.append(side, body); main.appendChild(wrap);
  ({ listas:renderListas, tipos:renderTiposModelos, funcoes:renderFuncoes, gerador:renderGerador,
     comunidades:renderComunidades, cadastro:renderCadastro, admins:renderAdmins, identidade:renderIdentidade,
     navegacao:renderNavOrdem, equipe:renderEquipe, tesouraria:renderTesouraria, modelos:renderModelos,
     crm:renderCrm, niveis:renderNiveis, missoes:renderMissoes, logins:renderLogins
   }[secaoAtual] || (()=>{}))(body);
}
// ── Logins (usuário/senha) — só superadmin ──
async function renderLogins(b){
  b.textContent='';
  const hint=document.createElement('p'); hint.style.cssText='font-size:12px;color:var(--text-muted);margin:0 0 8px;line-height:1.5;';
  hint.innerHTML='Usuário e login de cada membro. <b>A senha não fica guardada</b> — vive só no login seguro (criptografada). Para trocar, use <b>Redefinir senha</b>: a nova é mostrada uma única vez, anote na hora. Só superadmin vê esta tela.';
  b.appendChild(hint);
  const box=document.createElement('div'); box.innerHTML='<span class="loading">Carregando...</span>'; b.appendChild(box);
  const { data } = await sb.rpc('acolitos_logins_listar');
  box.textContent='';
  if(!data || data.erro){ box.textContent='Sem permissão.'; return; }
  const membros = data.membros || [];
  const busca=document.createElement('input'); busca.className='form-input'; busca.placeholder='buscar membro…'; busca.style.marginBottom='8px'; box.appendChild(busca);
  const list=document.createElement('div'); box.appendChild(list);
  const mini=(txt,danger)=>{ const x=document.createElement('button'); x.textContent=txt; x.style.cssText='font-size:11px;font-weight:700;padding:6px 10px;border-radius:6px;cursor:pointer;white-space:nowrap;border:1px solid '+(danger?'var(--danger)':'var(--gold-dim)')+';background:var(--surface2);color:'+(danger?'var(--danger-text)':'var(--gold-light)')+';'; return x; };
  async function setSenha(m){
    const s=(prompt('Nova senha para '+m.nome+' (mín. 6 caracteres):')||'').trim(); if(!s) return; if(s.length<6){alert('Senha muito curta.');return;}
    const r=await apiPost('/api/acolito-admin',{action:'password',user_id:m.user_id,password:s});
    if(!r.ok){alert('Erro: '+((r.data&&r.data.error)||'tente de novo'));return;}
    alert('Senha de '+m.nome+' redefinida:\n\n'+s+'\n\n⚠️ Anote agora — ela NÃO fica salva e não será mostrada de novo.');
  }
  async function setUser(m){
    const u=(prompt('Novo usuário (login) de '+m.nome+':', m.usuario||'')||'').trim(); if(!u) return;
    const r=await apiPost('/api/acolito-admin',{action:'username',user_id:m.user_id,usuario:u});
    if(!r.ok){alert('Erro: '+((r.data&&r.data.error)||'tente de novo'));return;}
    await sb.rpc('acolitos_login_registrar',{p_membro:m.id,p_usuario:u,p_senha:null});
    m.usuario=u; desenha();
  }
  async function criarConta(m){
    const u=(prompt('Usuário (login) de '+m.nome+':')||'').trim(); if(!u) return;
    const s=(prompt('Senha (mín. 6 caracteres):')||'').trim(); if(!s){return;} if(s.length<6){alert('Senha muito curta.');return;}
    const r=await apiPost('/api/acolito-admin',{action:'create',usuario:u,password:s,nome:m.nome,membro_id:m.id});
    if(!r.ok){alert('Erro: '+((r.data&&r.data.error)||'tente de novo'));return;}
    await sb.rpc('acolitos_login_registrar',{p_membro:m.id,p_usuario:u,p_senha:null});
    alert('Conta criada para '+m.nome+'.\nUsuário: '+u+'\nSenha: '+s+'\n\n⚠️ Anote a senha agora — ela NÃO fica salva e não será mostrada de novo.');
    m.tem_conta=true; if(r.data&&r.data.user_id) m.user_id=r.data.user_id; m.usuario=u; desenha();
  }
  function desenha(){
    list.textContent=''; const q=busca.value.trim().toLowerCase();
    const arr=membros.filter(m=>!q||(m.nome||'').toLowerCase().includes(q));
    arr.slice(0,300).forEach(m=>{
      const row=document.createElement('div'); row.style.cssText='display:flex;align-items:center;gap:8px;padding:8px 2px;border-bottom:1px solid var(--border);';
      const info=document.createElement('div'); info.style.cssText='flex:1;min-width:0;';
      const nm=document.createElement('div'); nm.style.cssText='font-weight:700;font-size:13px;color:var(--text);'; nm.textContent=m.nome;
      const sub=document.createElement('div'); sub.style.cssText='font-size:11px;color:var(--text-muted);word-break:break-all;';
      if(m.tem_conta){ sub.innerHTML='usuário: <b style="color:var(--gold-light)">'+escHtml(m.usuario||'—')+'</b>'; }
      else { sub.innerHTML='<i style="color:var(--danger-text)">sem conta</i>'; }
      info.append(nm,sub); row.appendChild(info);
      if(m.tem_conta){ const bu=mini('Usuário'); bu.onclick=()=>setUser(m); const bs=mini('Redefinir senha'); bs.onclick=()=>setSenha(m); row.append(bu,bs); }
      else { const bc=mini('Criar conta'); bc.onclick=()=>criarConta(m); row.append(bc); }
      list.appendChild(row);
    });
    if(arr.length>300){ const e=document.createElement('div'); e.style.cssText='font-size:11px;color:var(--text-muted);padding:6px 0;'; e.textContent='Mostrando 300 de '+arr.length+' — refine a busca.'; list.appendChild(e); }
  }
  busca.oninput=desenha; desenha();
}
async function setConfig(chave, valor){
  const { error } = await sb.from('acolitos_config').upsert({ chave, valor, updated_by: ctx.user.id, updated_at: new Date().toISOString() }, { onConflict:'chave' });
  if (error) { toast('Erro ao salvar.', 'error'); return false; }
  _APP_CONFIG[chave] = valor; toast('✓ Salvo!'); return true;
}
const LISTAS_TIPOS = [['competencia','Competências']];
let _listaTipo = 'competencia';
async function renderListas(b){
  b.textContent='';
  const subnav=document.createElement('div'); subnav.className='cfg-nav';
  LISTAS_TIPOS.forEach(([t,l])=>{ const x=document.createElement('button'); x.className='cfg-tab'+(t===_listaTipo?' on':''); x.textContent=l; x.onclick=()=>{_listaTipo=t;renderListas(b);}; subnav.appendChild(x); });
  b.appendChild(subnav);
  const { data } = await sb.from('acolitos_listas').select('id,valor,label').eq('tipo',_listaTipo).order('valor');
  (data||[]).forEach(item=>{
    const row=document.createElement('div'); row.style.cssText='display:flex;align-items:center;gap:8px;padding:7px 2px;border-bottom:1px solid var(--border);';
    const nm=document.createElement('span'); nm.style.flex='1'; nm.textContent=item.label||item.valor;
    const del=document.createElement('button'); del.className='mini-del'; del.textContent='−';
    del.onclick=async()=>{ if(!confirm('Remover "'+(item.label||item.valor)+'"?'))return; await sb.from('acolitos_listas').delete().eq('id',item.id); renderListas(b); };
    row.append(nm,del); b.appendChild(row);
  });
  const add=document.createElement('div'); add.style.cssText='display:flex;gap:8px;margin-top:10px;';
  const inp=document.createElement('input'); inp.className='form-input'; inp.placeholder='Novo item…';
  const bt=document.createElement('button'); bt.className='mini-add'; bt.textContent='+';
  bt.onclick=async()=>{ const v=inp.value.trim(); if(!v)return; const slug=v.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^\w]+/g,'_').replace(/^_|_$/g,''); await sb.from('acolitos_listas').insert({tipo:_listaTipo,valor:slug,label:v}); inp.value=''; renderListas(b); };
  add.append(inp,bt); b.appendChild(add);
}
// Aba unificada: Tipos de celebração + Modelos (vagas por função) — antes eram 2 abas
async function renderTiposModelos(b){
  b.textContent='';
  const sec=(txt)=>{ const h=document.createElement('div'); h.style.cssText='font-family:Sora,sans-serif;font-weight:700;font-size:13px;color:var(--gold);letter-spacing:.5px;margin:6px 0 8px;'; h.textContent=txt; b.appendChild(h); };
  sec('🗓 Tipos de celebração');
  const d1=document.createElement('div'); b.appendChild(d1); renderTipos(d1);
  const hr=document.createElement('div'); hr.style.cssText='border-top:1px solid var(--border-wine);margin:18px 0 0;'; b.appendChild(hr);
  sec('🪑 Modelos — vagas por função');
  const d2=document.createElement('div'); b.appendChild(d2); renderModelos(d2);
}
async function renderTipos(b){
  b.textContent='';
  const hint=document.createElement('p'); hint.style.cssText='font-size:12px;color:var(--text-muted);margin:0 0 10px;'; hint.textContent='Tipos disponíveis ao criar uma celebração (além dos padrões do sistema).'; b.appendChild(hint);
  const { data } = await sb.from('acolitos_listas').select('id,valor,label').eq('tipo','tipo_celebracao').order('label');
  (data||[]).forEach(item=>{
    const row=document.createElement('div'); row.style.cssText='display:flex;align-items:center;gap:8px;padding:7px 2px;border-bottom:1px solid var(--border);';
    const nm=document.createElement('span'); nm.style.flex='1'; nm.textContent=item.label||item.valor;
    const sl=document.createElement('span'); sl.style.cssText='font-size:11px;color:var(--text-muted);'; sl.textContent=item.valor;
    const del=document.createElement('button'); del.className='mini-del'; del.textContent='−';
    del.onclick=async()=>{ if(!confirm('Remover "'+(item.label||item.valor)+'"?'))return; await sb.from('acolitos_listas').delete().eq('id',item.id); renderTipos(b); };
    row.append(nm,sl,del); b.appendChild(row);
  });
  const add=document.createElement('div'); add.style.cssText='display:flex;gap:8px;margin-top:10px;';
  const inp=document.createElement('input'); inp.className='form-input'; inp.placeholder='Novo tipo (ex.: Missa de Formatura)';
  const bt=document.createElement('button'); bt.className='mini-add'; bt.textContent='+';
  bt.onclick=async()=>{ const v=inp.value.trim(); if(!v)return; const slug=v.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^\w]+/g,'_').replace(/^_|_$/g,''); await sb.from('acolitos_listas').insert({tipo:'tipo_celebracao',valor:slug,label:v}); inp.value=''; renderTipos(b); };
  add.append(inp,bt); b.appendChild(add);
}
async function renderFuncoes(b){
  b.textContent='';
  const FUNCOES_DEFAULT=[['cred_altar','Cerimonial de Altar'],['cred_credencia','Cerimonial de Credência'],['missal','Missal'],['turibulo','Turíbulo'],['naveta','Naveta'],['altar','Altar'],['cruz','Cruz'],['vela','Vela'],['sineta','Sineta'],['sinao','Sinão'],['apoio','Apoio'],['mitra','Mitra'],['baculo','Báculo']];
  const MAIORES_DEFAULT=['cred_altar','cred_credencia','missal','turibulo','naveta','mitra','baculo'];
  const hint=document.createElement('p'); hint.style.cssText='font-size:12px;color:var(--text-muted);margin:0 0 10px;'; hint.textContent='Funções litúrgicas (= habilidades). Marque cada uma como Maior (reserva cerimoniário) ou Menor; crie, edite e exclua funções próprias. Clique em Salvar ao terminar.'; b.appendChild(hint);
  const { data: custom } = await sb.from('acolitos_listas').select('id,valor,label').eq('tipo','funcao').order('label');
  const sel = new Set(cfg('funcoes_maiores', MAIORES_DEFAULT));
  const todas = FUNCOES_DEFAULT.map(([v,l])=>({valor:v,label:l,custom:false})).concat((custom||[]).map(c=>({valor:c.valor,label:c.label||c.valor,custom:true,id:c.id})));
  todas.forEach(f=>{
    const row=document.createElement('div'); row.style.cssText='display:flex;align-items:center;gap:8px;padding:7px 2px;border-bottom:1px solid var(--border);';
    const nm=document.createElement('span'); nm.style.flex='1'; nm.textContent=f.label+(f.custom?' (própria)':'');
    const tg=document.createElement('button'); tg.className='btn-sm'; tg.style.minWidth='66px';
    const paint=()=>{ const on=sel.has(f.valor); tg.textContent=on?'Maior':'Menor'; tg.style.cssText='min-width:66px;'+(on?'background:linear-gradient(180deg,var(--gold-light),var(--gold-dim));border-color:var(--gold-light);color:#2a1400;':'background:var(--surface2);color:var(--text-muted);'); };
    paint(); tg.onclick=()=>{ if(sel.has(f.valor))sel.delete(f.valor); else sel.add(f.valor); paint(); };
    row.append(nm,tg);
    if(f.custom){
      const ed=document.createElement('button'); ed.className='mini-add'; ed.textContent='✎'; ed.onclick=async()=>{ const nv=(prompt('Novo nome da função:', f.label)||'').trim(); if(!nv)return; await sb.from('acolitos_listas').update({label:nv}).eq('id',f.id); renderFuncoes(b); }; row.append(ed);
      const del=document.createElement('button'); del.className='mini-del'; del.textContent='−'; del.onclick=async()=>{ if(!confirm('Remover função própria "'+f.label+'"?'))return; await sb.from('acolitos_listas').delete().eq('id',f.id); renderFuncoes(b); }; row.append(del);
    }
    b.appendChild(row);
  });
  const save=document.createElement('button'); save.className='btn gold'; save.style.marginTop='12px'; save.textContent='Salvar funções maiores'; save.onclick=async()=>{ await setConfig('funcoes_maiores',[...sel]); }; b.appendChild(save);
  const add=document.createElement('div'); add.style.cssText='display:flex;gap:8px;margin-top:14px;';
  const inp=document.createElement('input'); inp.className='form-input'; inp.placeholder='Nova função própria (ex.: Báculo Auxiliar)';
  const bt=document.createElement('button'); bt.className='mini-add'; bt.textContent='+';
  bt.onclick=async()=>{ const v=inp.value.trim(); if(!v)return; const slug=v.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^\w]+/g,'_').replace(/^_|_$/g,''); await sb.from('acolitos_listas').insert({tipo:'funcao',valor:slug,label:v}); inp.value=''; renderFuncoes(b); };
  add.append(inp,bt); b.appendChild(add);
}
function renderGerador(b){
  b.textContent='';
  const ger = cfg('gerador', {}) || {};
  const kit = ger.kit_leve || { comunidade:'santo_antonio', funcoes:['cruz','vela'], idade_min:7 };
  const mk=(label)=>{ const L=document.createElement('label'); L.style.cssText='display:block;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin:10px 0 4px;'; L.textContent=label; b.appendChild(L); };
  mk('Janela do rodízio (dias) — quanto histórico o gerador considera');
  const iJ=document.createElement('input'); iJ.className='form-input'; iJ.type='number'; iJ.min='7'; iJ.value=ger.janela_dias||42; b.appendChild(iJ);
  const sep=document.createElement('div'); sep.style.cssText='margin-top:16px;font-family:Sora,sans-serif;font-weight:700;color:var(--gold-light);font-size:12px;'; sep.textContent='Kit leve (funções liberadas por idade numa comunidade)'; b.appendChild(sep);
  mk('Comunidade');
  const sC=document.createElement('select'); sC.className='form-input';
  [['santo_antonio','Santo Antônio'],['matriz','Matriz']].forEach(([v,l])=>{ const o=document.createElement('option'); o.value=v; o.textContent=l; if(kit.comunidade===v)o.selected=true; sC.appendChild(o); }); b.appendChild(sC);
  mk('Funções liberadas (slugs separados por vírgula: cruz, vela, sineta…)');
  const iF=document.createElement('input'); iF.className='form-input'; iF.value=(kit.funcoes||['cruz','vela']).join(', '); b.appendChild(iF);
  mk('Idade mínima');
  const iI=document.createElement('input'); iI.className='form-input'; iI.type='number'; iI.min='0'; iI.value=(kit.idade_min!=null?kit.idade_min:7); b.appendChild(iI);
  const save=document.createElement('button'); save.className='btn gold'; save.style.marginTop='16px'; save.textContent='Salvar regras';
  save.onclick=async()=>{ await setConfig('gerador', { janela_dias:Number(iJ.value)||42, kit_leve:{ comunidade:sC.value, funcoes:iF.value.split(',').map(s=>s.trim()).filter(Boolean), idade_min:Number(iI.value)||0 } }); };
  b.appendChild(save);
}
function renderComunidades(b){
  b.textContent='';
  const hint=document.createElement('p'); hint.style.cssText='font-size:12px;color:var(--text-muted);margin:0 0 10px;'; hint.textContent='Comunidades e horários de missa (alimentam o select ao criar celebração). Renomeie o rótulo livremente; evite trocar comunidades já em uso.'; b.appendChild(hint);
  let coms = cfg('comunidades', null);

  const selOf=(opts,val)=>{ const s=document.createElement('select'); s.className='form-input'; opts.forEach(([v,l])=>{const o=document.createElement('option');o.value=v;o.textContent=l;if(String(val)===String(v))o.selected=true;s.appendChild(o);}); return s; };
  lab('Título'); const fTit=inp(spec.titulo,'Ex.: Apto na Sineta'); md.appendChild(fTit);
  lab('Descrição'); const fDesc=inp(spec.descricao,'Como cumprir','area'); md.appendChild(fDesc);
  lab('Validação'); const fVal=selOf(MX_VALID, spec.validacao); md.appendChild(fVal);
  lab('XP'); const fXp=inp(spec.xp,'','number'); md.appendChild(fXp);
  lab('Nível-alvo (vazio = pool bônus)'); const nivOpts=[['','— Pool de bônus —']]; if(typeof NIVEIS!=='undefined')NIVEIS.forEach(n=>nivOpts.push([n.slug,n.label])); const fNiv=selOf(nivOpts, spec.nivel_alvo||''); md.appendChild(fNiv);
  const blocoCap=document.createElement('div'); md.appendChild(blocoCap);
  const blocoBonus=document.createElement('div'); md.appendChild(blocoBonus);
  function pintaCond(){
    blocoCap.textContent=''; blocoBonus.textContent='';
    if(fNiv.value){
      const l1=document.createElement('div'); l1.style.cssText='font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin:10px 0 4px;'; l1.textContent='Capítulo (nº)'; blocoCap.appendChild(l1);
      blocoCap._cap=inp(spec.capitulo,'1','number'); blocoCap.appendChild(blocoCap._cap);
      const row=document.createElement('label'); row.style.cssText='display:flex;align-items:center;gap:8px;margin-top:8px;font-size:13px;color:var(--text);';
      blocoCap._ob=document.createElement('input'); blocoCap._ob.type='checkbox'; blocoCap._ob.checked=spec.obrigatoria!==false; row.append(blocoCap._ob, document.createTextNode('Obrigatória (trava o capítulo)')); blocoCap.appendChild(row);
    } else {
      const aplOpts=[['','(todos)']]; if(typeof NIVEIS!=='undefined')NIVEIS.forEach(n=>aplOpts.push([n.slug,n.label]));
      const l1=document.createElement('div'); l1.style.cssText='font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin:10px 0 4px;'; l1.textContent='Aparece de / até (faixa de nível)'; blocoBonus.appendChild(l1);
      const r=document.createElement('div'); r.style.cssText='display:flex;gap:8px;'; blocoBonus._de=selOf(aplOpts, spec.aplica_de||''); blocoBonus._ate=selOf(aplOpts, spec.aplica_ate||''); r.append(blocoBonus._de,blocoBonus._ate); blocoBonus.appendChild(r);
    }
  }
  fNiv.onchange=pintaCond; pintaCond();
  const recRow=document.createElement('label'); recRow.style.cssText='display:flex;align-items:center;gap:8px;margin-top:10px;font-size:13px;color:var(--text);';
  const fRec=document.createElement('input'); fRec.type='checkbox'; fRec.checked=!!spec.recorrente; recRow.append(fRec, document.createTextNode('🔁 Recorrente (repete no intervalo)')); md.appendChild(recRow);
  lab('Tom'); const fSer=selOf([['seria','Séria'],['divertida','Divertida'],['surpresa','Surpresa']], spec.seriedade||'seria'); md.appendChild(fSer);
  lab('Competência que a quest trabalha (opcional)'); const fComp=selOf([['','— nenhuma —']], cr0.competencia||''); md.appendChild(fComp);
  sb.from('acolitos_listas').select('valor,label').eq('tipo','competencia').order('label').then(({data})=>{ (data||[]).forEach(c=>{ const o=document.createElement('option'); o.value=c.valor; o.textContent=c.label; fComp.appendChild(o); }); fComp.value=cr0.competencia||''; });
  const blocoCrit=document.createElement('div'); md.appendChild(blocoCrit);
  function pintaCrit(){
    blocoCrit.textContent=''; if(fVal.value!=='automatica')return;
    const l=document.createElement('div'); l.style.cssText='font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;margin:12px 0 4px;'; l.textContent='Critério automático'; blocoCrit.appendChild(l);
    blocoCrit._fonte=selOf(MX_FONTES, cr0.fonte||'missas_servidas'); blocoCrit.appendChild(blocoCrit._fonte);
    const r=document.createElement('div'); r.style.cssText='display:flex;gap:8px;margin-top:6px;';
    blocoCrit._qtd=inp(cr0.quantidade!=null?cr0.quantidade:(cr0.min!=null?cr0.min:''),'qtd / idade mín','number'); blocoCrit._qtd.style.flex='1';
    blocoCrit._prof=selOf([['','(proficiência)'],['em_formacao','em_formacao'],['apto','apto'],['experiente','experiente'],['referencia','referencia']], cr0.proficiencia||''); blocoCrit._prof.style.flex='1';
    r.append(blocoCrit._qtd, blocoCrit._prof); blocoCrit.appendChild(r);
    blocoCrit._func=inp((cr0.funcoes?(Array.isArray(cr0.funcoes)?cr0.funcoes.join(','):cr0.funcoes):(cr0.funcao||'')),'função(ões): missal,turibulo'); blocoCrit._func.style.marginTop='6px'; blocoCrit.appendChild(blocoCrit._func);
  }
  fVal.onchange=pintaCrit; pintaCrit();
  const badgeRow=document.createElement('label'); badgeRow.style.cssText='display:flex;align-items:center;gap:8px;margin-top:10px;font-size:13px;color:var(--text);';
  const fBadge=document.createElement('input'); fBadge.type='checkbox'; fBadge.checked=!!spec.concede_badge; badgeRow.append(fBadge, document.createTextNode('🏅 Concede badge')); md.appendChild(badgeRow);
  const fBLbl=inp(spec.badge_label,'Nome da conquista (badge)'); fBLbl.style.marginTop='6px'; md.appendChild(fBLbl);
  const save=document.createElement('button'); save.className='btn gold'; save.style.cssText='width:100%;margin-top:16px;'; save.textContent='Salvar missão';
  save.onclick=async()=>{
    const patch={ titulo:fTit.value.trim(), descricao:fDesc.value.trim(), validacao:fVal.value, xp:Number(fXp.value)||0, nivel_alvo:fNiv.value||null, recorrente:fRec.checked, seriedade:fSer.value, concede_badge:fBadge.checked, badge_label:fBLbl.value.trim()||null };
    if(!patch.titulo){ toast('Dê um título','error'); return; }
    if(patch.nivel_alvo){ patch.capitulo=Number(blocoCap._cap.value)||1; patch.obrigatoria=blocoCap._ob.checked; patch.aplica_de=null; patch.aplica_ate=null; }
    else { patch.capitulo=null; patch.obrigatoria=false; patch.aplica_de=blocoBonus._de.value||null; patch.aplica_ate=blocoBonus._ate.value||null; }
    const comp=fComp.value||null;
    if(patch.validacao==='automatica'){ const f=blocoCrit._fonte.value; const cr={fonte:f}; if(blocoCrit._qtd.value!==''){ const q=Number(blocoCrit._qtd.value); if(f==='idade')cr.min=q; else cr.quantidade=q; } if(blocoCrit._prof.value)cr.proficiencia=blocoCrit._prof.value; if(blocoCrit._func.value.trim())cr.funcoes=blocoCrit._func.value.split(',').map(s=>s.trim()).filter(Boolean); if(comp)cr.competencia=comp; patch.criterio=cr; } else patch.criterio = comp ? { competencia:comp } : null;
    const ok=await onSave(patch); if(ok!==false) ov.remove();
  };
  md.appendChild(save);
  ov.appendChild(md); document.body.appendChild(ov);
}

// ── Seção Etapas do CRM: CRUD completo (reordenar, editar, excluir, adicionar) ──
function renderCrm(b){
  b.textContent='';
  const hint=document.createElement('p'); hint.style.cssText='font-size:12px;color:var(--text-muted);margin:0 0 12px;'; hint.textContent='Fases de integração do novo membro. Reordene (↑↓), edite, exclua ou adicione. A última fase é o estado "concluído".'; b.appendChild(hint);
  const DEF=[['aprovacao_cadastro','Aprovação','Aprovar o cadastro. O membro segue para a etapa de integração.'],['integracao','Integração','Reunião de integração realizada com o membro.'],['whatsapp','WhatsApp','Entrada nos grupos de WhatsApp confirmada.'],['tunica','Túnica','Recebimento da túnica confirmado.'],['disponivel_escala','Disp. Escala','Disponibilidade preenchida. Membro pronto para ser escalado.'],['integrado','Integrado','Membro totalmente integrado! Defina o nível pastoral.']];
  let work=cfg('crm_etapas',null);
  work=(Array.isArray(work)&&work.length)?work.map(e=>({slug:e.slug,label:e.label,acao:e.acao||''})):DEF.map(([slug,label,acao])=>({slug,label,acao}));
  const cont=document.createElement('div'); b.appendChild(cont);
  const repaint=()=>{
    cont.textContent='';
    work.forEach((et,i)=>{
      const card=document.createElement('div'); card.className='cfg-card';
      const hd=document.createElement('div'); hd.className='cfg-card-hd';
      const nw=document.createElement('div'); nw.className='nmwrap';
      const stp=document.createElement('div'); stp.className='stp'; stp.textContent='Fase '+(i+1)+(i===work.length-1?' · final':'');
      const li=document.createElement('input'); li.className='form-input'; li.value=et.label; li.placeholder='Nome da fase'; li.oninput=()=>{ et.label=li.value; };
      nw.append(stp,li);
      const up=document.createElement('button'); up.className='cfg-mini'; up.textContent='↑'; up.disabled=(i===0); up.onclick=()=>{ const t=work[i-1]; work[i-1]=work[i]; work[i]=t; repaint(); };
      const dn=document.createElement('button'); dn.className='cfg-mini'; dn.textContent='↓'; dn.disabled=(i===work.length-1); dn.onclick=()=>{ const t=work[i+1]; work[i+1]=work[i]; work[i]=t; repaint(); };
      const del=document.createElement('button'); del.className='cfg-mini danger'; del.textContent='×'; del.onclick=()=>{ if(confirm('Excluir a fase "'+et.label+'"? Membros nela ficam sem etapa válida.')){ work.splice(i,1); repaint(); } };
      hd.append(nw,up,dn,del); card.appendChild(hd);
      _cfgField(card,'Texto da ação', et.acao, 'area', v=>{ et.acao=v; });
      cont.appendChild(card);
    });
  };
  repaint();
  const acts=document.createElement('div'); acts.style.cssText='display:flex;gap:8px;';
  const add=document.createElement('button'); add.className='btn'; add.textContent='+ Fase'; add.onclick=()=>{ const nome=(prompt('Nome da nova fase:')||'').trim(); if(!nome)return; const slug=(nome.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^\w]+/g,'_').replace(/^_|_$/g,''))||('fase_'+Date.now()); work.splice(Math.max(0,work.length-1),0,{slug,label:nome,acao:''}); repaint(); };
  const save=document.createElement('button'); save.className='btn gold'; save.textContent='Salvar fases'; save.onclick=async()=>{ await setConfig('crm_etapas', work); };
  acts.append(add,save); b.appendChild(acts);
}

// ── Seção Níveis / Jornada: lista ordenável com add/excluir + patch generator + edição do "O caminho" ──
function renderNiveis(b){
  b.textContent='';
  const hint=document.createElement('p'); hint.style.cssText='font-size:12px;color:var(--text-muted);margin:0 0 12px;'; hint.textContent='Edite, reordene (↑↓), exclua ou adicione níveis. O patch aparece ao lado — toque em "Gerar patch" pra customizar. A trilha da Jornada segue esta ordem.'; b.appendChild(hint);
  const niv=(typeof NIVEIS!=='undefined')?NIVEIS:[];
  const work=niv.map(n=>({ slug:n.slug, label:n.label, base:n.base||'acolito', int:(n.int!=null?n.int:0), pips:(n.pips!=null?n.pips:0), titulo:n.titulo||'', intro:n.intro||'', missao:n.missao||'', desafio:n.desafio||'', proximo:n.proximo||'', patch:n._patch||null }));
  const cont=document.createElement('div'); b.appendChild(cont);
  const repaint=()=>{
    cont.textContent='';
    work.forEach((w,i)=>{
      const card=document.createElement('div'); card.className='cfg-card';
      const hd=document.createElement('div'); hd.className='cfg-card-hd';
      const patch=document.createElement('div'); patch.className='cfg-patch';
      const pinta=()=>{ patch.textContent=''; if(typeof buildRankEmblem==='function') patch.appendChild(buildRankEmblem(w.slug,48,w.patch||null)); };
      pinta();
      const nw=document.createElement('div'); nw.className='nmwrap';
      const stp=document.createElement('div'); stp.className='stp'; stp.textContent='Nível '+(i+1);
      const li=document.createElement('input'); li.className='form-input'; li.value=w.label; li.placeholder='Nome'; li.oninput=()=>{ w.label=li.value; };
      nw.append(stp,li);
      const up=document.createElement('button'); up.className='cfg-mini'; up.textContent='↑'; up.disabled=(i===0); up.onclick=()=>{ const t=work[i-1]; work[i-1]=work[i]; work[i]=t; repaint(); };
      const dn=document.createElement('button'); dn.className='cfg-mini'; dn.textContent='↓'; dn.disabled=(i===work.length-1); dn.onclick=()=>{ const t=work[i+1]; work[i+1]=work[i]; work[i]=t; repaint(); };
      const del=document.createElement('button'); del.className='cfg-mini danger'; del.textContent='×'; del.onclick=()=>{ if(confirm('Excluir o nível "'+w.label+'"? Membros nele ficam sem nível válido.')){ work.splice(i,1); repaint(); } };
      hd.append(patch,nw,up,dn,del); card.appendChild(hd);
      const gp=document.createElement('button'); gp.className='btn-sm'; gp.style.cssText='margin-top:6px;background:linear-gradient(165deg,rgba(232,185,74,.16),var(--surface2));border:1px solid var(--gold-dim);color:var(--gold-light);'; gp.textContent='🎨 Gerar patch';
      gp.onclick=()=>abrirGeradorPatch(w.slug, w.patch || _specPadraoNivel(w.slug), (spec)=>{ w.patch=spec; pinta(); }); card.appendChild(gp);
      const baseRow=document.createElement('div'); baseRow.className='cfg-fld';
      const bl=document.createElement('label'); bl.textContent='Categoria (base)';
      const bs=document.createElement('select'); bs.className='form-input';
      [['aspirante','Aspirante'],['coroinha','Coroinha'],['acolito','Acólito'],['cerimonario','Cerimoniário']].forEach(([v,l])=>{ const o=document.createElement('option'); o.value=v; o.textContent=l; if(w.base===v)o.selected=true; bs.appendChild(o); });
      bs.onchange=()=>{ w.base=bs.value; }; baseRow.append(bl,bs); card.appendChild(baseRow);
      _cfgField(card,'Título', w.titulo, 'input', v=>{ w.titulo=v; });
      _cfgField(card,'Introdução (texto do "O caminho")', w.intro, 'area', v=>{ w.intro=v; });
      _cfgField(card,'Missão', w.missao, 'input', v=>{ w.missao=v; });
      _cfgField(card,'Desafio', w.desafio, 'area', v=>{ w.desafio=v; });
      _cfgField(card,'Próximo passo', w.proximo, 'input', v=>{ w.proximo=v; });
      cont.appendChild(card);
    });
  };
  repaint();
  const acts=document.createElement('div'); acts.style.cssText='display:flex;gap:8px;';
  const add=document.createElement('button'); add.className='btn'; add.textContent='+ Nível';
  add.onclick=()=>{ const nome=(prompt('Nome do novo nível:')||'').trim(); if(!nome)return; const slug=(nome.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^\w]+/g,'_').replace(/^_|_$/g,''))||('nivel_'+Date.now()); work.push({ slug, label:nome, base:'acolito', int:work.length, pips:0, titulo:'', intro:'', missao:'', desafio:'', proximo:'', patch:_specPadraoNivel('acolito_aspirante') }); repaint(); };
  const save=document.createElement('button'); save.className='btn gold'; save.textContent='Salvar níveis';
  save.onclick=async()=>{ const ok=await setConfig('niveis_full', work); if(ok){ if(typeof aplicarNiveisEstrutura==='function') aplicarNiveisEstrutura(); toast('✓ Salvo! Recarregue o app pra ver na Jornada.'); } };
  acts.append(add,save); b.appendChild(acts);
}
init();
</script>
