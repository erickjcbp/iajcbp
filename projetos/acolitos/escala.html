<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Escala — Acólitos JCBP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#150a0d">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script>window.addEventListener("beforeinstallprompt",function(e){e.preventDefault();window.__bip=e;});</script>
  <style>
    .aba-toggle { display:flex; gap:8px; margin-bottom:16px; }
    .aba-btn {
      padding:10px 20px; min-height:44px; background:var(--surface2);
      border:1px solid var(--border); color:var(--text-muted); border-radius:2px;
      cursor:pointer; font-family:'Sora',sans-serif; font-size:11px; letter-spacing:1px;
      text-transform:uppercase; transition:all .2s; -webkit-tap-highlight-color:transparent;
    }
    .aba-btn.active { border-color:var(--gold); color:var(--gold); background:rgba(201,168,76,.08); }
    .escala-toolbar { margin-bottom:14px; }
    .escala-toolbar .form-select { width:100%; margin-bottom:8px; }
    .escala-acoes { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
    .escala-acoes .btn-sm { white-space:nowrap; padding:10px 8px; font-size:13px; }
    @media(min-width:640px){
      .escala-toolbar { display:flex; align-items:center; gap:8px; }
      .escala-toolbar .form-select { width:auto; flex:1; max-width:220px; margin-bottom:0; }
      .escala-acoes { display:flex; gap:8px; }
      .escala-acoes .btn-sm { flex:none; }
    }
    .semana-grupo { margin-bottom:20px; }
    .semana-titulo {
      font-family:'Sora',sans-serif; font-size:11px; color:var(--text-muted);
      letter-spacing:1.5px; text-transform:uppercase; margin-bottom:10px;
      padding-bottom:6px; border-bottom:1px solid var(--border);
    }
    .celebracoes-grid { display:grid; grid-template-columns:1fr; gap:10px; }
    @media(min-width:600px){ .celebracoes-grid{ grid-template-columns:repeat(2,1fr); } }
    @media(min-width:900px){ .celebracoes-grid{ grid-template-columns:repeat(3,1fr); } }
    .celeb-card {
      background:var(--surface); border:1px solid var(--border-wine);
      border-radius:4px; padding:14px; position:relative; overflow:hidden;
    }
    .celeb-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
    .celeb-card.status-completa::before { background:var(--success); }
    .celeb-card.status-parcial::before  { background:var(--warn-text); }
    .celeb-card.status-critica::before  { background:var(--danger-text); }
    .celeb-card.status-vazia::before    { background:var(--border-wine); }
    .celeb-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; gap:8px; }
    .celeb-data { font-family:'Sora',sans-serif; font-size:13px; color:var(--text); font-weight:600; }
    .celeb-sub  { font-size:11px; color:var(--text-muted); margin-top:2px; }
    .status-pill {
      display:inline-block; padding:2px 8px; border-radius:10px;
      font-size:9px; font-family:'Sora',sans-serif; letter-spacing:.5px; border:1px solid; flex-shrink:0;
    }
    .status-pill.completa { background:rgba(30,80,30,.2); color:var(--success-text); border-color:var(--success); }
    .status-pill.parcial  { background:rgba(120,80,0,.2); color:var(--warn-text); border-color:var(--warn); }
    .status-pill.critica  { background:rgba(100,10,10,.3); color:var(--danger-text); border-color:var(--danger); }
    .status-pill.vazia    { background:var(--surface2); color:var(--text-muted); border-color:var(--border); }
    .cobertura-row { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
    .cobertura-label { color:var(--text-muted); width:72px; flex-shrink:0; font-size:10px; }
    .cobertura-bar  { flex:1; height:4px; background:var(--surface2); border-radius:2px; overflow:hidden; }
    .cobertura-fill { height:100%; border-radius:2px; }
    .cobertura-fill.ok      { background:var(--success); }
    .cobertura-fill.parcial { background:var(--warn-text); }
    .cobertura-fill.critico { background:var(--danger-text); }
    .cobertura-num { color:var(--text-muted); font-size:10px; width:32px; text-align:right; }
    .celeb-actions { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
    /* Planilha */
    .planilha-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; border:1px solid var(--border-wine); border-radius:4px; }
    .planilha-table { border-collapse:collapse; font-size:12px; white-space:nowrap; width:100%; }
    .planilha-table th, .planilha-table td { padding:8px 10px; border-bottom:1px solid var(--border); vertical-align:middle; }
    .planilha-table th {
      font-family:'Sora',sans-serif; font-size:9px; letter-spacing:1px; color:var(--text-muted);
      text-transform:uppercase; background:var(--surface); position:sticky; top:0; z-index:2;
      border-bottom:1px solid var(--border-wine);
    }
    .planilha-table th.sticky-left, .planilha-table td.sticky-left {
      position:sticky; left:0; background:var(--surface); z-index:1; border-right:1px solid var(--border-wine);
    }
    .planilha-table tr:hover td { background:rgba(201,168,76,.03); }
    .planilha-table tr.nivel-group td { background:linear-gradient(90deg, rgba(232,185,74,.16), rgba(232,185,74,.03)); border-top:1px solid var(--gold-dim); border-bottom:1px solid var(--gold-dim); padding:6px 10px; position:sticky; left:0; }
    .planilha-table tr.nivel-group td > div { font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--gold-light); }
    .planilha-table tr.nivel-group:hover td { background:linear-gradient(90deg, rgba(232,185,74,.16), rgba(232,185,74,.03)); }
    .escala-cell {
      display:inline-block; padding:2px 6px; border-radius:2px;
      font-size:10px; font-family:'Sora',sans-serif;
    }
    .escala-cell.escalado  { background:rgba(201,168,76,.12); color:var(--gold); }
    .escala-cell.presente  { background:rgba(30,80,30,.2); color:var(--success-text); }
    .escala-cell.ausente   { background:rgba(100,10,10,.3); color:var(--danger-text); }
    .escala-cell.aj        { background:rgba(120,80,0,.2); color:var(--warn-text); }
    /* Modal montagem */
    .montagem-cols { display:grid; grid-template-columns:1fr; gap:16px; }
    @media(min-width:600px){ .montagem-cols { grid-template-columns:1fr 1fr; } }
    .cat-titulo {
      font-family:'Sora',sans-serif; font-size:10px; color:var(--gold);
      letter-spacing:1px; text-transform:uppercase; padding:10px 0 4px;
      border-bottom:1px solid var(--border-wine); margin-bottom:2px;
    }
    .pos-item { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid var(--border); }
    .pos-item:last-child { border-bottom:none; }
    .pos-label { font-family:'Sora',sans-serif; font-size:11px; color:var(--text); flex:1; }
    .pos-select {
      flex:0 0 230px; padding:6px 8px; min-height:34px;
      background:var(--surface2); border:1px solid var(--border-wine);
      border-radius:2px; color:var(--text); font-size:11px; outline:none;
    }
    .pos-select.filled { border-color:var(--gold); }
    .mems-list { max-height:300px; overflow-y:auto; }
    .mem-row { padding:8px 0; border-bottom:1px solid var(--border); }
    .mem-row:last-child { border-bottom:none; }
    .mem-nome { font-size:12px; color:var(--text); margin-bottom:3px; }
    .mem-fns  { font-size:10px; color:var(--gold); }
    .cell-ico { background:transparent; border:none; cursor:pointer; font-size:15px; padding:2px; line-height:1; -webkit-tap-highlight-color:transparent; }
    /* Celular: modal de montagem cabe na tela — campos de nome iguais, label em cima, fontes menores */
    @media (max-width:599px){
      .montagem-cols { gap:12px; }
      .montagem-cols > div { min-width:0; }
      .pos-item { flex-wrap:wrap; gap:6px; padding:7px 0; }
      .pos-label { flex:1 1 100%; font-size:11px; line-height:1.3; }
      .pos-select { flex:1 1 auto; min-width:0; max-width:none; font-size:11px; }
      .cat-titulo { font-size:10px; }
    }
  </style>

<script src="shared.js"></script>
<script>
const MOTIVO_LABEL = { doenca:'🤒 Doença', viagem:'✈️ Viagem', familia:'👨‍👩‍👧 Família', outro:'📌 Outro' };
// Metadados de cada função (rótulo, categoria, ordem) — os modelos por tipo+comunidade vêm da tabela acolitos_modelos
const FUNCAO_META = {
  cred_altar:    {label:'Cerimonial de Altar',     cat:'Cerimoniais', ordem:10},
  cred_credencia:{label:'Cerimonial de Credência', cat:'Cerimoniais', ordem:11},
  missal:        {label:'Missal',                  cat:'Cerimoniais', ordem:12},
  altar:         {label:'Altar',                   cat:'Altares',     ordem:20},
  cruz:          {label:'Cruz',                     cat:'Litúrgicos',  ordem:30},
  vela:          {label:'Vela',                     cat:'Litúrgicos',  ordem:31},
  sineta:        {label:'Sineta',                   cat:'Litúrgicos',  ordem:32},
  sinao:         {label:'Sinão',                    cat:'Litúrgicos',  ordem:33},
  turibulo:      {label:'Turíbulo',                 cat:'Litúrgicos',  ordem:34},
  naveta:        {label:'Naveta',                   cat:'Litúrgicos',  ordem:35},
  apoio:         {label:'Apoio',                    cat:'Apoios',      ordem:40},
  mitra:         {label:'Mitra',                    cat:'Episcopal',   ordem:50},
  baculo:        {label:'Báculo',                   cat:'Episcopal',   ordem:51},
};
let modelos = {}; // chave 'tipo|comunidade' -> [{funcao, quantidade, ordem}]
async function loadModelos() {
  const [{ data: md }, { data: lf }] = await Promise.all([
    sb.from('acolitos_modelos').select('*'),
    sb.from('acolitos_listas').select('valor,label').eq('tipo','funcao'),
  ]);
  modelos = {};
  (md || []).forEach(r => { const k = r.tipo + '|' + r.comunidade; (modelos[k] = modelos[k] || []).push(r); });
  (lf || []).forEach(f => { if (!FUNCAO_META[f.valor]) FUNCAO_META[f.valor] = { label: f.label, cat: 'Personalizadas', ordem: 60 }; });
}
// Expande o modelo (tipo+comunidade) numa lista ordenada de vagas {funcao,label,cat} (igual aos templates antigos)
function modeloFor(tipo, comunidade) {
  let rows = modelos[tipo + '|' + comunidade];
  if (!rows || !rows.length) rows = modelos['missa_comum|' + comunidade] || modelos['missa_comum|matriz'] || [];
  const slots = [];
  rows.filter(r => r.quantidade > 0)
      .sort((a, b) => (a.ordem - b.ordem) || a.funcao.localeCompare(b.funcao))
      .forEach(r => {
        const meta = FUNCAO_META[r.funcao] || { label: r.funcao, cat: 'Outros' };
        for (let i = 1; i <= r.quantidade; i++) slots.push({ funcao: r.funcao, cat: meta.cat, label: r.quantidade > 1 ? meta.label + ' ' + i : meta.label });
      });
  return slots;
}

// ---- Editor de modelos ----
let mdQty = {};
function abrirModelos() {
  const selT = document.getElementById('md-tipo'); selT.textContent = '';
  // todos os tipos de missa do seletor de celebração + quaisquer já existentes nos modelos
  const tipos = Array.from(new Set(Object.keys(TIPO_LABEL).concat(Object.keys(modelos).map(k => k.split('|')[0]))));
  tipos.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = TIPO_LABEL[t] || t; selT.appendChild(o); });
  document.getElementById('md-com').value = 'matriz';
  document.getElementById('md-msg').textContent = ''; document.getElementById('md-msg').className = 'msg';
  renderModeloEditor();
  document.getElementById('modal-modelos').classList.add('open');
}
function renderModeloEditor() {
  const tipo = document.getElementById('md-tipo').value;
  const com = document.getElementById('md-com').value;
  mdQty = {};
  (modelos[tipo + '|' + com] || []).forEach(r => { mdQty[r.funcao] = r.quantidade; });
  const body = document.getElementById('md-body'); body.textContent = '';
  const funcs = Object.keys(FUNCAO_META).sort((a, b) => FUNCAO_META[a].ordem - FUNCAO_META[b].ordem);
  let catAtual = '';
  funcs.forEach(f => {
    const meta = FUNCAO_META[f];
    if (meta.cat !== catAtual) { catAtual = meta.cat; const c = document.createElement('div'); c.className = 'cat-titulo'; c.textContent = catAtual; body.appendChild(c); }
    const row = document.createElement('div'); row.style.cssText = 'display:flex;align-items:center;gap:10px;padding:5px 2px;';
    const lbl = document.createElement('span'); lbl.style.cssText = 'flex:1;font-size:13px;color:var(--text);'; lbl.textContent = meta.label;
    const minus = document.createElement('button'); minus.type = 'button'; minus.className = 'mini-del'; minus.textContent = '−';
    const num = document.createElement('span'); num.style.cssText = 'min-width:24px;text-align:center;font-weight:800;color:var(--gold);'; num.textContent = mdQty[f] || 0;
    const plus = document.createElement('button'); plus.type = 'button'; plus.className = 'mini-del'; plus.textContent = '+';
    minus.onclick = () => { mdQty[f] = Math.max(0, (mdQty[f] || 0) - 1); num.textContent = mdQty[f]; };
    plus.onclick = () => { mdQty[f] = (mdQty[f] || 0) + 1; num.textContent = mdQty[f]; };
    row.append(lbl, minus, num, plus); body.appendChild(row);
  });
}
async function salvarModelo() {
  const tipo = document.getElementById('md-tipo').value;
  const com = document.getElementById('md-com').value;
  const msg = document.getElementById('md-msg');
  const payload = Object.keys(FUNCAO_META).map(f => ({ tipo, comunidade: com, funcao: f, quantidade: mdQty[f] || 0, ordem: FUNCAO_META[f].ordem }));
  const { error } = await sb.from('acolitos_modelos').upsert(payload, { onConflict: 'tipo,comunidade,funcao' });
  if (error) { msg.className = 'msg error'; msg.textContent = 'Erro ao salvar.'; return; }
  msg.className = 'msg success'; msg.textContent = '✓ Modelo salvo.';
  await loadModelos();
  abaAtual === 'cards' ? renderCards() : renderPlanilha();
}
const FUNCAO_LABEL = {
  apoio:'Apoio', cruz:'Cruz', vela:'Vela', sineta:'Sineta', sinao:'Sinão',
  altar:'Altar', turibulo:'Turíbulo', naveta:'Naveta', missal:'Missal',
  cred_altar:'Cerim. Altar', cred_credencia:'Cerim. Cred.', mitra:'Mitra', baculo:'Báculo'
};
const TIPO_LABEL = {
  missa_comum:'Missa', solene:'Missa Solene', pontifical:'Pontifical (Bispo)',
  festa:'Festa Litúrgica', vigilia:'Vigília', crisma:'Crisma', casamento:'Casamento',
  batizado:'Batizado', ordenacao:'Ordenação', funeral:'Exéquias'
};
const DIAS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
let FUNCOES_ORDER = ['apoio','cruz','vela','sineta','sinao','altar','turibulo','naveta','missal','cred_altar','cred_credencia','mitra','baculo'];
const NIVEL_COR = { nao_treinado:'var(--border)', em_formacao:'#d4a060', apto:'var(--success-text)', experiente:'#4a90c4', referencia:'#9b59d4' };
const NIVEL_LABEL = { nao_treinado:'Não treinado', em_formacao:'Em formação', apto:'Apto', experiente:'Experiente', referencia:'Referência' };

let ctx = null, celebracoes = [], escalasMap = {}, membros = [], habMap = {}, dispMap = {};
let freqMap = {}, restricaoMap = {}, ausMap = {}, chamadasFeitas = new Set(), semanaPassada = {};
let pendingCelebId = null, pendingEdicao = [], abaAtual = 'cards', editCelebId = null, celAtual = null;

// Fecha qualquer modal (remove a classe 'open'). Estava sendo chamada em vários lugares mas nunca foi definida —

function openInfo(title, lines) {
  document.getElementById('info-title').textContent = title;
  const body = document.getElementById('info-body'); body.textContent = '';
  lines.forEach(l => { const p = document.createElement('p'); p.style.cssText = 'font-size:13px;color:var(--text);margin-bottom:8px;line-height:1.45;'; p.textContent = l; body.appendChild(p); });

async function init() {
  ctx = await initModulo(['coord_admin','subadmin','membro_equipe']);
  if (!ctx) return;
  renderHeader(ctx, 'escala');
  renderBottomNav(ctx, 'escala');
  mergeTiposLabel(TIPO_LABEL); // tipos customizados do Config entram no rótulo + select
  mergeFuncoesConfig();        // funções próprias + "maiores" configuráveis
  popularTipos();
  popularComunidades();        // comunidades do Config no select de criar celebração
  await loadModelos();
  popHorarios();
  await loadDados();
}

// Aplica funções próprias e o conjunto "maiores" vindo do Config (com fallback pros padrões)
function mergeFuncoesConfig() {
  if (typeof cfg !== 'function') return;
  (cfg('__funcoes', []) || []).forEach(f => {
    if (f && f.valor) { FUNCAO_LABEL[f.valor] = f.label || f.valor; if (!FUNCOES_ORDER.includes(f.valor)) FUNCOES_ORDER.push(f.valor); }
  });
  const maiores = cfg('funcoes_maiores', null);
  if (Array.isArray(maiores) && maiores.length) FUNCOES_MAIORES = new Set(maiores);
}

// Preenche o select de comunidade a partir do Config (fallback: mantém os defaults do HTML)
function popularComunidades() {
  const sel = document.getElementById('nc-com'); if (!sel) return;
  const coms = (typeof cfg === 'function') ? cfg('comunidades', null) : null;
  if (!Array.isArray(coms) || !coms.length) return;
  const atual = sel.value; sel.textContent = '';
  coms.forEach(c => { const o = document.createElement('option'); o.value = c.slug; o.textContent = c.label || c.slug; sel.appendChild(o); });
  if (atual) sel.value = atual;
}

// Preenche o select de tipo de celebração a partir de TIPO_LABEL (defaults + tipos do Config)
function popularTipos() {
  const sel = document.getElementById('nc-tipo'); if (!sel) return;
  const atual = sel.value; sel.textContent = '';
  Object.entries(TIPO_LABEL).forEach(([slug, label]) => {
    const o = document.createElement('option'); o.value = slug; o.textContent = label; sel.appendChild(o);
  });
  if (atual) sel.value = atual;
}

// Gera horários do dia todo, de hora em hora e meia-hora (ex.: 8h, 8h30)
function popHorarios() {
  const sel = document.getElementById('nc-horario'); if (!sel) return; sel.textContent = '';
  for (let h = 0; h < 24; h++) {
    for (const m of [0, 30]) {
      const val = m === 0 ? h + 'h' : h + 'h30';
      const o = document.createElement('option'); o.value = val; o.textContent = val; sel.appendChild(o);
    }
  }
}

let verHistorico = false;
function toggleHistorico(){
  verHistorico = !verHistorico;
  const b = document.getElementById('btn-hist-escala');
  if(b){ b.classList.toggle('gold',verHistorico); b.classList.toggle('gray',!verHistorico); b.textContent = verHistorico?'🕓 Histórico ✓':'🕓 Histórico'; }
  loadDados();
}

async function loadDados() {
  const com = document.getElementById('filtro-com').value;
  const hoje = new Date(); const fim = new Date(hoje); fim.setDate(hoje.getDate()+56);
  const ini = new Date(hoje); if(verHistorico) ini.setDate(hoje.getDate()-90);
  let q = sb.from('acolitos_celebracoes').select('*')
    .gte('data', ini.toISOString().slice(0,10))
    .lte('data', fim.toISOString().slice(0,10))
    .order('data').order('horario');
  if (com) q = q.eq('comunidade', com);
  const { data: celebs } = await q;
  celebracoes = celebs || [];

  if (celebracoes.length) {
    const ids = celebracoes.map(c=>c.id);
    const { data: esc, error: escErr } = await sb.from('acolitos_escalas')
      .select('*, acolitos_membros!membro_id(id,nome)').in('celebracao_id', ids);
    if (escErr) console.error('Erro lendo escalas:', escErr);
    escalasMap = {};
    (esc||[]).forEach(e => {
      if (!escalasMap[e.celebracao_id]) escalasMap[e.celebracao_id]=[];
      escalasMap[e.celebracao_id].push(e);
    });
    const [{ data: mems }, { data: habs }, { data: disps }, freqData, { data: auss }, { data: chs }] = await Promise.all([
      sb.from('acolitos_membros').select('id,nome,apelido,nivel,comunidade,pode_outras_comunidades,data_nascimento,foto_url,observacoes,necessidades_especiais,tem_pai_ministro,nome_pai_ministro,tem_mae_ministro,nome_mae_ministro,comunidade_ministro,grupo_irmaos,escalar_com_irmao').eq('status','ativo').order('nome'),
      sb.from('acolitos_habilitacoes').select('membro_id,funcao,proficiencia'),
      sb.from('acolitos_disponibilidade').select('membro_id,dia,horario,restricao'),
      fetchFrequencia(),
      sb.from('acolitos_ausencias').select('membro_id,celebracao_id').in('celebracao_id', ids),
      sb.from('acolitos_chamadas').select('celebracao_id').in('celebracao_id', ids),
    ]);
    membros = mems||[];
    chamadasFeitas = new Set((chs||[]).map(x=>x.celebracao_id));
    // semana passada: quem foi escalado nos últimos 7 dias + resultado (status da escala)
    const sete = new Date(hoje); sete.setDate(hoje.getDate()-7);
    const { data: escPas } = await sb.from('acolitos_escalas')
      .select('membro_id,status, acolitos_celebracoes!inner(data)')
      .gte('acolitos_celebracoes.data', sete.toISOString().slice(0,10))
      .lt('acolitos_celebracoes.data', hoje.toISOString().slice(0,10));
    semanaPassada = {};
    const _rk = s => (s==='presente'||s==='atrasado') ? 3 : (s==='ausente'||s==='ausente_justificado'||s==='substituido') ? 2 : 1;
    (escPas||[]).forEach(e => { const cur = semanaPassada[e.membro_id]; if (!cur || _rk(e.status) > _rk(cur)) semanaPassada[e.membro_id] = e.status; });
    ausMap = {}; (auss||[]).forEach(a=>{ if(!ausMap[a.celebracao_id]) ausMap[a.celebracao_id]=new Set(); ausMap[a.celebracao_id].add(a.membro_id); });
    // ausências avulsas por DATA (sem celebração): valem para todas as missas daquele dia
    const celDatas=[...new Set(celebracoes.map(c=>c.data))];
    if(celDatas.length){
      const{data:ausData}=await sb.from('acolitos_ausencias').select('membro_id,data').is('celebracao_id',null).in('data',celDatas);
      (ausData||[]).forEach(a=>celebracoes.filter(c=>c.data===a.data).forEach(c=>{ if(!ausMap[c.id])ausMap[c.id]=new Set(); ausMap[c.id].add(a.membro_id); }));
    }
    habMap = {}; (habs||[]).forEach(h=>{if(!habMap[h.membro_id])habMap[h.membro_id]={};habMap[h.membro_id][h.funcao]=h.proficiencia;});
    dispMap = {}; restricaoMap = {};
    (disps||[]).forEach(d=>{
      if(!dispMap[d.membro_id])dispMap[d.membro_id]=[];
      dispMap[d.membro_id].push(d.dia+'_'+d.horario);
      if(d.restricao){ if(!restricaoMap[d.membro_id])restricaoMap[d.membro_id]=[]; restricaoMap[d.membro_id].push(d.restricao); }
    });
    freqMap = freqData || {};
  }

  abaAtual==='cards' ? renderCards() : renderPlanilha();
}

function setAba(a) {
  abaAtual=a;
  document.getElementById('view-cards').style.display = a==='cards'?'':'none';
  document.getElementById('view-planilha').style.display = a==='planilha'?'':'none';
  document.getElementById('btn-cards').classList.toggle('active',a==='cards');
  document.getElementById('btn-planilha').classList.toggle('active',a==='planilha');
  a==='cards' ? renderCards() : renderPlanilha();
}

function getCobertura(celebId, comunidade, tipo) {
  const tmpl = modeloFor(tipo, comunidade);
  const esc = escalasMap[celebId]||[];
  const cats={};
  tmpl.forEach(p=>{if(!cats[p.cat])cats[p.cat]={min:0,atual:0};cats[p.cat].min++;});
  esc.forEach(e=>{const p=tmpl.find(x=>x.funcao===e.funcao);if(p&&cats[p.cat])cats[p.cat].atual++;});
  const total=Object.values(cats).reduce((a,c)=>a+c.min,0);
  const preen=Object.values(cats).reduce((a,c)=>a+Math.min(c.atual,c.min),0);
  let status='vazia';
  if(preen>=total)status='completa';
  else if(preen>=total*.6)status='parcial';
  else if(preen>0)status='critica';
  return {cats,total,preenchido:preen,status};
}

    if(!semanas[key])semanas[key]={label:'Semana de '+mon.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}),items:[]};
    semanas[key].items.push(c);
  });
  Object.values(semanas).forEach(sem=>{
    const grp=document.createElement('div');grp.className='semana-grupo';
    const head=document.createElement('div');head.style.cssText='display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;flex-wrap:wrap;';
    const tit=document.createElement('div');tit.className='semana-titulo';tit.style.margin='0';tit.textContent=sem.label;
    const acoesSem=document.createElement('div');acoesSem.style.cssText='display:flex;gap:6px;flex-wrap:wrap;';
    const bGer=document.createElement('button');bGer.className='btn-sm wine';bGer.style.flexShrink='0';bGer.textContent='⚡ Gerar escala da semana';bGer.onclick=()=>gerarEscalaSemana(sem.items,bGer);
    const bLimp=document.createElement('button');bLimp.className='btn-sm gray';bLimp.style.flexShrink='0';bLimp.textContent='🧹 Limpar semana';bLimp.onclick=()=>limparEscalaSemana(sem.items,bLimp);
    const bExp=document.createElement('button');bExp.className='btn-sm';bExp.style.cssText='flex-shrink:0;background:linear-gradient(165deg,rgba(232,185,74,.16),var(--surface2));border:1px solid var(--gold-dim);color:var(--gold-light);';bExp.textContent='📤 Exportar';bExp.onclick=()=>exportarSemana(sem.items,sem.label);
    acoesSem.append(bGer,bLimp,bExp);
    head.append(tit,acoesSem);
    const grid=document.createElement('div');grid.className='celebracoes-grid';
    sem.items.forEach(c=>{
      const cob=getCobertura(c.id,c.comunidade,c.tipo);
      const d=new Date(c.data+'T00:00:00');
      const card=document.createElement('div');card.className='celeb-card status-'+cob.status;
      const hdr=document.createElement('div');hdr.className='celeb-header';
      const info=document.createElement('div');

      dataEl.textContent=DIAS[d.getDay()]+' '+d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})+' · '+c.horario;
      const subEl=document.createElement('div');subEl.className='celeb-sub';
      subEl.textContent=(c.comunidade==='matriz'?'Matriz':'Sto. Antônio')+' · '+(TIPO_LABEL[c.tipo]||c.tipo);
      info.append(dataEl,subEl);
      const pill=document.createElement('span');pill.className='status-pill '+cob.status;
      pill.textContent=cob.status.charAt(0).toUpperCase()+cob.status.slice(1);
      hdr.append(info,pill);card.appendChild(hdr);
      Object.entries(cob.cats).forEach(([cat,v])=>{
        const row=document.createElement('div');row.className='cobertura-row';
        const lbl=document.createElement('span');lbl.className='cobertura-label';lbl.textContent=cat;
        const bar=document.createElement('div');bar.className='cobertura-bar';
        const fill=document.createElement('div');
        const pct=v.min>0?Math.min(v.atual/v.min,1)*100:0;

        const num=document.createElement('span');num.className='cobertura-num';num.textContent=v.atual+'/'+v.min;

      const acts=document.createElement('div');acts.className='celeb-actions';

async function excluirCelebracao(c) {
  const d=new Date(c.data+'T00:00:00');
  if(!confirm('Excluir a celebração de '+DIAS[d.getDay()]+' '+d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})+' · '+c.horario+'?\nA escala e as ausências desta missa também serão removidas.'))return;
  // FK em cascata já remove escalas/ausências; .select() confirma que a linha foi mesmo apagada
  const{data,error}=await sb.from('acolitos_celebracoes').delete().eq('id',c.id).select();
  if(error){toast('Erro ao excluir: '+error.message,'error');return;}
  if(!data||!data.length){toast('Não foi possível excluir (sem permissão?).','error');return;}
  await loadDados();
  toast('✓ Celebração excluída.');
}

function abrirMontagem(celeb) {
  pendingCelebId=celeb.id; celAtual=celeb;
  const ausNesta = ausMap[celeb.id] || new Set(); // membros que declararam ausência nesta missa
  const tmpl=modeloFor(celeb.tipo, celeb.comunidade);
  const d=new Date(celeb.data+'T00:00:00');
  document.getElementById('mt-titulo').textContent=DIAS[d.getDay()]+' '+d.toLocaleDateString('pt-BR',{day:'2-digit',month:'long'})+' · '+celeb.horario;
  document.getElementById('mt-sub').textContent=(celeb.comunidade==='matriz'?'Matriz':'Sto. Antônio')+' · '+(TIPO_LABEL[celeb.tipo]||celeb.tipo);
  const esc=escalasMap[celeb.id]||[];
  const body=document.getElementById('mt-body');body.textContent='';
  const dObj=new Date(celeb.data+'T00:00:00');
  const dow=dObj.getDay();
  const diaKey=dow===0?'domingo':dow===6?'sabado':null;
  const horKey=diaKey?diaKey+'_'+celeb.horario:null;
  pendingEdicao=[];

  // ⚠️ Dupla escala na MESMA semana (evita escalar no sábado e no domingo)
  const _mon=new Date(d);_mon.setDate(d.getDate()-((d.getDay()+6)%7));
  const _wk=_mon.toISOString().slice(0,10);
  const dupSemana={}; // membro_id -> Set de labels de OUTRAS missas da semana onde já está escalado
  celebracoes.forEach(oc=>{
    if(oc.id===celeb.id)return;
    const od=new Date(oc.data+'T00:00:00');
    const om=new Date(od);om.setDate(od.getDate()-((od.getDay()+6)%7));
    if(om.toISOString().slice(0,10)!==_wk)return;
    const lbl=DIAS[od.getDay()]+' '+od.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})+' '+oc.horario;
    (escalasMap[oc.id]||[]).forEach(e=>{ (dupSemana[e.membro_id]=dupSemana[e.membro_id]||new Set()).add(lbl); });
  });

  // Coluna posições
  const colPos=document.createElement('div');
  const t1=document.createElement('div');t1.style.cssText='font-family:Sora,sans-serif;font-size:12px;color:var(--gold);margin-bottom:10px;';t1.textContent='Posições';colPos.appendChild(t1);
  // builder de UMA posição (modelo ou extra) — aninhado p/ usar o estado da celebração
  function criarPosicao(funcao, label, existMembroId, container, isExtra){
    const row=document.createElement('div');row.className='pos-item';
    const lbl=document.createElement('span');lbl.className='pos-label';lbl.textContent=label;
    const sel=document.createElement('select');sel.className='pos-select'+(existMembroId?' filled':'');
    sel.setAttribute('data-funcao',funcao);
    const optV=document.createElement('option');optV.value='';optV.textContent='— vazio —';sel.appendChild(optV);
    const emFormacaoNesta = m => ((habMap[m.id]||{})[funcao])==='em_formacao';
    membros.filter(m=>elegivelFuncao(m,funcao,celeb.comunidade) || emFormacaoNesta(m))
      .forEach(m=>{
        const opt=document.createElement('option');opt.value=m.id;
        const disp=!horKey||(dispMap[m.id]||[]).includes(horKey);
        const ausente=ausNesta.has(m.id);
        const jaSem=dupSemana[m.id];
        const emForm=emFormacaoNesta(m) && !elegivelFuncao(m,funcao,celeb.comunidade);
        opt.textContent=(ausente?'🚫 ':(disp?'':'⚠ '))+(m.apelido||m.nome)+(emForm?' 🎓 em formação':'')+(ausente?' — ausência':'')+(jaSem?' 🔁 já: '+[...jaSem].join(', '):'');
        if(ausente && existMembroId!==m.id) opt.disabled=true;
        if(existMembroId===m.id)opt.selected=true;
        opt._baseTxt=opt.textContent; opt._baseDis=!!opt.disabled;
        sel.appendChild(opt);
      });
    const pe={sel,funcao,extra:!!isExtra};
    pendingEdicao.push(pe);
    const trc=document.createElement('button');trc.type='button';trc.className='mini-del';trc.textContent='🔄';trc.title='Trocar por outra opção';trc.style.cssText='width:28px;height:28px;flex:none;font-size:12px;';
    trc.onclick=()=>trocarPosicao(pe);
    const clr=document.createElement('button');clr.type='button';clr.className='mini-del';clr.textContent='✕';clr.title=isExtra?'Remover este campo extra':'Limpar esta função';clr.style.cssText='width:28px;height:28px;flex:none;font-size:12px;';
    const dm=document.createElement('div');dm.style.cssText='font-size:10px;margin:-4px 0 4px;padding-left:2px;font-weight:800;color:var(--danger-text);display:none;';
    const dp=document.createElement('div');dp.style.cssText='font-size:10px;margin:-4px 0 4px;padding-left:2px;font-weight:700;color:var(--danger-text);display:none;';
    const sp=document.createElement('div');sp.style.cssText='font-size:10px;margin:-4px 0 4px;padding-left:2px;font-weight:600;display:none;';
    pe.atualizarAvisos=()=>{
      const mid=sel.value;
      const naOutra=mid&&pendingEdicao.some(p=>p!==pe&&p.sel.value===mid);
      if(naOutra){dm.style.display='';dm.textContent='✋ Já escalado(a) nesta missa em outra função';}
      else{dm.style.display='none';dm.textContent='';}
      const dup=mid&&dupSemana[mid];
      if(dup&&dup.size){dp.style.display='';dp.textContent='⚠️ Já escalado(a) esta semana: '+[...dup].join(', ');}
      else{dp.style.display='none';dp.textContent='';}
      const stp=mid&&semanaPassada[mid];
      if(stp){const pres=(stp==='presente'||stp==='atrasado'),falt=(stp==='ausente'||stp==='ausente_justificado'||stp==='substituido');sp.style.display='';sp.style.color=pres?'var(--success-text)':falt?'var(--danger-text)':'var(--text-muted)';sp.textContent='🔁 Semana passada: '+(pres?'presença marcada ✓':falt?'faltou ✗':'escalado •');}
      else{sp.style.display='none';sp.textContent='';}
    };
    if(isExtra){
      clr.onclick=()=>{ const i=pendingEdicao.indexOf(pe); if(i>=0)pendingEdicao.splice(i,1); row.remove(); dm.remove(); dp.remove(); sp.remove(); refreshDuplicatasMissa(); };
    } else {
      clr.onclick=()=>{sel.value='';sel.classList.remove('filled');refreshDuplicatasMissa();};
    }
    sel.onchange=()=>{sel.classList.toggle('filled',!!sel.value);refreshDuplicatasMissa();checarIrmao(pe);};
    row.append(lbl,sel,trc,clr);container.appendChild(row);container.appendChild(dm);container.appendChild(dp);container.appendChild(sp);
    pe.atualizarAvisos();
    return pe;
  }
  // container por categoria + botão "＋ função"
  const catBox={};
  function getCatBox(cat){

    const titulo=document.createElement('div');titulo.className='cat-titulo';titulo.textContent=cat;colPos.appendChild(titulo);
    const box=document.createElement('div');colPos.appendChild(box);

    add.onclick=()=>abrirMenuAddFuncao(cat, add);
    colPos.appendChild(add);
    catBox[cat]={box,add};
    return catBox[cat];
  }
  function adicionarSlotExtra(funcao, membroId){
    const meta=FUNCAO_META[funcao]||{label:funcao,cat:'Outros'};
    const cb=getCatBox(meta.cat);
    const pe=criarPosicao(funcao, meta.label+' (extra)', membroId||null, cb.box, true);
    if(membroId){ pe.sel.value=membroId; pe.sel.classList.add('filled'); }
    refreshDuplicatasMissa();
    return pe;
  }
  function abrirMenuAddFuncao(cat, anchorBtn){
    if(anchorBtn._menu){ anchorBtn._menu.remove(); anchorBtn._menu=null; return; }
    const menu=document.createElement('div');menu.style.cssText='display:flex;flex-wrap:wrap;gap:6px;margin:0 0 10px;';
    Object.keys(FUNCAO_META).filter(f=>FUNCAO_META[f].cat===cat).forEach(f=>{
      const b=document.createElement('button');b.type='button';b.textContent=FUNCAO_META[f].label;
      b.style.cssText='font-size:11px;color:var(--text);background:var(--surface2);border:1px solid var(--border-wine);border-radius:6px;padding:4px 8px;cursor:pointer;';
      b.onclick=()=>{ adicionarSlotExtra(f); menu.remove(); anchorBtn._menu=null; };
      menu.appendChild(b);
    });
    anchorBtn.parentNode.insertBefore(menu, anchorBtn.nextSibling);
    anchorBtn._menu=menu;
  }
  // dispensados nesta sessão do modal (par membro|irmão) — usado no alerta de irmão
  const _irmaoDispensado=new Set();
  function checarIrmao(pe){
    const id=pe.sel.value; if(!id) return;
    const m=membros.find(x=>x.id===id); if(!m||!m.escalar_com_irmao||!m.grupo_irmaos) return;
    const irmaos=membros.filter(x=>x.grupo_irmaos===m.grupo_irmaos && x.escalar_com_irmao && x.id!==m.id);
    irmaos.forEach(irmao=>{
      const jaEsta=pendingEdicao.some(p=>p.sel.value===irmao.id);
      const chave=m.id+'|'+irmao.id;
      if(jaEsta || _irmaoDispensado.has(chave)) return;
      const aus=ausNesta.has(irmao.id)?' (atenção: ele declarou ausência nesta missa)':'';
      if(confirm('Você escalou '+(m.apelido||m.nome)+' e o irmão '+(irmao.apelido||irmao.nome)+' ainda não está na escala.'+aus+'\n\nAdicionar '+(irmao.apelido||irmao.nome)+' como Apoio?')){
        adicionarSlotExtra('apoio', irmao.id);
      } else {
        _irmaoDispensado.add(chave);
      }
    });
  }

  // posições do MODELO
  tmpl.forEach((pos,idx)=>{
    const existFn=esc.filter(e=>e.funcao===pos.funcao);
    const idxDessaFn=tmpl.slice(0,idx).filter(p=>p.funcao===pos.funcao).length;
    const exist=existFn[idxDessaFn];
    const cb=getCatBox(pos.cat);
    criarPosicao(pos.funcao, pos.label, exist?exist.membro_id:null, cb.box, false);
  });
  // SLOTS EXTRAS: linhas de escala que excedem a contagem do modelo (persistem ao reabrir)
  const _contFn={};
  esc.forEach(e=>{ _contFn[e.funcao]=(_contFn[e.funcao]||0)+1; });
  Object.keys(_contFn).forEach(funcao=>{
    const modeloN=tmpl.filter(p=>p.funcao===funcao).length;
    const rows=esc.filter(e=>e.funcao===funcao);
    for(let i=modeloN;i<rows.length;i++){ adicionarSlotExtra(funcao, rows[i].membro_id); }
  });

  // Coluna membros
  const colMems=document.createElement('div');
  const t2=document.createElement('div');t2.style.cssText='font-family:Sora,sans-serif;font-size:12px;color:var(--gold);margin-bottom:10px;';t2.textContent='Membros Aptos';colMems.appendChild(t2);
  const ml=document.createElement('div');ml.className='mems-list';
  membros.forEach(m=>{
    const habs=habMap[m.id]||{};
    const apt=['cred_credencia','cred_altar','missal','altar','turibulo','naveta','cruz','vela','sineta','sinao','apoio']
      .filter(f=>['apto','experiente','referencia'].includes(habs[f]));
    if(!apt.length)return;
    const disp=!horKey||(dispMap[m.id]||[]).includes(horKey);
    const ausente=ausNesta.has(m.id);
    const row=document.createElement('div');row.className='mem-row';row.style.opacity=ausente?'.3':(disp?'1':'.45');
    const n=document.createElement('div');n.className='mem-nome';n.textContent=(ausente?'🚫 ':(disp?'':'⚠ '))+(m.apelido||m.nome);
    const f=document.createElement('div');f.className='mem-fns';f.textContent=ausente?'Ausência declarada nesta missa':apt.map(x=>FUNCAO_LABEL[x]).join(', ');
    row.append(n,f);ml.appendChild(row);
  });
  colMems.appendChild(ml);
  body.append(colPos,colMems);
  refreshDuplicatasMissa(); // marca/avisa duplicatas na MESMA missa já ao abrir
  document.getElementById('modal-montagem').classList.add('open');
}

function horKeyDe(celeb) {
  const dow = new Date(celeb.data+'T00:00:00').getDay();
  const diaKey = dow===0?'domingo':dow===6?'sabado':null;
  return diaKey ? diaKey+'_'+celeb.horario : null;
}

// Recarrega ausências FRESCAS (por celebração + por data avulsa) — evita escalar quem lançou ausência agora
async function carregarAusenciasFresh(celebs) {
  const ids = celebs.map(c => c.id);
  const datas = [...new Set(celebs.map(c => c.data))];
  const map = {};
  const [porCel, porData] = await Promise.all([
    sb.from('acolitos_ausencias').select('membro_id,celebracao_id').in('celebracao_id', ids),
    sb.from('acolitos_ausencias').select('membro_id,data').is('celebracao_id', null).in('data', datas),
  ]);
  (porCel.data || []).forEach(a => { (map[a.celebracao_id] = map[a.celebracao_id] || new Set()).add(a.membro_id); });
  (porData.data || []).forEach(a => celebs.filter(c => c.data === a.data).forEach(c => { (map[c.id] = map[c.id] || new Set()).add(a.membro_id); }));
  return map;
}

// Funções MAIORES (especializadas) — reservadas p/ cerimoniários; o resto é menor (altar/cruz/vela/apoio...)
// Elegibilidade numa função: habilitação (apto+) OU kit leve do Santo Antônio (cruz/vela liberados p/ coroinhas 7+).
// Na Matriz vale só a habilitação (kit pesado — você controla por apto). Sem idade preenchida → cai no nível (coroinha+).
function elegivelFuncao(m, f, comKey) {
  const h = (habMap[m.id]||{})[f];
  if (h && ['apto','experiente','referencia'].includes(h)) return true;
  const ger = (typeof cfg === 'function') ? (cfg('gerador', {}) || {}) : {};
  const kit = ger.kit_leve || { comunidade:'santo_antonio', funcoes:['cruz','vela'], idade_min:7 };
  if (kit && comKey === kit.comunidade && (kit.funcoes||[]).includes(f)) {
    const idade = m.data_nascimento ? calcIdade(m.data_nascimento) : null;
    if (idade != null) return idade >= (kit.idade_min != null ? kit.idade_min : 7);
    return nivelInfo(m.nivel||'aspirante').int >= 1;   // sem idade → coroinha pra cima
  }
  return false;
}

// Carga histórica p/ rodízio: consulta DIRETO no banco quantas vezes cada membro já foi escalado
// nas ~6 semanas até o fim de semana de referência (NÃO depende do que está carregado na tela —
// considera o histórico real, inclusive semanas passadas que a tela não traz).
async function carregarCargaHistorica(refData) {
  const ref = refData || new Date().toISOString().slice(0,10);
  const _gerJ = (typeof cfg === 'function') ? (cfg('gerador', {}) || {}) : {};
  const _dias = Number(_gerJ.janela_dias) || 42;
  const ini = new Date(ref + 'T00:00:00'); ini.setDate(ini.getDate() - _dias); // janela móvel (config, default 6 semanas)
  const iniStr = ini.toISOString().slice(0,10);
  const base = {};
  try {
    // 2 passos (sem filtro em tabela aninhada, que falhava em silêncio): IDs das celebrações da janela → conta escalas
    const { data: cels } = await sb.from('acolitos_celebracoes').select('id').gte('data', iniStr).lte('data', ref);
    const ids = (cels || []).map(c => c.id);
    if (!ids.length) return base;
    const { data } = await sb.from('acolitos_escalas').select('membro_id').in('celebracao_id', ids).limit(5000);
    (data || []).forEach(e => { base[e.membro_id] = (base[e.membro_id]||0)+1; });
  } catch (err) { console.error('carga histórica falhou', err); }
  return base;
}

let FUNCOES_MAIORES = new Set(['cred_altar','cred_credencia','missal','turibulo','naveta','mitra','baculo']);
// Núcleo do gerador. vagas = array de funções (uma por vaga aberta). Retorna array alinhado de membro_id|null.
// Regras: apto + não-ausente + sem repetir na missa; IRMÃOS juntos = bloco tudo-ou-nada;
//   cerimoniários priorizados nas MAIORES (só em último caso vão p/ menores); não repetir no fim de semana (usadoFds);
//   COMUNIDADE da missa preferida (cruza só faltando); rodízio justo do mês (carga); mix de experiência nas menores.
function planejarVagas(vagas, horKey, ausNesta, usados, carga, usadoFds, comKey) {
  usadoFds = usadoFds || new Set();
  const res = new Array(vagas.length).fill(null);
  const nint = {}; membros.forEach(m => { nint[m.id] = nivelInfo(m.nivel||'aspirante').int; });
  const memById = {}; membros.forEach(m => { memById[m.id] = m; });
  const apta = (id,f) => { const m = memById[id]; return m ? elegivelFuncao(m, f, comKey) : false; };
  const disp = id => !horKey || (dispMap[id]||[]).includes(horKey);
  const livres = () => res.map((r,i)=>r?-1:i).filter(i=>i>=0);
  const assign = (i,id) => { res[i]=id; usados.add(id); usadoFds.add(id); carga[id]=(carga[id]||0)+1; };
  const bloqueados = new Set();
  const ehCerimo = m => nint[m.id] >= 6; // cerimoniário = nível 6+
  // POOL DURO: apto + DISPONÍVEL no horário + não-ausente + sem repetir na missa + não bloqueado
  const cands = (i) => membros.filter(m => apta(m.id,vagas[i]) && disp(m.id) && !usados.has(m.id) && !ausNesta.has(m.id) && !bloqueados.has(m.id));

  function placeUnit(ids) {
    const slots = livres();
    const order = ids.slice().sort((a,b)=> slots.filter(i=>apta(a,vagas[i])).length - slots.filter(i=>apta(b,vagas[i])).length);
    const used = new Set(); const plan = [];
    for (const id of order) {
      const idx = slots.find(i => !used.has(i) && apta(id, vagas[i]));
      if (idx === undefined) return false;
      used.add(idx); plan.push([idx,id]);
    }
    plan.forEach(([i,id]) => assign(i,id));
    return true;
  }

  // 0) COMPLETAR FAMÍLIA dos já escalados (manual/existente): irmãos que servem junto entram também.
  //    Não remove a escolha manual — só adiciona o(s) irmão(s) disponível(is) numa vaga apta.
  Array.from(usados).forEach(id => {
    const m = membros.find(x => x.id === id);
    if (!m || !m.escalar_com_irmao || !m.grupo_irmaos) return;
    membros.filter(x => x.grupo_irmaos===m.grupo_irmaos && x.escalar_com_irmao && x.id!==id && !usados.has(x.id) && !ausNesta.has(x.id) && disp(x.id))
      .forEach(irm => { const i = livres().find(j => apta(irm.id, vagas[j])); if (i !== undefined) assign(i, irm.id); });
  });

  // 1) blocos de irmãos (tudo-ou-nada)
  const visited = new Set(); const sibUnits = [];
  membros.forEach(m => {
    if (visited.has(m.id)) return;
    if (m.escalar_com_irmao && m.grupo_irmaos) {
      const grp = membros.filter(x => x.grupo_irmaos===m.grupo_irmaos && x.escalar_com_irmao);
      grp.forEach(x => visited.add(x.id));
      const unit = grp.filter(x => !usados.has(x.id) && !usadoFds.has(x.id) && !ausNesta.has(x.id) && disp(x.id) && livres().some(i=>apta(x.id,vagas[i])));
      if (unit.length >= 2) sibUnits.push(unit.map(x=>x.id));
    } else visited.add(m.id);
  });
  sibUnits.sort((A,B) => {
    const ua=A.some(id=>usadoFds.has(id))?1:0, ub=B.some(id=>usadoFds.has(id))?1:0; if(ua!==ub) return ua-ub;
    const fa=Math.min(...A.map(id=>carga[id]||0)), fb=Math.min(...B.map(id=>carga[id]||0)); return (fa-fb) || (B.length-A.length);
  });
  sibUnits.forEach(u => { if (!placeUnit(u)) u.forEach(id => bloqueados.add(id)); });

  const mesmaCom = m => !comKey || (m.comunidade||'') === comKey;

  // 2) vagas individuais — funções MAIORES primeiro (cerimoniários nelas), depois mais escassas
  livres()
    .map(i => ({ i, maior: FUNCOES_MAIORES.has(vagas[i]), n: cands(i).length }))
    .sort((a,b) => (b.maior?1:0)-(a.maior?1:0) || a.n - b.n)
    .forEach(({ i }) => {
      if (res[i]) return;
      const menor = !FUNCOES_MAIORES.has(vagas[i]);
      const pool = cands(i); // já filtrado por disponibilidade (duro)
      if (!pool.length) return; // ninguém apto E disponível → vaga fica VAZIA (não força)
      // CAMADA DE COMUNIDADE: prefere quem é da comunidade da missa; cruza só faltando (e quem pode); por fim qualquer
      const comTiers = [ pool.filter(mesmaCom),
                         pool.filter(m => !mesmaCom(m) && m.pode_outras_comunidades),
                         pool ];
      const comPool = comTiers.find(t => t.length);
      // camadas internas — cada uma só usada se a anterior estiver vazia:
      const tiers = menor
        ? [ comPool.filter(m => !ehCerimo(m) && !usadoFds.has(m.id)),  // 1) não-cerimoniário e novo no fds
            comPool.filter(m => !ehCerimo(m)),                         // 2) não-cerimoniário (mesmo repetindo)
            comPool.filter(m => !usadoFds.has(m.id)),                  // 3) novo no fds (aceita cerimoniário)
            comPool ]                                                  // 4) qualquer (último caso)
        : [ comPool.filter(m => !usadoFds.has(m.id)),                  // maior: 1) ainda não usado no fds
            comPool ];                                                 // 2) qualquer
      // ORDENA: rodízio primeiro (quem serviu menos no histórico), e EMPATE É ALEATÓRIO.
      // (nível/mix saíram do meio de propósito — eram determinísticos e causavam repetição semana a semana.)
      const grupo = tiers.find(t => t.length).slice();
      grupo.sort((a,b) => {
        if ((carga[a.id]||0)!==(carga[b.id]||0)) return (carga[a.id]||0)-(carga[b.id]||0); // RODÍZIO
        return Math.random()-0.5;                                                            // empate → aleatório (varia)
      });
      const escolhido = grupo[0];
      assign(i, escolhido.id);
    });
  return res;
}

// Botão "Gerar automático" do modal — preenche as vagas vazias da missa aberta
async function gerarEscalaAuto() {
  if (!celAtual || !pendingEdicao.length) return;
  const aus = await carregarAusenciasFresh([celAtual]);
  const ausNesta = aus[celAtual.id] || new Set();
  ausMap[celAtual.id] = ausNesta;
  const open = pendingEdicao.filter(pe => !pe.sel.value);
  const usados = new Set(); pendingEdicao.forEach(pe => { if (pe.sel.value) usados.add(pe.sel.value); });
  const cargaH = await carregarCargaHistorica(celAtual.data);
  const res = planejarVagas(open.map(pe=>pe.funcao), horKeyDe(celAtual), ausNesta, usados, cargaH, new Set(usados), celAtual.comunidade);
  res.forEach((id,i) => { if (id) { open[i].sel.value = id; open[i].sel.classList.add('filled'); } });
  const vazias = res.filter(r => !r).length;
  const btn = document.getElementById('btn-gerar-auto');
  if (btn) { btn.textContent = vazias ? '✨ Gerado (' + vazias + ' sem apto)' : '✨ Gerado!'; setTimeout(() => { btn.textContent = '✨ Gerar automático'; }, 2500); }
}

// Limpa todas as posições do card aberto (precisa Salvar p/ gravar)
function limparMontagem() {
  if (!pendingEdicao.length) return;
  pendingEdicao.forEach(({sel}) => { sel.value=''; sel.classList.remove('filled'); });
  toast('Posições limpas — clique em "Salvar Escala" para gravar.');
}

// Troca a pessoa de uma posição por OUTRA opção válida (apta, disponível, não-ausente, sem duplicar na missa)
// recalcula em TODOS os selects/avisos quem já está na MESMA missa (marca + desabilita opções)
function refreshDuplicatasMissa(){
  const naMissa=new Set();
  pendingEdicao.forEach(p=>{ if(p.sel.value) naMissa.add(p.sel.value); });
  pendingEdicao.forEach(p=>{
    Array.from(p.sel.options).forEach(opt=>{
      if(!opt.value) return;
      const dup=naMissa.has(opt.value) && opt.value!==p.sel.value;
      opt.disabled=(opt._baseDis||false)||dup;
      opt.textContent=(opt._baseTxt||opt.textContent)+(dup?' ✋ nesta missa':'');
    });
    if(p.atualizarAvisos) p.atualizarAvisos();
  });
}
function trocarPosicao(pe) {
  if (!celAtual) return;
  const horKey = horKeyDe(celAtual);
  const ausNesta = ausMap[celAtual.id] || new Set();
  const atual = pe.sel.value;
  const usadosOutros = new Set();
  pendingEdicao.forEach(p => { if (p !== pe && p.sel.value) usadosOutros.add(p.sel.value); });
  const apta = (id,f) => { const m=membros.find(x=>x.id===id); return m ? elegivelFuncao(m, f, celAtual.comunidade) : false; };
  const disp = id => !horKey || (dispMap[id]||[]).includes(horKey);
  const nivel = id => { const m=membros.find(x=>x.id===id); return m?nivelInfo(m.nivel||'aspirante').int:0; };
  const menor = !FUNCOES_MAIORES.has(pe.funcao);
  const pool = membros.filter(m => apta(m.id,pe.funcao) && disp(m.id) && !ausNesta.has(m.id) && !usadosOutros.has(m.id) && m.id!==atual);
  if (!pool.length) { toast('Sem outra opção disponível e apta pra essa função.','error'); return; }
  const tiers = menor ? [pool.filter(m => nivel(m.id) < 6), pool] : [pool]; // menor: evita cerimoniário
  const grupo = tiers.find(t => t.length);
  const escolhido = grupo[Math.floor(Math.random()*grupo.length)];
  pe.sel.value = escolhido.id; pe.sel.classList.add('filled');
  refreshDuplicatasMissa();
  toast('🔄 ' + (escolhido.apelido || (escolhido.nome||'').split(' ')[0]));
}

// Gera e SALVA a escala de todas as missas de um fim de semana (preenche só as vagas ainda vazias)
async function gerarEscalaSemana(celebs, btnEl) {
  if (!celebs || !celebs.length) return;
  if (!confirm('Gerar a escala de ' + celebs.length + ' missa(s) deste fim de semana?\n(Preenche as vagas ainda vazias, mantendo o que já estiver montado.)')) return;
  const txt0 = btnEl ? btnEl.textContent : '';
  if (btnEl) { btnEl.disabled = true; btnEl.textContent = 'Gerando...'; }
  const ordc = celebs.slice().sort((a,b) => (a.data+a.horario).localeCompare(b.data+b.horario));
  const carga = await carregarCargaHistorica(ordc[0] ? ordc[0].data : ''); // rodízio: histórico real (banco) — ref = data mais antiga
  const ausFresh = await carregarAusenciasFresh(ordc);
  const usadoFds = new Set();                // ninguém repete no fim de semana
  ordc.forEach(c => (escalasMap[c.id]||[]).forEach(e => usadoFds.add(e.membro_id))); // já escalados contam
  const nint = {}; membros.forEach(m => { nint[m.id] = nivelInfo(m.nivel||'aspirante').int; });
  const ehCerimo = m => nint[m.id] >= 6;

  // Monta TODAS as vagas abertas da semana (de todas as missas)
  const usadosMissa = {}; const slots = [];
  ordc.forEach(c => {
    const existing = escalasMap[c.id] || [];
    usadosMissa[c.id] = new Set(existing.map(e => e.membro_id));
    const existPorFunc = {}; existing.forEach(e => { existPorFunc[e.funcao] = (existPorFunc[e.funcao]||0)+1; });
    const cnt = {};
    modeloFor(c.tipo, c.comunidade).forEach(s => {
      cnt[s.funcao] = (cnt[s.funcao]||0)+1;
      if (cnt[s.funcao] > (existPorFunc[s.funcao]||0)) slots.push({ c, funcao: s.funcao, hk: horKeyDe(c), com: c.comunidade, filled: false });
    });
  });
  // pool DURO de candidatos p/ uma vaga, no estado atual
  const candsDe = s => {
    const aus = ausFresh[s.c.id] || new Set();
    return membros.filter(m => elegivelFuncao(m, s.funcao, s.com)
      && (!s.hk || (dispMap[m.id]||[]).includes(s.hk))
      && !usadoFds.has(m.id) && !usadosMissa[s.c.id].has(m.id) && !aus.has(m.id));
  };
  // escolha dentro do pool: comunidade → reserva cerimoniário (nas menores) → RODÍZIO → aleatório
  const escolher = (s, pool) => {
    const mesmaCom = m => !s.com || (m.comunidade||'') === s.com;
    const comPool = [pool.filter(mesmaCom), pool.filter(m => !mesmaCom(m) && m.pode_outras_comunidades), pool].find(t => t.length);
    const menor = !FUNCOES_MAIORES.has(s.funcao);
    const tiers = menor ? [comPool.filter(m => !ehCerimo(m)), comPool] : [comPool];
    const grupo = tiers.find(t => t.length).slice();
    grupo.sort((a,b) => ((carga[a.id]||0)-(carga[b.id]||0)) || (Math.random()-0.5));
    return grupo[0];
  };
  const novas = [];
  const colocar = (s, m) => {
    s.filled = true; usadoFds.add(m.id); usadosMissa[s.c.id].add(m.id); carga[m.id] = (carga[m.id]||0)+1;
    novas.push({ celebracao_id: s.c.id, membro_id: m.id, funcao: s.funcao, created_by: ctx.user.id });
  };
  // GREEDY GLOBAL: preenche sempre a vaga com MENOS candidatos primeiro (reserva os "frescos" p/ onde há pouca opção)
  while (true) {
    let best = null, bestCands = null;
    for (const s of slots) {
      if (s.filled) continue;
      const cs = candsDe(s);
      if (best === null || cs.length < bestCands.length) { best = s; bestCands = cs; }
    }
    if (!best) break;
    if (!bestCands.length) { best.filled = true; continue; } // ninguém apto+disponível → vaga fica vazia
    const m = escolher(best, bestCands);
    colocar(best, m);
    // IRMÃOS JUNTOS: se serve com irmão, tenta colocar o(s) irmão(s) na MESMA missa
    if (m.escalar_com_irmao && m.grupo_irmaos) {
      membros.filter(x => x.grupo_irmaos === m.grupo_irmaos && x.escalar_com_irmao && !usadoFds.has(x.id))
        .forEach(irm => {
          const s2 = slots.find(s => !s.filled && s.c.id === best.c.id && candsDe(s).some(cc => cc.id === irm.id));
          if (s2) colocar(s2, irm);
        });
    }
  }
  if (novas.length) {
    const { error } = await sb.from('acolitos_escalas').insert(novas);
    if (error) { alert('Erro ao salvar: ' + error.message); if (btnEl) { btnEl.disabled = false; btnEl.textContent = txt0; } return; }
  }
  await loadDados();
}

// Exporta as escalas da semana em texto "Nome - Função" (copiar/baixar p/ compartilhar)
// ── Escala em PDF (período carregado, por semana → missa, alfabético) ──
function escalaPDF(){
  if(!celebracoes || !celebracoes.length){ toast('Nenhuma celebração no período.','error'); return; }
  const HOR_ORDEM=['17h','18h30','7h','9h','19h'];
  const horRank=h=>{ const i=HOR_ORDEM.indexOf(String(h||'').replace(/^0/,'')); return i<0?99:i; };
  const nomeDe=e=>(e.acolitos_membros && e.acolitos_membros.nome) || '—';
  const comLbl=c=>c==='matriz'?'Matriz':'Sto. Antônio';
  const semanas={};
  celebracoes.forEach(c=>{
    const d=new Date(c.data+'T00:00:00'); const mon=new Date(d); mon.setDate(d.getDate()-((d.getDay()+6)%7));
    const key=mon.toISOString().slice(0,10);
    if(!semanas[key]) semanas[key]={ label:'Semana de '+mon.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}), items:[] };
    semanas[key].items.push(c);
  });
  let corpo='';
  Object.keys(semanas).sort().forEach(key=>{
    const sem=semanas[key];
    corpo+='<h2>'+relEsc(sem.label)+'</h2>';
    sem.items.slice().sort((a,b)=>a.data.localeCompare(b.data)||horRank(a.horario)-horRank(b.horario)).forEach(c=>{
      const d=new Date(c.data+'T00:00:00');
      const tit=DIAS[d.getDay()]+' '+d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})+' · '+c.horario+' · '+comLbl(c.comunidade)+' · '+(TIPO_LABEL[c.tipo]||c.tipo);
      corpo+='<h3>'+relEsc(tit)+'</h3>';
      const escalas=(escalasMap[c.id]||[]).slice().sort((a,b)=>nomeDe(a).localeCompare(nomeDe(b),'pt',{sensitivity:'base'}));
      if(!escalas.length){ corpo+='<p class="muted">(escala não montada)</p>'; return; }
      corpo+=relTabela(['Membro','Função'], escalas.map(e=>[ nomeDe(e), (FUNCAO_LABEL[e.funcao]||e.funcao) ]));
    });
  });
  const datas=celebracoes.map(c=>c.data).sort();
  const f=s=>new Date(s+'T00:00:00').toLocaleDateString('pt-BR');
  const periodo = datas.length ? (f(datas[0])+' a '+f(datas[datas.length-1])) : 'período carregado';
  abrirRelatorio({ titulo:'Escala', subtitulo:'Acólitos · '+periodo, corpo, css:'h3{margin:14px 0 4px}' });
}
function exportarSemana(celebs, label) {
  // ordem fixa das missas: 17h, 18h30, 7h, 9h, 19h (por dia); lista de cada missa em ordem ALFABÉTICA por nome
  const HOR_ORDEM = ['17h','18h30','7h','9h','19h'];
  const horRank = h => { const i = HOR_ORDEM.indexOf(String(h||'').replace(/^0/,'')); return i<0?99:i; };
  const nomeDe = e => (e.acolitos_membros && e.acolitos_membros.nome) || '';
  const ordc = celebs.slice().sort((a,b) => a.data.localeCompare(b.data) || horRank(a.horario)-horRank(b.horario));
  let txt = (label ? label.toUpperCase() : 'ESCALA DA SEMANA') + '\n\n';
  ordc.forEach(c => {
    const d = new Date(c.data+'T00:00:00');
    txt += DIAS[d.getDay()] + ' ' + d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}) + ' · ' + c.horario + ' · ' + (c.comunidade==='matriz'?'Matriz':'Sto. Antônio') + '\n';
    const escalas = (escalasMap[c.id]||[]).slice().sort((a,b) => nomeDe(a).localeCompare(nomeDe(b),'pt',{sensitivity:'base'}));
    if (!escalas.length) txt += '(escala não montada)\n';
    else escalas.forEach(e => { txt += (nomeDe(e)||'—') + ' - ' + (FUNCAO_LABEL[e.funcao]||e.funcao) + '\n'; });
    txt += '\n';
  });

  const ov = document.createElement('div'); ov.className = 'modal-overlay open'; ov.onclick = (e) => { if (e.target===ov) ov.remove(); };
  const m = document.createElement('div'); m.className = 'modal'; m.style.maxWidth = '460px';
  const tt = document.createElement('div'); tt.className = 'modal-title'; tt.textContent = 'Exportar escala';
  const ta = document.createElement('textarea'); ta.readOnly = true; ta.value = txt.trim();
  ta.style.cssText = 'width:100%;height:46vh;background:var(--surface2);border:1px solid var(--border-wine);border-radius:8px;color:var(--text);font-family:monospace;font-size:12px;line-height:1.5;padding:10px;white-space:pre;overflow:auto;';
  const acts = document.createElement('div'); acts.style.cssText = 'display:flex;gap:8px;margin-top:12px;';
  const bCopy = document.createElement('button'); bCopy.className = 'btn gold'; bCopy.style.flex = '1'; bCopy.textContent = '📋 Copiar';
  bCopy.onclick = async () => {
    try { await navigator.clipboard.writeText(ta.value); } catch (e) { ta.select(); document.execCommand('copy'); }
    bCopy.textContent = '✓ Copiado!'; setTimeout(() => { bCopy.textContent = '📋 Copiar'; }, 2000);
  };
  const bDown = document.createElement('button'); bDown.className = 'btn'; bDown.style.flex = '1'; bDown.textContent = '⬇️ Baixar .txt';
  bDown.onclick = () => {
    const blob = new Blob([ta.value], { type:'text/plain' }); const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'escala-' + (label||'semana').replace(/[^\w]+/g,'-').toLowerCase() + '.txt'; a.click(); URL.revokeObjectURL(url);
  };
  const bClose = document.createElement('button'); bClose.className = 'btn'; bClose.style.cssText = 'flex:1;background:transparent;border:1px solid var(--border);color:var(--text-muted);'; bClose.textContent = 'Fechar'; bClose.onclick = () => ov.remove();
  acts.append(bCopy, bDown, bClose);
  m.append(tt, ta, acts); ov.appendChild(m); document.body.appendChild(ov);
}

let salvandoEscala=false;
async function salvarEscala() {
  if(salvandoEscala || !pendingCelebId){ if(!pendingCelebId) toast('Abra uma celebração para montar a escala.','error'); return; }
  salvandoEscala=true;
  const btn=document.getElementById('btn-sv-escala');
  btn.disabled=true;btn.textContent='Salvando...';
  // monta só as vagas preenchidas — pode salvar INCOMPLETA (vagas vazias são ignoradas)
  const novas=[];
  pendingEdicao.forEach(({sel,funcao})=>{ if(sel.value) novas.push({celebracao_id:pendingCelebId,membro_id:sel.value,funcao,created_by:ctx.user.id}); });
  // trava: ninguém pode estar em duas funções da MESMA missa
  const _ids=novas.map(n=>n.membro_id); const _dupId=_ids.find((id,i)=>_ids.indexOf(id)!==i);
  if(_dupId){ const _m=membros.find(x=>x.id===_dupId); salvandoEscala=false; btn.disabled=false; btn.textContent='Salvar Escala'; toast('✋ '+((_m&&(_m.apelido||_m.nome))||'Um membro')+' está em duas funções nesta missa. Ajuste antes de salvar.','error'); return; }
  const del=await sb.from('acolitos_escalas').delete().eq('celebracao_id',pendingCelebId);
  if(del.error){ salvandoEscala=false; btn.disabled=false; btn.textContent='Salvar Escala'; toast('Erro ao salvar: '+del.error.message,'error'); return; }
  let gravadas=0;
  if(novas.length){
    const ins=await sb.from('acolitos_escalas').insert(novas).select();
    if(ins.error){ salvandoEscala=false; btn.disabled=false; btn.textContent='Salvar Escala'; toast('Erro ao salvar: '+ins.error.message,'error'); return; }
    gravadas = ins.data ? ins.data.length : 0;
  }
  if(novas.length && gravadas===0){
    salvandoEscala=false; btn.disabled=false; btn.textContent='Salvar Escala';
    toast('⚠ Nada foi gravado (0 de '+novas.length+') — sem permissão de escrita na escala.','error'); return;
  }
  btn.className='btn-sm green'; btn.textContent='✓ Escala salva!';
  toast('✓ Escala salva! ('+gravadas+' de '+novas.length+' posições)');
  setTimeout(async ()=>{
    fecharModal('modal-montagem');
    btn.className='btn-sm gold'; btn.textContent='Salvar Escala'; btn.disabled=false;
    salvandoEscala=false;
    await loadDados();
  }, 1000);
}

  const tt=document.createElement('div');tt.className='modal-title';tt.textContent='Registrar Ausência';md.appendChild(tt);
  const lM=document.createElement('label');lM.style.cssText='font-size:12px;color:var(--text-muted);display:block;margin:8px 0 4px;';lM.textContent='Membro';md.appendChild(lM);
  const selMembro=document.createElement('select');selMembro.className='form-select';selMembro.style.width='100%';
  const o0=document.createElement('option');o0.value='';o0.textContent='— escolha —';selMembro.appendChild(o0);
  (membros||[]).slice().sort((a,b)=>(a.nome||'').localeCompare(b.nome||'')).forEach(m=>{const o=document.createElement('option');o.value=m.id;o.textContent=m.apelido||m.nome;selMembro.appendChild(o);});
  md.appendChild(selMembro);
  const lC=document.createElement('label');lC.style.cssText='font-size:12px;color:var(--text-muted);display:block;margin:12px 0 4px;';lC.textContent='Missas (marque uma ou mais)';md.appendChild(lC);
  const box=document.createElement('div');box.style.cssText='max-height:30vh;overflow-y:auto;border:1px solid var(--border);border-radius:6px;padding:6px;';
  if(!futuras.length){const e=document.createElement('div');e.style.cssText='font-size:12px;color:var(--text-muted);';e.textContent='Nenhuma missa futura cadastrada.';box.appendChild(e);}
  futuras.forEach(c=>{
    const r=document.createElement('label');r.style.cssText='display:flex;align-items:center;gap:8px;padding:5px 2px;font-size:12px;color:var(--text);cursor:pointer;';
    const chk=document.createElement('input');chk.type='checkbox';chk.className='aus-cel';chk.value=c.id;
    const sp=document.createElement('span');sp.textContent=dataCurta(c.data)+' '+c.horario+' · '+(c.comunidade==='matriz'?'Matriz':'Sto. Antônio');
    r.append(chk,sp);box.appendChild(r);
  });
  md.appendChild(box);
  const lAv=document.createElement('label');lAv.style.cssText='font-size:12px;color:var(--text-muted);display:block;margin:12px 0 4px;';lAv.textContent='Ou uma data avulsa (sem missa cadastrada)';md.appendChild(lAv);
  const avInp=document.createElement('input');avInp.type='date';avInp.className='form-input';avInp.min=hoje;avInp.style.width='100%';md.appendChild(avInp);
  const lMo=document.createElement('label');lMo.style.cssText='font-size:12px;color:var(--text-muted);display:block;margin:12px 0 4px;';lMo.textContent='Motivo';md.appendChild(lMo);
  const selMotivo=document.createElement('select');selMotivo.className='form-select';selMotivo.style.width='100%';
  motivos.forEach(([v,l])=>{const o=document.createElement('option');o.value=v;o.textContent=l;selMotivo.appendChild(o);});
  md.appendChild(selMotivo);
  const obsInp=document.createElement('input');obsInp.className='form-input';obsInp.placeholder='Observação (opcional)';obsInp.style.cssText='width:100%;margin-top:10px;';md.appendChild(obsInp);
  const msg=document.createElement('div');msg.style.cssText='font-size:12px;color:var(--danger-text);margin-top:8px;min-height:16px;';md.appendChild(msg);
  const acts=document.createElement('div');acts.style.cssText='display:flex;gap:8px;margin-top:8px;';
  const cancel=document.createElement('button');cancel.className='btn-sm gray';cancel.style.flex='1';cancel.textContent='Cancelar';cancel.onclick=()=>ov.remove();
  const salvar=document.createElement('button');salvar.className='btn-sm gold';salvar.style.flex='1';salvar.textContent='Salvar';
  salvar.onclick=async()=>{
    const mid=selMembro.value; if(!mid){msg.textContent='Escolha um membro.';return;}
    const ids=[...box.querySelectorAll('.aus-cel:checked')].map(c=>c.value);
    const dataAvulsa=avInp.value;
    if(!ids.length && !dataAvulsa){msg.textContent='Escolha ao menos uma missa ou uma data.';return;}
    const motivo=selMotivo.value; const obs=obsInp.value.trim()||null;
    salvar.disabled=true; salvar.textContent='Salvando...';
    if(ids.length){
      const { error }=await sb.from('acolitos_ausencias').upsert(ids.map(cid=>({membro_id:mid,celebracao_id:cid,motivo,observacao:obs})),{onConflict:'membro_id,celebracao_id'});
      if(error){msg.textContent='Erro ao salvar (missas).';salvar.disabled=false;salvar.textContent='Salvar';return;}
      ids.forEach(cid=>{ (ausMap[cid]=ausMap[cid]||new Set()).add(mid); });
    }
    if(dataAvulsa){
      await sb.from('acolitos_ausencias').delete().eq('membro_id',mid).eq('data',dataAvulsa).is('celebracao_id',null);
      const { error }=await sb.from('acolitos_ausencias').insert([{membro_id:mid,data:dataAvulsa,celebracao_id:null,motivo,observacao:obs}]);
      if(error){msg.textContent='Erro ao salvar (data avulsa).';salvar.disabled=false;salvar.textContent='Salvar';return;}
    }
    toast('✓ Ausência registrada'); ov.remove();
  };
  acts.append(cancel,salvar);md.appendChild(acts);
  ov.appendChild(md);document.body.appendChild(ov);
}
// ── Relatório de Frequência (acumulado via view OU por período) ──
function _freqComLabel(c){ return c==='matriz'?'Matriz':c==='santo_antonio'?'Sto. Antônio':'Outra'; }
function _freqPeriodoLabel(de,ate){ const f=d=>new Date(d+'T00:00:00').toLocaleDateString('pt-BR'); if(de&&ate)return 'de '+f(de)+' a '+f(ate); if(de)return 'a partir de '+f(de); if(ate)return 'até '+f(ate); return 'Acumulado (histórico total)'; }
async function _freqDados(de, ate){
  const out = membros.map(m=>({ m, servidas:0, faltas:0, atrasos:0, taxa:null, ultima:null }));
  const byId = {}; out.forEach(r=>{ byId[r.m.id]=r; });
  if(!de && !ate){
    const freq = (freqMap && Object.keys(freqMap).length) ? freqMap : (await fetchFrequencia());
    out.forEach(r=>{ const f=freq[r.m.id]; if(f){ r.servidas=f.servidas||0; r.faltas=(f.faltas_just||0)+(f.faltas_nao_just||0); r.atrasos=f.atrasos||0; r.taxa=(f.taxa!=null?f.taxa:null); r.ultima=f.ultima_participacao||null; } });
    return out;
  }
  let q = sb.from('acolitos_escalas').select('membro_id,status,acolitos_celebracoes!inner(data)');
  if(de) q=q.gte('acolitos_celebracoes.data', de);
  if(ate) q=q.lte('acolitos_celebracoes.data', ate);
  const { data } = await q;
  (data||[]).forEach(e=>{ const r=byId[e.membro_id]; if(!r) return; const dt=e.acolitos_celebracoes&&e.acolitos_celebracoes.data;
    if(e.status==='presente'||e.status==='atrasado'){ r.servidas++; if(e.status==='atrasado') r.atrasos++; if(dt&&(!r.ultima||dt>r.ultima)) r.ultima=dt; }
    else if(e.status==='ausente'||e.status==='ausente_justificado'){ r.faltas++; }
  });
  out.forEach(r=>{ const den=r.servidas+r.faltas; r.taxa = den ? Math.round(100*r.servidas/den) : null; });
  return out;
}
function _freqOrdena(a){ return a.sort((x,y)=>{ if(x.taxa==null&&y.taxa==null) return (x.m.nome||'').localeCompare(y.m.nome||''); if(x.taxa==null) return 1; if(y.taxa==null) return -1; return x.taxa-y.taxa; }); }
async function freqPDF(){
  const de=document.getElementById('freq-de').value, ate=document.getElementById('freq-ate').value;
  if(de&&ate&&de>ate){ toast('A data inicial é maior que a final.','error'); return; }
  const rows=await _freqDados(de,ate);
  const ordem=['matriz','santo_antonio','outra']; const grp={matriz:[],santo_antonio:[],outra:[]};
  rows.forEach(r=>grp[ordem.includes(r.m.comunidade)?r.m.comunidade:'outra'].push(r));
  const fmtD=d=>d?new Date(d+'T00:00:00').toLocaleDateString('pt-BR'):'—';
  let corpo='';
  ordem.forEach(c=>{ const arr=grp[c]; if(!arr.length) return; _freqOrdena(arr);
    const trows=arr.map(r=>[ (r.m.apelido||r.m.nome), String(r.servidas), String(r.faltas), String(r.atrasos),
      (r.taxa==null?{t:'—'}:{t:r.taxa+'%', bg:(r.taxa<70?'#f7caca':'transparent')}), fmtD(r.ultima) ]);
    corpo+='<h2>'+_freqComLabel(c)+' · '+arr.length+'</h2>'+relTabela(['Membro','Servidas','Faltas','Atrasos','Taxa','Última'], trows);
  });
  if(!corpo) corpo='<p class="muted">Sem dados.</p>';
  if(de||ate) corpo+='<p class="muted">Período não credita substitutos.</p>';
  abrirRelatorio({ titulo:'Relatório de Frequência', subtitulo:'Acólitos · '+_freqPeriodoLabel(de,ate), corpo });
}
async function freqCSV(){
  const de=document.getElementById('freq-de').value, ate=document.getElementById('freq-ate').value;
  if(de&&ate&&de>ate){ toast('A data inicial é maior que a final.','error'); return; }
  const rows=await _freqDados(de,ate); _freqOrdena(rows);
  const fmtD=d=>d?new Date(d+'T00:00:00').toLocaleDateString('pt-BR'):'';
  const linhas=[['Comunidade','Membro','Servidas','Faltas','Atrasos','Taxa','Última']];
  rows.forEach(r=>linhas.push([ _freqComLabel(r.m.comunidade), r.m.nome||'', String(r.servidas), String(r.faltas), String(r.atrasos), (r.taxa==null?'':r.taxa+'%'), fmtD(r.ultima) ]));
  baixarCSV('frequencia', linhas);
}
function abrirRelatorioFrequencia(){
  const ov=document.createElement('div'); ov.className='modal-overlay open'; ov.onclick=e=>{ if(e.target===ov) ov.remove(); };
  const md=document.createElement('div'); md.className='modal'; md.style.maxWidth='420px';
  md.innerHTML='<div class="modal-title">📊 Relatório de Frequência</div>'
    +'<p style="font-size:12px;color:var(--text-muted);margin:-4px 0 12px;">Deixe as datas em branco para o acumulado (histórico total).</p>'
    +'<div style="display:flex;gap:10px;"><label style="flex:1;font-size:12px;color:var(--text-muted);">De<input type="date" id="freq-de" class="form-input" style="width:100%;"></label>'
    +'<label style="flex:1;font-size:12px;color:var(--text-muted);">Até<input type="date" id="freq-ate" class="form-input" style="width:100%;"></label></div>'
    +'<div style="display:flex;gap:8px;margin-top:14px;"><button class="btn-sm gold" id="freq-pdf" style="flex:1;">📄 PDF</button><button class="btn-sm gray" id="freq-csv" style="flex:1;">⬇️ CSV</button><button class="btn-sm gray" id="freq-x">Fechar</button></div>';
  ov.appendChild(md); document.body.appendChild(ov);
  md.querySelector('#freq-pdf').onclick=freqPDF;
  md.querySelector('#freq-csv').onclick=freqCSV;
  md.querySelector('#freq-x').onclick=()=>ov.remove();
}
async function abrirAusencias(){
  document.getElementById('modal-ausencias').classList.add('open');
  const body=document.getElementById('aus-body'); body.textContent=''; const ld=document.createElement('span'); ld.className='loading'; ld.textContent='Carregando...'; body.appendChild(ld);
  const { data }=await sb.from('acolitos_ausencias')
    .select('*, acolitos_membros(nome,apelido), acolitos_celebracoes(data,horario,comunidade)')
    .order('created_at',{ascending:false}).limit(80);
  body.textContent='';
  if(!data||!data.length){ const em=document.createElement('span'); em.className='empty'; em.textContent='Nenhuma ausência registrada.'; body.appendChild(em); return; }
  data.forEach(a=>{
    const m=a.acolitos_membros, c=a.acolitos_celebracoes;
    const row=document.createElement('div'); row.style.cssText='display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:9px 4px;border-bottom:1px solid var(--border);';
    const left=document.createElement('div'); left.style.cssText='min-width:0;flex:1;';
    const nm=document.createElement('div'); nm.style.cssText='font-weight:700;font-size:14px;color:var(--text);'; nm.textContent=m?(m.apelido||m.nome):'—';
    const wh=document.createElement('div'); wh.style.cssText='font-size:12px;color:var(--gold);';
    wh.textContent = c ? (dataCurta(c.data)+' '+c.horario+' · '+(c.comunidade==='matriz'?'Matriz':'Sto. Antônio')) : (a.data ? dataCurta(a.data)+' · dia todo' : '—');
    const mo=document.createElement('div'); mo.style.cssText='font-size:11px;color:var(--text-muted);'; mo.textContent=(MOTIVO_LABEL[a.motivo]||a.motivo)+(a.observacao?' · '+a.observacao:'');
    left.append(nm,wh,mo);
    const del=document.createElement('button'); del.className='mini-del'; del.textContent='🗑'; del.title='Remover ausência';
    del.onclick=async()=>{ if(!confirm('Remover esta ausência?'))return; await sb.from('acolitos_ausencias').delete().eq('id',a.id); abrirAusencias(); loadDados(); };
    row.append(left,del); body.appendChild(row);
  });
}
async function abrirFaltas(){
  document.getElementById('modal-faltas').classList.add('open');
  const body=document.getElementById('faltas-body'); body.textContent=''; const ld=document.createElement('span'); ld.className='loading'; ld.textContent='Carregando...'; body.appendChild(ld);
  const { data }=await sb.rpc('acolitos_faltas_recentes');
  body.textContent='';
  if(!data||!data.length){ const em=document.createElement('span'); em.className='empty'; em.textContent='Nenhuma falta registrada ainda.'; body.appendChild(em); return; }
  data.forEach(a=>{
    const row=document.createElement('div'); row.style.cssText='display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:9px 4px;border-bottom:1px solid var(--border);';
    const left=document.createElement('div'); left.style.cssText='min-width:0;flex:1;';
    const nm=document.createElement('div'); nm.style.cssText='font-weight:700;font-size:14px;color:var(--text);'; nm.textContent=a.membro||'—';
    const wh=document.createElement('div'); wh.style.cssText='font-size:12px;color:var(--gold);';
    wh.textContent = (a.data?dataCurta(a.data):'—')+(a.horario?' '+a.horario:'')+' · '+(a.comunidade==='matriz'?'Matriz':'Sto. Antônio');
    const fn=document.createElement('div'); fn.style.cssText='font-size:11px;color:var(--text-muted);'; fn.textContent=(FUNCAO_LABEL[a.funcao]||a.funcao)+(a.substituto?' · 🔄 coberto por '+a.substituto:' · vaga aberta');
    left.append(nm,wh,fn);
    const badge=document.createElement('span'); badge.style.cssText='font-size:11px;font-weight:700;color:var(--danger-text);flex:none;'; badge.textContent='❌ faltou';
    row.append(left,badge); body.appendChild(row);
  });
}
