<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escala — Acólitos JCBP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    .aba-toggle { display:flex; gap:8px; margin-bottom:16px; }
    .aba-btn {
      padding:10px 20px; min-height:44px; background:var(--surface2);
      border:1px solid var(--border); color:var(--text-muted); border-radius:2px;
      cursor:pointer; font-family:'Sora',sans-serif; font-size:11px; letter-spacing:1px;
      text-transform:uppercase; transition:all .2s; -webkit-tap-highlight-color:transparent;
    }
    .aba-btn.active { border-color:var(--gold); color:var(--gold); background:rgba(201,168,76,.08); }
    .escala-toolbar { margin-bottom:14px; }
    .escala-toolbar .form-select { width:100%; margin-bottom:8px; }
    .escala-acoes { display:flex; gap:8px; }
    .escala-acoes .btn-sm { flex:1; white-space:nowrap; padding:9px 6px; }
    @media(min-width:640px){
      .escala-toolbar { display:flex; align-items:center; gap:8px; }
      .escala-toolbar .form-select { width:auto; flex:1; max-width:220px; margin-bottom:0; }
      .escala-acoes { flex:none; }
      .escala-acoes .btn-sm { flex:none; }
    }
    .semana-grupo { margin-bottom:20px; }
    .semana-titulo {
      font-family:'Sora',sans-serif; font-size:11px; color:var(--text-muted);
      letter-spacing:1.5px; text-transform:uppercase; margin-bottom:10px;
      padding-bottom:6px; border-bottom:1px solid var(--border);
    }
    .celebracoes-grid { display:grid; grid-template-columns:1fr; gap:10px; }
    @media(min-width:600px){ .celebracoes-grid{ grid-template-columns:repeat(2,1fr); } }
    @media(min-width:900px){ .celebracoes-grid{ grid-template-columns:repeat(3,1fr); } }
    .celeb-card {
      background:var(--surface); border:1px solid var(--border-wine);
      border-radius:4px; padding:14px; position:relative; overflow:hidden;
    }
    .celeb-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
    .celeb-card.status-completa::before { background:var(--success); }
    .celeb-card.status-parcial::before  { background:var(--warn-text); }
    .celeb-card.status-critica::before  { background:var(--danger-text); }
    .celeb-card.status-vazia::before    { background:var(--border-wine); }
    .celeb-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; gap:8px; }
    .celeb-data { font-family:'Sora',sans-serif; font-size:13px; color:var(--text); font-weight:600; }
    .celeb-sub  { font-size:11px; color:var(--text-muted); margin-top:2px; }
    .status-pill {
      display:inline-block; padding:2px 8px; border-radius:10px;
      font-size:9px; font-family:'Sora',sans-serif; letter-spacing:.5px; border:1px solid; flex-shrink:0;
    }
    .status-pill.completa { background:rgba(30,80,30,.2); color:var(--success-text); border-color:var(--success); }
    .status-pill.parcial  { background:rgba(120,80,0,.2); color:var(--warn-text); border-color:var(--warn); }
    .status-pill.critica  { background:rgba(100,10,10,.3); color:var(--danger-text); border-color:var(--danger); }
    .status-pill.vazia    { background:var(--surface2); color:var(--text-muted); border-color:var(--border); }
    .cobertura-row { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
    .cobertura-label { color:var(--text-muted); width:72px; flex-shrink:0; font-size:10px; }
    .cobertura-bar  { flex:1; height:4px; background:var(--surface2); border-radius:2px; overflow:hidden; }
    .cobertura-fill { height:100%; border-radius:2px; }
    .cobertura-fill.ok      { background:var(--success); }
    .cobertura-fill.parcial { background:var(--warn-text); }
    .cobertura-fill.critico { background:var(--danger-text); }
    .cobertura-num { color:var(--text-muted); font-size:10px; width:32px; text-align:right; }
    .celeb-actions { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
    /* Planilha */
    .planilha-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; border:1px solid var(--border-wine); border-radius:4px; }
    .planilha-table { border-collapse:collapse; font-size:12px; white-space:nowrap; width:100%; }
    .planilha-table th, .planilha-table td { padding:8px 10px; border-bottom:1px solid var(--border); vertical-align:middle; }
    .planilha-table th {
      font-family:'Sora',sans-serif; font-size:9px; letter-spacing:1px; color:var(--text-muted);
      text-transform:uppercase; background:var(--surface); position:sticky; top:0; z-index:2;
      border-bottom:1px solid var(--border-wine);
    }
    .planilha-table th.sticky-left, .planilha-table td.sticky-left {
      position:sticky; left:0; background:var(--surface); z-index:1; border-right:1px solid var(--border-wine);
    }
    .planilha-table tr:hover td { background:rgba(201,168,76,.03); }
    .escala-cell {
      display:inline-block; padding:2px 6px; border-radius:2px;
      font-size:10px; font-family:'Sora',sans-serif;
    }
    .escala-cell.escalado  { background:rgba(201,168,76,.12); color:var(--gold); }
    .escala-cell.presente  { background:rgba(30,80,30,.2); color:var(--success-text); }
    .escala-cell.ausente   { background:rgba(100,10,10,.3); color:var(--danger-text); }
    .escala-cell.aj        { background:rgba(120,80,0,.2); color:var(--warn-text); }
    /* Modal montagem */
    .montagem-cols { display:grid; grid-template-columns:1fr; gap:16px; }
    @media(min-width:600px){ .montagem-cols { grid-template-columns:1fr 1fr; } }
    .cat-titulo {
      font-family:'Sora',sans-serif; font-size:10px; color:var(--gold);
      letter-spacing:1px; text-transform:uppercase; padding:10px 0 4px;
      border-bottom:1px solid var(--border-wine); margin-bottom:2px;
    }
    .pos-item { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid var(--border); }
    .pos-item:last-child { border-bottom:none; }
    .pos-label { font-family:'Sora',sans-serif; font-size:11px; color:var(--text); flex:1; }
    .pos-select {
      flex:0 0 150px; padding:6px 8px; min-height:34px;
      background:var(--surface2); border:1px solid var(--border-wine);
      border-radius:2px; color:var(--text); font-size:11px; outline:none; max-width:150px;
    }
    .pos-select.filled { border-color:var(--gold); }
    .mems-list { max-height:300px; overflow-y:auto; }
    .mem-row { padding:8px 0; border-bottom:1px solid var(--border); }
    .mem-row:last-child { border-bottom:none; }
    .mem-nome { font-size:12px; color:var(--text); margin-bottom:3px; }
    .mem-fns  { font-size:10px; color:var(--gold); }
    .cell-ico { background:transparent; border:none; cursor:pointer; font-size:15px; padding:2px; line-height:1; -webkit-tap-highlight-color:transparent; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.106.2/dist/umd/supabase.min.js" integrity="sha384-4Cjkyy4cE1EgIS0C+Y3xzGmJ2noQFRRU91yKAW8IxtPfVtbQXPMqadSc3sYnjwou" crossorigin="anonymous"></script>
</head>

<script src="shared.js"></script>
<script>
const MOTIVO_LABEL = { doenca:'🤒 Doença', viagem:'✈️ Viagem', familia:'👨‍👩‍👧 Família', outro:'📌 Outro' };
// Metadados de cada função (rótulo, categoria, ordem) — os modelos por tipo+comunidade vêm da tabela acolitos_modelos
const FUNCAO_META = {
  cred_altar:    {label:'Cerimonial de Altar',     cat:'Cerimoniais', ordem:10},
  cred_credencia:{label:'Cerimonial de Credência', cat:'Cerimoniais', ordem:11},
  missal:        {label:'Missal',                  cat:'Cerimoniais', ordem:12},
  altar:         {label:'Altar',                   cat:'Altares',     ordem:20},
  cruz:          {label:'Cruz',                     cat:'Litúrgicos',  ordem:30},
  vela:          {label:'Vela',                     cat:'Litúrgicos',  ordem:31},
  sineta:        {label:'Sineta',                   cat:'Litúrgicos',  ordem:32},
  sinao:         {label:'Sinão',                    cat:'Litúrgicos',  ordem:33},
  turibulo:      {label:'Turíbulo',                 cat:'Litúrgicos',  ordem:34},
  naveta:        {label:'Naveta',                   cat:'Litúrgicos',  ordem:35},
  apoio:         {label:'Apoio',                    cat:'Apoios',      ordem:40},
  mitra:         {label:'Mitra',                    cat:'Episcopal',   ordem:50},
  baculo:        {label:'Báculo',                   cat:'Episcopal',   ordem:51},
};
let modelos = {}; // chave 'tipo|comunidade' -> [{funcao, quantidade, ordem}]
async function loadModelos() {
  const [{ data: md }, { data: lf }] = await Promise.all([
    sb.from('acolitos_modelos').select('*'),
    sb.from('acolitos_listas').select('valor,label').eq('tipo','funcao'),
  ]);
  modelos = {};
  (md || []).forEach(r => { const k = r.tipo + '|' + r.comunidade; (modelos[k] = modelos[k] || []).push(r); });
  (lf || []).forEach(f => { if (!FUNCAO_META[f.valor]) FUNCAO_META[f.valor] = { label: f.label, cat: 'Personalizadas', ordem: 60 }; });
}
// Expande o modelo (tipo+comunidade) numa lista ordenada de vagas {funcao,label,cat} (igual aos templates antigos)
function modeloFor(tipo, comunidade) {
  let rows = modelos[tipo + '|' + comunidade];
  if (!rows || !rows.length) rows = modelos['missa_comum|' + comunidade] || modelos['missa_comum|matriz'] || [];
  const slots = [];
  rows.filter(r => r.quantidade > 0)
      .sort((a, b) => (a.ordem - b.ordem) || a.funcao.localeCompare(b.funcao))
      .forEach(r => {
        const meta = FUNCAO_META[r.funcao] || { label: r.funcao, cat: 'Outros' };
        for (let i = 1; i <= r.quantidade; i++) slots.push({ funcao: r.funcao, cat: meta.cat, label: r.quantidade > 1 ? meta.label + ' ' + i : meta.label });
      });
  return slots;
}

// ---- Editor de modelos ----
let mdQty = {};
function abrirModelos() {
  const selT = document.getElementById('md-tipo'); selT.textContent = '';
  // todos os tipos de missa do seletor de celebração + quaisquer já existentes nos modelos
  const tipos = Array.from(new Set(Object.keys(TIPO_LABEL).concat(Object.keys(modelos).map(k => k.split('|')[0]))));
  tipos.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = TIPO_LABEL[t] || t; selT.appendChild(o); });
  document.getElementById('md-com').value = 'matriz';
  document.getElementById('md-msg').textContent = ''; document.getElementById('md-msg').className = 'msg';
  renderModeloEditor();
  document.getElementById('modal-modelos').classList.add('open');
}
function renderModeloEditor() {
  const tipo = document.getElementById('md-tipo').value;
  const com = document.getElementById('md-com').value;
  mdQty = {};
  (modelos[tipo + '|' + com] || []).forEach(r => { mdQty[r.funcao] = r.quantidade; });
  const body = document.getElementById('md-body'); body.textContent = '';
  const funcs = Object.keys(FUNCAO_META).sort((a, b) => FUNCAO_META[a].ordem - FUNCAO_META[b].ordem);
  let catAtual = '';
  funcs.forEach(f => {
    const meta = FUNCAO_META[f];
    if (meta.cat !== catAtual) { catAtual = meta.cat; const c = document.createElement('div'); c.className = 'cat-titulo'; c.textContent = catAtual; body.appendChild(c); }
    const row = document.createElement('div'); row.style.cssText = 'display:flex;align-items:center;gap:10px;padding:5px 2px;';
    const lbl = document.createElement('span'); lbl.style.cssText = 'flex:1;font-size:13px;color:var(--text);'; lbl.textContent = meta.label;
    const minus = document.createElement('button'); minus.type = 'button'; minus.className = 'mini-del'; minus.textContent = '−';
    const num = document.createElement('span'); num.style.cssText = 'min-width:24px;text-align:center;font-weight:800;color:var(--gold);'; num.textContent = mdQty[f] || 0;
    const plus = document.createElement('button'); plus.type = 'button'; plus.className = 'mini-del'; plus.textContent = '+';
    minus.onclick = () => { mdQty[f] = Math.max(0, (mdQty[f] || 0) - 1); num.textContent = mdQty[f]; };
    plus.onclick = () => { mdQty[f] = (mdQty[f] || 0) + 1; num.textContent = mdQty[f]; };
    row.append(lbl, minus, num, plus); body.appendChild(row);
  });
}
async function salvarModelo() {
  const tipo = document.getElementById('md-tipo').value;
  const com = document.getElementById('md-com').value;
  const msg = document.getElementById('md-msg');
  const payload = Object.keys(FUNCAO_META).map(f => ({ tipo, comunidade: com, funcao: f, quantidade: mdQty[f] || 0, ordem: FUNCAO_META[f].ordem }));
  const { error } = await sb.from('acolitos_modelos').upsert(payload, { onConflict: 'tipo,comunidade,funcao' });
  if (error) { msg.className = 'msg error'; msg.textContent = 'Erro ao salvar.'; return; }
  msg.className = 'msg success'; msg.textContent = '✓ Modelo salvo.';
  await loadModelos();
  abaAtual === 'cards' ? renderCards() : renderPlanilha();
}
const FUNCAO_LABEL = {
  apoio:'Apoio', cruz:'Cruz', vela:'Vela', sineta:'Sineta', sinao:'Sinão',
  altar:'Altar', turibulo:'Turíbulo', naveta:'Naveta', missal:'Missal',
  cred_altar:'Cerim. Altar', cred_credencia:'Cerim. Cred.', mitra:'Mitra', baculo:'Báculo'
};
const TIPO_LABEL = {
  missa_comum:'Missa', solene:'Missa Solene', pontifical:'Pontifical (Bispo)',
  festa:'Festa Litúrgica', vigilia:'Vigília', crisma:'Crisma', casamento:'Casamento',
  batizado:'Batizado', ordenacao:'Ordenação', funeral:'Exéquias'
};
const DIAS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const FUNCOES_ORDER = ['apoio','cruz','vela','sineta','sinao','altar','turibulo','naveta','missal','cred_altar','cred_credencia','mitra','baculo'];
const NIVEL_COR = { nao_treinado:'var(--border)', em_formacao:'#d4a060', apto:'var(--success-text)', experiente:'#4a90c4', referencia:'#9b59d4' };
const NIVEL_LABEL = { nao_treinado:'Não treinado', em_formacao:'Em formação', apto:'Apto', experiente:'Experiente', referencia:'Referência' };

let ctx = null, celebracoes = [], escalasMap = {}, membros = [], habMap = {}, dispMap = {};
let freqMap = {}, restricaoMap = {}, ausMap = {};
let pendingCelebId = null, pendingEdicao = [], abaAtual = 'cards', editCelebId = null, celAtual = null;

function openInfo(title, lines) {
  document.getElementById('info-title').textContent = title;
  const body = document.getElementById('info-body'); body.textContent = '';
  lines.forEach(l => { const p = document.createElement('p'); p.style.cssText = 'font-size:13px;color:var(--text);margin-bottom:8px;line-height:1.45;'; p.textContent = l; body.appendChild(p); });
  document.getElementById('modal-info').classList.add('open');
}

async function init() {
  ctx = await initModulo(['coord_admin','subadmin','membro_equipe']);
  if (!ctx) return;
  renderHeader(ctx, 'escala');
  renderBottomNav(ctx, 'escala');
  await loadModelos();
  popHorarios();
  await loadDados();
}

// Gera horários do dia todo, de hora em hora e meia-hora (ex.: 8h, 8h30)
function popHorarios() {
  const sel = document.getElementById('nc-horario'); if (!sel) return; sel.textContent = '';
  for (let h = 0; h < 24; h++) {
    for (const m of [0, 30]) {
      const val = m === 0 ? h + 'h' : h + 'h30';
      const o = document.createElement('option'); o.value = val; o.textContent = val; sel.appendChild(o);
    }
  }
}

async function loadDados() {
  const com = document.getElementById('filtro-com').value;
  const hoje = new Date(); const fim = new Date(hoje); fim.setDate(hoje.getDate()+56);
  let q = sb.from('acolitos_celebracoes').select('*')
    .gte('data', hoje.toISOString().slice(0,10))
    .lte('data', fim.toISOString().slice(0,10))
    .order('data').order('horario');
  if (com) q = q.eq('comunidade', com);
  const { data: celebs } = await q;
  celebracoes = celebs || [];

  if (celebracoes.length) {
    const ids = celebracoes.map(c=>c.id);
    const { data: esc, error: escErr } = await sb.from('acolitos_escalas')
      .select('*, acolitos_membros!membro_id(id,nome)').in('celebracao_id', ids);
    if (escErr) console.error('Erro lendo escalas:', escErr);
    escalasMap = {};
    (esc||[]).forEach(e => {
      if (!escalasMap[e.celebracao_id]) escalasMap[e.celebracao_id]=[];
      escalasMap[e.celebracao_id].push(e);
    });
    const [{ data: mems }, { data: habs }, { data: disps }, freqData, { data: auss }] = await Promise.all([
      sb.from('acolitos_membros').select('id,nome,apelido,nivel,comunidade,data_nascimento,foto_url,observacoes,necessidades_especiais,tem_pai_ministro,nome_pai_ministro,tem_mae_ministro,nome_mae_ministro,comunidade_ministro,grupo_irmaos,escalar_com_irmao').eq('status','ativo').order('nome'),
      sb.from('acolitos_habilitacoes').select('membro_id,funcao,proficiencia'),
      sb.from('acolitos_disponibilidade').select('membro_id,dia,horario,restricao'),
      fetchFrequencia(),
      sb.from('acolitos_ausencias').select('membro_id,celebracao_id').in('celebracao_id', ids),
    ]);
    membros = mems||[];
    ausMap = {}; (auss||[]).forEach(a=>{ if(!ausMap[a.celebracao_id]) ausMap[a.celebracao_id]=new Set(); ausMap[a.celebracao_id].add(a.membro_id); });
    // ausências avulsas por DATA (sem celebração): valem para todas as missas daquele dia
    const celDatas=[...new Set(celebracoes.map(c=>c.data))];
    if(celDatas.length){
      const{data:ausData}=await sb.from('acolitos_ausencias').select('membro_id,data').is('celebracao_id',null).in('data',celDatas);
      (ausData||[]).forEach(a=>celebracoes.filter(c=>c.data===a.data).forEach(c=>{ if(!ausMap[c.id])ausMap[c.id]=new Set(); ausMap[c.id].add(a.membro_id); }));
    }
    habMap = {}; (habs||[]).forEach(h=>{if(!habMap[h.membro_id])habMap[h.membro_id]={};habMap[h.membro_id][h.funcao]=h.proficiencia;});
    dispMap = {}; restricaoMap = {};
    (disps||[]).forEach(d=>{
      if(!dispMap[d.membro_id])dispMap[d.membro_id]=[];
      dispMap[d.membro_id].push(d.dia+'_'+d.horario);
      if(d.restricao){ if(!restricaoMap[d.membro_id])restricaoMap[d.membro_id]=[]; restricaoMap[d.membro_id].push(d.restricao); }
    });
    freqMap = freqData || {};
  }

  abaAtual==='cards' ? renderCards() : renderPlanilha();
}

function setAba(a) {
  abaAtual=a;
  document.getElementById('view-cards').style.display = a==='cards'?'':'none';
  document.getElementById('view-planilha').style.display = a==='planilha'?'':'none';
  document.getElementById('btn-cards').classList.toggle('active',a==='cards');
  document.getElementById('btn-planilha').classList.toggle('active',a==='planilha');
  a==='cards' ? renderCards() : renderPlanilha();
}

function getCobertura(celebId, comunidade, tipo) {
  const tmpl = modeloFor(tipo, comunidade);
  const esc = escalasMap[celebId]||[];
  const cats={};
  tmpl.forEach(p=>{if(!cats[p.cat])cats[p.cat]={min:0,atual:0};cats[p.cat].min++;});
  esc.forEach(e=>{const p=tmpl.find(x=>x.funcao===e.funcao);if(p&&cats[p.cat])cats[p.cat].atual++;});
  const total=Object.values(cats).reduce((a,c)=>a+c.min,0);
  const preen=Object.values(cats).reduce((a,c)=>a+Math.min(c.atual,c.min),0);
  let status='vazia';
  if(preen>=total)status='completa';
  else if(preen>=total*.6)status='parcial';
  else if(preen>0)status='critica';
  return {cats,total,preenchido:preen,status};
}

    acoesSem.append(bGer,bLimp);

    sem.items.forEach(c=>{

      info.append(dataEl,subEl);
      const pill=document.createElement('span');pill.className='status-pill '+cob.status;
      pill.textContent=cob.status.charAt(0).toUpperCase()+cob.status.slice(1);

        const lbl=document.createElement('span');lbl.className='cobertura-label';lbl.textContent=cat;
        const bar=document.createElement('div');bar.className='cobertura-bar';
        const fill=document.createElement('div');
        const pct=v.min>0?Math.min(v.atual/v.min,1)*100:0;
        fill.className='cobertura-fill '+(pct>=100?'ok':pct>=50?'parcial':'critico');
        fill.style.width=pct+'%';bar.appendChild(fill);
        const num=document.createElement('span');num.className='cobertura-num';num.textContent=v.atual+'/'+v.min;
        row.append(lbl,bar,num);card.appendChild(row);
      });

async function excluirCelebracao(c) {
  const d=new Date(c.data+'T00:00:00');
  if(!confirm('Excluir a celebração de '+DIAS[d.getDay()]+' '+d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})+' · '+c.horario+'?\nA escala e as ausências desta missa também serão removidas.'))return;
  // FK em cascata já remove escalas/ausências; .select() confirma que a linha foi mesmo apagada
  const{data,error}=await sb.from('acolitos_celebracoes').delete().eq('id',c.id).select();
  if(error){toast('Erro ao excluir: '+error.message,'error');return;}
  if(!data||!data.length){toast('Não foi possível excluir (sem permissão?).','error');return;}
  await loadDados();
  toast('✓ Celebração excluída.');
}

    membros.filter(m=>{const h=(habMap[m.id]||{})[pos.funcao];return h&&['apto','experiente','referencia'].includes(h);})
      .forEach(m=>{
        const opt=document.createElement('option');opt.value=m.id;

        const ausente=ausNesta.has(m.id);

function horKeyDe(celeb) {
  const dow = new Date(celeb.data+'T00:00:00').getDay();
  const diaKey = dow===0?'domingo':dow===6?'sabado':null;
  return diaKey ? diaKey+'_'+celeb.horario : null;
}

// Funções MAIORES (especializadas) — reservadas p/ cerimoniários; o resto é menor (altar/cruz/vela/apoio...)
const FUNCOES_MAIORES = new Set(['cred_altar','cred_credencia','missal','turibulo','naveta','mitra','baculo']);
// Núcleo do gerador. vagas = array de funções (uma por vaga aberta). Retorna array alinhado de membro_id|null.
// Regras: apto + não-ausente + sem repetir na missa; IRMÃOS juntos = bloco tudo-ou-nada;
//   cerimoniários priorizados nas MAIORES (só em último caso vão p/ menores); não repetir no fim de semana (usadoFds); rodízio (carga).
function planejarVagas(vagas, horKey, ausNesta, usados, carga, usadoFds) {
  usadoFds = usadoFds || new Set();
  const res = new Array(vagas.length).fill(null);
  const nint = {}; membros.forEach(m => { nint[m.id] = nivelInfo(m.nivel||'aspirante').int; });
  const apta = (id,f) => { const h=(habMap[id]||{})[f]; return h && ['apto','experiente','referencia'].includes(h); };
  const disp = id => !horKey || (dispMap[id]||[]).includes(horKey);
  const livres = () => res.map((r,i)=>r?-1:i).filter(i=>i>=0);
  const assign = (i,id) => { res[i]=id; usados.add(id); usadoFds.add(id); carga[id]=(carga[id]||0)+1; };
  const bloqueados = new Set();
  const ehCerimo = m => nint[m.id] >= 6; // cerimoniário = nível 6+
  // POOL DURO: apto + DISPONÍVEL no horário + não-ausente + sem repetir na missa + não bloqueado
  const cands = (i) => membros.filter(m => apta(m.id,vagas[i]) && disp(m.id) && !usados.has(m.id) && !ausNesta.has(m.id) && !bloqueados.has(m.id));

  function placeUnit(ids) {
    const slots = livres();
    const order = ids.slice().sort((a,b)=> slots.filter(i=>apta(a,vagas[i])).length - slots.filter(i=>apta(b,vagas[i])).length);
    const used = new Set(); const plan = [];
    for (const id of order) {
      const idx = slots.find(i => !used.has(i) && apta(id, vagas[i]));
      if (idx === undefined) return false;
      used.add(idx); plan.push([idx,id]);
    }
    plan.forEach(([i,id]) => assign(i,id));
    return true;
  }

  // 0) COMPLETAR FAMÍLIA dos já escalados (manual/existente): irmãos que servem junto entram também.
  //    Não remove a escolha manual — só adiciona o(s) irmão(s) disponível(is) numa vaga apta.
  Array.from(usados).forEach(id => {
    const m = membros.find(x => x.id === id);
    if (!m || !m.escalar_com_irmao || !m.grupo_irmaos) return;
    membros.filter(x => x.grupo_irmaos===m.grupo_irmaos && x.escalar_com_irmao && x.id!==id && !usados.has(x.id) && !ausNesta.has(x.id) && disp(x.id))
      .forEach(irm => { const i = livres().find(j => apta(irm.id, vagas[j])); if (i !== undefined) assign(i, irm.id); });
  });

  // 1) blocos de irmãos (tudo-ou-nada)
  const visited = new Set(); const sibUnits = [];
  membros.forEach(m => {
    if (visited.has(m.id)) return;
    if (m.escalar_com_irmao && m.grupo_irmaos) {
      const grp = membros.filter(x => x.grupo_irmaos===m.grupo_irmaos && x.escalar_com_irmao);
      grp.forEach(x => visited.add(x.id));
      const unit = grp.filter(x => !usados.has(x.id) && !ausNesta.has(x.id) && disp(x.id) && livres().some(i=>apta(x.id,vagas[i])));
      if (unit.length >= 2) sibUnits.push(unit.map(x=>x.id));
    } else visited.add(m.id);
  });
  sibUnits.sort((A,B) => {
    const ua=A.some(id=>usadoFds.has(id))?1:0, ub=B.some(id=>usadoFds.has(id))?1:0; if(ua!==ub) return ua-ub;
    const fa=Math.min(...A.map(id=>carga[id]||0)), fb=Math.min(...B.map(id=>carga[id]||0)); return (fa-fb) || (B.length-A.length);
  });
  sibUnits.forEach(u => { if (!placeUnit(u)) u.forEach(id => bloqueados.add(id)); });

  // 2) vagas individuais — funções MAIORES primeiro (cerimoniários nelas), depois mais escassas
  livres()
    .map(i => ({ i, maior: FUNCOES_MAIORES.has(vagas[i]), n: cands(i).length }))
    .sort((a,b) => (b.maior?1:0)-(a.maior?1:0) || a.n - b.n)
    .forEach(({ i }) => {
      if (res[i]) return;
      const menor = !FUNCOES_MAIORES.has(vagas[i]);
      const pool = cands(i); // já filtrado por disponibilidade (duro)
      if (!pool.length) return; // ninguém apto E disponível → vaga fica VAZIA (não força)
      // camadas de preferência — cada uma só é usada se a anterior estiver vazia:
      const tiers = menor
        ? [ pool.filter(m => !ehCerimo(m) && !usadoFds.has(m.id)),  // 1) não-cerimoniário e ainda não usado no fds
            pool.filter(m => !ehCerimo(m)),                         // 2) não-cerimoniário (mesmo repetindo)
            pool.filter(m => !usadoFds.has(m.id)),                  // 3) novo no fds (aceita cerimoniário)
            pool ]                                                  // 4) qualquer (último caso)
        : [ pool.filter(m => !usadoFds.has(m.id)),                  // maior: 1) ainda não usado no fds
            pool ];                                                 // 2) qualquer
      const grupo = tiers.find(t => t.length).slice().sort((a,b) => {
        if (menor && nint[a.id]!==nint[b.id]) return nint[a.id]-nint[b.id]; // menor: menos graduado primeiro
        if (!menor && nint[a.id]!==nint[b.id]) return nint[b.id]-nint[a.id]; // maior: mais graduado primeiro
        return (carga[a.id]||0)-(carga[b.id]||0);                            // rodízio
      });
      assign(i, grupo[0].id);
    });
  return res;
}

// Botão "Gerar automático" do modal — preenche as vagas vazias da missa aberta
function gerarEscalaAuto() {
  if (!celAtual || !pendingEdicao.length) return;
  const open = pendingEdicao.filter(pe => !pe.sel.value);
  const usados = new Set(); pendingEdicao.forEach(pe => { if (pe.sel.value) usados.add(pe.sel.value); });
  const res = planejarVagas(open.map(pe=>pe.funcao), horKeyDe(celAtual), ausMap[celAtual.id]||new Set(), usados, Object.assign({}, freqMap), new Set(usados));
  res.forEach((id,i) => { if (id) { open[i].sel.value = id; open[i].sel.classList.add('filled'); } });
  const vazias = res.filter(r => !r).length;
  const btn = document.getElementById('btn-gerar-auto');
  if (btn) { btn.textContent = vazias ? '✨ Gerado (' + vazias + ' sem apto)' : '✨ Gerado!'; setTimeout(() => { btn.textContent = '✨ Gerar automático'; }, 2500); }
}

// Limpa todas as posições do card aberto (precisa Salvar p/ gravar)
function limparMontagem() {
  if (!pendingEdicao.length) return;
  pendingEdicao.forEach(({sel}) => { sel.value=''; sel.classList.remove('filled'); });
  toast('Posições limpas — clique em "Salvar Escala" para gravar.');
}

// Troca a pessoa de uma posição por OUTRA opção válida (apta, disponível, não-ausente, sem duplicar na missa)
function trocarPosicao(pe) {
  if (!celAtual) return;
  const horKey = horKeyDe(celAtual);
  const ausNesta = ausMap[celAtual.id] || new Set();
  const atual = pe.sel.value;
  const usadosOutros = new Set();
  pendingEdicao.forEach(p => { if (p !== pe && p.sel.value) usadosOutros.add(p.sel.value); });
  const apta = (id,f) => { const h=(habMap[id]||{})[f]; return h && ['apto','experiente','referencia'].includes(h); };
  const disp = id => !horKey || (dispMap[id]||[]).includes(horKey);
  const nivel = id => { const m=membros.find(x=>x.id===id); return m?nivelInfo(m.nivel||'aspirante').int:0; };
  const menor = !FUNCOES_MAIORES.has(pe.funcao);
  const pool = membros.filter(m => apta(m.id,pe.funcao) && disp(m.id) && !ausNesta.has(m.id) && !usadosOutros.has(m.id) && m.id!==atual);
  if (!pool.length) { toast('Sem outra opção disponível e apta pra essa função.','error'); return; }
  const tiers = menor ? [pool.filter(m => nivel(m.id) < 6), pool] : [pool]; // menor: evita cerimoniário
  const grupo = tiers.find(t => t.length);
  const escolhido = grupo[Math.floor(Math.random()*grupo.length)];
  pe.sel.value = escolhido.id; pe.sel.classList.add('filled');
  toast('🔄 ' + (escolhido.apelido || (escolhido.nome||'').split(' ')[0]));
}

// Gera e SALVA a escala de todas as missas de um fim de semana (preenche só as vagas ainda vazias)
async function gerarEscalaSemana(celebs, btnEl) {
  if (!celebs || !celebs.length) return;
  if (!confirm('Gerar a escala de ' + celebs.length + ' missa(s) deste fim de semana?\n(Preenche as vagas ainda vazias, mantendo o que já estiver montado.)')) return;
  const txt0 = btnEl ? btnEl.textContent : '';
  if (btnEl) { btnEl.disabled = true; btnEl.textContent = 'Gerando...'; }
  const carga = Object.assign({}, freqMap); // rodízio histórico
  const usadoFds = new Set();                // ninguém repete no fim de semana (só em último caso)
  const novas = [];
  const ordc = celebs.slice().sort((a,b) => (a.data+a.horario).localeCompare(b.data+b.horario));
  ordc.forEach(c => (escalasMap[c.id]||[]).forEach(e => usadoFds.add(e.membro_id))); // já escalados contam
  for (const c of ordc) {
    const modelo = modeloFor(c.tipo, c.comunidade);            // vagas do tipo+comunidade (já em ordem cerimoniais→...)
    const existing = escalasMap[c.id] || [];
    const existPorFunc = {}; existing.forEach(e => { existPorFunc[e.funcao] = (existPorFunc[e.funcao]||0)+1; });
    const cnt = {}; const vagas = [];
    modelo.forEach(slot => { cnt[slot.funcao] = (cnt[slot.funcao]||0)+1; if (cnt[slot.funcao] > (existPorFunc[slot.funcao]||0)) vagas.push(slot.funcao); });
    if (!vagas.length) continue;
    const usados = new Set(existing.map(e => e.membro_id));
    const res = planejarVagas(vagas, horKeyDe(c), ausMap[c.id]||new Set(), usados, carga, usadoFds);
    res.forEach((id,i) => { if (id) novas.push({ celebracao_id: c.id, membro_id: id, funcao: vagas[i], created_by: ctx.user.id }); });
  }
  if (novas.length) {
    const { error } = await sb.from('acolitos_escalas').insert(novas);
    if (error) { alert('Erro ao salvar: ' + error.message); if (btnEl) { btnEl.disabled = false; btnEl.textContent = txt0; } return; }
  }
  await loadDados();
}

// Apaga TODAS as escalas das missas do fim de semana (direto no banco)
async function limparEscalaSemana(celebs, btnEl) {
  if (!celebs || !celebs.length) return;
  if (!confirm('Limpar TODAS as escalas das ' + celebs.length + ' missa(s) deste fim de semana?\n(Apaga as posições já montadas — não pode desfazer.)')) return;
  const txt0 = btnEl ? btnEl.textContent : '';
  if (btnEl) { btnEl.disabled = true; btnEl.textContent = 'Limpando...'; }
  const { error } = await sb.from('acolitos_escalas').delete().in('celebracao_id', celebs.map(c => c.id));
  if (btnEl) { btnEl.disabled = false; btnEl.textContent = txt0; }
  if (error) { toast('Erro ao limpar: ' + error.message, 'error'); return; }
  toast('✓ Escalas do fim de semana limpas.');
  await loadDados();
}

let salvandoEscala=false;
async function salvarEscala() {
  if(salvandoEscala || !pendingCelebId){ if(!pendingCelebId) toast('Abra uma celebração para montar a escala.','error'); return; }
  salvandoEscala=true;
  const btn=document.getElementById('btn-sv-escala');
  btn.disabled=true;btn.textContent='Salvando...';
  // monta só as vagas preenchidas — pode salvar INCOMPLETA (vagas vazias são ignoradas)
  const novas=[];
  pendingEdicao.forEach(({sel,funcao})=>{ if(sel.value) novas.push({celebracao_id:pendingCelebId,membro_id:sel.value,funcao,created_by:ctx.user.id}); });
  const del=await sb.from('acolitos_escalas').delete().eq('celebracao_id',pendingCelebId);
  if(del.error){ salvandoEscala=false; btn.disabled=false; btn.textContent='Salvar Escala'; toast('Erro ao salvar: '+del.error.message,'error'); return; }
  let gravadas=0;
  if(novas.length){
    const ins=await sb.from('acolitos_escalas').insert(novas).select();
    if(ins.error){ salvandoEscala=false; btn.disabled=false; btn.textContent='Salvar Escala'; toast('Erro ao salvar: '+ins.error.message,'error'); return; }
    gravadas = ins.data ? ins.data.length : 0;
  }
  if(novas.length && gravadas===0){
    salvandoEscala=false; btn.disabled=false; btn.textContent='Salvar Escala';
    toast('⚠ Nada foi gravado (0 de '+novas.length+') — sem permissão de escrita na escala.','error'); return;
  }
  btn.className='btn-sm green'; btn.textContent='✓ Escala salva!';
  toast('✓ Escala salva! ('+gravadas+' de '+novas.length+' posições)');
  setTimeout(async ()=>{
    fecharModal('modal-montagem');
    btn.className='btn-sm gold'; btn.textContent='Salvar Escala'; btn.disabled=false;
    salvandoEscala=false;
    await loadDados();
  }, 1000);
}

function renderPlanilha() {
  const el=document.getElementById('view-planilha');el.textContent='';
  if(!membros.length){const em=document.createElement('span');em.className='empty';em.textContent='Sem membros para exibir.';el.appendChild(em);return;}
  const wrap=document.createElement('div');wrap.className='planilha-wrap';
  const table=document.createElement('table');table.className='planilha-table';

  // Cabeçalho
  const thead=document.createElement('thead');const hr=document.createElement('tr');
  ['Membro','Idade','Freq','Obs','MECE','Funções','Fn.Máx'].forEach((h,i)=>{const th=document.createElement('th');if(i===0)th.className='sticky-left';th.textContent=h;hr.appendChild(th);});
  celebracoes.forEach(c=>{
    const d=new Date(c.data+'T00:00:00');
    const th=document.createElement('th');th.style.minWidth='66px';th.style.textAlign='center';
    const l1=document.createElement('div');l1.textContent=d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
    const l2=document.createElement('div');l2.style.cssText='color:var(--text-muted);font-size:8px;';l2.textContent=c.horario+' '+(c.comunidade==='matriz'?'M':'SA');
    th.append(l1,l2);hr.appendChild(th);
  });
  thead.appendChild(hr);table.appendChild(thead);

  // Corpo
  const tbody=document.createElement('tbody');
  membros.forEach(m=>{
    const tr=document.createElement('tr');
    const habs=habMap[m.id]||{};

    // Membro (sticky): avatar + patch + nome
    const tdN=document.createElement('td');tdN.className='sticky-left';
    const wrapN=document.createElement('div');wrapN.style.cssText='display:flex;align-items:center;gap:8px;';
    wrapN.appendChild(buildAvatarEl(m.foto_url, patchRoleFromHabs(habs), 30, { nivelSlug: m.nivel || nivelFromRole(patchRoleFromHabs(habs)) }));
    const nm=document.createElement('div'); nm.style.cssText='min-width:0;line-height:1.15;';
    if((m.apelido||'').trim()){ const a=document.createElement('div'); a.style.cssText='font-size:12px;font-weight:700;white-space:nowrap;'; a.textContent=m.apelido; const n=document.createElement('div'); n.style.cssText='font-size:9.5px;color:var(--text-muted);white-space:nowrap;'; n.textContent=m.nome; nm.append(a,n); }
    else { nm.style.fontSize='12px'; nm.style.whiteSpace='nowrap'; nm.textContent=m.nome; }
    wrapN.appendChild(nm);tdN.appendChild(wrapN);tr.appendChild(tdN);

    // Idade
    const tdI=document.createElement('td');tdI.style.cssText='text-align:center;font-size:11px;';tdI.textContent=m.data_nascimento?calcIdade(m.data_nascimento):'—';tr.appendChild(tdI);

    // Frequência
    const f=freqMap[m.id];
    const tdF=document.createElement('td');tdF.style.minWidth='52px';
    if(f&&f.taxa!=null){
      const num=document.createElement('div');num.style.cssText='font-size:11px;color:var(--text);text-align:center;';num.textContent=f.taxa+'%';
      const bar=document.createElement('div');bar.style.cssText='height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-top:2px;';
      const fill=document.createElement('div');fill.style.cssText='height:100%;border-radius:2px;width:'+f.taxa+'%;background:'+(f.taxa>=75?'var(--success-text)':f.taxa>=50?'var(--warn-text)':'var(--danger-text)')+';';
      bar.appendChild(fill);tdF.append(num,bar);
    } else { tdF.style.cssText='text-align:center;color:var(--border);';tdF.textContent='—'; }
    tr.appendChild(tdF);

    // Obs (balão)
    const tdO=document.createElement('td');tdO.style.textAlign='center';
    const obsParts=[];
    if(m.necessidades_especiais)obsParts.push('Necessidades: '+m.necessidades_especiais);
    if((restricaoMap[m.id]||[]).length)obsParts.push('Restrições: '+restricaoMap[m.id].join('; '));
    if(m.observacoes)obsParts.push(m.observacoes);
    if(obsParts.length){const b=document.createElement('button');b.className='cell-ico';b.textContent='💬';b.onclick=()=>openInfo('Observações — '+m.nome,obsParts);tdO.appendChild(b);}
    else{tdO.style.color='var(--border)';tdO.textContent='—';}
    tr.appendChild(tdO);

    // MECE (pais ministros)
    const tdM=document.createElement('td');tdM.style.textAlign='center';
    const mece=[];
    if(m.tem_pai_ministro&&m.nome_pai_ministro)mece.push('Pai: '+m.nome_pai_ministro);
    if(m.tem_mae_ministro&&m.nome_mae_ministro)mece.push('Mãe: '+m.nome_mae_ministro);
    if(m.comunidade_ministro)mece.push('Comunidade: '+(m.comunidade_ministro==='matriz'?'Matriz':m.comunidade_ministro==='santo_antonio'?'Sto. Antônio':m.comunidade_ministro));
    if(mece.length){const b=document.createElement('button');b.className='cell-ico';b.textContent='👪';b.onclick=()=>openInfo('Pais ministros — '+m.nome,mece);tdM.appendChild(b);}
    else{tdM.style.color='var(--border)';tdM.textContent='—';}
    tr.appendChild(tdM);

    // Funções (13 bolinhas por proficiência)
    const tdFns=document.createElement('td');
    const dots=document.createElement('div');dots.style.cssText='display:flex;gap:2px;';
    FUNCOES_ORDER.forEach(fn=>{
      const niv=habs[fn]||'nao_treinado';
      const dot=document.createElement('span');
      dot.style.cssText='width:8px;height:8px;border-radius:50%;flex-shrink:0;background:'+NIVEL_COR[niv]+';'+(niv==='nao_treinado'?'opacity:.35;':'');
      dot.title=(FUNCAO_LABEL[fn]||fn)+': '+NIVEL_LABEL[niv];
      dots.appendChild(dot);
    });
    tdFns.appendChild(dots);tr.appendChild(tdFns);

    // Função máxima
    let fnMax='—';
    for(const fn of['cred_credencia','cred_altar','missal','altar','turibulo','naveta','cruz','vela','sineta','sinao','apoio']){if(['apto','experiente','referencia'].includes(habs[fn])){fnMax=FUNCAO_LABEL[fn];break;}}
    const tdMx=document.createElement('td');tdMx.style.cssText='font-size:10px;color:var(--gold);white-space:nowrap;';tdMx.textContent=fnMax;tr.appendChild(tdMx);

    // Colunas das datas
    celebracoes.forEach(c=>{
      const td=document.createElement('td');td.style.textAlign='center';
      const e=(escalasMap[c.id]||[]).find(x=>x.membro_id===m.id);
      if(e){const cell=document.createElement('span');cell.className='escala-cell '+(e.status==='ausente_justificado'?'aj':e.status==='escalado'?'escalado':e.status);cell.textContent=FUNCAO_LABEL[e.funcao]||e.funcao;td.appendChild(cell);}
      else if((ausMap[c.id]||new Set()).has(m.id)){td.textContent='🚫';td.title='Declarou ausência';td.style.color='var(--danger-text)';}
      else{td.textContent='—';td.style.color='var(--border)';}
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);wrap.appendChild(table);el.appendChild(wrap);
}

  editCelebId=null;
  document.getElementById('nc-title').textContent='Nova Celebração';
  document.getElementById('nc-data').value=new Date().toISOString().slice(0,10);
  document.getElementById('nc-horario').value='17h';
  document.getElementById('nc-com').value='matriz';
  document.getElementById('nc-tipo').value='missa_comum';
  document.getElementById('nc-obs').value='';
  document.getElementById('modal-nova-celeb').classList.add('open');
}
function abrirEditarCeleb(c){
  editCelebId=c.id;
  document.getElementById('nc-title').textContent='Editar Celebração';
  document.getElementById('nc-data').value=c.data||'';
  document.getElementById('nc-horario').value=c.horario||'17h';
  document.getElementById('nc-com').value=c.comunidade||'matriz';
  document.getElementById('nc-tipo').value=c.tipo||'missa_comum';
  document.getElementById('nc-obs').value=c.observacoes||'';
  document.getElementById('modal-nova-celeb').classList.add('open');
}
let salvandoCeleb=false;
async function salvarNovaCeleb(){
  if(salvandoCeleb)return; // evita cliques duplos criando celebrações repetidas
  const data=document.getElementById('nc-data').value;
  const horario=document.getElementById('nc-horario').value;
  const comunidade=document.getElementById('nc-com').value;
  const tipo=document.getElementById('nc-tipo').value;
  const obs=document.getElementById('nc-obs').value.trim();
  if(!data||!horario){toast('Data e horário são obrigatórios.','error');return;}
  salvandoCeleb=true;
  const sv=document.getElementById('nc-save'); if(sv){sv.disabled=true;sv.textContent='Salvando...';}
  const editando=!!editCelebId;
  const payload={data,horario,comunidade,tipo,observacoes:obs||null};
  const{error}= editando
    ? await sb.from('acolitos_celebracoes').update(payload).eq('id',editCelebId)
    : await sb.from('acolitos_celebracoes').insert({...payload,created_by:ctx.user.id});
  if(error){ salvandoCeleb=false; if(sv){sv.disabled=false;sv.textContent='Salvar';} toast('Erro: '+error.message,'error'); return; }
  // sucesso: botão fica VERDE com "Salvo com sucesso!" antes de fechar
  editCelebId=null;
  if(sv){ sv.className='btn-sm green'; sv.textContent='✓ Salvo com sucesso!'; }
  toast(editando?'✓ Celebração atualizada!':'✓ Celebração criada!');
  setTimeout(async ()=>{
    fecharModal('modal-nova-celeb');
    if(sv){ sv.className='btn-sm gold'; sv.textContent='Salvar'; sv.disabled=false; }
    salvandoCeleb=false;
    await loadDados();
  }, 1100);
}
function dataCurta(d){ const x=new Date(d+'T00:00:00'); return DIAS[x.getDay()]+' '+x.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}); }
async function abrirAusencias(){
  document.getElementById('modal-ausencias').classList.add('open');
  const body=document.getElementById('aus-body'); body.textContent=''; const ld=document.createElement('span'); ld.className='loading'; ld.textContent='Carregando...'; body.appendChild(ld);
  const { data }=await sb.from('acolitos_ausencias')
    .select('*, acolitos_membros(nome,apelido), acolitos_celebracoes(data,horario,comunidade)')
    .order('created_at',{ascending:false}).limit(80);
  body.textContent='';
  if(!data||!data.length){ const em=document.createElement('span'); em.className='empty'; em.textContent='Nenhuma ausência registrada.'; body.appendChild(em); return; }
  data.forEach(a=>{
    const m=a.acolitos_membros, c=a.acolitos_celebracoes;
    const row=document.createElement('div'); row.style.cssText='display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:9px 4px;border-bottom:1px solid var(--border);';
    const left=document.createElement('div'); left.style.cssText='min-width:0;flex:1;';
    const nm=document.createElement('div'); nm.style.cssText='font-weight:700;font-size:14px;color:var(--text);'; nm.textContent=m?(m.apelido||m.nome):'—';
    const wh=document.createElement('div'); wh.style.cssText='font-size:12px;color:var(--gold);';
    wh.textContent = c ? (dataCurta(c.data)+' '+c.horario+' · '+(c.comunidade==='matriz'?'Matriz':'Sto. Antônio')) : (a.data ? dataCurta(a.data)+' · dia todo' : '—');
    const mo=document.createElement('div'); mo.style.cssText='font-size:11px;color:var(--text-muted);'; mo.textContent=(MOTIVO_LABEL[a.motivo]||a.motivo)+(a.observacao?' · '+a.observacao:'');
    left.append(nm,wh,mo);
    const del=document.createElement('button'); del.className='mini-del'; del.textContent='🗑'; del.title='Remover ausência';
    del.onclick=async()=>{ if(!confirm('Remover esta ausência?'))return; await sb.from('acolitos_ausencias').delete().eq('id',a.id); abrirAusencias(); loadDados(); };
    row.append(left,del); body.appendChild(row);
  });
}
