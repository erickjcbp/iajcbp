<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Ausências — Acólitos JCBP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#150a0d">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script>window.addEventListener("beforeinstallprompt",function(e){e.preventDefault();window.__bip=e;});</script>
  <style>
    .motivo-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:16px; }
    .motivo-btn {
      padding:12px 8px; min-height:52px; background:var(--surface2);
      border:1px solid var(--border); border-radius:3px; color:var(--text-muted);
      cursor:pointer; font-size:13px; text-align:center; transition:all .2s;
      -webkit-tap-highlight-color:transparent; line-height:1.3;
    }
    .motivo-btn.active { border-color:var(--gold); color:var(--gold); background:rgba(201,168,76,.08); }
    .ausencia-item {
      background:var(--surface); border:1px solid var(--border-wine);
      border-radius:4px; padding:14px; margin-bottom:10px;
    }
    .ausencia-data { font-family:'Sora',sans-serif; font-size:13px; color:var(--text); margin-bottom:4px; }
    .ausencia-meta { font-size:12px; color:var(--text-muted); }
    .equipe-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); }
    .equipe-row-info { flex:1; }
    .equipe-row-nome { font-size:13px; color:var(--text); margin-bottom:2px; }
    .equipe-row-meta { font-size:11px; color:var(--text-muted); }
    .view-toggle { display:flex; gap:8px; margin-bottom:16px; }
    .view-btn {
      padding:8px 16px; min-height:40px; background:var(--surface2);
      border:1px solid var(--border); color:var(--text-muted); border-radius:2px;
      cursor:pointer; font-family:'Sora',sans-serif; font-size:11px; letter-spacing:1px;
      text-transform:uppercase; transition:all .2s; -webkit-tap-highlight-color:transparent;
    }
    .view-btn.active { border-color:var(--gold); color:var(--gold); background:rgba(201,168,76,.08); }
    .aus-cel-box { max-height:240px; overflow-y:auto; display:flex; flex-direction:column; gap:6px; border:1px solid var(--border-wine); border-radius:6px; padding:8px; }
    .aus-cel-row { display:flex; align-items:center; gap:10px; font-size:13px; color:var(--text); cursor:pointer; padding:3px 4px; }
    .aus-cel-row input[type=checkbox] { width:18px; height:18px; flex:none; accent-color:var(--gold); }
    .aus-cel-row.sel-all { font-weight:700; color:var(--gold); margin:4px 0 2px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.106.2/dist/umd/supabase.min.js" integrity="sha384-4Cjkyy4cE1EgIS0C+Y3xzGmJ2noQFRRU91yKAW8IxtPfVtbQXPMqadSc3sYnjwou" crossorigin="anonymous"></script>
</head>
<body>
<div id="app-header"></div>
<div id="app-nav"></div>
<div class="main" id="main-content">
  <span class="loading">Carregando...</span>
</div>

<script src="shared.js"></script>
<script>
let MOTIVOS = { doenca:'🤒 Doença', viagem:'✈️ Viagem', familia:'👨‍👩‍👧 Família', outro:'📌 Outro' }; // fallback; o Config (acolitos_listas tipo motivo) sobrescreve
async function carregarMotivos(){
  try { const { data } = await sb.from('acolitos_listas').select('valor,label').eq('tipo','motivo').order('label');
    if (data && data.length) { MOTIVOS = {}; data.forEach(r => { MOTIVOS[r.valor] = r.label; }); }
  } catch(e){}
}
const DIAS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
// EQUIPE_ROLES já vem do shared.js (redeclarar com const aqui quebrava o script)

let ctx = null;
let rosterMembrosAus = null, rosterMapAus = {};
// Roster seguro (security-definer) — cobre o cerimoniário, que não lê acolitos_membros por RLS.
async function carregarRosterAus() {
  if (rosterMembrosAus) return rosterMembrosAus;
  const { data } = await sb.rpc('acolitos_roster_substituicao');
  rosterMembrosAus = (data && data.membros) || [];
  rosterMapAus = {}; rosterMembrosAus.forEach(m => { rosterMapAus[m.id] = m; });
  return rosterMembrosAus;
}
let motivoSelecionado = 'doenca';
let datasAvulsasSel = []; // datas (YYYY-MM-DD) informadas sem celebração cadastrada

function fmtDataBR(d) { const x = new Date(d + 'T00:00:00'); return DIAS[x.getDay()] + ' ' + x.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' }); }

async function init() {
  ctx = await initModulo();
  if (!ctx) return;
  renderHeader(ctx, 'ausencias');
  renderBottomNav(ctx, 'ausencias');
  await carregarMotivos(); // motivos do Config (fallback: padrões)
  // equipe E cerimoniários podem registrar ausência de outros (a RLS libera os dois)
  const _r = ctx.membership.role;
  (EQUIPE_ROLES.includes(_r) || _r === 'cerimonario') ? renderViewEquipe() : renderViewMembro();
}

// Rótulo amigável de uma celebração (missa)
function celLabel(c) {
  const d = new Date(c.data + 'T00:00:00');
  return DIAS[d.getDay()] + ' ' + d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}) + ' ' + c.horario + ' · ' + (c.comunidade==='matriz'?'Matriz':'Sto. Antônio');
}

// ── VIEW MEMBRO ───────────────────────────────────────────────
// Declara em quais missas o membro NÃO poderá servir (pré-indisponibilidade).
async function renderViewMembro() {
  const main = document.getElementById('main-content');
  main.textContent = '';

  if (!ctx.membro) {
    const em = document.createElement('span'); em.className = 'empty';
    em.textContent = 'Perfil não encontrado.'; main.appendChild(em); return;
  }

  const title = document.createElement('h1'); title.className = 'page-title';
  title.textContent = 'Informar Ausência'; main.appendChild(title);
  const hint = document.createElement('p'); hint.style.cssText = 'font-size:12px;color:var(--text-muted);margin:-6px 0 14px;line-height:1.5;';
  hint.textContent = 'Marque as missas em que você NÃO poderá servir. A escala vai considerar isso automaticamente.';
  main.appendChild(hint);

  const hoje = new Date().toISOString().slice(0,10);
  const { data: cels } = await sb.from('acolitos_celebracoes')
    .select('id,data,horario,comunidade').gte('data', hoje).order('data').order('horario');
  let futuras = cels || [];
  if (ctx.membro.comunidade && !ctx.membro.pode_outras_comunidades) {
    futuras = futuras.filter(c => c.comunidade === ctx.membro.comunidade);
  }

  const { data: aus } = await sb.from('acolitos_ausencias')
    .select('*, acolitos_celebracoes(data,horario,comunidade)')
    .eq('membro_id', ctx.membro.id).order('created_at',{ascending:false});
  const declaredIds = new Set((aus||[]).map(a => a.celebracao_id));
  const disponiveis = futuras.filter(c => !declaredIds.has(c.id));

  datasAvulsasSel = [];
  const card = document.createElement('div'); card.className = 'section-card';

  // (1) Missas já cadastradas
  if (disponiveis.length) {
    const g1 = document.createElement('div'); g1.className = 'form-group';
    const l1 = document.createElement('label'); l1.className = 'form-label'; l1.textContent = 'Missas em que estarei ausente (marque uma ou mais)';
    g1.appendChild(l1);
    const selAll = document.createElement('label'); selAll.className = 'aus-cel-row sel-all';
    const chkAll = document.createElement('input'); chkAll.type = 'checkbox';
    const spAll = document.createElement('span'); spAll.textContent = 'Selecionar todas';
    selAll.append(chkAll, spAll); g1.appendChild(selAll);
    const box = document.createElement('div'); box.className = 'aus-cel-box';
    disponiveis.forEach(c => {
      const row = document.createElement('label'); row.className = 'aus-cel-row';
      const chk = document.createElement('input'); chk.type = 'checkbox'; chk.className = 'aus-cel'; chk.value = c.id;
      const sp = document.createElement('span'); sp.textContent = celLabel(c);
      row.append(chk, sp); box.appendChild(row);
    });
    chkAll.onchange = () => { box.querySelectorAll('.aus-cel').forEach(c => { c.checked = chkAll.checked; }); };
    g1.appendChild(box); card.appendChild(g1);
  } else {
    const note = document.createElement('p'); note.style.cssText = 'font-size:12px;color:var(--text-muted);margin:0 0 6px;';
    note.textContent = 'Não há missas futuras cadastradas — mas você já pode informar uma data avulsa abaixo.';
    card.appendChild(note);
  }

  // (2) Datas avulsas (mesmo sem missa cadastrada)
  const gAv = document.createElement('div'); gAv.className = 'form-group';
  const lAv = document.createElement('label'); lAv.className = 'form-label'; lAv.textContent = 'Outra data (mesmo sem missa cadastrada)';
  const avRow = document.createElement('div'); avRow.style.cssText = 'display:flex;gap:8px;align-items:center;';
  const avInp = document.createElement('input'); avInp.type = 'date'; avInp.className = 'form-input'; avInp.min = hoje; avInp.style.flex = '1';
  const avAdd = document.createElement('button'); avAdd.type = 'button'; avAdd.className = 'mini-add'; avAdd.textContent = '+ adicionar';
  avRow.append(avInp, avAdd);
  const avList = document.createElement('div'); avList.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;';
  function renderAv() {
    avList.textContent = '';
    datasAvulsasSel.forEach((d, i) => {
      const chip = document.createElement('span'); chip.style.cssText = 'display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--gold);background:rgba(232,185,74,.1);border:1px solid var(--gold-dim);border-radius:12px;padding:3px 6px 3px 10px;';
      chip.appendChild(document.createTextNode(fmtDataBR(d) + ' · dia todo'));
      const x = document.createElement('button'); x.type = 'button'; x.textContent = '×'; x.style.cssText = 'background:none;border:none;color:var(--gold);cursor:pointer;font-weight:800;font-size:14px;line-height:1;';
      x.onclick = () => { datasAvulsasSel.splice(i, 1); renderAv(); };
      chip.appendChild(x); avList.appendChild(chip);
    });
  }
  avAdd.onclick = () => { const d = avInp.value; if (d && !datasAvulsasSel.includes(d)) { datasAvulsasSel.push(d); datasAvulsasSel.sort(); renderAv(); } avInp.value = ''; };
  gAv.append(lAv, avRow, avList); card.appendChild(gAv);

  // (3) Motivo
  const lMot = document.createElement('label'); lMot.className = 'form-label'; lMot.textContent = 'Motivo *';
  const mGrid = document.createElement('div'); mGrid.className = 'motivo-grid';
  motivoSelecionado = 'doenca';
  Object.entries(MOTIVOS).forEach(([val,label]) => {
    const btn = document.createElement('button'); btn.type = 'button';
    btn.className = 'motivo-btn'+(val==='doenca'?' active':''); btn.textContent = label;
    btn.onclick = () => { motivoSelecionado = val; mGrid.querySelectorAll('.motivo-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); };
    mGrid.appendChild(btn);
  });
  card.append(lMot, mGrid);

  // (4) Observação
  const g2 = document.createElement('div'); g2.className = 'form-group';
  const l2 = document.createElement('label'); l2.className = 'form-label'; l2.textContent = 'Observação (opcional)';
  const inp = document.createElement('input'); inp.className = 'form-input'; inp.id = 'obs-aus'; inp.placeholder = 'Detalhes...';
  g2.append(l2, inp); card.appendChild(g2);

  // (5) Confirmar
  const btnEnv = document.createElement('button'); btnEnv.className = 'btn gold'; btnEnv.id = 'btn-env'; btnEnv.textContent = 'Confirmar Ausência';
  btnEnv.onclick = () => enviarAusencia();
  card.appendChild(btnEnv);
  const msg = document.createElement('div'); msg.id = 'msg-aus'; msg.className = 'msg'; card.appendChild(msg);
  main.appendChild(card);

  // Ausências já declaradas (com opção de cancelar)
  const hTitle = document.createElement('div'); hTitle.className = 'page-title';
  hTitle.style.cssText = 'font-size:14px;margin-top:20px;'; hTitle.textContent = 'Minhas Ausências';
  main.appendChild(hTitle);

  if (!aus || !aus.length) {
    const em = document.createElement('span'); em.className = 'empty'; em.style.paddingTop='16px';
    em.textContent = 'Nenhuma ausência declarada.'; main.appendChild(em);
  } else {
    aus.forEach(a => {
      const c = a.acolitos_celebracoes;
      const item = document.createElement('div'); item.className = 'ausencia-item';
      const dt = document.createElement('div'); dt.className = 'ausencia-data'; dt.textContent = c ? celLabel(c) : (a.data ? fmtDataBR(a.data) + ' · dia todo' : '—');
      const mt = document.createElement('div'); mt.className = 'ausencia-meta';
      mt.textContent = (MOTIVOS[a.motivo]||a.motivo)+(a.observacao?' · '+a.observacao:'');
      const cancel = document.createElement('button'); cancel.className = 'btn-sm gray'; cancel.style.marginTop = '8px'; cancel.textContent = 'Cancelar';
      cancel.onclick = async () => { cancel.disabled = true; await sb.from('acolitos_ausencias').delete().eq('id', a.id); renderViewMembro(); };
      item.append(dt, mt, cancel); main.appendChild(item);
    });
  }
}

async function enviarAusencia() {
  const ids = [...document.querySelectorAll('.aus-cel:checked')].map(c => c.value);
  const datas = datasAvulsasSel.slice();
  const obs = document.getElementById('obs-aus').value.trim();
  const msg = document.getElementById('msg-aus');
  const btn = document.getElementById('btn-env');
  if (!ids.length && !datas.length) { msg.className='msg error'; msg.textContent='Selecione ao menos uma missa ou data.'; return; }
  btn.disabled=true; btn.textContent='Enviando...';

  // Irmãos escalados juntos entram na mesma ausência automaticamente
  const irmaosJuntos = (ctx.grupoIrmaos || []).filter(m => m.escalar_com_irmao && m.id !== ctx.membro.id);
  const membrosAll = [ctx.membro.id, ...irmaosJuntos.map(i => i.id)];

  // (a) por celebração já cadastrada
  if (ids.length) {
    const rows = [];
    ids.forEach(id => membrosAll.forEach(mid => rows.push({ membro_id: mid, celebracao_id: id, motivo: motivoSelecionado, observacao: obs||null })));
    const { error } = await sb.from('acolitos_ausencias').upsert(rows, { onConflict:'membro_id,celebracao_id' });
    if (error) { msg.className='msg error'; msg.textContent='Erro. Tente novamente.'; btn.disabled=false; btn.textContent='Confirmar Ausência'; return; }
  }
  // (b) por data avulsa (sem celebração) — vale para todas as missas daquele dia
  if (datas.length) {
    await sb.from('acolitos_ausencias').delete().in('membro_id', membrosAll).in('data', datas).is('celebracao_id', null);
    const rows = [];
    datas.forEach(d => membrosAll.forEach(mid => rows.push({ membro_id: mid, data: d, celebracao_id: null, motivo: motivoSelecionado, observacao: obs||null })));
    const { error } = await sb.from('acolitos_ausencias').insert(rows);
    if (error) { msg.className='msg error'; msg.textContent='Erro ao salvar a data avulsa.'; btn.disabled=false; btn.textContent='Confirmar Ausência'; return; }
  }

  // Substituição automática: se já estava escalado nessas missas, troca por alguém disponível
  let celebsAfetadas = ids.slice();
  if (datas.length) {
    const { data: cc } = await sb.from('acolitos_celebracoes').select('id').in('data', datas);
    celebsAfetadas = celebsAfetadas.concat((cc||[]).map(c => c.id));
  }
  celebsAfetadas = [...new Set(celebsAfetadas)];
  let nSub = 0;
  if (celebsAfetadas.length) {
    const { data: r } = await sb.rpc('acolitos_substituir_ausente', { p_membros: membrosAll, p_celebracoes: celebsAfetadas });
    nSub = r || 0;
  }

  const total = ids.length + datas.length;
  const extra = irmaosJuntos.length ? ' (e ' + irmaosJuntos.map(i => i.apelido || (i.nome||'').split(' ')[0]).join(', ') + ', que serve' + (irmaosJuntos.length>1?'m':'') + ' junto)' : '';
  const subTxt = nSub ? ' Já substituí ' + nSub + ' posição(ões) na escala.' : '';
  msg.className='msg success'; msg.textContent = total + (total>1 ? ' ausências registradas!' : ' ausência registrada!') + extra + subTxt;
  btn.disabled=true; btn.textContent='Registrado ✓';
  setTimeout(()=>renderViewMembro(), 1600);
}

// ── VIEW EQUIPE ───────────────────────────────────────────────
async function renderViewEquipe() {
  const main = document.getElementById('main-content');
  main.textContent = '';

  const title = document.createElement('h1'); title.className = 'page-title';
  title.textContent = 'Ausências Informadas'; main.appendChild(title);

  const btnAdd = document.createElement('button'); btnAdd.className = 'btn-sm gold';
  btnAdd.style.marginBottom = '16px'; btnAdd.textContent = '+ Registrar ausência';
  btnAdd.onclick = abrirRegistroAusencia; main.appendChild(btnAdd);

  // KPIs
  const { count: totalAus } = await sb.from('acolitos_ausencias')
    .select('*',{count:'exact',head:true});
  const { count: sem30 } = await sb.from('acolitos_ausencias')
    .select('*',{count:'exact',head:true})
    .gte('created_at', new Date(Date.now()-30*86400000).toISOString());

  const kpi = document.createElement('div'); kpi.className='kpi-grid'; kpi.style.gridTemplateColumns='1fr 1fr';
  [{label:'Total Registradas',value:totalAus||0,sub:'histórico'},{label:'Últimos 30 dias',value:sem30||0,sub:'recentes'}].forEach(k=>{
    const c=document.createElement('div');c.className='kpi-card';
    const l=document.createElement('div');l.className='kpi-label';l.textContent=k.label;
    const v=document.createElement('div');v.className='kpi-value';v.textContent=k.value;
    const s=document.createElement('div');s.className='kpi-sub';s.textContent=k.sub;
    c.append(l,v,s);kpi.appendChild(c);
  });
  main.appendChild(kpi);

  const { data: ausencias } = await sb
    .from('acolitos_ausencias')
    .select('*, acolitos_membros(nome,apelido), acolitos_celebracoes(data,horario,comunidade)')
    .order('created_at',{ascending:false}).limit(60);

  if (!ausencias?.length) {
    const em=document.createElement('span');em.className='empty';em.textContent='Nenhuma ausência informada.';main.appendChild(em);return;
  }

  // cerimoniário não lê acolitos_membros por RLS → embed volta vazio; roster (security-definer) cobre
  await carregarRosterAus();
  ausencias.forEach(a => {
    const c=a.acolitos_celebracoes; const d=c?new Date(c.data+'T00:00:00'):null;
    const rm=rosterMapAus[a.membro_id]||{};
    const row=document.createElement('div');row.className='equipe-row';
    const info=document.createElement('div');info.className='equipe-row-info';
    const n=document.createElement('div');n.className='equipe-row-nome';n.textContent=a.acolitos_membros?.apelido||a.acolitos_membros?.nome||rm.apelido||rm.nome||'—';
    const m=document.createElement('div');m.className='equipe-row-meta';
    m.textContent=(d?DIAS[d.getDay()]+' '+d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})+' · '+c.horario:'—')+' · '+(MOTIVOS[a.motivo]||a.motivo);
    info.append(n,m);
    const badge=document.createElement('span');badge.className='badge coroinha';badge.textContent='AJ';
    row.append(info,badge);main.appendChild(row);
  });
  if (EQUIPE_ROLES.includes(ctx.membership.role)) renderMotivosAdmin(main);
}

// ── GESTÃO DA LISTA DE MOTIVOS (movida do Config) — só equipe ──
async function renderMotivosAdmin(main) {
  const card = document.createElement('div'); card.style.cssText = 'background:var(--surface);border:1px solid var(--border-wine);border-radius:6px;padding:14px;margin-top:20px;';
  const h = document.createElement('div'); h.style.cssText = 'font-family:Sora,sans-serif;font-weight:700;font-size:13px;color:var(--gold);margin-bottom:4px;'; h.textContent = '⚙ Motivos de ausência (gerir)'; card.appendChild(h);
  const sub = document.createElement('div'); sub.style.cssText = 'font-size:11px;color:var(--text-muted);margin-bottom:8px;'; sub.textContent = 'Crie ou exclua os motivos que aparecem ao registrar uma ausência.'; card.appendChild(sub);
  const box = document.createElement('div'); card.appendChild(box);
  const miniBtn = (txt, danger) => { const b = document.createElement('button'); b.textContent = txt; b.style.cssText = 'width:30px;height:30px;border-radius:6px;cursor:pointer;font-weight:700;border:1px solid ' + (danger ? 'var(--danger)' : 'var(--gold-dim)') + ';background:var(--surface2);color:' + (danger ? 'var(--danger-text)' : 'var(--gold-light)') + ';'; return b; };
  async function pinta() {
    box.textContent = '';
    const { data } = await sb.from('acolitos_listas').select('id,valor,label').eq('tipo', 'motivo').order('label');
    (data || []).forEach(item => {
      const row = document.createElement('div'); row.style.cssText = 'display:flex;align-items:center;gap:8px;padding:7px 2px;border-bottom:1px solid var(--border);';
      const nm = document.createElement('span'); nm.style.cssText = 'flex:1;font-size:13px;color:var(--text);'; nm.textContent = item.label || item.valor;
      const del = miniBtn('−', true);
      del.onclick = async () => { if (!confirm('Remover motivo "' + (item.label || item.valor) + '"?')) return; await sb.from('acolitos_listas').delete().eq('id', item.id); pinta(); };
      row.append(nm, del); box.appendChild(row);
    });
    const add = document.createElement('div'); add.style.cssText = 'display:flex;gap:8px;margin-top:10px;';
    const inp = document.createElement('input'); inp.className = 'form-input'; inp.placeholder = 'Novo motivo (ex.: 🏫 Prova)';
    const bt = miniBtn('+', false);
    bt.onclick = async () => { const v = inp.value.trim(); if (!v) return; const slug = v.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/[^\w]+/g, '_').replace(/^_|_$/g, ''); await sb.from('acolitos_listas').insert({ tipo: 'motivo', valor: slug, label: v }); inp.value = ''; pinta(); };
    add.append(inp, bt); box.appendChild(add);
  }
  pinta();
  main.appendChild(card);
}

// ── REGISTRAR AUSÊNCIA (equipe/admin, em nome de um membro) ───
async function abrirRegistroAusencia() {
  const hoje = new Date().toISOString().slice(0,10);
  const membros = await carregarRosterAus(); // roster seguro (cobre cerimoniário; embed RLS volta vazio p/ ele)
  const { data: cels } = await sb.from('acolitos_celebracoes')
    .select('id,data,horario,comunidade').gte('data', hoje).order('data').order('horario');
  const futuras = cels || [];

  const ov = document.createElement('div'); ov.className = 'modal-overlay open';
  ov.onclick = (ev) => { if (ev.target === ov) ov.remove(); };
  const modal = document.createElement('div'); modal.className = 'modal';
  const handle = document.createElement('div'); handle.className = 'modal-handle';
  const tt = document.createElement('div'); tt.className = 'modal-title'; tt.textContent = 'Registrar Ausência';
  modal.append(handle, tt); ov.appendChild(modal); document.body.appendChild(ov);

  if (!membros || !membros.length || !futuras.length) {
    const em = document.createElement('div'); em.style.cssText = 'color:var(--text-muted);font-size:13px;line-height:1.5;';
    em.textContent = !futuras.length ? 'Nenhuma missa futura cadastrada. Cadastre as celebrações primeiro.' : 'Nenhum membro ativo cadastrado.';
    const close = document.createElement('button'); close.className = 'btn-sm gray'; close.style.marginTop = '16px';
    close.textContent = 'Fechar'; close.onclick = () => ov.remove();
    modal.append(em, close); return;
  }

  // Membros (múltiplos) + sugestão de irmão
  const selecionados = [];
  const g1 = document.createElement('div'); g1.className = 'form-group';
  const l1 = document.createElement('label'); l1.className = 'form-label'; l1.textContent = 'Membros * (um ou mais)';
  const chips = document.createElement('div'); chips.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;';
  const sugBox = document.createElement('div'); sugBox.style.cssText = 'display:flex;flex-direction:column;gap:5px;margin-bottom:6px;';
  const buscaM = document.createElement('input'); buscaM.className = 'form-input'; buscaM.placeholder = 'Buscar membro…';
  const listaM = document.createElement('div'); listaM.style.cssText = 'max-height:150px;overflow-y:auto;margin-top:4px;';
  g1.append(l1, chips, sugBox, buscaM, listaM); modal.appendChild(g1);

  // Missas
  const g2 = document.createElement('div'); g2.className = 'form-group';
  const l2 = document.createElement('label'); l2.className = 'form-label'; l2.textContent = 'Missas * (marque uma ou mais)';
  g2.appendChild(l2);
  const selAll = document.createElement('label'); selAll.className = 'aus-cel-row sel-all';
  const chkAll = document.createElement('input'); chkAll.type = 'checkbox';
  const spAll = document.createElement('span'); spAll.textContent = 'Selecionar todas';
  selAll.append(chkAll, spAll); g2.appendChild(selAll);
  const boxC = document.createElement('div'); boxC.className = 'aus-cel-box';
  g2.append(boxC); modal.appendChild(g2);
  chkAll.onchange = () => { boxC.querySelectorAll('.aus-cel').forEach(c => { c.checked = chkAll.checked; }); };

  function add(m) { if (!selecionados.some(s => s.id === m.id)) selecionados.push(m); buscaM.value = ''; redraw(); }
  function rem(id) { const i = selecionados.findIndex(s => s.id === id); if (i >= 0) selecionados.splice(i, 1); redraw(); }
  function redraw() { pintaChips(); pintaSug(); pintaLista(); popMissas(); }
  function pintaChips() {
    chips.textContent = '';
    selecionados.forEach(s => { const c = document.createElement('span'); c.style.cssText = 'background:var(--surface2);border:1px solid var(--gold-dim);color:var(--gold-light);border-radius:14px;padding:3px 10px;font-size:12px;cursor:pointer;'; c.textContent = (s.apelido || s.nome) + ' ✕'; c.onclick = () => rem(s.id); chips.appendChild(c); });
  }
  function pintaSug() {
    sugBox.textContent = '';
    const ids = new Set(selecionados.map(s => s.id)); const vistos = new Set();
    selecionados.forEach(s => {
      if (!s.grupo_irmaos) return;
      membros.filter(m => m.grupo_irmaos === s.grupo_irmaos && m.id !== s.id && !ids.has(m.id)).forEach(irm => {
        if (vistos.has(irm.id)) return; vistos.add(irm.id);
        const sug = document.createElement('div'); sug.style.cssText = 'display:flex;align-items:center;gap:8px;background:rgba(232,185,74,.1);border:1px solid var(--gold-dim);border-radius:8px;padding:7px 10px;';
        const txt = document.createElement('span'); txt.style.cssText = 'flex:1;font-size:12px;color:var(--text);'; txt.textContent = '💡 ' + (irm.apelido || irm.nome) + ' é irmão(ã) de ' + (s.apelido || s.nome);
        const b = document.createElement('button'); b.className = 'btn-sm gold'; b.style.cssText = 'padding:5px 12px;font-size:12px;'; b.textContent = '+ Adicionar'; b.onclick = () => add(irm);
        sug.append(txt, b); sugBox.appendChild(sug);
      });
    });
  }
  function pintaLista() {
    const termo = buscaM.value.trim().toLowerCase(); listaM.textContent = '';
    if (!termo) return;
    membros.filter(m => !selecionados.some(s => s.id === m.id) && ((m.apelido || '').toLowerCase().includes(termo) || (m.nome || '').toLowerCase().includes(termo)))
      .slice(0, 12).forEach(m => { const it = document.createElement('div'); it.style.cssText = 'padding:8px 6px;font-size:13px;color:var(--text);border-bottom:1px solid var(--border);cursor:pointer;'; it.textContent = m.apelido || m.nome; it.onclick = () => add(m); listaM.appendChild(it); });
  }
  function popMissas() {
    const coms = new Set(); let todas = false;
    selecionados.forEach(s => { if (s.pode_outras_comunidades || !s.comunidade) todas = true; else coms.add(s.comunidade); });
    let lista = futuras;
    if (!todas && coms.size) lista = futuras.filter(c => coms.has(c.comunidade));
    boxC.textContent = ''; chkAll.checked = false;
    if (!selecionados.length) { const e = document.createElement('div'); e.style.cssText = 'font-size:12px;color:var(--text-muted);font-style:italic;padding:4px;'; e.textContent = '(escolha os membros primeiro)'; boxC.appendChild(e); return; }
    if (!lista.length) { const e = document.createElement('div'); e.style.cssText = 'font-size:12px;color:var(--text-muted);font-style:italic;padding:4px;'; e.textContent = '(sem missas para a comunidade)'; boxC.appendChild(e); return; }
    lista.forEach(c => {
      const row = document.createElement('label'); row.className = 'aus-cel-row';
      const chk = document.createElement('input'); chk.type = 'checkbox'; chk.className = 'aus-cel'; chk.value = c.id;
      const sp = document.createElement('span'); sp.textContent = celLabel(c);
      row.append(chk, sp); boxC.appendChild(row);
    });
  }
  buscaM.oninput = pintaLista; redraw();

  const lMot = document.createElement('label'); lMot.className = 'form-label'; lMot.textContent = 'Motivo *'; modal.appendChild(lMot);
  const mGrid = document.createElement('div'); mGrid.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;';
  let motivoSel = 'doenca';
  Object.entries(MOTIVOS).forEach(([val,label]) => {
    const b = document.createElement('button'); b.type = 'button'; b.className = 'form-toggle' + (val==='doenca'?' active':''); b.textContent = label;
    b.onclick = () => { motivoSel = val; mGrid.querySelectorAll('.form-toggle').forEach(x => x.classList.remove('active')); b.classList.add('active'); };
    mGrid.appendChild(b);
  });
  modal.appendChild(mGrid);

  const g3 = document.createElement('div'); g3.className = 'form-group';
  const l3 = document.createElement('label'); l3.className = 'form-label'; l3.textContent = 'Observação (opcional)';
  const inpObs = document.createElement('input'); inpObs.className = 'form-input'; inpObs.placeholder = 'Detalhes...';
  g3.append(l3, inpObs); modal.appendChild(g3);

  const msg = document.createElement('div'); msg.className = 'msg'; modal.appendChild(msg);

  const acts = document.createElement('div'); acts.className = 'modal-actions';
  const cancel = document.createElement('button'); cancel.className = 'btn-sm gray'; cancel.textContent = 'Cancelar'; cancel.onclick = () => ov.remove();
  const conf = document.createElement('button'); conf.className = 'btn-sm gold'; conf.textContent = 'Registrar';
  conf.onclick = async () => {
    if (!selecionados.length) { msg.className='msg error'; msg.textContent='Escolha ao menos um membro.'; return; }
    const ids = [...boxC.querySelectorAll('.aus-cel:checked')].map(c => c.value);
    if (!ids.length) { msg.className='msg error'; msg.textContent='Selecione ao menos uma missa.'; return; }
    conf.disabled = true; conf.textContent = 'Salvando...';
    const obsVal = inpObs.value.trim() || null;
    const rows = [];
    ids.forEach(id => { selecionados.forEach(s => rows.push({ membro_id: s.id, celebracao_id: id, motivo: motivoSel, observacao: obsVal })); });
    const { error } = await sb.from('acolitos_ausencias').upsert(rows, { onConflict: 'membro_id,celebracao_id' });
    if (error) { msg.className = 'msg error'; msg.textContent = 'Erro ao registrar. Tente novamente.'; conf.disabled = false; conf.textContent = 'Registrar'; return; }
    const { data: nSub } = await sb.rpc('acolitos_substituir_ausente', { p_membros: selecionados.map(s => s.id), p_celebracoes: ids });
    const subTxt = nSub ? ' Substituí ' + nSub + ' posição(ões) na escala.' : '';
    msg.className = 'msg success'; msg.textContent = 'Registrado para ' + selecionados.length + ' membro(s).' + subTxt;
    setTimeout(() => { ov.remove(); renderViewEquipe(); }, 1500);
  };
  acts.append(cancel, conf); modal.appendChild(acts);
}

init();
</script>
</body>
</html>
