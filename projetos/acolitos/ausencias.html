<script>
let MOTIVOS = { doenca:'🤒 Doença', viagem:'✈️ Viagem', familia:'👨‍👩‍👧 Família', outro:'📌 Outro' }; // fallback; o Config (acolitos_listas tipo motivo) sobrescreve
async function carregarMotivos(){
  try { const { data } = await sb.from('acolitos_listas').select('valor,label').eq('tipo','motivo').order('label');
    if (data && data.length) { MOTIVOS = {}; data.forEach(r => { MOTIVOS[r.valor] = r.label; }); }
  } catch(e){}
}
const DIAS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
// EQUIPE_ROLES já vem do shared.js (redeclarar com const aqui quebrava o script)
// FUNCAO_LABEL/dataLabel/comLabel copiados de escalas-membro.html (padrão, sem duplicar DIAS/TIPO_LABEL — TIPO_LABEL não é usado aqui)
const FUNCAO_LABEL = { cred_altar:'Cerimonial de Altar', cred_credencia:'Cerimonial de Credência', missal:'Missal', turibulo:'Turíbulo', naveta:'Naveta', altar:'Altar', cruz:'Cruz', vela:'Vela', sineta:'Sineta', sinao:'Sinão', apoio:'Apoio', mitra:'Mitra', baculo:'Báculo' };
function dataLabel(d) { const x = new Date(d+'T00:00:00'); return DIAS[x.getDay()] + ' ' + x.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}); }
function comLabel(c) { return c==='matriz'?'Matriz':'Sto. Antônio'; }

let ctx = null;
let rosterMembrosAus = null, rosterMapAus = {}, rosterHabsAus = [];
// Roster seguro (security-definer) — cobre o cerimoniário, que não lê acolitos_membros por RLS.
async function carregarRosterAus() {
  if (rosterMembrosAus) return rosterMembrosAus;
  const { data } = await sb.rpc('acolitos_roster_substituicao');
  rosterMembrosAus = (data && data.membros) || [];
  rosterHabsAus = (data && data.habs) || [];
  rosterMapAus = {}; rosterMembrosAus.forEach(m => { rosterMapAus[m.id] = m; });
  return rosterMembrosAus;
}

// ── Motor único (GeradorSubstituto) — auto-troca ao APROVAR ausência pública ──
// Espelha carregarCargaHistorica/dispMapDe/horKeyDe da escala.html (mesma janela/regra).
async function carregarCargaAus(refData) {
  const _ger = (typeof cfg === 'function') ? (cfg('gerador', {}) || {}) : {};
  const dias = Number(_ger.janela_dias) || 42;
  const ini = new Date(refData + 'T00:00:00'); ini.setDate(ini.getDate() - dias);
  const iniStr = ini.toISOString().slice(0, 10);
  const base = {};
  try {
    const { data: cels } = await sb.from('acolitos_celebracoes').select('id').gte('data', iniStr).lte('data', refData);
    const ids = (cels || []).map(c => c.id);
    if (!ids.length) return base;
    const { data } = await sb.from('acolitos_escalas').select('membro_id').in('celebracao_id', ids).limit(5000);
    (data || []).forEach(e => { base[e.membro_id] = (base[e.membro_id] || 0) + 1; });
  } catch (err) { console.error('carga histórica (ausências) falhou', err); }
  return base;
}
function dispMapDeAus(rows) { const m = {}; (rows || []).forEach(r => { (m[r.membro_id] = m[r.membro_id] || []).push(r.dia + '_' + r.horario); }); return m; }
function horKeyDeCelAus(c) { const dow = new Date(c.data + 'T00:00:00').getDay(); const diaK = dow===0?'domingo':dow===6?'sabado':null; return diaK ? diaK + '_' + c.horario : null; }

// Aplica a auto-troca (motor único GeradorSubstituto) para os itens recém-APROVADOS da fila pública.
// `itens`: objetos vindos de acolitos_ausencia_pendente_listar() — {membro_id,data,horario,comunidade,celebracao_id,...}.
// Migration 010 passou a devolver celebracao_id direto na RPC: usamos ele como identidade (não mais
// o casamento frágil por data+horario+comunidade). Itens com celebracao_id null são "data avulsa"
// (sem celebração única) e ficam de fora, igual ao caminho de Registrar Ausência (enviarAusencia) só
// chama acolitos_substituir_ausente ali.
async function autoTrocaAprovadas(itens) {
  const comCel = (itens || []).filter(p => p.celebracao_id != null);
  if (!comCel.length) return;
  await carregarRosterAus();
  if (!rosterMembrosAus || !rosterMembrosAus.length) return;

  const habMap = {}; (rosterHabsAus || []).forEach(h => { (habMap[h.membro_id] = habMap[h.membro_id] || {})[h.funcao] = h.proficiencia; });
  const { data: dispRows } = await sb.from('acolitos_disponibilidade').select('membro_id,dia,horario');
  const dispMap = dispMapDeAus(dispRows);
  const config = { gerador: (typeof cfg === 'function' ? cfg('gerador', {}) : {}), funcoes_maiores: (typeof cfg === 'function' ? cfg('funcoes_maiores', null) : null) };

  // A RPC já devolve data/horario/comunidade junto (pro rótulo na tela) — usamos direto de `p`.
  // Só busca no banco por id os que vierem incompletos (defesa contra RPC antiga/parcial).
  const idsFaltantes = [...new Set(comCel.filter(p => !p.data || !p.comunidade).map(p => p.celebracao_id))];
  let celsPorId = {};
  if (idsFaltantes.length) {
    const { data: cels } = await sb.from('acolitos_celebracoes').select('id,data,horario,comunidade').in('id', idsFaltantes);
    (cels || []).forEach(c => { celsPorId[c.id] = c; });
  }
  const celDe = (p) => {
    if (p.data && p.comunidade) return { id: p.celebracao_id, data: p.data, horario: p.horario, comunidade: p.comunidade };
    const c = celsPorId[p.celebracao_id];
    return c ? { id: c.id, data: c.data, horario: c.horario, comunidade: c.comunidade } : null;
  };

  const cargaPorData = {}; // Fix 3: cacheia a carga (janela de 42d) por data — evita 1 query por item aprovado
  const trocas = [];
  const falhas = [];
  for (const p of comCel) {
    const cel = celDe(p);
    if (!cel || !cel.id) continue; // não achou a celebração — não força nada
    try {
      if (!cargaPorData[cel.data]) cargaPorData[cel.data] = await carregarCargaAus(cel.data);
      const carga = cargaPorData[cel.data];
      const t = await GeradorSubstituto.aplicarTrocaEscala(sb,
        { celebracao_id: cel.id, comunidade: cel.comunidade, data: cel.data, membroAusenteId: p.membro_id },
        (funcao, usadosNaMissa, usadoFds) => ({
          funcao, comunidade: cel.comunidade, horKey: horKeyDeCelAus(cel), membroAusenteId: p.membro_id,
          roster: rosterMembrosAus, habMap, dispMap, cargaMap: carga,
          usadosNaMissa, usadoFds: new Set(), config
        }));
      if (t) trocas.push(t);
      if(t && t.entrou){ try{ apiPost('/api/enviar-push',{tipo:'escalado',membros:[t.entrou],titulo:'Você entrou na escala ⛪',texto:'Você cobriu uma vaga na escala. Confira no app.'}); }catch(_){} }
    } catch (e) {
      console.error('auto-troca item falhou', p, e);
      falhas.push(p);
    }
  }
  if (trocas.length) {
    const nomes = {}; rosterMembrosAus.forEach(m => { nomes[m.id] = m.apelido || m.nome; });
    GeradorSubstituto.abrirResumoTrocas(trocas, nomes, (t) => GeradorSubstituto.desfazerTroca(sb, t));
  }
  if (falhas.length) {
    // Fix 2: sinaliza pro chamador (approve flow) mostrar aviso — a aprovação em si já foi salva,
    // isso só avisa que a troca automática pode ter ficado incompleta para 1+ item.
    const err = new Error('auto-troca falhou para ' + falhas.length + ' item(ns) aprovado(s)');
    err.falhas = falhas;
    throw err;
  }
}
// Constrói o ctx do motor p/ UMA solicitação de cobertura (espelha autoTrocaAprovadas)
async function construirCtxMotor(it){
  await carregarRosterAus();
  const habMap = {}; (rosterHabsAus||[]).forEach(h => { (habMap[h.membro_id]=habMap[h.membro_id]||{})[h.funcao]=h.proficiencia; });
  const { data: dispRows } = await sb.from('acolitos_disponibilidade').select('membro_id,dia,horario');
  const dispMap = dispMapDeAus(dispRows);
  const carga = await carregarCargaAus(it.data);
  const config = { gerador: (typeof cfg==='function'?cfg('gerador',{}):{}), funcoes_maiores: (typeof cfg==='function'?cfg('funcoes_maiores',null):null) };
  const { data: linhas } = await sb.from('acolitos_escalas').select('membro_id,status').eq('celebracao_id', it.celebracao_id);
  const usadosNaMissa = new Set((linhas||[]).filter(e => e.status==='escalado'||e.status==='presente'||e.status==='atrasado').map(e => e.membro_id));
  usadosNaMissa.add(it.membro_id);
  return { funcao: it.funcao, comunidade: it.comunidade, horKey: horKeyDeCelAus({ data: it.data, horario: it.horario }),
           membroAusenteId: it.membro_id, roster: rosterMembrosAus, habMap, dispMap, cargaMap: carga,
           usadosNaMissa, usadoFds: new Set(), config };
}
function nomeDoMembro(id){ const m = rosterMapAus && rosterMapAus[id]; return m ? (m.apelido||m.nome) : id; }

let motivoSelecionado = 'doenca';
let datasAvulsasSel = []; // datas (YYYY-MM-DD) informadas sem celebração cadastrada

function fmtDataBR(d) { const x = new Date(d + 'T00:00:00'); return DIAS[x.getDay()] + ' ' + x.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' }); }

// ── Caixa de Aprovações — grupos Trocas / Candidaturas (Task 10) + Cobrir (Task 11) ──
async function renderCaixaSolicitacoes(container){
  const { data } = await sb.rpc('acolitos_solicitacoes_pendentes');
  const trocas=(data&&data.trocas)||[]; const cand=(data&&data.candidaturas)||[]; const cobrir=(data&&data.cobrir)||[];

  function grupo(titulo, itens, montarItem){
    if(!itens.length) return;
    const h=document.createElement('div'); h.style.cssText='font-family:Sora,sans-serif;font-weight:800;font-size:13px;color:var(--gold-light);margin:16px 0 8px;';
    h.textContent=titulo+' ('+itens.length+')'; container.appendChild(h);
    itens.forEach(it=>container.appendChild(montarItem(it)));
  }
  function fmt(it){ return dataLabel(it.data)+' · '+it.horario+' · '+comLabel(it.comunidade); }
  function card(){ const c=document.createElement('div'); c.style.cssText='background:var(--surface);border:1px solid var(--border-wine);border-radius:10px;padding:12px;margin-bottom:8px;'; return c; }
  function acoes(){ const a=document.createElement('div'); a.style.cssText='display:flex;gap:8px;margin-top:10px;'; return a; }

  async function decidir(id, acao, substituto, onOk){
    const { data:res } = await sb.rpc('acolitos_solicitacao_decidir', { p_solicitacao_id:id, p_acao:acao, p_substituto_id:substituto||null });
    if(res && res.ok){ toast('Feito.','success'); onOk(); } else { toast('Não foi possível decidir.','error'); }
  }

  // 🔄 Trocas aguardando homologação (colega já aceitou)
  grupo('🔄 Trocas aguardando você', trocas, (it)=>{
    const c=card();
    const t=document.createElement('div'); t.style.fontWeight='700'; t.textContent=(it.de_nome||'?')+' → '+(it.alvo_nome||'?');
    const s=document.createElement('div'); s.style.cssText='font-size:12px;color:var(--gold);'; s.textContent=fmt(it)+' · '+(FUNCAO_LABEL[it.funcao]||it.funcao);
    const a=acoes();
    const ok=document.createElement('button'); ok.className='btn-sm'; ok.style.flex='1'; ok.textContent='Homologar';
    const no=document.createElement('button'); no.className='btn-sm gray'; no.style.flex='1'; no.textContent='Negar';
    ok.onclick=()=>decidir(it.id,'homologar',null,()=>c.remove());
    no.onclick=()=>decidir(it.id,'negar',null,()=>c.remove());
    a.append(ok,no); c.append(t,s,a); return c;
  });

  // 🙋 Candidaturas a vaga
  grupo('🙋 Candidaturas a vaga', cand, (it)=>{
    const c=card();
    const t=document.createElement('div'); t.style.fontWeight='700'; t.textContent=(it.de_nome||'?')+' quer '+(FUNCAO_LABEL[it.funcao]||it.funcao);
    const s=document.createElement('div'); s.style.cssText='font-size:12px;color:var(--gold);'; s.textContent=fmt(it);
    const a=acoes();
    const ok=document.createElement('button'); ok.className='btn-sm'; ok.style.flex='1'; ok.textContent='Aprovar';
    const no=document.createElement('button'); no.className='btn-sm gray'; no.style.flex='1'; no.textContent='Negar';
    ok.onclick=()=>decidir(it.id,'aprovar_candidatura',null,()=>c.remove());
    no.onclick=()=>decidir(it.id,'negar',null,()=>c.remove());
    a.append(ok,no); c.append(t,s,a); return c;
  });

  // 🛟 Cobrir — tratado na Task 11 (auto-troca)
  renderCaixaCobrir(container, cobrir);

  // 🆕 Novos cadastros aguardando aprovação (fonte: CRM)
  try {
    const { data: novos } = await sb.from('acolitos_crm')
      .select('membro_id, etapa, acolitos_membros(nome)')
      .eq('etapa','aprovacao_cadastro');
    if ((novos||[]).length){
      const h=document.createElement('div'); h.style.cssText='font-family:Sora,sans-serif;font-weight:800;font-size:13px;color:var(--gold-light);margin:16px 0 8px;';
      h.textContent='🆕 Novos cadastros ('+novos.length+')'; container.appendChild(h);
      novos.forEach(n=>{
        const c=document.createElement('div'); c.style.cssText='background:var(--surface);border:1px solid var(--border-wine);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:10px;';
        const t=document.createElement('div'); t.style.fontWeight='700'; t.textContent=(n.acolitos_membros && n.acolitos_membros.nome) || '(sem nome)';
        const b=document.createElement('a'); b.className='btn-sm'; b.href='crm.html'; b.textContent='Abrir no CRM →';
        c.append(t,b); container.appendChild(c);
      });
    }
  } catch(e){ console.error('novos cadastros (caixa) falhou', e); }
}
async function renderCaixaCobrir(container, cobrir){
  if(!cobrir.length) return;
  const h=document.createElement('div'); h.style.cssText='font-family:Sora,sans-serif;font-weight:800;font-size:13px;color:var(--gold-light);margin:16px 0 8px;';
  h.textContent='🛟 Cobrir / auto-troca ('+cobrir.length+')'; container.appendChild(h);
  for (const it of cobrir){
    const c=document.createElement('div'); c.style.cssText='background:var(--surface);border:1px solid var(--border-wine);border-radius:10px;padding:12px;margin-bottom:8px;';
    const t=document.createElement('div'); t.style.fontWeight='700'; t.textContent='Vaga de '+(it.de_nome||'?')+' — '+(FUNCAO_LABEL[it.funcao]||it.funcao);
    const s=document.createElement('div'); s.style.cssText='font-size:12px;color:var(--gold);'; s.textContent=dataLabel(it.data)+' · '+it.horario+' · '+comLabel(it.comunidade);
    c.append(t,s);
    const sug=document.createElement('div'); sug.style.cssText='font-size:13px;margin-top:8px;'; sug.textContent='Calculando sugestão...'; c.appendChild(sug);
    let sugeridoId=null;
    try {
      const ctxMotor = await construirCtxMotor(it);
      const r = GeradorSubstituto.escolherSubstituto(ctxMotor);
      sugeridoId = r.membroId || null;
      sug.textContent = sugeridoId ? ('Sugerido: '+nomeDoMembro(sugeridoId)) : 'Sem candidato disponível (vaga ficará vazia)';
    } catch(e){ console.error('sugestão cobertura falhou', e); sug.textContent='Não foi possível calcular sugestão.'; }
    const a=document.createElement('div'); a.style.cssText='display:flex;gap:8px;margin-top:10px;';
    const ok=document.createElement('button'); ok.className='btn-sm'; ok.style.flex='1'; ok.textContent=sugeridoId?'Confirmar':'Deixar vago';
    const no=document.createElement('button'); no.className='btn-sm gray'; no.style.flex='1'; no.textContent='Negar';
    ok.onclick=async()=>{ ok.disabled=no.disabled=true; const { data:res }=await sb.rpc('acolitos_solicitacao_decidir',{p_solicitacao_id:it.id,p_acao:'confirmar_cobertura',p_substituto_id:sugeridoId});
      if(res&&res.ok){ toast('Cobertura confirmada.','success'); c.remove(); } else { toast('Não foi possível confirmar.','error'); ok.disabled=no.disabled=false; } };
    no.onclick=async()=>{ ok.disabled=no.disabled=true; const { data:res }=await sb.rpc('acolitos_solicitacao_decidir',{p_solicitacao_id:it.id,p_acao:'negar',p_substituto_id:null});
      if(res&&res.ok){ toast('Negado.','success'); c.remove(); } else { toast('Não foi possível negar.','error'); ok.disabled=no.disabled=false; } };
    a.append(ok,no); c.appendChild(a); container.appendChild(c);
  }
}

async function init() {
  ctx = await initModulo();
  if (!ctx) return;
  renderHeader(ctx, 'ausencias');
  renderBottomNav(ctx, 'ausencias');
  await carregarMotivos(); // motivos do Config (fallback: padrões)
  // equipe E cerimoniários podem registrar ausência de outros (a RLS libera os dois)
  const _r = ctx.membership.role;
  // renderPendentesPublicas sem await de propósito: carrega em background e prepende
  // o card após a view de equipe já ter montado (ela limpa #main-content no início).
  if (EQUIPE_ROLES.includes(_r) || _r === 'cerimonario') {
    await renderViewEquipe();
    renderPendentesPublicas();
  }
  else renderViewMembro();
}

// Avisos recebidos pela página pública (/ausencias), aguardando confirmação.
// Card fino (só a contagem) → toca para expandir → "Aprovar todas" de uma vez.
async function renderPendentesPublicas(){
  const { data } = await sb.rpc('acolitos_ausencia_pendente_listar');
  const pend = (data && data.pendentes) || [];
  if(!pend.length) return;
  const main = document.getElementById('main-content');
  const fmt = d => { const [y,m,da]=String(d).split('-'); return da+'/'+m+'/'+y; };

  const card = document.createElement('div'); card.className='section-card';
  card.style.cssText = (card.style.cssText||'') + ';border:1px solid var(--gold);';

  // Cabeçalho fino clicável (toggle)
  const head = document.createElement('div');
  head.style.cssText='display:flex;align-items:center;gap:8px;cursor:pointer;font-family:Sora,sans-serif;font-weight:700;font-size:14px;color:var(--gold);';
  const ht = document.createElement('span'); ht.style.flex='1';
  const chev = document.createElement('span'); chev.textContent='▾'; chev.style.cssText='transition:transform .15s;font-size:12px;';
  head.append(ht, chev); card.appendChild(head);

  // Corpo (oculto por padrão)
  const body = document.createElement('div'); body.style.cssText='display:none;margin-top:10px;'; card.appendChild(body);

  const restantes = ()=>body.querySelectorAll('div[data-pend]').length;
  const atualiza = ()=>{
    const n = restantes();
    ht.textContent = '📋 Avisos recebidos (' + n + ')';
    bAll.textContent = '✓ Aprovar todas (' + n + ')';
    if(!n) card.remove();
  };
  const decidir = async (ids, acao, onOk)=>{
    const { data:r } = await sb.rpc('acolitos_ausencia_pendente_decidir',{ p_ids:ids, p_acao:acao });
    if(r && r.ok){
      try { const _it=pend.filter(p=>ids.includes(p.id)); const _al=[...new Set(_it.map(i=>i.membro_id).filter(Boolean))]; if(_al.length){ const _ok=acao==='aprovar'; apiPost('/api/enviar-push',{tipo:'ausencia',membros:_al,titulo:_ok?'Ausência aprovada ✅':'Ausência recusada',texto:'Sua ausência foi '+(_ok?'APROVADA':'recusada')+'. Veja no app.'}); } } catch(_){}
      onOk();
      // Auto-troca (Task 5): só ao aprovar, e só para os itens desta chamada (o RPC já gravou
      // a ausência real com celebracao_id). `pend` é o array completo carregado no topo desta função.
      if (acao === 'aprovar') {
        const itens = pend.filter(p => ids.includes(p.id));
        try { await autoTrocaAprovadas(itens); }
        catch (e) {
          console.error('auto-troca (aprovação) falhou', e);
          // Ausência já foi aprovada (não desfaz) — só avisa que a troca automática não foi
          // garantida, pro coordenador conferir a escala manualmente.
          await uiAlert('Ausência aprovada, mas a troca automática não foi concluída para 1 ou mais item(ns). Confira a escala manualmente.');
        }
      }
    } else { await uiAlert('Erro ao processar.'); }
  };

  // Ação em massa
  const bAll = document.createElement('button');
  bAll.style.cssText='width:100%;font-size:12.5px;font-weight:800;padding:10px;border-radius:8px;cursor:pointer;border:none;margin-bottom:10px;background:linear-gradient(160deg,var(--gold-light,#ffd97a),var(--gold,#8a6a24));color:#2a1500;';
  bAll.onclick = async ()=>{
    const rows = Array.from(body.querySelectorAll('div[data-pend]'));
    const ids = rows.map(r=>r.dataset.id); if(!ids.length) return;
    bAll.disabled=true; bAll.textContent='Aprovando...';
    await decidir(ids,'aprovar', ()=>{ rows.forEach(r=>r.remove()); });
    bAll.disabled=false; atualiza();
  };
  body.appendChild(bAll);

  pend.forEach(p=>{
    const row=document.createElement('div'); row.dataset.id=p.id; row.setAttribute('data-pend','1');
    row.style.cssText='display:flex;align-items:center;gap:8px;padding:8px 2px;border-bottom:1px solid var(--border);';
    const info=document.createElement('div'); info.style.cssText='flex:1;min-width:0;';
    const nm=document.createElement('div'); nm.style.cssText='font-weight:700;font-size:13px;color:var(--text);';
    nm.textContent = p.nome + ' · ' + fmt(p.data) + (p.horario ? ' ' + p.horario : '')
      + (p.comunidade ? ' · ' + (p.comunidade==='matriz'?'Matriz':'Sto. Antônio') : '');
    const sub=document.createElement('div'); sub.style.cssText='font-size:11px;color:var(--text-muted);word-break:break-word;';
    const partes=[]; if(p.informante_nome) partes.push('por '+p.informante_nome);
    if(p.informante_contato) partes.push(p.informante_contato);
    if(p.motivo) partes.push(p.motivo);
    sub.textContent = partes.join(' · ') || 'sem detalhes';
    info.append(nm,sub);
    const bOk=document.createElement('button'); bOk.textContent='Aprovar';
    bOk.style.cssText='font-size:11px;font-weight:700;padding:6px 10px;border-radius:6px;cursor:pointer;border:1px solid var(--gold-dim);background:var(--surface2);color:var(--gold-light);';
    const bNo=document.createElement('button'); bNo.textContent='Rejeitar';
    bNo.style.cssText='font-size:11px;font-weight:700;padding:6px 10px;border-radius:6px;cursor:pointer;border:1px solid var(--danger);background:var(--surface2);color:var(--danger-text);';
    const one = async (acao)=>{ bOk.disabled=true; bNo.disabled=true;
      await decidir([p.id], acao, ()=>{ row.remove(); atualiza(); });
      bOk.disabled=false; bNo.disabled=false; };
    bOk.onclick=()=>one('aprovar'); bNo.onclick=()=>one('rejeitar');
    row.append(info,bOk,bNo); body.appendChild(row);
  });

  let aberto=false;
  head.onclick = ()=>{ aberto=!aberto; body.style.display=aberto?'block':'none'; chev.style.transform=aberto?'rotate(180deg)':'none'; };

  atualiza();
  main.insertBefore(card, main.firstChild);
}

// Rótulo amigável de uma celebração (missa)
function celLabel(c) {
  const d = new Date(c.data + 'T00:00:00');
  return DIAS[d.getDay()] + ' ' + d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}) + ' ' + c.horario + ' · ' + (c.comunidade==='matriz'?'Matriz':'Sto. Antônio');
}

async function enviarAusencia() {
  const ids = [...document.querySelectorAll('.aus-cel:checked')].map(c => c.value);
  const datas = datasAvulsasSel.slice();
  const obs = document.getElementById('obs-aus').value.trim();
  const msg = document.getElementById('msg-aus');
  const btn = document.getElementById('btn-env');
  if (!ids.length && !datas.length) { msg.className='msg error'; msg.textContent='Selecione ao menos uma missa ou data.'; return; }
  btn.disabled=true; btn.textContent='Enviando...';

  // Irmãos escalados juntos entram na mesma ausência automaticamente
  const irmaosJuntos = (ctx.grupoIrmaos || []).filter(m => m.escalar_com_irmao && m.id !== ctx.membro.id);
  const membrosAll = [ctx.membro.id, ...irmaosJuntos.map(i => i.id)];

  // (a) por celebração já cadastrada
  if (ids.length) {
    const rows = [];
    ids.forEach(id => membrosAll.forEach(mid => rows.push({ membro_id: mid, celebracao_id: id, motivo: motivoSelecionado, observacao: obs||null })));
    const { error } = await sb.from('acolitos_ausencias').upsert(rows, { onConflict:'membro_id,celebracao_id' });
    if (error) { msg.className='msg error'; msg.textContent='Erro. Tente novamente.'; btn.disabled=false; btn.textContent='Confirmar Ausência'; return; }
  }
  // (b) por data avulsa (sem celebração) — vale para todas as missas daquele dia
  if (datas.length) {
    await sb.from('acolitos_ausencias').delete().in('membro_id', membrosAll).in('data', datas).is('celebracao_id', null);
    const rows = [];
    datas.forEach(d => membrosAll.forEach(mid => rows.push({ membro_id: mid, data: d, celebracao_id: null, motivo: motivoSelecionado, observacao: obs||null })));
    const { error } = await sb.from('acolitos_ausencias').insert(rows);
    if (error) { msg.className='msg error'; msg.textContent='Erro ao salvar a data avulsa.'; btn.disabled=false; btn.textContent='Confirmar Ausência'; return; }
  }

  // Substituição automática: se já estava escalado nessas missas, troca por alguém disponível
  let celebsAfetadas = ids.slice();
  if (datas.length) {
    const { data: cc } = await sb.from('acolitos_celebracoes').select('id').in('data', datas);
    celebsAfetadas = celebsAfetadas.concat((cc||[]).map(c => c.id));
  }
  celebsAfetadas = [...new Set(celebsAfetadas)];
  let nSub = 0;
  if (celebsAfetadas.length) {
    const { data: r } = await sb.rpc('acolitos_substituir_ausente', { p_membros: membrosAll, p_celebracoes: celebsAfetadas });
    nSub = r || 0;
  }

  const total = ids.length + datas.length;
  const extra = irmaosJuntos.length ? ' (e ' + irmaosJuntos.map(i => i.apelido || (i.nome||'').split(' ')[0]).join(', ') + ', que serve' + (irmaosJuntos.length>1?'m':'') + ' junto)' : '';
  const subTxt = nSub ? ' Já substituí ' + nSub + ' posição(ões) na escala.' : '';
  msg.className='msg success'; msg.textContent = total + (total>1 ? ' ausências registradas!' : ' ausência registrada!') + extra + subTxt;
  btn.disabled=true; btn.textContent='Registrado ✓';
  setTimeout(()=>renderViewMembro(), 1600);
}

  if (!membros || !membros.length || !futuras.length) {
    const em = document.createElement('div'); em.style.cssText = 'color:var(--text-muted);font-size:13px;line-height:1.5;';
    em.textContent = !futuras.length ? 'Nenhuma missa futura cadastrada. Cadastre as celebrações primeiro.' : 'Nenhum membro ativo cadastrado.';
    const close = document.createElement('button'); close.className = 'btn-sm gray'; close.style.marginTop = '16px';
    close.textContent = 'Fechar'; close.onclick = () => ov.remove();
    modal.append(em, close); return;
  }

  // Membros (múltiplos) + sugestão de irmão
  const selecionados = [];
  const g1 = document.createElement('div'); g1.className = 'form-group';
  const l1 = document.createElement('label'); l1.className = 'form-label'; l1.textContent = 'Membros * (um ou mais)';
  const chips = document.createElement('div'); chips.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;';
  const sugBox = document.createElement('div'); sugBox.style.cssText = 'display:flex;flex-direction:column;gap:5px;margin-bottom:6px;';
  const buscaM = document.createElement('input'); buscaM.className = 'form-input'; buscaM.placeholder = 'Buscar membro…';
  const listaM = document.createElement('div'); listaM.style.cssText = 'max-height:150px;overflow-y:auto;margin-top:4px;';
  g1.append(l1, chips, sugBox, buscaM, listaM); modal.appendChild(g1);

  // Missas
  const g2 = document.createElement('div'); g2.className = 'form-group';
  const l2 = document.createElement('label'); l2.className = 'form-label'; l2.textContent = 'Missas * (marque uma ou mais)';
  g2.appendChild(l2);
  const selAll = document.createElement('label'); selAll.className = 'aus-cel-row sel-all';
  const chkAll = document.createElement('input'); chkAll.type = 'checkbox';
  const spAll = document.createElement('span'); spAll.textContent = 'Selecionar todas';
  selAll.append(chkAll, spAll); g2.appendChild(selAll);
  const boxC = document.createElement('div'); boxC.className = 'aus-cel-box';
  g2.append(boxC); modal.appendChild(g2);
  chkAll.onchange = () => { boxC.querySelectorAll('.aus-cel').forEach(c => { c.checked = chkAll.checked; }); };

  function add(m) { if (!selecionados.some(s => s.id === m.id)) selecionados.push(m); buscaM.value = ''; redraw(); }
  function rem(id) { const i = selecionados.findIndex(s => s.id === id); if (i >= 0) selecionados.splice(i, 1); redraw(); }
  function redraw() { pintaChips(); pintaSug(); pintaLista(); popMissas(); }
  function pintaChips() {
    chips.textContent = '';
    selecionados.forEach(s => { const c = document.createElement('span'); c.style.cssText = 'background:var(--surface2);border:1px solid var(--gold-dim);color:var(--gold-light);border-radius:14px;padding:3px 10px;font-size:12px;cursor:pointer;'; c.textContent = (s.apelido || s.nome) + ' ✕'; c.onclick = () => rem(s.id); chips.appendChild(c); });
  }
  function pintaSug() {
    sugBox.textContent = '';
    const ids = new Set(selecionados.map(s => s.id)); const vistos = new Set();
    selecionados.forEach(s => {
      if (!s.grupo_irmaos) return;
      membros.filter(m => m.grupo_irmaos === s.grupo_irmaos && m.id !== s.id && !ids.has(m.id)).forEach(irm => {
        if (vistos.has(irm.id)) return; vistos.add(irm.id);
        const sug = document.createElement('div'); sug.style.cssText = 'display:flex;align-items:center;gap:8px;background:rgba(232,185,74,.1);border:1px solid var(--gold-dim);border-radius:8px;padding:7px 10px;';
        const txt = document.createElement('span'); txt.style.cssText = 'flex:1;font-size:12px;color:var(--text);'; txt.textContent = '💡 ' + (irm.apelido || irm.nome) + ' é irmão(ã) de ' + (s.apelido || s.nome);
        const b = document.createElement('button'); b.className = 'btn-sm gold'; b.style.cssText = 'padding:5px 12px;font-size:12px;'; b.textContent = '+ Adicionar'; b.onclick = () => add(irm);
        sug.append(txt, b); sugBox.appendChild(sug);
      });
    });
  }
  function pintaLista() {
    const termo = buscaM.value.trim().toLowerCase(); listaM.textContent = '';
    if (!termo) return;
    membros.filter(m => !selecionados.some(s => s.id === m.id) && (semAcento(m.apelido).includes(semAcento(termo)) || semAcento(m.nome).includes(semAcento(termo))))
      .slice(0, 12).forEach(m => { const it = document.createElement('div'); it.style.cssText = 'padding:8px 6px;font-size:13px;color:var(--text);border-bottom:1px solid var(--border);cursor:pointer;'; it.textContent = m.apelido || m.nome; it.onclick = () => add(m); listaM.appendChild(it); });
  }
  function popMissas() {
    const coms = new Set(); let todas = false;
    selecionados.forEach(s => { if (s.pode_outras_comunidades || !s.comunidade) todas = true; else coms.add(s.comunidade); });
    let lista = futuras;
    if (!todas && coms.size) lista = futuras.filter(c => coms.has(c.comunidade));
    boxC.textContent = ''; chkAll.checked = false;
    if (!selecionados.length) { const e = document.createElement('div'); e.style.cssText = 'font-size:12px;color:var(--text-muted);font-style:italic;padding:4px;'; e.textContent = '(escolha os membros primeiro)'; boxC.appendChild(e); return; }
    if (!lista.length) { const e = document.createElement('div'); e.style.cssText = 'font-size:12px;color:var(--text-muted);font-style:italic;padding:4px;'; e.textContent = '(sem missas para a comunidade)'; boxC.appendChild(e); return; }
    lista.forEach(c => {
      const row = document.createElement('label'); row.className = 'aus-cel-row';
      const chk = document.createElement('input'); chk.type = 'checkbox'; chk.className = 'aus-cel'; chk.value = c.id;
      const sp = document.createElement('span'); sp.textContent = celLabel(c);
      row.append(chk, sp); boxC.appendChild(row);
    });
  }
  buscaM.oninput = pintaLista; redraw();

  const lMot = document.createElement('label'); lMot.className = 'form-label'; lMot.textContent = 'Motivo *'; modal.appendChild(lMot);
  const mGrid = document.createElement('div'); mGrid.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;';
  let motivoSel = 'doenca';
  Object.entries(MOTIVOS).forEach(([val,label]) => {
    const b = document.createElement('button'); b.type = 'button'; b.className = 'form-toggle' + (val==='doenca'?' active':''); b.textContent = label;
    b.onclick = () => { motivoSel = val; mGrid.querySelectorAll('.form-toggle').forEach(x => x.classList.remove('active')); b.classList.add('active'); };
    mGrid.appendChild(b);
  });
  modal.appendChild(mGrid);

  const g3 = document.createElement('div'); g3.className = 'form-group';
  const l3 = document.createElement('label'); l3.className = 'form-label'; l3.textContent = 'Observação (opcional)';
  const inpObs = document.createElement('input'); inpObs.className = 'form-input'; inpObs.placeholder = 'Detalhes...';
  g3.append(l3, inpObs); modal.appendChild(g3);

  const msg = document.createElement('div'); msg.className = 'msg'; modal.appendChild(msg);

  const acts = document.createElement('div'); acts.className = 'modal-actions';
  const cancel = document.createElement('button'); cancel.className = 'btn-sm gray'; cancel.textContent = 'Cancelar'; cancel.onclick = () => ov.remove();
  const conf = document.createElement('button'); conf.className = 'btn-sm gold'; conf.textContent = 'Registrar';
  conf.onclick = async () => {
    if (!selecionados.length) { msg.className='msg error'; msg.textContent='Escolha ao menos um membro.'; return; }
    const ids = [...boxC.querySelectorAll('.aus-cel:checked')].map(c => c.value);
    if (!ids.length) { msg.className='msg error'; msg.textContent='Selecione ao menos uma missa.'; return; }
    conf.disabled = true; conf.textContent = 'Salvando...';
    const obsVal = inpObs.value.trim() || null;
    const rows = [];
    ids.forEach(id => { selecionados.forEach(s => rows.push({ membro_id: s.id, celebracao_id: id, motivo: motivoSel, observacao: obsVal })); });
    const { error } = await sb.from('acolitos_ausencias').upsert(rows, { onConflict: 'membro_id,celebracao_id' });
    if (error) { msg.className = 'msg error'; msg.textContent = 'Erro ao registrar. Tente novamente.'; conf.disabled = false; conf.textContent = 'Registrar'; return; }
    const { data: nSub } = await sb.rpc('acolitos_substituir_ausente', { p_membros: selecionados.map(s => s.id), p_celebracoes: ids });
    const subTxt = nSub ? ' Substituí ' + nSub + ' posição(ões) na escala.' : '';
    msg.className = 'msg success'; msg.textContent = 'Registrado para ' + selecionados.length + ' membro(s).' + subTxt;
    setTimeout(() => { ov.remove(); renderViewEquipe(); }, 1500);
  };
  acts.append(cancel, conf); modal.appendChild(acts);
}

init();
</script>
</body>
</html>
