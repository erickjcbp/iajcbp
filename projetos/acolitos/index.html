<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acólitos e Coroinhas — JCBP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    /* CRM status (membro novo) */
    .status-card { background:var(--surface); border:1px solid var(--gold-dim); border-radius:4px; padding:20px 16px; text-align:center; margin-bottom:20px; }
    .status-icon { font-size:40px; margin-bottom:10px; }
    .status-title { font-family:'Cinzel',serif; font-size:16px; color:var(--gold-light); letter-spacing:1px; margin-bottom:6px; }
    .status-sub { font-size:13px; color:var(--text-muted); font-style:italic; line-height:1.5; }
    /* Greet */
    .greet-section { text-align:center; margin-bottom:22px; }
    .greet-nome { font-family:'Cinzel',serif; font-size:18px; font-weight:700; margin-top:12px; color:var(--text); }
    .greet-sub { font-size:12px; color:var(--text-muted); margin-top:6px; font-style:italic; }
    /* Próxima escala / agenda item */
    .ev-item { background:var(--surface); border:1px solid var(--border-wine); border-radius:4px; padding:13px 14px; margin-bottom:10px; display:flex; align-items:center; gap:12px; }
    .ev-date { text-align:center; flex-shrink:0; width:46px; }
    .ev-dia { font-family:'Cinzel',serif; font-size:18px; font-weight:700; color:var(--gold); line-height:1; }
    .ev-mes { font-size:9px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-top:2px; }
    .ev-body { flex:1; min-width:0; }
    .ev-top { font-size:13px; color:var(--text); }
    .ev-sub { font-size:11px; color:var(--text-muted); margin-top:2px; }
    .ev-funcao { font-family:'Cinzel',serif; font-size:11px; color:var(--gold); letter-spacing:.5px; }
    .ev-badge { font-size:9px; padding:2px 7px; border-radius:10px; font-family:'Cinzel',serif; border:1px solid var(--border-wine); color:var(--text-muted); flex-shrink:0; }
    /* Chart cards */
    .chart-card { background:var(--surface); border:1px solid var(--border-wine); border-radius:4px; padding:16px; margin-bottom:14px; }
    .chart-title { font-family:'Cinzel',serif; font-size:11px; font-weight:600; color:var(--gold); letter-spacing:1px; text-transform:uppercase; margin-bottom:14px; padding-bottom:8px; border-bottom:1px solid var(--border); }
    .legend-dot { width:10px; height:10px; border-radius:2px; }
    /* Níveis (barras horizontais) */
    .lvl-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
    .lvl-name { width:96px; font-size:11px; color:var(--text); font-family:'Cinzel',serif; flex-shrink:0; }
    .lvl-track { flex:1; height:16px; background:var(--surface2); border-radius:3px; overflow:hidden; }
    .lvl-fill { height:100%; border-radius:3px; transition:width .4s; }
    .lvl-num { width:22px; text-align:right; font-size:12px; color:var(--text-muted); flex-shrink:0; }
    /* Donut */
    .donut-wrap { display:flex; align-items:center; gap:18px; flex-wrap:wrap; justify-content:center; }
    .donut-legend { display:flex; flex-direction:column; gap:8px; }
    .donut-leg-item { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text-muted); }
    /* Alertas */
    .alert-item { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); font-size:13px; color:var(--text); }
    .alert-item:last-child { border-bottom:none; }
    .alert-ico { font-size:16px; flex-shrink:0; }
    /* Quick links */
    .quick-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:6px; }
    .quick-link { background:var(--surface); border:1px solid var(--border-wine); border-radius:4px; padding:14px; display:flex; align-items:center; gap:10px; text-decoration:none; transition:border-color .2s; -webkit-tap-highlight-color:transparent; }
    .quick-link:active { border-color:var(--gold); }
    .quick-link-icon { font-size:22px; flex-shrink:0; }
    .quick-link-title { font-family:'Cinzel',serif; font-size:12px; color:var(--text); }
    .section-head { font-family:'Cinzel',serif; font-size:13px; color:var(--text); letter-spacing:1px; margin:18px 0 12px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.106.2/dist/umd/supabase.min.js" integrity="sha384-4Cjkyy4cE1EgIS0C+Y3xzGmJ2noQFRRU91yKAW8IxtPfVtbQXPMqadSc3sYnjwou" crossorigin="anonymous"></script>
</head>
<body>
<div id="app-header"></div>
<div id="app-nav"></div>
<div class="main" id="main">
  <span class="loading">Carregando...</span>
</div>

<script src="shared.js"></script>
<script>
const EQUIPE_ROLES = ['coord_admin','subadmin','membro_equipe'];
const CRM_ETAPAS = ['integracao','whatsapp','tunica','disponivel_escala','integrado'];
const CRM_LABEL = { integracao:'Integração', whatsapp:'WhatsApp', tunica:'Túnica', disponivel_escala:'Disponível para Escala', integrado:'Integrado ✓' };
const CRM_DESC = {
  integracao:'Em breve entraremos em contato para agendar sua reunião de integração.',
  whatsapp:'Aguardando sua confirmação de entrada nos grupos de WhatsApp.',
  tunica:'Em processo de recebimento da túnica.',
  disponivel_escala:'A equipe está registrando sua disponibilidade para as escalas.',
  integrado:'Você já está integrado! Bem-vindo à pastoral.'
};
const JORNADA = [
  {role:'aspirante',label:'Aspirante',icon:'✦'},
  {role:'coroinha',label:'Coroinha',icon:'♛'},
  {role:'acolito',label:'Acólito',icon:'⊕'},
  {role:'cerimonario',label:'Cerimoniário',icon:'✵'},
];
const ROLE_LABEL = { cerimonario:'Cerimoniário', acolito:'Acólito', coroinha:'Coroinha', aspirante:'Aspirante', membro_equipe:'Equipe', subadmin:'Sub-Admin', coord_admin:'Coordenador' };
const FUNCAO_LABEL = { apoio:'Apoio', cruz:'Cruz', vela:'Vela', sineta:'Sineta', sinao:'Sinão', altar:'Altar', turibulo:'Turíbulo', naveta:'Naveta', missal:'Missal', cred_altar:'Cred. Altar', cred_credencia:'Cred. Credência', mitra:'Mitra', baculo:'Báculo' };
const TIPO_LABEL = { missa_comum:'Missa', solenidade:'Solenidade', casamento:'Casamento', batizado:'Batizado', crisma:'Crisma', ordenacao:'Ordenação' };
const DIAS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const MES = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

const hojeStr = () => new Date().toISOString().slice(0,10);
const elDate = d => { const dt = new Date(d+'T00:00:00'); return { dia: dt.getDate(), mes: MES[dt.getMonth()], dow: DIAS[dt.getDay()] }; };

let moduloId = null;

async function init() {
  const ctx = await initModulo();
  if (!ctx) return;
  renderHeader(ctx, 'home');
  const role = ctx.membership?.role;
  renderBottomNav(role || 'novo', 'home');
  const { data: mod } = await sb.from('pastoral_modules').select('id').eq('slug','acolitos').maybeSingle();
  moduloId = mod?.id || null;

  if (!ctx.membership || role === 'novo') await renderStatusCrm(ctx);
  else if (EQUIPE_ROLES.includes(role)) await renderDashboardEquipe(ctx);
  else await renderDashboardMembro(ctx);
}

/* ── STATUS CRM ──────────────────────────────────────────────── */
async function renderStatusCrm(ctx) {
  const main = document.getElementById('main'); main.textContent = '';
  let etapa = 'integracao';
  if (ctx.membro) {
    const { data: crm } = await sb.from('acolitos_crm').select('etapa').eq('membro_id', ctx.membro.id).maybeSingle();
    if (crm) etapa = crm.etapa;
  }
  const card = document.createElement('div'); card.className = 'status-card';
  const icon = document.createElement('div'); icon.className = 'status-icon'; icon.textContent = '⛪';
  const title = document.createElement('div'); title.className = 'status-title'; title.textContent = 'Sua Integração na Pastoral';
  const sub = document.createElement('div'); sub.className = 'status-sub'; sub.textContent = CRM_DESC[etapa];
  card.append(icon, title, sub); main.appendChild(card);

  const track = document.createElement('div'); track.className = 'jornada-track';
  const idx = CRM_ETAPAS.indexOf(etapa);
  CRM_ETAPAS.forEach((e,i) => {
    const step = document.createElement('div'); step.className = 'jornada-step';
    const dot = document.createElement('div'); dot.className = 'jornada-dot' + (i<idx?' done':i===idx?' current':'');
    dot.textContent = i<idx?'✓':String(i+1);
    const lbl = document.createElement('div'); lbl.className = 'jornada-label' + (i===idx?' current':''); lbl.textContent = CRM_LABEL[e].split(' ')[0];
    step.append(dot,lbl); track.appendChild(step);
    if (i<CRM_ETAPAS.length-1) { const line=document.createElement('div'); line.className='jornada-line'+(i<idx?' done':''); track.appendChild(line); }
  });
  main.appendChild(track);
  const info = document.createElement('p');
  info.style.cssText = 'color:var(--text-muted);font-size:12px;text-align:center;font-style:italic;margin-top:12px;';
  info.textContent = 'Em caso de dúvidas, entre em contato com a equipe da pastoral.';
  main.appendChild(info);
}

/* ── DASHBOARD MEMBRO ────────────────────────────────────────── */
async function renderDashboardMembro(ctx) {
  const main = document.getElementById('main'); main.textContent = '';
  const m = ctx.membro; const role = ctx.membership.role;

  // Saudação + avatar editável (membro sobe a própria foto)
  const greet = document.createElement('div'); greet.className = 'greet-section';
  greet.appendChild(buildAvatarEl(m?.foto_url, role, 84, m ? {
    editable: true, membro: m,
    onUpload: (url) => { m.foto_url = url; }
  } : undefined));
  const nomeEl = document.createElement('div'); nomeEl.className = 'greet-nome'; nomeEl.textContent = m?.nome || ctx.user.email;
  const subEl = document.createElement('div'); subEl.className = 'greet-sub';
  subEl.textContent = (ROLE_LABEL[role]||role) + (m?.comunidade ? ' · ' + (m.comunidade==='matriz'?'Matriz':'Sto. Antônio') : '');
  greet.append(nomeEl, subEl); main.appendChild(greet);

  // KPIs de frequência
  if (m) {
    const f = await fetchFrequencia(m.id);
    const grid = document.createElement('div'); grid.className = 'kpi-grid'; grid.style.gridTemplateColumns = '1fr 1fr 1fr';
    [
      { label:'Frequência', value: f && f.taxa!=null ? f.taxa+'%' : '—', sub:'comparecimento' },
      { label:'Missas Servidas', value: f ? (f.servidas||0) : 0, sub:'no histórico' },
      { label:'Última Missa', value: f && f.ultima_participacao ? formatDate(f.ultima_participacao) : '—', sub:'participação' },
    ].forEach(k => {
      const c=document.createElement('div'); c.className='kpi-card';
      const l=document.createElement('div'); l.className='kpi-label'; l.textContent=k.label;
      const v=document.createElement('div'); v.className='kpi-value'; v.style.fontSize='18px'; v.textContent=k.value;
      const s=document.createElement('div'); s.className='kpi-sub'; s.textContent=k.sub;
      c.append(l,v,s); grid.appendChild(c);
    });
    main.appendChild(grid);
  }

  // Jornada
  const track = document.createElement('div'); track.className = 'jornada-track';
  const roleIdx = JORNADA.findIndex(j => j.role === role);
  JORNADA.forEach((j,i) => {
    const step=document.createElement('div'); step.className='jornada-step';
    const dot=document.createElement('div'); dot.className='jornada-dot'+(i<roleIdx?' done':i===roleIdx?' current':'');
    dot.textContent = i<=roleIdx ? j.icon : '○';
    const lbl=document.createElement('div'); lbl.className='jornada-label'+(i===roleIdx?' current':''); lbl.textContent=j.label;
    step.append(dot,lbl); track.appendChild(step);
    if (i<JORNADA.length-1) { const line=document.createElement('div'); line.className='jornada-line'+(i<roleIdx?' done':''); track.appendChild(line); }
  });
  main.appendChild(track);

  // Próximas escalas do membro
  const psHead = document.createElement('div'); psHead.className='section-head'; psHead.textContent='Minhas Próximas Escalas';
  main.appendChild(psHead);
  if (m) {
    const { data: esc } = await sb.from('acolitos_escalas')
      .select('id,funcao, acolitos_celebracoes!inner(data,horario,comunidade)')
      .eq('membro_id', m.id).eq('status','escalado')
      .gte('acolitos_celebracoes.data', hojeStr());
    const prox = (esc||[]).filter(e=>e.acolitos_celebracoes)
      .sort((a,b)=> (a.acolitos_celebracoes.data+a.acolitos_celebracoes.horario).localeCompare(b.acolitos_celebracoes.data+b.acolitos_celebracoes.horario))
      .slice(0,3);
    if (!prox.length) {
      const em=document.createElement('span'); em.className='empty'; em.style.padding='16px 0'; em.textContent='Nenhuma escala publicada para você.'; main.appendChild(em);
    } else {
      prox.forEach(e => {
        const c=e.acolitos_celebracoes; const d=elDate(c.data);
        const item=document.createElement('div'); item.className='ev-item';
        const dt=document.createElement('div'); dt.className='ev-date';
        const dia=document.createElement('div'); dia.className='ev-dia'; dia.textContent=d.dia;
        const mes=document.createElement('div'); mes.className='ev-mes'; mes.textContent=d.mes;
        dt.append(dia,mes);
        const body=document.createElement('div'); body.className='ev-body';
        const top=document.createElement('div'); top.className='ev-top'; top.textContent=d.dow+' · '+c.horario+' · '+(c.comunidade==='matriz'?'Matriz':'Sto. Antônio');
        const fn=document.createElement('div'); fn.className='ev-funcao'; fn.textContent=FUNCAO_LABEL[e.funcao]||e.funcao;
        body.append(top,fn);
        const btn=document.createElement('a'); btn.className='btn-sm gray'; btn.href='ausencias.html'; btn.textContent='Ausência';
        item.append(dt,body,btn); main.appendChild(item);
      });
    }
  }

  // Agenda da pastoral
  await renderAgenda(main, 'Agenda da Pastoral', 5);
}

/* ── DASHBOARD EQUIPE ────────────────────────────────────────── */
async function renderDashboardEquipe(ctx) {
  const main = document.getElementById('main'); main.textContent = '';
  const title = document.createElement('h1'); title.className='page-title'; title.textContent='Painel Operacional'; main.appendChild(title);

  // Carrega dados
  const hoje = hojeStr();
  const ini = new Date(); ini.setDate(1); const iniMes = ini.toISOString().slice(0,10);
  const fimMes = new Date(ini.getFullYear(), ini.getMonth()+1, 0).toISOString().slice(0,10);
  const seis = new Date(); seis.setMonth(seis.getMonth()-5); seis.setDate(1); const seisStr = seis.toISOString().slice(0,10);

  const [ativosR, crmR, freqMap, mesR, escSeisR, membrosR, pmR, cobR] = await Promise.all([
    sb.from('acolitos_membros').select('*',{count:'exact',head:true}).eq('status','ativo'),
    sb.from('acolitos_crm').select('*',{count:'exact',head:true}).neq('etapa','integrado'),
    fetchFrequencia(),
    sb.from('acolitos_celebracoes').select('*',{count:'exact',head:true}).gte('data',iniMes).lte('data',fimMes),
    sb.from('acolitos_escalas').select('status, acolitos_celebracoes!inner(data)').gte('acolitos_celebracoes.data', seisStr),
    sb.from('acolitos_membros').select('id,user_id').eq('status','ativo'),
    moduloId ? sb.from('pastoral_members').select('user_id,role').eq('module_id',moduloId) : Promise.resolve({data:[]}),
    sb.from('acolitos_celebracoes').select('id,data,horario,comunidade,tipo, acolitos_escalas(id)').gte('data',hoje).lte('data', new Date(Date.now()+28*86400000).toISOString().slice(0,10)).order('data').order('horario'),
  ]);

  const taxas = Object.values(freqMap||{}).map(f=>f.taxa).filter(t=>t!=null);
  const freqMedia = taxas.length ? Math.round(taxas.reduce((a,b)=>a+b,0)/taxas.length) : null;

  // KPIs
  const kpiGrid = document.createElement('div'); kpiGrid.className='kpi-grid';
  [
    { label:'Membros Ativos', value: ativosR.count||0, sub:'na pastoral' },
    { label:'Freq. Média', value: freqMedia!=null ? freqMedia+'%' : '—', sub:'comparecimento' },
    { label:'Missas no Mês', value: mesR.count||0, sub:'celebrações' },
    { label:'Em Onboarding', value: crmR.count||0, sub:'no CRM' },
  ].forEach(k => {
    const c=document.createElement('div'); c.className='kpi-card';
    const l=document.createElement('div'); l.className='kpi-label'; l.textContent=k.label;
    const v=document.createElement('div'); v.className='kpi-value'; v.textContent=k.value;
    const s=document.createElement('div'); s.className='kpi-sub'; s.textContent=k.sub;
    c.append(l,v,s); kpiGrid.appendChild(c);
  });
  main.appendChild(kpiGrid);

  // Gráfico 1 — Presença por mês
  renderGraficoPresenca(main, escSeisR.data||[]);

  // Gráfico 2 — Membros por nível
  renderGraficoNiveis(main, membrosR.data||[], pmR.data||[]);

  // Gráfico 3 — Cobertura próximas escalas (donut)
  renderGraficoCobertura(main, cobR.data||[]);

  // Painel de alertas
  renderAlertas(main, freqMap||{});

  // Agenda — reaproveita as celebrações já buscadas para a cobertura (sem nova query)
  await renderAgenda(main, 'Próximas Celebrações', 6, true, cobR.data || []);

  // Acesso rápido
  const qh = document.createElement('div'); qh.className='section-head'; qh.textContent='Acesso Rápido'; main.appendChild(qh);
  const qrow = document.createElement('div'); qrow.className='quick-row';
  [
    { href:'escala.html', icon:'📅', title:'Montar Escala' },
    { href:'membros.html', icon:'👥', title:'Membros' },
    { href:'chamada.html', icon:'✅', title:'Chamada' },
    { href:'crm.html', icon:'🔄', title:'Integração' },
  ].forEach(q => {
    const a=document.createElement('a'); a.className='quick-link'; a.href=q.href;
    const ic=document.createElement('span'); ic.className='quick-link-icon'; ic.textContent=q.icon;
    const t=document.createElement('span'); t.className='quick-link-title'; t.textContent=q.title;
    a.append(ic,t); qrow.appendChild(a);
  });
  main.appendChild(qrow);
}

/* ── GRÁFICO: presença por mês ───────────────────────────────── */
function renderGraficoPresenca(main, escalas) {
  const card = document.createElement('div'); card.className='chart-card';
  const t = document.createElement('div'); t.className='chart-title'; t.textContent='Presença — últimos 6 meses'; card.appendChild(t);
  card.appendChild(buildPresencaChart(escalas)); // helper compartilhado (shared.js)
  main.appendChild(card);
}

/* ── GRÁFICO: membros por nível ──────────────────────────────── */
function renderGraficoNiveis(main, membros, pm) {
  const roleMap = {}; pm.forEach(r => roleMap[r.user_id]=r.role);
  const cont = { cerimonario:0, acolito:0, coroinha:0, aspirante:0 };
  membros.forEach(m => { const r = (m.user_id && roleMap[m.user_id]) || 'aspirante'; if (cont[r]!=null) cont[r]++; else cont.aspirante++; });
  const max = Math.max(1, ...Object.values(cont));
  const cores = { cerimonario:'#9b59d4', acolito:'var(--gold)', coroinha:'#4a90c4', aspirante:'#8a8a8a' };

  const card=document.createElement('div'); card.className='chart-card';
  const t=document.createElement('div'); t.className='chart-title'; t.textContent='Membros por nível'; card.appendChild(t);
  [['cerimonario','Cerimoniários'],['acolito','Acólitos'],['coroinha','Coroinhas'],['aspirante','Aspirantes']].forEach(([k,label])=>{
    const row=document.createElement('div'); row.className='lvl-row';
    const n=document.createElement('div'); n.className='lvl-name'; n.textContent=label;
    const tr=document.createElement('div'); tr.className='lvl-track';
    const fi=document.createElement('div'); fi.className='lvl-fill'; fi.style.width=(cont[k]/max*100)+'%'; fi.style.background=cores[k];
    tr.appendChild(fi);
    const num=document.createElement('div'); num.className='lvl-num'; num.textContent=cont[k];
    row.append(n,tr,num); card.appendChild(row);
  });
  main.appendChild(card);
}

/* ── GRÁFICO: cobertura (donut) ──────────────────────────────── */
function renderGraficoCobertura(main, celebs) {
  const cont = { completa:0, parcial:0, critica:0, vazia:0 };
  celebs.forEach(c => {
    const filled = (c.acolitos_escalas||[]).length;
    const need = c.comunidade==='santo_antonio' ? 8 : 17;
    const r = filled/need;
    if (filled===0) cont.vazia++; else if (r>=1) cont.completa++; else if (r>=0.6) cont.parcial++; else cont.critica++;
  });
  const segs = [
    { value:cont.completa, color:'var(--success)', label:'Completa' },
    { value:cont.parcial, color:'var(--warn-text)', label:'Parcial' },
    { value:cont.critica, color:'var(--danger-text)', label:'Crítica' },
    { value:cont.vazia, color:'#5a3a3a', label:'Vazia' },
  ];
  const total = segs.reduce((a,s)=>a+s.value,0);

  const card=document.createElement('div'); card.className='chart-card';
  const t=document.createElement('div'); t.className='chart-title'; t.textContent='Cobertura — próximas 4 semanas'; card.appendChild(t);
  if (!total) {
    const em=document.createElement('div'); em.style.cssText='color:var(--text-muted);font-size:12px;font-style:italic;text-align:center;padding:12px 0;'; em.textContent='Nenhuma celebração no período.'; card.appendChild(em); main.appendChild(card); return;
  }
  const wrap=document.createElement('div'); wrap.className='donut-wrap';
  wrap.appendChild(buildDonut(segs, 132));
  const leg=document.createElement('div'); leg.className='donut-legend';
  segs.forEach(s => {
    const it=document.createElement('div'); it.className='donut-leg-item';
    const dot=document.createElement('span'); dot.className='legend-dot'; dot.style.background=s.color;
    const sp=document.createElement('span'); sp.textContent=s.label+' · '+s.value; it.append(dot,sp); leg.appendChild(it);
  });
  wrap.appendChild(leg); card.appendChild(wrap); main.appendChild(card);
}

function buildDonut(segments, size) {
  const ns='http://www.w3.org/2000/svg';
  const total = segments.reduce((a,s)=>a+s.value,0)||1;
  const stroke = 18, r = (size-stroke)/2, cx=size/2, cy=size/2, circ=2*Math.PI*r;
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('viewBox','0 0 '+size+' '+size); svg.setAttribute('width',size); svg.setAttribute('height',size);
  const track=document.createElementNS(ns,'circle');
  track.setAttribute('cx',cx); track.setAttribute('cy',cy); track.setAttribute('r',r);
  track.setAttribute('fill','none'); track.setAttribute('stroke','var(--surface2)'); track.setAttribute('stroke-width',stroke);
  svg.appendChild(track);
  let offset=0;
  segments.forEach(s => {
    if (!s.value) return;
    const frac=s.value/total;
    const c=document.createElementNS(ns,'circle');
    c.setAttribute('cx',cx); c.setAttribute('cy',cy); c.setAttribute('r',r);
    c.setAttribute('fill','none'); c.setAttribute('stroke',s.color); c.setAttribute('stroke-width',stroke);
    c.setAttribute('stroke-dasharray', (frac*circ)+' '+circ);
    c.setAttribute('stroke-dashoffset', (-offset*circ));
    c.setAttribute('transform','rotate(-90 '+cx+' '+cy+')');
    svg.appendChild(c); offset += frac;
  });
  const txt=document.createElementNS(ns,'text');
  txt.setAttribute('x',cx); txt.setAttribute('y',cy+6); txt.setAttribute('text-anchor','middle');
  txt.setAttribute('fill','var(--text)'); txt.setAttribute('font-family','Cinzel,serif'); txt.setAttribute('font-size','22'); txt.setAttribute('font-weight','700');
  txt.textContent=total; svg.appendChild(txt);
  return svg;
}

/* ── ALERTAS ─────────────────────────────────────────────────── */
function renderAlertas(main, freqMap) {
  const alertas = [];
  Object.values(freqMap).forEach(f => {
    const realizadas = (f.servidas||0)+(f.faltas_just||0)+(f.faltas_nao_just||0);
    if (realizadas>=3 && f.taxa!=null && f.taxa<60) alertas.push({ ico:'⚠️', txt:'Frequência baixa em '+realizadas+' convocações ('+f.taxa+'%)' });
  });
  const card=document.createElement('div'); card.className='chart-card';
  const t=document.createElement('div'); t.className='chart-title'; t.textContent='Alertas'; card.appendChild(t);
  if (!alertas.length) {
    const ok=document.createElement('div'); ok.style.cssText='color:var(--success-text);font-size:13px;padding:6px 0;'; ok.textContent='✓ Nenhum alerta no momento.'; card.appendChild(ok);
  } else {
    alertas.slice(0,6).forEach(a => {
      const it=document.createElement('div'); it.className='alert-item';
      const ic=document.createElement('span'); ic.className='alert-ico'; ic.textContent=a.ico;
      const sp=document.createElement('span'); sp.textContent=a.txt; it.append(ic,sp); card.appendChild(it);
    });
  }
  main.appendChild(card);
}

/* ── AGENDA (compartilhada) ──────────────────────────────────── */
async function renderAgenda(main, titulo, limit, comCobertura, prefetched) {
  const head=document.createElement('div'); head.className='section-head'; head.textContent=titulo; main.appendChild(head);
  let celebs;
  if (prefetched) {
    celebs = prefetched.slice(0, limit);
  } else {
    const sel = comCobertura ? 'id,data,horario,comunidade,tipo, acolitos_escalas(id)' : 'id,data,horario,comunidade,tipo';
    const { data } = await sb.from('acolitos_celebracoes').select(sel)
      .gte('data', hojeStr()).order('data').order('horario').limit(limit);
    celebs = data;
  }
  if (!celebs?.length) {
    const em=document.createElement('span'); em.className='empty'; em.style.padding='16px 0'; em.textContent='Nenhuma celebração agendada.'; main.appendChild(em); return;
  }
  celebs.forEach(c => {
    const d=elDate(c.data);
    const item=document.createElement('div'); item.className='ev-item';
    const dt=document.createElement('div'); dt.className='ev-date';
    const dia=document.createElement('div'); dia.className='ev-dia'; dia.textContent=d.dia;
    const mes=document.createElement('div'); mes.className='ev-mes'; mes.textContent=d.mes;
    dt.append(dia,mes);
    const body=document.createElement('div'); body.className='ev-body';
    const top=document.createElement('div'); top.className='ev-top'; top.textContent=d.dow+' · '+c.horario+' · '+(c.comunidade==='matriz'?'Matriz':'Sto. Antônio');
    const sub=document.createElement('div'); sub.className='ev-sub'; sub.textContent=TIPO_LABEL[c.tipo]||c.tipo;
    body.append(top,sub);
    item.append(dt,body);
    if (comCobertura) {
      const filled=(c.acolitos_escalas||[]).length;
      const need=c.comunidade==='santo_antonio'?8:17;
      const badge=document.createElement('span'); badge.className='ev-badge';
      const r=filled/need;
      badge.textContent = filled===0?'Vazia':r>=1?'Completa':r>=0.6?'Parcial':'Crítica';
      badge.style.color = filled===0?'var(--text-muted)':r>=1?'var(--success-text)':r>=0.6?'var(--warn-text)':'var(--danger-text)';
      item.appendChild(badge);
    }
    main.appendChild(item);
  });
}

init();
