<head>

  <style>
    /* CRM status (membro novo) */
    .status-card { background:var(--surface); border:1px solid var(--gold-dim); border-radius:4px; padding:20px 16px; text-align:center; margin-bottom:20px; }
    .status-icon { font-size:40px; margin-bottom:10px; }
    .status-title { font-family:'Sora',sans-serif; font-size:16px; color:var(--gold-light); letter-spacing:1px; margin-bottom:6px; }
    .status-sub { font-size:13px; color:var(--text-muted); font-style:italic; line-height:1.5; }
    /* Greet */
    .greet-section { display:flex; align-items:center; gap:14px; margin-bottom:22px; }
    .greet-info { flex:1; min-width:0; text-align:left; }
    .greet-nome { font-family:'Sora',sans-serif; font-size:18px; font-weight:700; color:var(--text); line-height:1.15; }
    .greet-sub { font-size:12px; color:var(--text-muted); margin-top:5px; font-style:italic; line-height:1.4; }
    /* Próxima escala / agenda item */
    .ev-item { background:var(--surface); border:1px solid var(--border-wine); border-radius:4px; padding:13px 14px; margin-bottom:10px; display:flex; align-items:center; gap:12px; }
    .ev-date { text-align:center; flex-shrink:0; width:46px; }
    .ev-dia { font-family:'Sora',sans-serif; font-size:18px; font-weight:700; color:var(--gold); line-height:1; }
    .ev-mes { font-size:9px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-top:2px; }
    .ev-body { flex:1; min-width:0; }
    .ev-top { font-size:13px; color:var(--text); }
    .ev-sub { font-size:11px; color:var(--text-muted); margin-top:2px; }
    .ev-funcao { font-family:'Sora',sans-serif; font-size:11px; color:var(--gold); letter-spacing:.5px; }
    .ev-badge { font-size:9px; padding:2px 7px; border-radius:10px; font-family:'Sora',sans-serif; border:1px solid var(--border-wine); color:var(--text-muted); flex-shrink:0; }
    /* Chart cards */
    .chart-card { background:var(--surface); border:1px solid var(--border-wine); border-radius:4px; padding:16px; margin-bottom:14px; }
    .chart-title { font-family:'Sora',sans-serif; font-size:11px; font-weight:600; color:var(--gold); letter-spacing:1px; text-transform:uppercase; margin-bottom:14px; padding-bottom:8px; border-bottom:1px solid var(--border); }
    .legend-dot { width:10px; height:10px; border-radius:2px; }
    /* Níveis (barras horizontais) */
    .lvl-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
    .lvl-name { width:96px; font-size:11px; color:var(--text); font-family:'Sora',sans-serif; flex-shrink:0; }
    .lvl-track { flex:1; height:16px; background:var(--surface2); border-radius:3px; overflow:hidden; }
    .lvl-fill { height:100%; border-radius:3px; transition:width .4s; }
    .lvl-num { width:22px; text-align:right; font-size:12px; color:var(--text-muted); flex-shrink:0; }
    /* Donut */
    .donut-wrap { display:flex; align-items:center; gap:18px; flex-wrap:wrap; justify-content:center; }
    .donut-legend { display:flex; flex-direction:column; gap:8px; }
    .donut-leg-item { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text-muted); }
    /* Alertas */
    .alert-item { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); font-size:13px; color:var(--text); }
    .alert-item:last-child { border-bottom:none; }
    .alert-ico { font-size:16px; flex-shrink:0; }
    /* Quick links */
    .quick-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:6px; }
    .quick-link { background:var(--surface); border:1px solid var(--border-wine); border-radius:4px; padding:14px; display:flex; align-items:center; gap:10px; text-decoration:none; transition:border-color .2s; -webkit-tap-highlight-color:transparent; }
    .quick-link:active { border-color:var(--gold); }
    .quick-link-icon { flex-shrink:0; width:26px; height:26px; display:flex; }
    .quick-link-icon svg { width:26px; height:26px; fill:none; stroke:var(--gold); stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; filter:drop-shadow(0 0 6px var(--red-glow)); }
    .quick-link-title { font-family:'Sora',sans-serif; font-size:12px; color:var(--text); }
    .section-head { font-family:'Sora',sans-serif; font-size:13px; color:var(--text); letter-spacing:1px; margin:18px 0 12px; }
    /* Patch da home virando do nível atual pro próximo (flip 3D) — emblema completo (pips + halo) */
    .rank-top { position:relative; z-index:1; font-family:'Sora',sans-serif; font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-muted); margin-bottom:8px; }
    .rank-flip { width:82px; height:102px; margin:0 auto; perspective:800px; }
    .rank-flip-inner { position:relative; width:100%; height:100%; transform-style:preserve-3d; animation:rankFlip 11s ease-in-out infinite; }
    .rank-face { position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; display:flex; align-items:center; justify-content:center; animation:rankFaceFront 11s ease-in-out infinite; }
    .rank-face.back { transform:rotateY(180deg); animation:rankFaceBack 11s ease-in-out infinite; }
    @keyframes rankFlip { 0%,44%{transform:rotateY(0deg)} 50%,94%{transform:rotateY(180deg)} 100%{transform:rotateY(0deg)} }
    @keyframes rankFaceFront { 0%,46%{opacity:1} 47.5%,96%{opacity:0} 97.5%,100%{opacity:1} }
    @keyframes rankFaceBack { 0%,46%{opacity:0} 47.5%,96%{opacity:1} 97.5%,100%{opacity:0} }
    /* nome (estilo original) transiciona em sincronia com o flip */
    .rank-name-flip { position:relative; display:grid; justify-items:center; }
    .rank-name-flip > span { grid-area:1/1; }
    .rank-stars { text-align:center; margin-top:10px; }
    .rank-stars .rs-n { display:block; font-size:18px; letter-spacing:2px; line-height:1.2; }
    .rank-stars .rs-z { display:block; font-size:12px; color:var(--gold-dim); font-style:italic; }
    .rank-stars .rs-c { display:block; font-size:10px; color:var(--gold-light); font-weight:700; margin-top:2px; }
    .rank-stars .rs-x { display:block; font-size:9.5px; color:var(--text-muted); margin-top:3px; text-transform:uppercase; letter-spacing:.5px; }
    .rank-stars-expl { font-size:10px; color:var(--text-muted); font-style:italic; text-align:center; margin-top:10px; line-height:1.5; opacity:.85; max-width:280px; margin-left:auto; margin-right:auto; }
    .rn-cur { animation:rnCur 11s ease-in-out infinite; }
    .rn-next { animation:rnNext 11s ease-in-out infinite; }
    @keyframes rnCur { 0%,42%{opacity:1} 50%,94%{opacity:0} 100%{opacity:1} }
    @keyframes rnNext { 0%,44%{opacity:0} 52%,94%{opacity:1} 100%{opacity:0} }
    @media (prefers-reduced-motion: reduce) { .rank-flip-inner, .rank-face, .rn-cur, .rn-next { animation:none; } .rn-next, .rank-face.back { opacity:0; } }
    .rank-fill { transition:width .5s ease; }
    /* Chip "Continuar: <última tela>" (Spec D · Fase 4) */
    .continuar-chip{ display:inline-flex; align-items:center; gap:8px; margin:0 0 14px; max-width:100%;
      padding:9px 14px; border-radius:22px; text-decoration:none; box-sizing:border-box;
      background:linear-gradient(160deg, rgba(232,205,143,.14), rgba(138,106,36,.1));
      border:1px solid var(--gold-dim, #7a5a1a); color:var(--gold-light, #ffd97a);
      font-size:13px; font-weight:700; font-family:'Sora',system-ui,sans-serif; }
    .continuar-chip .cc-ic{ font-size:14px; flex-shrink:0; }
    .continuar-chip .cc-tx{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .continuar-chip:active{ background:rgba(232,205,143,.2); }

<body>
<div id="app-header"></div>
<div id="app-nav"></div>
<div class="main" id="main">
  <span class="loading">Carregando...</span>
</div>

<script src="shared.js"></script>
<script>
// EQUIPE_ROLES já vem do shared.js (redeclarar com const aqui quebrava o script)
// Splash (turíbulo) agora é centralizado no shared.js — mostrado/escondido em todas as páginas.
const CRM_ETAPAS = ['aprovacao_cadastro','integracao','whatsapp','tunica','disponivel_escala','integrado'];
const CRM_LABEL = { aprovacao_cadastro:'Aprovação', integracao:'Integração', whatsapp:'WhatsApp', tunica:'Túnica', disponivel_escala:'Disponível para Escala', integrado:'Integrado ✓' };
const CRM_DESC = {
  aprovacao_cadastro:'Seu cadastro foi recebido e está aguardando aprovação da coordenação.',
  integracao:'Em breve entraremos em contato para agendar sua reunião de integração.',
  whatsapp:'Aguardando sua confirmação de entrada nos grupos de WhatsApp.',
  tunica:'Em processo de recebimento da túnica.',
  disponivel_escala:'A equipe está registrando sua disponibilidade para as escalas.',
  integrado:'Você já está integrado! Bem-vindo à pastoral.'
};
// JORNADA/NÍVEIS vêm do shared.js (NIVEIS, nivelInfo, nivelIndex, nivelFromRole)
const ROLE_LABEL = { cerimonario:'Cerimoniário', acolito:'Acólito', coroinha:'Coroinha', aspirante:'Aspirante', membro_equipe:'Equipe', subadmin:'Sub-Admin', coord_admin:'Coordenador' };
const FUNCAO_LABEL = { apoio:'Apoio', cruz:'Cruz', vela:'Vela', sineta:'Sineta', sinao:'Sinão', altar:'Altar', turibulo:'Turíbulo', naveta:'Naveta', missal:'Missal', cred_altar:'Cerimoniário Altar', cred_credencia:'Cerimoniário Credência', mitra:'Mitra', baculo:'Báculo' };
const TIPO_LABEL = { missa_comum:'Missa', solenidade:'Solenidade', casamento:'Casamento', batizado:'Batizado', crisma:'Crisma', ordenacao:'Ordenação' };
const DIAS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const MES = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

const hojeStr = () => new Date().toISOString().slice(0,10);
const elDate = d => { const dt = new Date(d+'T00:00:00'); return { dia: dt.getDate(), mes: MES[dt.getMonth()], dow: DIAS[dt.getDay()] }; };

let moduloId = null;

async function init() {
  const ctx = await initModulo();
  if (!ctx) return;
  mergeTiposLabel(TIPO_LABEL); // tipos customizados do Config
  renderHeader(ctx, 'home');
  const role = ctx.membership?.role;
  renderBottomNav(ctx, 'home');
  const { data: mod } = await sb.from('pastoral_modules').select('id').eq('slug','acolitos').maybeSingle();
  moduloId = mod?.id || null;

  const mode = navMode(ctx);
  if (!ctx.membership || role === 'novo') await renderStatusCrm(ctx);
  else if (mode === 'coordenacao') await renderDashboardEquipe(ctx);
  else await renderDashboardMembro(ctx);
  // depois do conteúdo montar (cada render limpa #main); senão o chip/banner seriam apagados.
  renderContinuar(ctx);
  renderAvisoAusencias();
}

// Chip "▸ Continuar: <última tela>" no topo da Home (Spec D · Fase 4).
// Só aparece se: há última tela conhecida, não é a própria Home, e o usuário pode acessá-la.
// Sem redirect automático — é só um atalho clicável.
function renderContinuar(ctx){
  let u; try{ u = JSON.parse(localStorage.getItem('ultima-tela')||'null'); }catch(e){ u=null; }
  if(!u || !u.href || !u.label) return;
  const caps = (typeof navCaps==='function') ? navCaps(ctx) : null;
  const COORD = { 'membros.html':'membros','escala.html':'escala','crm.html':'crm','tesouraria.html':'tesouraria','casas.html':'casas' };
  const permKey = COORD[u.href];
  if(permKey){                              // tela de coordenação: exige permissão
    if(!caps || !caps.perms || caps.perms.indexOf(permKey)===-1) return;
  }
  const main = document.getElementById('main');
  if(!main) return;
  const chip = document.createElement('a');
  chip.href = u.href; chip.className = 'continuar-chip';
  const ic = document.createElement('span'); ic.className = 'cc-ic'; ic.textContent = '▸';
  const tx = document.createElement('span'); tx.className = 'cc-tx'; tx.textContent = 'Continuar: ' + u.label;
  chip.append(ic, tx);
  if(main.firstChild) main.insertBefore(chip, main.firstChild);
  else main.appendChild(chip);
}

// Banner na Home: avisos de ausência aguardando confirmação (só p/ aprovadores).
async function renderAvisoAusencias(){
  const { data } = await sb.rpc('acolitos_ausencia_pendente_count');
  const n = (typeof data === 'number') ? data : 0;
  if(!n) return;
  const main = document.getElementById('main');
  if(!main) return;
  const a = document.createElement('a');
  a.href = 'ausencias.html';
  a.style.cssText='display:flex;align-items:center;gap:10px;text-decoration:none;background:#33181f;border:1px solid var(--gold,#8a6a24);border-radius:12px;padding:11px 13px;margin:0 0 12px;color:var(--text);';
  a.innerHTML = '<span style="font-size:18px">📋</span>'
    + '<span style="flex:1;font-size:13px"><b style="color:var(--gold-light,#ffd97a)">'
    + n + ' aviso(s) de ausência</b> aguardando sua confirmação</span>'
    + '<span style="color:var(--gold-light,#ffd97a);font-weight:800">›</span>';
  main.insertBefore(a, main.firstChild);
}

/* ── STATUS CRM ──────────────────────────────────────────────── */
async function renderStatusCrm(ctx) {
  const main = document.getElementById('main'); main.textContent = '';
  let etapa = 'aprovacao_cadastro';
  if (ctx.membro) {
    const { data: crm } = await sb.from('acolitos_crm').select('etapa').eq('membro_id', ctx.membro.id).maybeSingle();
    if (crm) etapa = crm.etapa;
  }
  const card = document.createElement('div'); card.className = 'status-card';
  const icon = document.createElement('div'); icon.className = 'status-icon'; icon.textContent = '⛪';
  const title = document.createElement('div'); title.className = 'status-title'; title.textContent = 'Sua Integração na Pastoral';
  const sub = document.createElement('div'); sub.className = 'status-sub'; sub.textContent = CRM_DESC[etapa];
  card.append(icon, title, sub); main.appendChild(card);

  const track = document.createElement('div'); track.className = 'jornada-track';
  const idx = CRM_ETAPAS.indexOf(etapa);
  CRM_ETAPAS.forEach((e,i) => {
    const step = document.createElement('div'); step.className = 'jornada-step';
    const dot = document.createElement('div'); dot.className = 'jornada-dot' + (i<idx?' done':i===idx?' current':'');
    dot.textContent = i<idx?'✓':String(i+1);
    const lbl = document.createElement('div'); lbl.className = 'jornada-label' + (i===idx?' current':''); lbl.textContent = CRM_LABEL[e].split(' ')[0];
    step.append(dot,lbl); track.appendChild(step);
    if (i<CRM_ETAPAS.length-1) { const line=document.createElement('div'); line.className='jornada-line'+(i<idx?' done':''); track.appendChild(line); }
  });
  main.appendChild(track);
  const info = document.createElement('p');
  info.style.cssText = 'color:var(--text-muted);font-size:12px;text-align:center;font-style:italic;margin-top:12px;';
  info.textContent = 'Em caso de dúvidas, entre em contato com a equipe da pastoral.';
  main.appendChild(info);
}

/* ── LEVEL-UP (celebração ao avançar de nível) ──────────────── */
// A detecção e o disparo (com prioridade) ficam na fila de notificações do shared.js;
// aqui só definimos showLevelUp(), que a fila chama na home.

// Renderiza o emblema (SVG) como imagem para uso em canvas
function svgToImage(svgStr) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgStr)));
  });
}

// Gera imagem 9:16 (stories) da conquista e compartilha (ou baixa como fallback)
async function shareLevelUp(nivel, nome, btn) {
  const info = nivelInfo(nivel);
  if (btn) { btn.disabled = true; btn.textContent = 'Gerando...'; }
  const W = 1080, H = 1920;
  const cv = document.createElement('canvas'); cv.width = W; cv.height = H;
  const x = cv.getContext('2d');
  try { await document.fonts.ready; } catch (e) {}
  // Fundo
  const g = x.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#1c0407'); g.addColorStop(.5, '#2c0a10'); g.addColorStop(1, '#080203');
  x.fillStyle = g; x.fillRect(0, 0, W, H);
  // Halo
  const cx = W / 2, cy = 720;
  const rg = x.createRadialGradient(cx, cy, 30, cx, cy, 460);
  rg.addColorStop(0, 'rgba(224,18,40,.55)'); rg.addColorStop(.6, 'rgba(224,18,40,.12)'); rg.addColorStop(1, 'rgba(224,18,40,0)');
  x.fillStyle = rg; x.beginPath(); x.arc(cx, cy, 460, 0, Math.PI * 2); x.fill();
  // Emblema
  try { const img = await svgToImage(getNivelSvg(nivel, 600)); x.drawImage(img, cx - 300, cy - 320, 600, 600); } catch (e) {}
  x.textAlign = 'center';
  const fit = (txt, max, size) => { let s = size; x.font = '800 ' + s + 'px Sora, sans-serif'; while (x.measureText(txt).width > max && s > 28) { s -= 4; x.font = '800 ' + s + 'px Sora, sans-serif'; } };
  // Topo
  x.fillStyle = 'rgba(255,255,255,.6)'; x.font = '600 30px Sora, sans-serif';
  x.fillText('ACÓLITOS & COROINHAS · JCBP LIMEIRA', cx, 120);
  // Tag + nome
  x.fillStyle = '#e8b94a'; x.font = '700 40px Sora, sans-serif'; x.fillText('★ NÍVEL ALCANÇADO ★', cx, 1240);
  if (nome) { x.fillStyle = 'rgba(255,255,255,.85)'; x.font = '600 40px Sora, sans-serif'; x.fillText(nome, cx, 1320); }
  // Nível
  fit(info.label.toUpperCase(), W - 120, 96); x.fillStyle = '#fff'; x.fillText(info.label.toUpperCase(), cx, 1430);
  // Título conquistado
  if (info.titulo) {
    x.fillStyle = '#e8b94a'; x.font = 'italic 600 50px Sora, sans-serif';
    let t = '“' + info.titulo + '”', ts = 50;
    while (x.measureText(t).width > W - 120 && ts > 26) { ts -= 3; x.font = 'italic 600 ' + ts + 'px Sora, sans-serif'; }
    x.fillText(t, cx, 1530);
  }
  // Rodapé
  x.fillStyle = 'rgba(255,255,255,.45)'; x.font = '500 30px Sora, sans-serif';
  x.fillText('Servos do Altar · coroinhas.jcbplimeira.com.br', cx, 1830);

  const blob = await new Promise(res => cv.toBlob(res, 'image/png', .92));
  const file = new File([blob], 'conquista.png', { type: 'image/png' });
  const data = { files: [file], title: 'Minha conquista', text: 'Avancei na minha jornada como ' + info.label + '! 🙏' };
  try {
    if (navigator.canShare && navigator.canShare({ files: [file] })) { await navigator.share(data); }
    else { const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'conquista.png'; a.click(); URL.revokeObjectURL(url); }
  } catch (e) { /* usuário cancelou */ }
  if (btn) { btn.disabled = false; btn.textContent = '📲 Compartilhar'; }
}

function showLevelUp(nivel, nome, done) {
  try { if (typeof _celebrate === 'function') _celebrate(playLevelUpSound); } catch (e) {}
  const info = nivelInfo(nivel);
  const ov = document.createElement('div'); ov.className = 'levelup-overlay';
  const card = document.createElement('div'); card.className = 'levelup-card';
  const rays = document.createElement('div'); rays.className = 'levelup-rays';
  const burst = document.createElement('div'); burst.className = 'levelup-burst';
  const flash = document.createElement('div'); flash.className = 'levelup-flash';
  const patchWrap = document.createElement('div'); patchWrap.className = 'levelup-patchwrap';
  const ring = document.createElement('div'); ring.className = 'levelup-ring';
  const rsparks = document.createElement('div'); rsparks.className = 'levelup-rsparks';
  for (let i = 0; i < 14; i++) {
    const ang = (i / 14) * Math.PI * 2, r = 86 + Math.random() * 26;
    const sp = document.createElement('i');
    sp.style.setProperty('--dx', (Math.cos(ang) * r).toFixed(0) + 'px');
    sp.style.setProperty('--dy', (Math.sin(ang) * r).toFixed(0) + 'px');
    sp.style.animationDelay = (0.3 + Math.random() * 0.15).toFixed(2) + 's';
    rsparks.appendChild(sp);
  }
  const patch = document.createElement('div'); patch.className = 'levelup-patch';
  patch.appendChild(buildRankEmblem(nivel, 132));
  patchWrap.append(ring, rsparks, patch);
  const tag = document.createElement('div'); tag.className = 'levelup-tag'; tag.textContent = 'NÍVEL ALCANÇADO';
  const cong = document.createElement('div'); cong.className = 'levelup-congrats'; cong.textContent = 'Parabéns!';
  const txt = document.createElement('div'); txt.className = 'levelup-text'; txt.textContent = 'Você avançou na sua jornada';
  const rank = document.createElement('div'); rank.className = 'levelup-rank'; rank.textContent = info.label;
  const tit = document.createElement('div'); tit.className = 'levelup-titulo'; tit.textContent = info.titulo ? '🏆 ' + info.titulo : '';
  const share = document.createElement('button'); share.className = 'levelup-btn share'; share.textContent = '📲 Compartilhar';
  share.onclick = () => shareLevelUp(nivel, nome || '', share);
  const btn = document.createElement('button'); btn.className = 'levelup-btn ghost'; btn.textContent = 'Continuar';
  btn.onclick = () => { ov.classList.add('closing'); setTimeout(() => { ov.remove(); if (typeof done === 'function') done(); }, 300); };

/* ── RANK PROGRESS (nível atual animado + jornada de 10 níveis) ─ */
const _JOR_ICON = { aspirante:'✦', coroinha:'♛', acolito:'⊕', cerimonario:'✵' };
function renderRankProgress(main, nivel, membro) {
  const idx = Math.max(0, nivelIndex(nivel));
  const cur = NIVEIS[idx], next = NIVEIS[idx + 1];
  const pct = Math.round(((idx + 1) / NIVEIS.length) * 100);

  const card = document.createElement('div'); card.className = 'rank-card';
  const patch = document.createElement('div'); patch.className = 'rank-patch';
  if (next) {
    // flip 3D: patch do nível atual virando o do próximo
    const flip = document.createElement('div'); flip.className = 'rank-flip';
    const inner = document.createElement('div'); inner.className = 'rank-flip-inner';
    const fa = document.createElement('div'); fa.className = 'rank-face'; fa.appendChild(buildRankEmblem(nivel, 82));
    const fb = document.createElement('div'); fb.className = 'rank-face back'; fb.appendChild(buildRankEmblem(next.slug, 82));
    inner.append(fa, fb); flip.appendChild(inner); patch.appendChild(flip);
  } else {
    patch.appendChild(buildRankEmblem(nivel, 82));
  }
  const name = document.createElement('div'); name.className = 'rank-name';
  if (next) {
    name.classList.add('rank-name-flip');
    const s1 = document.createElement('span'); s1.className = 'rn-cur'; s1.textContent = cur.label;
    const s2 = document.createElement('span'); s2.className = 'rn-next'; s2.textContent = next.label;
    name.append(s1, s2);
  } else { name.textContent = cur.label; }
  const tit = document.createElement('div'); tit.className = 'rank-titulo'; tit.textContent = cur.titulo ? '🏆 ' + cur.titulo : '';
  const nx = document.createElement('div'); nx.className = 'rank-next';
  nx.textContent = next ? 'Próximo nível: ' + next.label : 'Nível máximo · Cerimoniário Mor';
  const bar = document.createElement('div'); bar.className = 'rank-bar';
  const fill = document.createElement('div'); fill.className = 'rank-fill'; fill.style.setProperty('--pct', (next ? 0 : 100) + '%');
  bar.appendChild(fill);
  const xpLine = document.createElement('div'); xpLine.style.cssText = 'font-family:Sora,sans-serif;font-weight:700;font-size:11.5px;color:var(--gold-light);margin-top:7px;text-shadow:0 0 8px var(--red-glow);';
  const top = document.createElement('div'); top.className = 'rank-top';
  if (next) {
    top.classList.add('rank-name-flip');
    const t1 = document.createElement('span'); t1.className = 'rn-cur'; t1.textContent = 'Meu nível';
    const t2 = document.createElement('span'); t2.className = 'rn-next'; t2.textContent = 'Meu próximo nível';
    top.append(t1, t2);
  } else { top.textContent = 'Meu nível'; }
  const stars = document.createElement('div'); stars.className = 'rank-stars';
  const starsExpl = document.createElement('div'); starsExpl.className = 'rank-stars-expl';
  starsExpl.textContent = 'As estrelas mostram o quanto você está empenhado em evoluir e ser um bom servo do altar. Cada esforço conta. 🌟';
  card.append(top, patch, name, tit, nx, bar, xpLine, stars, starsExpl);
  main.appendChild(card);

  // estrelas: micro-progressão DENTRO do nível atual (XP de missões desde que subiu)
  if (membro) (async () => {
    try {
      const { data } = await sb.rpc('acolitos_estrelas', { p_membro: membro.id });
      if (data && !data.erro) {
        const n = Number(data.estrelas) || 0;
        const cheias = n > 0 ? '⭐'.repeat(Math.min(n, 5)) + (n > 5 ? ' ×' + n : '') : '';
        stars.innerHTML = (n > 0
          ? '<span class="rs-n">' + cheias + '</span><span class="rs-c">' + n + ' estrela' + (n > 1 ? 's' : '') + ' conquistada' + (n > 1 ? 's' : '') + ' neste nível</span>'
          : '<span class="rs-z">Primeira estrela a caminho ✨</span>')
          + '<span class="rs-x">faltam ' + data.xp_prox + ' XP pra próxima ⭐</span>';
        const key = 'estrelas-vistas-' + membro.id;
        const prev = parseInt(localStorage.getItem(key) || '-1', 10);
        if (prev < 0) localStorage.setItem(key, String(n));
        else if (n > prev) { localStorage.setItem(key, String(n)); setTimeout(() => { if (typeof showStarUp === 'function') showStarUp(n); }, 700); }
      }
    } catch (e) {}
  })();

  // barra + texto espelham o board de Missões (mesmo progresso de missões obrigatórias + XP)
  if (membro && next) (async () => {
    try {
      const { data } = await sb.rpc('acolitos_missoes_board', { p_membro: membro.id, p_niveis: NIVEIS.map(n => n.slug) });
      if (data && data.proximo_nivel) {
        const caps = data.capitulos || [];
        const tot = caps.length, fez = caps.filter(c => c.completo).length;
        fill.style.setProperty('--pct', (tot ? Math.round(100 * fez / tot) : 0) + '%');
        nx.textContent = 'Próximo: ' + nivelInfo(data.proximo_nivel).label + '  ·  ' + fez + '/' + tot + ' capítulos';
        xpLine.textContent = '✦ ' + data.xp_total + ' XP adquiridos na Jornada Principal';
      }
    } catch (e) {}
  })();

  // Botões "O caminho" e "Meu Desenvolvimento" — acima da trilha, estendidos (full-width)
  const btnRow = document.createElement('div'); btnRow.style.cssText = 'display:flex;gap:8px;margin:2px 0 14px;';
  const verBtn = document.createElement('button'); verBtn.className = 'btn-sm gold'; verBtn.style.flex = '1'; verBtn.textContent = 'O caminho ▸';
  verBtn.onclick = () => showJornada(nivel);
  btnRow.appendChild(verBtn);
  main.appendChild(btnRow);

  // Jornada em grade 3 colunas (colapsável) — 10º nível centralizado
  const jorToggle = document.createElement('button'); jorToggle.className = 'jor-toggle';
  const grid = document.createElement('div'); grid.className = 'jornada-grid';
  const hint = document.createElement('div'); hint.className = 'jor-hint'; hint.textContent = '↳ Sua trilha — siga do nível 1 ao 10';
  grid.appendChild(hint);
  // Trilha em S (serpentina) gerada dinamicamente p/ N níveis (3 colunas) — reproduz o caminho clássico.
  const _N = NIVEIS.length, _cols = 3;
  const serp = []; const linkRight = new Set(); const linkDown = new Set();
  let _r = 0;
  for (let base = 0; base < _N; base += _cols, _r++) {
    const k = Math.min(_cols, _N - base);
    let idxs = []; for (let c = 0; c < k; c++) idxs.push(base + c);
    const par = (_r % 2) === 1; // fileira ímpar inverte (vai da direita p/ esquerda)
    if (par) idxs.reverse();
    const startP = serp.length;
    idxs.forEach(li => serp.push(li));
    for (let c = 0; c < k - 1; c++) linkRight.add(startP + c); // conector horizontal entre células da fileira
    // conector "down" no ponto de virada — fileira par vira na direita (última célula), ímpar na esquerda (primeira)
    const nextBase = base + _cols;
    if (nextBase < _N) {
      const nextK = Math.min(_cols, _N - nextBase);
      const turnPos = par ? startP : (startP + k - 1);  // posição da célula que vira
      if (nextK > 1) linkDown.add(turnPos);              // se a próxima fileira é só 1 célula (centralizada), não desenha (não alinha)
    }
  }
  serp.forEach((li, p) => {
    const j = NIVEIS[li];
    const state = li < idx ? 'done' : li === idx ? 'atual' : 'locked';
    let cls = 'jor-cell ' + state;
    if (linkRight.has(p)) cls += ' link-right';
    if (linkDown.has(p)) cls += ' link-down';
    const cell = document.createElement('div'); cell.className = cls;
    const num = document.createElement('span'); num.className = 'jor-num ' + state; num.textContent = String(li + 1);
    const emb = document.createElement('div'); emb.className = 'jor-emb';
    emb.innerHTML = getNivelSvg(j.slug, 48); // SVG hardcoded — seguro
    const lbl = document.createElement('div'); lbl.className = 'jornada-label' + (li === idx ? ' current' : ''); lbl.textContent = j.label;
    cell.append(num, emb);
    const pr = pipRowEl(j.slug, 34); if (pr) cell.appendChild(pr); // pips animados abaixo do patch
    cell.appendChild(lbl); grid.appendChild(cell);
  });
  function setJorCollapsed(c) {
    grid.style.display = c ? 'none' : 'grid';
    jorToggle.textContent = c ? '▸  Mostrar minha jornada' : '▾  Ocultar minha jornada';
    localStorage.setItem('jor-collapsed', c ? '1' : '0');
  }
  jorToggle.onclick = () => setJorCollapsed(grid.style.display !== 'none');
  main.append(jorToggle, grid);
  setJorCollapsed(localStorage.getItem('jor-collapsed') === '1');
}

/* ── JORNADA DETALHADA (modal clicável) ──────────────────────── */
function showJornada(nivelAtual) {
  const idxAtual = nivelIndex(nivelAtual);
  const ov = document.createElement('div'); ov.className = 'modal-overlay open';
  ov.onclick = (e) => { if (e.target === ov) ov.remove(); };
  const modal = document.createElement('div'); modal.className = 'modal';
  const handle = document.createElement('div'); handle.className = 'modal-handle';
  const tt = document.createElement('div'); tt.className = 'modal-title'; tt.textContent = 'Sua Jornada';
  const sub = document.createElement('p'); sub.style.cssText = 'font-size:12px;color:var(--text-muted);margin:-8px 0 14px;font-weight:600;';
  sub.textContent = 'Toque em cada nível para ver os detalhes.';
  modal.append(handle, tt, sub);

  NIVEIS.forEach((n, i) => {
    const status = i < idxAtual ? 'done' : i === idxAtual ? 'atual' : 'futuro';
    const row = document.createElement('div'); row.className = 'jor-row ' + status;
    const head = document.createElement('div'); head.className = 'jor-head';
    const em = document.createElement('span'); em.className = 'jor-emoji';
    em.appendChild(buildRankEmblem(n.slug, 46)); // patch reluzente do nível
    const nm = document.createElement('div'); nm.className = 'jor-nome'; nm.textContent = n.label;
    const st = document.createElement('span'); st.className = 'jor-status ' + status;
    st.textContent = status === 'done' ? '✓' : status === 'atual' ? 'VOCÊ ESTÁ AQUI' : '🔒';
    head.append(em, nm, st);
    const det = document.createElement('div'); det.className = 'jor-det' + (status === 'atual' ? ' open' : '');
    const intro = document.createElement('p'); intro.className = 'jor-intro'; intro.textContent = n.intro;
    det.appendChild(intro);
    if (n.titulo) { const tt2 = document.createElement('div'); tt2.className = 'jor-titulo'; tt2.textContent = '🏆 Título: ' + n.titulo; det.appendChild(tt2); }
    [['Missão', n.missao], ['Desafio', n.desafio], [i === NIVEIS.length - 1 ? 'Conquista final' : 'Próximo objetivo', n.proximo]].forEach(([k, v]) => {
      if (!v) return;
      const d = document.createElement('div'); d.className = 'jor-kv';
      const ks = document.createElement('span'); ks.className = 'jor-k'; ks.textContent = k;
      const vs = document.createElement('span'); vs.className = 'jor-v'; vs.textContent = v;
      d.append(ks, vs); det.appendChild(d);
    });
    head.onclick = () => det.classList.toggle('open');
    row.append(head, det); modal.appendChild(row);
  });

  const close = document.createElement('button'); close.className = 'btn gold'; close.style.marginTop = '16px';
  close.textContent = 'Fechar'; close.onclick = () => ov.remove();
  modal.appendChild(close);
  ov.appendChild(modal); document.body.appendChild(ov);
}

    { href:'escala.html', icon:'calendar', title:'Montar Escala' },
    { href:'membros.html', icon:'users', title:'Membros' },
    { href:'chamada.html', icon:'message-circle', title:'Chamada' },
    { href:'crm.html', icon:'shuffle', title:'Integração' },
  ].forEach(q => {
    const a=document.createElement('a'); a.className='quick-link'; a.href=q.href;
    const ic=document.createElement('span'); ic.className='quick-link-icon'; ic.innerHTML=_svgIcon(q.icon); // SVG hardcoded — seguro
    const t=document.createElement('span'); t.className='quick-link-title'; t.textContent=q.title;
    a.append(ic,t); qrow.appendChild(a);
  });
  if (navCaps(ctx).isAdmin) {
    const av=document.createElement('button'); av.type='button'; av.className='quick-link'; av.style.cssText='border:none;cursor:pointer;font:inherit;';
    const aic=document.createElement('span'); aic.className='quick-link-icon'; aic.innerHTML=_svgIcon('message-circle'); // SVG hardcoded — seguro
    const at=document.createElement('span'); at.className='quick-link-title'; at.textContent='Avisar todos';
    av.append(aic,at); av.onclick=()=>avisarTodos(); qrow.appendChild(av);
  }
  main.appendChild(qrow);
}

/* ── GRÁFICO: presença por mês ───────────────────────────────── */
async function renderCaixaHome(main) {
  const { data } = await sb.from('acolitos_financeiro').select('tipo,valor,data');
  const lanc = data || [];
  const saldo = lanc.reduce((s, l) => s + (l.tipo === 'entrada' ? 1 : -1) * Number(l.valor), 0);
  const hoje = new Date(); const ym = hoje.getFullYear() + '-' + String(hoje.getMonth() + 1).padStart(2, '0');
  const mes = lanc.filter(l => (l.data || '').slice(0, 7) === ym);
  const ent = mes.filter(l => l.tipo === 'entrada').reduce((s, l) => s + Number(l.valor), 0);
  const sai = mes.filter(l => l.tipo === 'saida').reduce((s, l) => s + Number(l.valor), 0);
  const brl = v => Number(v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

  const card = document.createElement('a'); card.href = 'tesouraria.html'; card.className = 'chart-card'; card.style.cssText = 'display:block;text-decoration:none;';
  const t = document.createElement('div'); t.className = 'chart-title'; t.textContent = 'Caixa — Tesouraria ▸'; card.appendChild(t);
  const row = document.createElement('div'); row.style.cssText = 'display:flex;justify-content:space-between;align-items:flex-end;gap:10px;';
  const s = document.createElement('div');
  const sl = document.createElement('div'); sl.style.cssText = 'font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;'; sl.textContent = 'Saldo em caixa';
  const sv = document.createElement('div'); sv.style.cssText = 'font-family:Oxanium,sans-serif;font-size:26px;font-weight:800;color:' + (saldo >= 0 ? 'var(--gold-light)' : 'var(--danger-text)') + ';'; sv.textContent = brl(saldo);
  s.append(sl, sv);
  const m = document.createElement('div'); m.style.cssText = 'text-align:right;line-height:1.5;';
  const me = document.createElement('div'); me.style.cssText = 'font-size:12px;color:var(--success-text);font-weight:700;'; me.textContent = '+ ' + brl(ent);
  const ms = document.createElement('div'); ms.style.cssText = 'font-size:12px;color:var(--danger-text);font-weight:700;'; ms.textContent = '− ' + brl(sai);
  const ml = document.createElement('div'); ml.style.cssText = 'font-size:10px;color:var(--text-muted);'; ml.textContent = 'no mês';
  m.append(me, ms, ml); row.append(s, m); card.appendChild(row);
  main.appendChild(card);
}

function renderGraficoPresenca(main, escalas) {
  const card = document.createElement('div'); card.className='chart-card';
  const t = document.createElement('div'); t.className='chart-title'; t.textContent='Presença — últimos 6 meses'; card.appendChild(t);
  card.appendChild(buildPresencaChart(escalas)); // helper compartilhado (shared.js)
  main.appendChild(card);
}

/* ── GRÁFICO: membros por nível ──────────────────────────────── */
function renderGraficoNiveis(main, membros, pm) {
  const roleMap = {}; pm.forEach(r => roleMap[r.user_id]=r.role);
  const cont = {}, porNivel = {}; NIVEIS.forEach(n => { cont[n.slug] = 0; porNivel[n.slug] = []; });
  membros.forEach(m => {
    const role = (m.user_id && roleMap[m.user_id]) || 'aspirante';
    const slug = (m.nivel && cont[m.nivel] != null) ? m.nivel : nivelFromRole(role);
    cont[slug] = (cont[slug] || 0) + 1;
    (porNivel[slug] = porNivel[slug] || []).push(m);
  });

  const card=document.createElement('div'); card.className='chart-card';
  const t=document.createElement('div'); t.className='chart-title'; t.textContent='Membros por nível'; card.appendChild(t);
  const grid=document.createElement('div'); grid.className='niveis-grid';
  NIVEIS.forEach(n => {
    const cell=document.createElement('div'); cell.className='nivel-cell' + (cont[n.slug] ? '' : ' vazio');
    const emb=document.createElement('div'); emb.className='nivel-emb'; emb.innerHTML=getNivelSvg(n.slug, 42); // SVG hardcoded — seguro
    const cnt=document.createElement('div'); cnt.className='nivel-cnt'; cnt.textContent=cont[n.slug];
    const lbl=document.createElement('div'); lbl.className='nivel-lbl'; lbl.textContent=n.label;
    cell.append(emb);
    const pr=pipRowEl(n.slug, 30); if(pr) cell.appendChild(pr); // pips animados abaixo do patch
    cell.append(cnt, lbl);
    if (cont[n.slug]) { cell.style.cursor='pointer'; cell.title='Ver membros'; cell.onclick=()=>abrirNivelMembros(n, porNivel[n.slug]); }
    grid.appendChild(cell);
  });
  card.appendChild(grid);
  main.appendChild(card);
}

function abrirNivelMembros(n, lista) {
  const ov = document.createElement('div'); ov.className='modal-overlay open';
  ov.onclick = (e) => { if (e.target === ov) ov.remove(); };
  const modal = document.createElement('div'); modal.className='modal'; modal.style.maxWidth='400px';
  const handle = document.createElement('div'); handle.className='modal-handle'; modal.appendChild(handle);
  const head = document.createElement('div'); head.style.cssText='display:flex;align-items:center;gap:12px;margin-bottom:12px;';
  head.appendChild(buildRankEmblem(n.slug, 50));
  const ht = document.createElement('div');
  const hn = document.createElement('div'); hn.style.cssText='font-family:Sora,sans-serif;font-weight:700;font-size:16px;color:var(--text);'; hn.textContent=n.label;
  const hc = document.createElement('div'); hc.style.cssText='font-size:12px;color:var(--text-muted);'; hc.textContent=lista.length+' membro'+(lista.length>1?'s':'')+(n.titulo?' · 🏆 '+n.titulo:'');
  ht.append(hn, hc); head.appendChild(ht); modal.appendChild(head);

  const box = document.createElement('div'); box.style.cssText='max-height:60vh;overflow-y:auto;';
  lista.slice().sort((a,b)=>(a.nome||'').localeCompare(b.nome||'')).forEach(m => {
    const row = document.createElement('div'); row.style.cssText='display:flex;align-items:center;gap:10px;padding:7px 4px;border-bottom:1px solid var(--border);';
    row.appendChild(buildAvatarEl(m.foto_url, nivelInfo(n.slug).base, 34, { nivelSlug: n.slug }));
    const info = document.createElement('div'); info.style.cssText='flex:1;min-width:0;';
    const nm = document.createElement('div'); nm.style.cssText='font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;'; nm.textContent = m.apelido || m.nome;
    const cm = document.createElement('div'); cm.style.cssText='font-size:11px;color:var(--text-muted);'; cm.textContent = m.comunidade==='matriz'?'Matriz':(m.comunidade==='santo_antonio'?'Sto. Antônio':'Outra');
    info.append(nm, cm); row.appendChild(info);
    box.appendChild(row);
  });
  modal.appendChild(box);
  const close = document.createElement('button'); close.className='btn-sm gray'; close.style.cssText='margin-top:14px;width:100%;'; close.textContent='Fechar'; close.onclick=()=>ov.remove();
  modal.appendChild(close);
  ov.appendChild(modal); document.body.appendChild(ov);
}

/* ── GRÁFICO: cobertura (donut) ──────────────────────────────── */
function renderGraficoCobertura(main, celebs) {
  const cont = { completa:0, parcial:0, critica:0, vazia:0 };
  celebs.forEach(c => {
    const filled = (c.acolitos_escalas||[]).length;
    const need = c.comunidade==='santo_antonio' ? 8 : 17;
    const r = filled/need;
    if (filled===0) cont.vazia++; else if (r>=1) cont.completa++; else if (r>=0.6) cont.parcial++; else cont.critica++;
  });
  const segs = [
    { value:cont.completa, color:'var(--success)', label:'Completa' },
    { value:cont.parcial, color:'var(--warn-text)', label:'Parcial' },
    { value:cont.critica, color:'var(--danger-text)', label:'Crítica' },
    { value:cont.vazia, color:'#5a3a3a', label:'Vazia' },
  ];
  const total = segs.reduce((a,s)=>a+s.value,0);

  const card=document.createElement('div'); card.className='chart-card';
  const t=document.createElement('div'); t.className='chart-title'; t.textContent='Cobertura — próximas 4 semanas'; card.appendChild(t);
  if (!total) {
    const em=document.createElement('div'); em.style.cssText='color:var(--text-muted);font-size:12px;font-style:italic;text-align:center;padding:12px 0;'; em.textContent='Nenhuma celebração no período.'; card.appendChild(em); main.appendChild(card); return;
  }
  const wrap=document.createElement('div'); wrap.className='donut-wrap';
  wrap.appendChild(buildDonut(segs, 132));
  const leg=document.createElement('div'); leg.className='donut-legend';
  segs.forEach(s => {
    const it=document.createElement('div'); it.className='donut-leg-item';
    const dot=document.createElement('span'); dot.className='legend-dot'; dot.style.background=s.color;
    const sp=document.createElement('span'); sp.textContent=s.label+' · '+s.value; it.append(dot,sp); leg.appendChild(it);
  });
  wrap.appendChild(leg); card.appendChild(wrap); main.appendChild(card);
}

function buildDonut(segments, size) {
  const ns='http://www.w3.org/2000/svg';
  const total = segments.reduce((a,s)=>a+s.value,0)||1;
  const stroke = 18, r = (size-stroke)/2, cx=size/2, cy=size/2, circ=2*Math.PI*r;
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('viewBox','0 0 '+size+' '+size); svg.setAttribute('width',size); svg.setAttribute('height',size);
  const track=document.createElementNS(ns,'circle');
  track.setAttribute('cx',cx); track.setAttribute('cy',cy); track.setAttribute('r',r);
  track.setAttribute('fill','none'); track.setAttribute('stroke','var(--surface2)'); track.setAttribute('stroke-width',stroke);
  svg.appendChild(track);
  let offset=0;
  segments.forEach(s => {
    if (!s.value) return;
    const frac=s.value/total;
    const c=document.createElementNS(ns,'circle');
    c.setAttribute('cx',cx); c.setAttribute('cy',cy); c.setAttribute('r',r);
    c.setAttribute('fill','none'); c.setAttribute('stroke',s.color); c.setAttribute('stroke-width',stroke);
    c.setAttribute('stroke-dasharray', (frac*circ)+' '+circ);
    c.setAttribute('stroke-dashoffset', (-offset*circ));
    c.setAttribute('transform','rotate(-90 '+cx+' '+cy+')');
    svg.appendChild(c); offset += frac;
  });
  const txt=document.createElementNS(ns,'text');
  txt.setAttribute('x',cx); txt.setAttribute('y',cy+6); txt.setAttribute('text-anchor','middle');
  txt.setAttribute('fill','var(--text)'); txt.setAttribute('font-family','Sora,sans-serif'); txt.setAttribute('font-size','22'); txt.setAttribute('font-weight','700');
  txt.textContent=total; svg.appendChild(txt);
  return svg;
}

/* ── ALERTAS ─────────────────────────────────────────────────── */
function renderAlertas(main, freqMap) {
  const alertas = [];
  Object.values(freqMap).forEach(f => {
    const realizadas = (f.servidas||0)+(f.faltas_just||0)+(f.faltas_nao_just||0);
    if (realizadas>=3 && f.taxa!=null && f.taxa<60) alertas.push({ ico:'⚠️', txt:'Frequência baixa em '+realizadas+' convocações ('+f.taxa+'%)' });
  });
  const card=document.createElement('div'); card.className='chart-card';
  const t=document.createElement('div'); t.className='chart-title'; t.textContent='Alertas'; card.appendChild(t);
  if (!alertas.length) {
    const ok=document.createElement('div'); ok.style.cssText='color:var(--success-text);font-size:13px;padding:6px 0;'; ok.textContent='✓ Nenhum alerta no momento.'; card.appendChild(ok);
  } else {
    alertas.slice(0,6).forEach(a => {
      const it=document.createElement('div'); it.className='alert-item';
      const ic=document.createElement('span'); ic.className='alert-ico'; ic.textContent=a.ico;
      const sp=document.createElement('span'); sp.textContent=a.txt; it.append(ic,sp); card.appendChild(it);
    });
  }
  main.appendChild(card);
}

/* ── AGENDA (compartilhada) ──────────────────────────────────── */
async function renderAgenda(main, titulo, limit, comCobertura, prefetched) {
  const head=document.createElement('div'); head.className='section-head'; head.textContent=titulo; main.appendChild(head);
  let celebs;
  if (prefetched) {
    celebs = prefetched.slice(0, limit);
  } else {
    const sel = comCobertura ? 'id,data,horario,comunidade,tipo, acolitos_escalas(id)' : 'id,data,horario,comunidade,tipo';
    const { data } = await sb.from('acolitos_celebracoes').select(sel)
      .gte('data', hojeStr()).order('data').order('horario').limit(limit);
    celebs = data;
  }
  if (!celebs?.length) {
    const em=document.createElement('span'); em.className='empty'; em.style.padding='16px 0'; em.textContent='Nenhuma celebração agendada.'; main.appendChild(em); return;
  }
  celebs.forEach(c => {
    const d=elDate(c.data);
    const item=document.createElement('div'); item.className='ev-item';
    const dt=document.createElement('div'); dt.className='ev-date';
    const dia=document.createElement('div'); dia.className='ev-dia'; dia.textContent=d.dia;
    const mes=document.createElement('div'); mes.className='ev-mes'; mes.textContent=d.mes;
    dt.append(dia,mes);
    const body=document.createElement('div'); body.className='ev-body';
    const top=document.createElement('div'); top.className='ev-top'; top.textContent=d.dow+' · '+c.horario+' · '+(c.comunidade==='matriz'?'Matriz':'Sto. Antônio');
    const sub=document.createElement('div'); sub.className='ev-sub'; sub.textContent=TIPO_LABEL[c.tipo]||c.tipo;
    body.append(top,sub);
    item.append(dt,body);
    if (comCobertura) {
      const filled=(c.acolitos_escalas||[]).length;
      const need=c.comunidade==='santo_antonio'?8:17;
      const badge=document.createElement('span'); badge.className='ev-badge';
      const r=filled/need;
      badge.textContent = filled===0?'Vazia':r>=1?'Completa':r>=0.6?'Parcial':'Crítica';
      badge.style.color = filled===0?'var(--text-muted)':r>=1?'var(--success-text)':r>=0.6?'var(--warn-text)':'var(--danger-text)';
      item.appendChild(badge);
    }
    main.appendChild(item);
  });
}
