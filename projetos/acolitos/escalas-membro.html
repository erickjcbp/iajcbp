<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Escalas — Acólitos JCBP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#150a0d">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script>window.addEventListener("beforeinstallprompt",function(e){e.preventDefault();window.__bip=e;});</script>
  <style>
    .semana-titulo { font-family:'Sora',sans-serif; font-size:11px; color:var(--text-muted); letter-spacing:1.5px; text-transform:uppercase; margin:18px 0 10px; padding-bottom:6px; border-bottom:1px solid var(--border); }
    .esc-grid { display:grid; grid-template-columns:1fr; gap:10px; }
    @media(min-width:600px){ .esc-grid{ grid-template-columns:repeat(2,1fr); } }
    @media(min-width:900px){ .esc-grid{ grid-template-columns:repeat(3,1fr); } }
    .esc-card { background:var(--surface); border:1px solid var(--border-wine); border-radius:10px; padding:14px; cursor:pointer; transition:border-color .15s, transform .1s; }
    .esc-card:hover { border-color:var(--gold-dim); }
    .esc-card:active { transform:scale(.99); }
    .esc-data { font-family:'Sora',sans-serif; font-weight:700; font-size:14px; color:var(--text); }
    .esc-sub { font-size:12px; color:var(--gold); margin-top:2px; }
    .esc-count { font-size:12px; color:var(--text-muted); margin-top:8px; display:flex; align-items:center; gap:6px; }
    .esc-count b { color:var(--text); }
    .esc-line { display:flex; justify-content:space-between; gap:10px; padding:7px 2px; border-bottom:1px solid var(--border); font-size:13px; }
    .esc-line .fn { color:var(--gold); font-weight:700; }
    .esc-line .nm { color:var(--text); text-align:right; }
    .esc-cat { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin:12px 0 2px; font-weight:700; }
    .esc-chamada-btn { margin-top:10px; width:100%; padding:9px; border-radius:8px; border:1px solid var(--gold-dim); background:linear-gradient(165deg, rgba(232,185,74,.14), var(--surface2)); color:var(--gold-light); font-family:'Sora',sans-serif; font-weight:700; font-size:12px; letter-spacing:.3px; cursor:pointer; }
    .esc-chamada-btn:hover { border-color:var(--gold); box-shadow:0 0 12px var(--red-glow); }
    .esc-chamada-btn.feita { border-color:var(--success-text,#4caf50); background:linear-gradient(165deg, rgba(76,175,80,.14), var(--surface2)); color:var(--success-text,#7bd88f); }
    /* ── ESCALA EU! ── */
    .ee-hero { position:relative; overflow:hidden; border-radius:14px; padding:24px 18px; text-align:center; cursor:pointer; background:linear-gradient(150deg, rgba(232,185,74,.18), rgba(120,20,30,.30)); border:1px solid var(--gold-dim); transition:transform .12s, box-shadow .3s; }
    .ee-hero.pulsa { animation:eePulse 2.2s ease-in-out infinite; }
    .ee-hero:active { transform:scale(.99); }
    @keyframes eePulse { 0%,100%{ box-shadow:0 0 0 0 rgba(232,185,74,0); } 50%{ box-shadow:0 0 26px 2px var(--red-glow); } }
    .ee-hero .ee-t { font-family:'Sora',sans-serif; font-weight:800; letter-spacing:2px; font-size:26px; color:var(--gold-light); text-shadow:0 0 16px var(--red-glow); }
    .ee-hero .ee-s { font-size:13px; color:var(--text); margin-top:6px; }
    .ee-hero .ee-badge { display:inline-block; margin-top:14px; font-family:'Sora',sans-serif; font-weight:700; font-size:12px; color:var(--text); background:rgba(0,0,0,.25); border:1px solid var(--border-wine); border-radius:999px; padding:5px 13px; }
    .ee-hero.calmo { animation:none; cursor:default; background:linear-gradient(150deg, rgba(120,20,30,.14), var(--surface2)); }
    .ee-back { background:none; border:none; color:var(--gold); font-family:'Sora',sans-serif; font-weight:700; font-size:13px; cursor:pointer; padding:6px 0; margin-bottom:6px; }
    .ee-step { animation:eeFade .28s ease both; }
    @keyframes eeFade { from{ opacity:0; transform:translateY(6px); } to{ opacity:1; transform:none; } }
    .ee-resumo { font-size:12px; color:var(--gold); margin:2px 0 10px; }
    .ee-chips { display:flex; flex-wrap:wrap; gap:10px; }
    .ee-chip { flex:1 1 44%; min-width:130px; padding:15px 12px; border-radius:12px; border:1px solid var(--gold-dim); background:linear-gradient(165deg, rgba(232,185,74,.12), var(--surface2)); color:var(--gold-light); font-family:'Sora',sans-serif; font-weight:700; font-size:14px; cursor:pointer; text-align:center; transition:border-color .15s, transform .1s, box-shadow .2s; }
    .ee-chip:hover { border-color:var(--gold); box-shadow:0 0 12px var(--red-glow); }
    .ee-chip:active { transform:scale(.98); }
    .ee-chip:disabled { cursor:default; border-color:var(--success-text,#4caf50); color:var(--success-text,#7bd88f); background:linear-gradient(165deg, rgba(76,175,80,.14), var(--surface2)); box-shadow:none; }
    .esc-secao { font-family:'Sora',sans-serif; font-weight:800; font-size:15px; color:var(--gold-light); letter-spacing:.5px; margin:28px 0 10px; padding-bottom:6px; border-bottom:1px solid var(--border-wine); }
  </style>
  <script src="/projetos/acolitos/vendor/supabase-js-2.106.2.min.js"></script>
  <script src="/projetos/acolitos/solicitacoes-core.js"></script>
</head>
<body>
<div id="app-header"></div>
<div id="app-nav"></div>
<div class="main" id="main-content">
  <span class="loading">Carregando...</span>
</div>

<script src="shared.js"></script>
<script>
const DIAS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const TIPO_LABEL = { missa_comum:'Missa', solene:'Missa Solene', pontifical:'Pontifical (Bispo)', festa:'Festa Litúrgica', vigilia:'Vigília', crisma:'Crisma', casamento:'Casamento', batizado:'Batizado', ordenacao:'Ordenação', funeral:'Exéquias' };
const FUNCAO_LABEL = { cred_altar:'Cerimonial de Altar', cred_credencia:'Cerimonial de Credência', missal:'Missal', turibulo:'Turíbulo', naveta:'Naveta', altar:'Altar', cruz:'Cruz', vela:'Vela', sineta:'Sineta', sinao:'Sinão', apoio:'Apoio', mitra:'Mitra', baculo:'Báculo' };
const FUNCAO_CAT = { cred_altar:'Cerimoniais', cred_credencia:'Cerimoniais', missal:'Cerimoniais', altar:'Altares', cruz:'Litúrgicos', vela:'Litúrgicos', sineta:'Litúrgicos', sinao:'Litúrgicos', turibulo:'Litúrgicos', naveta:'Litúrgicos', apoio:'Apoios', mitra:'Episcopal', baculo:'Episcopal' };
const FUNCAO_ORDEM = { cred_altar:10, cred_credencia:11, missal:12, altar:20, cruz:30, vela:31, sineta:32, sinao:33, turibulo:34, naveta:35, apoio:40, mitra:50, baculo:51 };

function dataLabel(d) { const x = new Date(d+'T00:00:00'); return DIAS[x.getDay()] + ' ' + x.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}); }
function comLabel(c) { return c==='matriz'?'Matriz':'Sto. Antônio'; }
function hojeStr() { return new Date().toISOString().slice(0,10); }

async function init() {
  const ctx = await initModulo();
  if (!ctx) return;
  mergeTiposLabel(TIPO_LABEL); // tipos customizados do Config aparecem com o rótulo certo
  const isCerimo = navCaps(ctx).isCerimo; // só cerimoniário vê o botão de Chamada
  renderHeader(ctx, 'escalas-membro');
  renderBottomNav(ctx, 'escalas-membro');
  const main = document.getElementById('main-content'); main.textContent = '';
  const title = document.createElement('h1'); title.className = 'page-title'; title.textContent = 'Escalas'; main.appendChild(title);
  // ── Tela única: seções empilhadas (rolagem) ──
  function secaoTitulo(txt){ const h=document.createElement('div'); h.className='esc-secao'; h.textContent=txt; return h; }

  // 1) ESCALA EU! (herói + fluxo missa→função) — se anuncia sozinho, sem título
  const secVagas = document.createElement('div'); main.appendChild(secVagas);
  carregarVagas(secVagas, ctx);

  // 2) Minhas missas
  main.appendChild(secaoTitulo('Minhas missas'));
  const secMinhas = document.createElement('div'); main.appendChild(secMinhas);
  carregarMinhasMissas(secMinhas, ctx);

  // 3) Meus pedidos
  main.appendChild(secaoTitulo('Meus pedidos'));
  const secPed = document.createElement('div'); main.appendChild(secPed);
  carregarMeusPedidos(secPed, ctx);

  // 4) Todas as missas (browse read-only) — mantém toggle Próximas/Histórico
  main.appendChild(secaoTitulo('Todas as missas'));
  const secTodas = document.createElement('div'); main.appendChild(secTodas);
  const hintTodas = document.createElement('p'); hintTodas.style.cssText='font-size:12px;color:var(--text-muted);margin:-2px 0 8px;'; hintTodas.textContent='Toque numa missa para ver quem está escalado.'; secTodas.appendChild(hintTodas);
  const tabs = document.createElement('div'); tabs.style.cssText='display:flex;gap:8px;margin-bottom:8px;';
  const tabProx=document.createElement('button'); tabProx.textContent='Próximas';
  const tabHist=document.createElement('button'); tabHist.textContent='Histórico';
  tabs.append(tabProx, tabHist); secTodas.appendChild(tabs);
  const wrap = document.createElement('div'); secTodas.appendChild(wrap);

  function setActive(modo){
    const on='flex:1;cursor:pointer;border-radius:8px;padding:8px;background:var(--gold);color:#1a0e10;border:1px solid var(--gold);font-weight:700;font-family:Sora,sans-serif;';
    const off='flex:1;cursor:pointer;border-radius:8px;padding:8px;background:transparent;color:var(--text-muted);border:1px solid var(--border);font-family:Sora,sans-serif;';
    tabProx.style.cssText = modo==='futuras'?on:off;
    tabHist.style.cssText = modo==='passadas'?on:off;
  }
  async function carregar(modo){
    setActive(modo);
    wrap.textContent=''; const ld=document.createElement('span'); ld.className='loading'; ld.textContent='Carregando...'; wrap.appendChild(ld);
    const rpc = modo==='passadas' ? 'acolitos_escalas_passadas' : 'acolitos_escalas_futuras';
    const { data, error } = await sb.rpc(rpc);
    wrap.textContent='';
    if (error) { const e=document.createElement('span'); e.className='empty'; e.textContent='Não foi possível carregar as escalas.'; wrap.appendChild(e); return; }
    const cels = data || [];
    if (!cels.length) { const e=document.createElement('span'); e.className='empty'; e.textContent = modo==='passadas' ? 'Nenhuma missa no histórico.' : 'Nenhuma missa futura cadastrada.'; wrap.appendChild(e); return; }
    let chamadasFeitas = new Set();
    if (isCerimo) { try { const { data: chs } = await sb.from('acolitos_chamadas').select('celebracao_id'); (chs||[]).forEach(x => chamadasFeitas.add(x.celebracao_id)); } catch (e) {} }
    pintarSemanas(cels, wrap, isCerimo, chamadasFeitas, modo);
  }
  tabProx.onclick=()=>carregar('futuras');
  tabHist.onclick=()=>carregar('passadas');
  carregar('futuras');
}

async function carregarMinhasMissas(body, ctx){
  const m = ctx.membro;
  if(!m){ body.textContent=''; const e=document.createElement('span'); e.className='empty'; e.textContent='Perfil não encontrado.'; body.appendChild(e); return; }
  const { data, error } = await sb.from('acolitos_escalas')
    .select('id,funcao, acolitos_celebracoes!inner(id,data,horario,comunidade,tipo)')
    .eq('membro_id', m.id).eq('status','escalado')
    .gte('acolitos_celebracoes.data', hojeStr());
  body.textContent='';
  if(error){ const e=document.createElement('span'); e.className='empty'; e.textContent='Não foi possível carregar.'; body.appendChild(e); return; }
  const linhas = (data||[]).filter(e=>e.acolitos_celebracoes)
    .sort((a,b)=> (a.acolitos_celebracoes.data+a.acolitos_celebracoes.horario).localeCompare(b.acolitos_celebracoes.data+b.acolitos_celebracoes.horario));
  if(!linhas.length){ const e=document.createElement('span'); e.className='empty'; e.textContent='Você não está escalado em nenhuma missa futura.'; body.appendChild(e); return; }
  linhas.forEach(e=>{
    const c=e.acolitos_celebracoes;
    const card=document.createElement('div'); card.className='esc-card'; card.style.cursor='default';
    const dt=document.createElement('div'); dt.className='esc-data'; dt.textContent=dataLabel(c.data)+' · '+c.horario;
    const sub=document.createElement('div'); sub.className='esc-sub'; sub.textContent=comLabel(c.comunidade)+' · '+(FUNCAO_LABEL[e.funcao]||e.funcao);
    const bTroca=document.createElement('button');
    bTroca.textContent='⚠ Pedir troca';
    bTroca.style.cssText='margin-top:10px;width:100%;padding:9px;border-radius:8px;border:1px solid #7a2a34;background:linear-gradient(165deg,rgba(224,96,122,.16),var(--surface2));color:#ff9db0;font-family:Sora,sans-serif;font-weight:700;font-size:12px;cursor:pointer;';
    bTroca.onclick=()=>abrirPedirTroca(e, ctx);
    card.append(dt,sub,bTroca); body.appendChild(card);
  });
}

async function abrirPedirTroca(escala, ctx){
  const ok = await uiConfirm(
    'Tem certeza que não poderá cumprir esta escala?\n\nServir é um compromisso. Só peça troca se realmente não puder.',
    { ok:'Sim, pedir troca', cancel:'Voltar' });
  if(!ok) return;
  // roster habilitado na função (RPC member-facing, já filtra habilitados/ativos/exclui o próprio)
  const { data: r } = await sb.rpc('acolitos_habilitados_funcao', { p_funcao: escala.funcao });
  const elegiveis = (r && r.membros) || [];

  const ov=document.createElement('div'); ov.className='modal-overlay open';
  ov.onclick=(ev)=>{ if(ev.target===ov) ov.remove(); };
  const modal=document.createElement('div'); modal.className='modal';
  const h=document.createElement('div'); h.className='modal-handle';
  const tt=document.createElement('div'); tt.className='modal-title'; tt.textContent='Com quem trocar?';
  modal.append(h,tt);
  const hint=document.createElement('p'); hint.style.cssText='font-size:12px;color:var(--text-muted);margin:-6px 0 10px;';
  hint.textContent='Escolha um colega habilitado. Ele precisa aceitar e a coordenação homologa. Ou peça pra coordenação cobrir.';
  modal.appendChild(hint);

  async function enviar(alvoId){
    const { data: res, error } = await sb.rpc('acolitos_solicitar_troca',
      { p_escala_id: escala.id, p_alvo_membro_id: alvoId||null, p_motivo: null });
    ov.remove();
    if (error) { toast('Erro ao enviar o pedido. Tente de novo.','error'); return; }
    if(res && res.ok){ toast(alvoId?'Convite enviado ao colega.':'Pedido enviado à coordenação.','success'); }
    else if(res && res.erro==='ja_existe'){ toast('Você já tem um pedido pendente para esta missa.','error'); }
    else { toast('Não foi possível enviar o pedido.','error'); }
  }

  const lista=document.createElement('div'); lista.style.cssText='max-height:46vh;overflow:auto;';
  if(!elegiveis.length){ const e=document.createElement('div'); e.style.cssText='color:var(--text-muted);font-style:italic;padding:8px 0;'; e.textContent='Nenhum colega habilitado nesta função.'; lista.appendChild(e); }
  elegiveis.forEach(mm=>{
    const row=document.createElement('button'); row.style.cssText='display:block;width:100%;text-align:left;padding:10px;margin-bottom:6px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;';
    row.textContent=(mm.apelido||mm.nome);
    row.onclick=()=>enviar(mm.id);
    lista.appendChild(row);
  });
  modal.appendChild(lista);

  const bCob=document.createElement('button'); bCob.className='btn-sm'; bCob.style.cssText='margin-top:10px;width:100%;';
  bCob.textContent='Não sei quem chamar — pedir à coordenação';
  bCob.onclick=()=>enviar(null);
  const bX=document.createElement('button'); bX.className='btn-sm gray'; bX.style.marginTop='8px'; bX.textContent='Cancelar'; bX.onclick=()=>ov.remove();
  modal.append(bCob,bX);
  ov.appendChild(modal); document.body.appendChild(ov);
}

// Vagas pedidas nesta sessão (celebracao_id|funcao). O RPC filtra por
// "escalado", não por candidatura pendente — então a vaga pedida continua
// aparecendo; marcamos o chip como "✓" pra não deixar re-pedir.
const _eePedidos = new Set();

async function carregarVagas(body, ctx){
  body.textContent = '';
  const wrap = document.createElement('div'); body.appendChild(wrap);
  const { data } = await sb.rpc('acolitos_vagas_abertas_membro');
  const missas = window.SolicitacoesCore.agruparVagasPorMissa((data && data.vagas) || []);
  renderHeroi();

  function mkBack(txt, fn){ const b=document.createElement('button'); b.className='ee-back'; b.textContent=txt; b.onclick=fn; return b; }

  function renderHeroi(){
    wrap.textContent = '';
    const hero = document.createElement('div');
    hero.className = 'ee-hero ee-step' + (missas.length ? ' pulsa' : ' calmo');
    const t = document.createElement('div'); t.className='ee-t'; t.textContent='ESCALA EU!';
    const s = document.createElement('div'); s.className='ee-s';
    hero.append(t, s);
    if(missas.length){
      s.textContent = 'Quer servir? Escolha uma missa e a sua função.';
      const b = document.createElement('div'); b.className='ee-badge';
      b.textContent = missas.length===1 ? '1 missa precisa de você' : missas.length+' missas precisam de você';
      hero.appendChild(b);
      hero.onclick = renderMissas;
    } else {
      s.textContent = 'Tudo escalado por enquanto — volte depois.';
    }
    wrap.appendChild(hero);
  }

  function renderMissas(){
    wrap.textContent = '';
    wrap.appendChild(mkBack('‹ voltar', renderHeroi));
    missas.forEach(function(m){
      const card = document.createElement('div'); card.className='esc-card ee-step';
      const dt = document.createElement('div'); dt.className='esc-data'; dt.textContent = dataLabel(m.data)+' · '+m.horario;
      const sub = document.createElement('div'); sub.className='esc-sub'; sub.textContent = comLabel(m.comunidade);
      const cnt = document.createElement('div'); cnt.className='esc-count';
      const strong = document.createElement('b'); strong.textContent = m.funcoes.length;
      const k = m.funcoes.length;
      cnt.append(strong, document.createTextNode(' '+(k===1?'função aberta pra você':'funções abertas pra você')));
      card.append(dt, sub, cnt);
      card.onclick = function(){ renderFuncoes(m); };
      wrap.appendChild(card);
    });
  }

  function renderFuncoes(m){
    wrap.textContent = '';
    wrap.appendChild(mkBack('‹ voltar', renderMissas));
    const res = document.createElement('div'); res.className='ee-resumo';
    res.textContent = dataLabel(m.data)+' · '+m.horario+' · '+comLabel(m.comunidade);
    wrap.appendChild(res);
    const chips = document.createElement('div'); chips.className='ee-chips ee-step'; wrap.appendChild(chips);
    m.funcoes.forEach(function(fn){
      const chip = document.createElement('button'); chip.className='ee-chip';
      const nome = FUNCAO_LABEL[fn]||fn;
      const jaPedido = _eePedidos.has(m.celebracao_id+'|'+fn);
      chip.textContent = jaPedido ? '✓ '+nome : nome;
      chip.disabled = jaPedido;
      chip.onclick = function(){ pedir(m, fn, chip); };
      chips.appendChild(chip);
    });
  }

  async function pedir(m, fn, chip){
    const nome = FUNCAO_LABEL[fn]||fn;
    const ok = await uiConfirm('Pedir para servir como '+nome+' em '+dataLabel(m.data)+' · '+m.horario+'?');
    if(!ok) return;
    chip.disabled = true; const antes = chip.textContent; chip.textContent = '...';
    const { data: res } = await sb.rpc('acolitos_candidatar_vaga', { p_celebracao_id:m.celebracao_id, p_funcao:fn, p_motivo:null });
    if(res && res.ok){
      _eePedidos.add(m.celebracao_id+'|'+fn);
      chip.textContent = '✓ '+nome;
      showCeleb({ icon:'⛪', tag:'ESCALA EU!', hero:'Pedido enviado!', sub:'A coordenação vai confirmar sua escala.', sound:'star', autoClose:2600, done:renderHeroi });
    } else if(res && res.erro==='ja_candidatou'){
      _eePedidos.add(m.celebracao_id+'|'+fn);
      chip.textContent = '✓ '+nome;
      toast('Você já se candidatou a essa vaga.','error');
    } else {
      chip.disabled = false; chip.textContent = antes;
      toast('Não foi possível pedir.','error');
    }
  }
}

async function carregarMeusPedidos(body, ctx){
  const { data } = await sb.rpc('acolitos_solicitacoes_membro');
  const meus=(data&&data.meus)||[]; const convites=(data&&data.convites)||[];
  body.textContent='';
  const SC = window.SolicitacoesCore;

  // Convites recebidos (aceitar/recusar) — accept/reject SÓ aqui
  const hCon=document.createElement('div'); hCon.className='esc-cat'; hCon.textContent='Convites recebidos'; body.appendChild(hCon);
  if(!convites.length){ const e=document.createElement('div'); e.style.cssText='color:var(--text-muted);font-style:italic;font-size:12px;padding:4px 0 8px;'; e.textContent='Nenhum convite.'; body.appendChild(e); }
  convites.forEach(cv=>{
    const row=document.createElement('div'); row.className='esc-card'; row.style.cursor='default';
    const t=document.createElement('div'); t.className='esc-data'; t.textContent=(cv.de_nome||'Colega')+' quer trocar com você';
    const s=document.createElement('div'); s.className='esc-sub'; s.textContent=dataLabel(cv.data)+' · '+cv.horario+' · '+(FUNCAO_LABEL[cv.funcao]||cv.funcao);
    const acts=document.createElement('div'); acts.style.cssText='display:flex;gap:8px;margin-top:10px;';
    const bNo=document.createElement('button'); bNo.className='btn-sm gray'; bNo.style.flex='1'; bNo.textContent='Recusar';
    const bYes=document.createElement('button'); bYes.className='esc-chamada-btn'; bYes.style.flex='1'; bYes.style.marginTop='0'; bYes.textContent='Aceitar';
    async function responder(aceita){ bYes.disabled=bNo.disabled=true;
      const { data: res } = await sb.rpc('acolitos_troca_responder', { p_solicitacao_id:cv.id, p_aceita:aceita });
      if(res && res.ok){ toast(aceita?'Você aceitou. Vai pra coordenação homologar.':'Convite recusado.','success'); carregarMeusPedidos(body,ctx); }
      else { toast('Não foi possível responder.','error'); bYes.disabled=bNo.disabled=false; }
    }
    bNo.onclick=()=>responder(false); bYes.onclick=()=>responder(true);
    acts.append(bNo,bYes); row.append(t,s,acts); body.appendChild(row);
  });

  // Meus pedidos
  const hMy=document.createElement('div'); hMy.className='esc-cat'; hMy.textContent='Meus pedidos'; body.appendChild(hMy);
  if(!meus.length){ const e=document.createElement('div'); e.style.cssText='color:var(--text-muted);font-style:italic;font-size:12px;padding:4px 0;'; e.textContent='Você ainda não fez pedidos.'; body.appendChild(e); }
  meus.forEach(p=>{
    const row=document.createElement('div'); row.className='esc-card'; row.style.cursor='default';
    const t=document.createElement('div'); t.className='esc-data'; t.textContent=(SC.TIPO_LABEL[p.tipo]||p.tipo)+' · '+dataLabel(p.data)+' · '+p.horario;
    const s=document.createElement('div'); s.className='esc-sub'; s.textContent=(FUNCAO_LABEL[p.funcao]||p.funcao)+' — '+(SC.STATUS_LABEL[p.status]||p.status);
    row.append(t,s);
    const acts=document.createElement('div'); acts.style.cssText='display:flex;gap:8px;margin-top:10px;';
    if(p.status==='recusado_colega'){
      const bCob=document.createElement('button'); bCob.className='btn-sm'; bCob.style.flex='1'; bCob.textContent='Pedir à coordenação';
      bCob.onclick=async()=>{ const { data:res }=await sb.rpc('acolitos_solicitacao_reenviar',{p_solicitacao_id:p.id,p_novo_alvo:null});
        if(res&&res.ok){ toast('Enviado à coordenação.','success'); carregarMeusPedidos(body,ctx);} else toast('Falhou.','error'); };
      acts.appendChild(bCob);
    }
    if(SC.estaPendente(p.status)){
      const bCancel=document.createElement('button'); bCancel.className='btn-sm gray'; bCancel.style.flex='1'; bCancel.textContent='Cancelar';
      bCancel.onclick=async()=>{ const ok=await uiConfirm('Cancelar este pedido?'); if(!ok) return;
        const { data:res }=await sb.rpc('acolitos_solicitacao_cancelar',{p_solicitacao_id:p.id});
        if(res&&res.ok){ toast('Cancelado.','success'); carregarMeusPedidos(body,ctx);} else toast('Falhou.','error'); };
      acts.appendChild(bCancel);
    }
    if(acts.children.length) row.appendChild(acts);
    body.appendChild(row);
  });
}

// Agrupa por semana e pinta os cards (reaproveitado por Próximas e Histórico)
function pintarSemanas(cels, container, isCerimo, chamadasFeitas, modo){
  const semanas = {};
  cels.forEach(c => {
    const d = new Date(c.data+'T00:00:00');
    const mon = new Date(d); mon.setDate(d.getDate() - ((d.getDay()+6)%7));
    const key = mon.toISOString().slice(0,10);
    if (!semanas[key]) semanas[key] = { mon, label: 'Semana de ' + mon.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}), items: [] };
    semanas[key].items.push(c);
  });
  const ordenadas = Object.values(semanas).sort((a,b)=> modo==='passadas' ? (b.mon-a.mon) : (a.mon-b.mon));
  ordenadas.forEach(sem => {
    const t = document.createElement('div'); t.className = 'semana-titulo'; t.textContent = sem.label; container.appendChild(t);
    const grid = document.createElement('div'); grid.className = 'esc-grid';
    sem.items.forEach(c => {
      const card = document.createElement('div'); card.className = 'esc-card';
      const dt = document.createElement('div'); dt.className = 'esc-data'; dt.textContent = dataLabel(c.data) + ' · ' + c.horario;
      const sb2 = document.createElement('div'); sb2.className = 'esc-sub'; sb2.textContent = comLabel(c.comunidade) + ' · ' + (TIPO_LABEL[c.tipo]||c.tipo);
      const cnt = document.createElement('div'); cnt.className = 'esc-count';
      const n = (c.escalados||[]).length;
      cnt.innerHTML = n ? '<b>'+n+'</b> escalado'+(n>1?'s':'')+' — toque para ver' : 'Escala ainda não montada';
      card.append(dt, sb2, cnt);
      card.onclick = () => abrirEscala(c);
      if (isCerimo && n) {
        const feita = c.id && chamadasFeitas.has(c.id);
        const bCh = document.createElement('button'); bCh.className = 'esc-chamada-btn' + (feita ? ' feita' : '');
        bCh.textContent = feita ? '✓ Chamada feita' : '✋ Fazer chamada';
        bCh.onclick = (ev) => { ev.stopPropagation(); abrirChamadaCeleb(c); };
        card.appendChild(bCh);
      }
      grid.appendChild(card);
    });
    container.appendChild(grid);
  });
}

// Abre a chamada daquela missa (deep-link). Se o RPC não trouxe id, resolve por data+horário+comunidade.
async function abrirChamadaCeleb(c) {
  let id = c.id;
  if (!id) {
    const { data } = await sb.from('acolitos_celebracoes').select('id').eq('data', c.data).eq('horario', c.horario).eq('comunidade', c.comunidade).maybeSingle();
    id = data && data.id;
  }
  if (!id) { toast('Não foi possível abrir a chamada desta missa.', 'error'); return; }
  window.location.href = 'chamada.html?celeb=' + id;
}

function abrirEscala(c) {
  const ov = document.createElement('div'); ov.className = 'modal-overlay open';
  ov.onclick = (e) => { if (e.target === ov) ov.remove(); };
  const modal = document.createElement('div'); modal.className = 'modal';
  const handle = document.createElement('div'); handle.className = 'modal-handle';
  const tt = document.createElement('div'); tt.className = 'modal-title'; tt.textContent = dataLabel(c.data) + ' · ' + c.horario;
  const sub = document.createElement('p'); sub.style.cssText = 'font-size:12px;color:var(--gold);margin:-8px 0 12px;'; sub.textContent = comLabel(c.comunidade) + ' · ' + (TIPO_LABEL[c.tipo]||c.tipo);
  modal.append(handle, tt, sub);

  const lista = (c.escalados||[]).slice().sort((a,b) => (FUNCAO_ORDEM[a.funcao]||99) - (FUNCAO_ORDEM[b.funcao]||99));
  if (!lista.length) {
    const em = document.createElement('div'); em.style.cssText = 'color:var(--text-muted);font-style:italic;padding:8px 0;'; em.textContent = 'Escala ainda não montada para esta missa.'; modal.appendChild(em);
  } else {
    let catAtual = '';
    lista.forEach(e => {
      const cat = FUNCAO_CAT[e.funcao] || 'Outros';
      if (cat !== catAtual) { catAtual = cat; const ch = document.createElement('div'); ch.className = 'esc-cat'; ch.textContent = cat; modal.appendChild(ch); }
      const row = document.createElement('div'); row.className = 'esc-line';
      const fn = document.createElement('span'); fn.className = 'fn'; fn.textContent = FUNCAO_LABEL[e.funcao] || e.funcao;
      const nm = document.createElement('span'); nm.className = 'nm'; nm.textContent = e.nome;
      row.append(fn, nm); modal.appendChild(row);
    });
  }
  const close = document.createElement('button'); close.className = 'btn-sm gray'; close.style.marginTop = '14px'; close.textContent = 'Fechar'; close.onclick = () => ov.remove();
  modal.appendChild(close);
  ov.appendChild(modal); document.body.appendChild(ov);
}

init();
</script>
