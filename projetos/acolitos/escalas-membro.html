<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Escalas — Acólitos JCBP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#150a0d">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script>window.addEventListener("beforeinstallprompt",function(e){e.preventDefault();window.__bip=e;});</script>
  <style>
    .semana-titulo { font-family:'Sora',sans-serif; font-size:11px; color:var(--text-muted); letter-spacing:1.5px; text-transform:uppercase; margin:18px 0 10px; padding-bottom:6px; border-bottom:1px solid var(--border); }
    .esc-grid { display:grid; grid-template-columns:1fr; gap:10px; }
    @media(min-width:600px){ .esc-grid{ grid-template-columns:repeat(2,1fr); } }
    @media(min-width:900px){ .esc-grid{ grid-template-columns:repeat(3,1fr); } }
    .esc-card { background:var(--surface); border:1px solid var(--border-wine); border-radius:10px; padding:14px; cursor:pointer; transition:border-color .15s, transform .1s; }
    .esc-card:hover { border-color:var(--gold-dim); }
    .esc-card:active { transform:scale(.99); }
    .esc-data { font-family:'Sora',sans-serif; font-weight:700; font-size:14px; color:var(--text); }
    .esc-sub { font-size:12px; color:var(--gold); margin-top:2px; }
    .esc-count { font-size:12px; color:var(--text-muted); margin-top:8px; display:flex; align-items:center; gap:6px; }
    .esc-count b { color:var(--text); }
    .esc-line { display:flex; justify-content:space-between; gap:10px; padding:7px 2px; border-bottom:1px solid var(--border); font-size:13px; }
    .esc-line .fn { color:var(--gold); font-weight:700; }
    .esc-line .nm { color:var(--text); text-align:right; }
    .esc-cat { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin:12px 0 2px; font-weight:700; }
    .esc-chamada-btn { margin-top:10px; width:100%; padding:9px; border-radius:8px; border:1px solid var(--gold-dim); background:linear-gradient(165deg, rgba(232,185,74,.14), var(--surface2)); color:var(--gold-light); font-family:'Sora',sans-serif; font-weight:700; font-size:12px; letter-spacing:.3px; cursor:pointer; }
    .esc-chamada-btn:hover { border-color:var(--gold); box-shadow:0 0 12px var(--red-glow); }
    .esc-chamada-btn.feita { border-color:var(--success-text,#4caf50); background:linear-gradient(165deg, rgba(76,175,80,.14), var(--surface2)); color:var(--success-text,#7bd88f); }
  </style>
  <script src="/projetos/acolitos/vendor/supabase-js-2.106.2.min.js"></script>
</head>
<body>
<div id="app-header"></div>
<div id="app-nav"></div>
<div class="main" id="main-content">
  <span class="loading">Carregando...</span>
</div>

<script src="shared.js"></script>
<script>
const DIAS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const TIPO_LABEL = { missa_comum:'Missa', solene:'Missa Solene', pontifical:'Pontifical (Bispo)', festa:'Festa Litúrgica', vigilia:'Vigília', crisma:'Crisma', casamento:'Casamento', batizado:'Batizado', ordenacao:'Ordenação', funeral:'Exéquias' };
const FUNCAO_LABEL = { cred_altar:'Cerimonial de Altar', cred_credencia:'Cerimonial de Credência', missal:'Missal', turibulo:'Turíbulo', naveta:'Naveta', altar:'Altar', cruz:'Cruz', vela:'Vela', sineta:'Sineta', sinao:'Sinão', apoio:'Apoio', mitra:'Mitra', baculo:'Báculo' };
const FUNCAO_CAT = { cred_altar:'Cerimoniais', cred_credencia:'Cerimoniais', missal:'Cerimoniais', altar:'Altares', cruz:'Litúrgicos', vela:'Litúrgicos', sineta:'Litúrgicos', sinao:'Litúrgicos', turibulo:'Litúrgicos', naveta:'Litúrgicos', apoio:'Apoios', mitra:'Episcopal', baculo:'Episcopal' };
const FUNCAO_ORDEM = { cred_altar:10, cred_credencia:11, missal:12, altar:20, cruz:30, vela:31, sineta:32, sinao:33, turibulo:34, naveta:35, apoio:40, mitra:50, baculo:51 };

function dataLabel(d) { const x = new Date(d+'T00:00:00'); return DIAS[x.getDay()] + ' ' + x.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}); }
function comLabel(c) { return c==='matriz'?'Matriz':'Sto. Antônio'; }

async function init() {
  const ctx = await initModulo();
  if (!ctx) return;
  mergeTiposLabel(TIPO_LABEL); // tipos customizados do Config aparecem com o rótulo certo
  const isCerimo = navCaps(ctx).isCerimo; // só cerimoniário vê o botão de Chamada
  renderHeader(ctx, 'escalas-membro');
  renderBottomNav(ctx, 'escalas-membro');
  const main = document.getElementById('main-content'); main.textContent = '';
  const title = document.createElement('h1'); title.className = 'page-title'; title.textContent = 'Escalas'; main.appendChild(title);
  const hint = document.createElement('p'); hint.style.cssText = 'font-size:12px;color:var(--text-muted);margin:-6px 0 10px;'; hint.textContent = 'Toque numa missa para ver quem está escalado.'; main.appendChild(hint);

  // Abas Próximas / Histórico
  const tabs = document.createElement('div'); tabs.style.cssText='display:flex;gap:8px;margin-bottom:8px;';
  const tabProx=document.createElement('button'); tabProx.textContent='Próximas';
  const tabHist=document.createElement('button'); tabHist.textContent='Histórico';
  tabs.append(tabProx, tabHist); main.appendChild(tabs);
  const wrap = document.createElement('div'); main.appendChild(wrap);

  function setActive(modo){
    const on='flex:1;cursor:pointer;border-radius:8px;padding:8px;background:var(--gold);color:#1a0e10;border:1px solid var(--gold);font-weight:700;font-family:Sora,sans-serif;';
    const off='flex:1;cursor:pointer;border-radius:8px;padding:8px;background:transparent;color:var(--text-muted);border:1px solid var(--border);font-family:Sora,sans-serif;';
    tabProx.style.cssText = modo==='futuras'?on:off;
    tabHist.style.cssText = modo==='passadas'?on:off;
  }

  async function carregar(modo){
    setActive(modo);
    wrap.textContent=''; const ld=document.createElement('span'); ld.className='loading'; ld.textContent='Carregando...'; wrap.appendChild(ld);
    const rpc = modo==='passadas' ? 'acolitos_escalas_passadas' : 'acolitos_escalas_futuras';
    const { data, error } = await sb.rpc(rpc);
    wrap.textContent='';
    if (error) { const e=document.createElement('span'); e.className='empty'; e.textContent='Não foi possível carregar as escalas.'; wrap.appendChild(e); return; }
    const cels = data || [];
    if (!cels.length) { const e=document.createElement('span'); e.className='empty'; e.textContent = modo==='passadas' ? 'Nenhuma missa no histórico.' : 'Nenhuma missa futura cadastrada.'; wrap.appendChild(e); return; }

    // celebrações que já tiveram chamada (pra rotular o botão) — só cerimoniário lê
    let chamadasFeitas = new Set();
    if (isCerimo) { try { const { data: chs } = await sb.from('acolitos_chamadas').select('celebracao_id'); (chs||[]).forEach(x => chamadasFeitas.add(x.celebracao_id)); } catch (e) {} }

    pintarSemanas(cels, wrap, isCerimo, chamadasFeitas, modo);
  }

  tabProx.onclick=()=>carregar('futuras');
  tabHist.onclick=()=>carregar('passadas');
  carregar('futuras');
}

// Agrupa por semana e pinta os cards (reaproveitado por Próximas e Histórico)
function pintarSemanas(cels, container, isCerimo, chamadasFeitas, modo){
  const semanas = {};
  cels.forEach(c => {
    const d = new Date(c.data+'T00:00:00');
    const mon = new Date(d); mon.setDate(d.getDate() - ((d.getDay()+6)%7));
    const key = mon.toISOString().slice(0,10);
    if (!semanas[key]) semanas[key] = { mon, label: 'Semana de ' + mon.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}), items: [] };
    semanas[key].items.push(c);
  });
  const ordenadas = Object.values(semanas).sort((a,b)=> modo==='passadas' ? (b.mon-a.mon) : (a.mon-b.mon));
  ordenadas.forEach(sem => {
    const t = document.createElement('div'); t.className = 'semana-titulo'; t.textContent = sem.label; container.appendChild(t);
    const grid = document.createElement('div'); grid.className = 'esc-grid';
    sem.items.forEach(c => {
      const card = document.createElement('div'); card.className = 'esc-card';
      const dt = document.createElement('div'); dt.className = 'esc-data'; dt.textContent = dataLabel(c.data) + ' · ' + c.horario;
      const sb2 = document.createElement('div'); sb2.className = 'esc-sub'; sb2.textContent = comLabel(c.comunidade) + ' · ' + (TIPO_LABEL[c.tipo]||c.tipo);
      const cnt = document.createElement('div'); cnt.className = 'esc-count';
      const n = (c.escalados||[]).length;
      cnt.innerHTML = n ? '<b>'+n+'</b> escalado'+(n>1?'s':'')+' — toque para ver' : 'Escala ainda não montada';
      card.append(dt, sb2, cnt);
      card.onclick = () => abrirEscala(c);
      if (isCerimo && n) {
        const feita = c.id && chamadasFeitas.has(c.id);
        const bCh = document.createElement('button'); bCh.className = 'esc-chamada-btn' + (feita ? ' feita' : '');
        bCh.textContent = feita ? '✓ Chamada feita' : '✋ Fazer chamada';
        bCh.onclick = (ev) => { ev.stopPropagation(); abrirChamadaCeleb(c); };
        card.appendChild(bCh);
      }
      grid.appendChild(card);
    });
    container.appendChild(grid);
  });
}

// Abre a chamada daquela missa (deep-link). Se o RPC não trouxe id, resolve por data+horário+comunidade.
async function abrirChamadaCeleb(c) {
  let id = c.id;
  if (!id) {
    const { data } = await sb.from('acolitos_celebracoes').select('id').eq('data', c.data).eq('horario', c.horario).eq('comunidade', c.comunidade).maybeSingle();
    id = data && data.id;
  }
  if (!id) { toast('Não foi possível abrir a chamada desta missa.', 'error'); return; }
  window.location.href = 'chamada.html?celeb=' + id;
}

function abrirEscala(c) {
  const ov = document.createElement('div'); ov.className = 'modal-overlay open';
  ov.onclick = (e) => { if (e.target === ov) ov.remove(); };
  const modal = document.createElement('div'); modal.className = 'modal';
  const handle = document.createElement('div'); handle.className = 'modal-handle';
  const tt = document.createElement('div'); tt.className = 'modal-title'; tt.textContent = dataLabel(c.data) + ' · ' + c.horario;
  const sub = document.createElement('p'); sub.style.cssText = 'font-size:12px;color:var(--gold);margin:-8px 0 12px;'; sub.textContent = comLabel(c.comunidade) + ' · ' + (TIPO_LABEL[c.tipo]||c.tipo);
  modal.append(handle, tt, sub);

  const lista = (c.escalados||[]).slice().sort((a,b) => (FUNCAO_ORDEM[a.funcao]||99) - (FUNCAO_ORDEM[b.funcao]||99));
  if (!lista.length) {
    const em = document.createElement('div'); em.style.cssText = 'color:var(--text-muted);font-style:italic;padding:8px 0;'; em.textContent = 'Escala ainda não montada para esta missa.'; modal.appendChild(em);
  } else {
    let catAtual = '';
    lista.forEach(e => {
      const cat = FUNCAO_CAT[e.funcao] || 'Outros';
      if (cat !== catAtual) { catAtual = cat; const ch = document.createElement('div'); ch.className = 'esc-cat'; ch.textContent = cat; modal.appendChild(ch); }
      const row = document.createElement('div'); row.className = 'esc-line';
      const fn = document.createElement('span'); fn.className = 'fn'; fn.textContent = FUNCAO_LABEL[e.funcao] || e.funcao;
      const nm = document.createElement('span'); nm.className = 'nm'; nm.textContent = e.nome;
      row.append(fn, nm); modal.appendChild(row);
    });
  }
  const close = document.createElement('button'); close.className = 'btn-sm gray'; close.style.marginTop = '14px'; close.textContent = 'Fechar'; close.onclick = () => ov.remove();
  modal.appendChild(close);
  ov.appendChild(modal); document.body.appendChild(ov);
}

init();
</script>
</body>
</html>
