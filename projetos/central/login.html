<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central JCBP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#0c0404;
      --surface:#180a0a;
      --surface2:#220d0d;
      --border:#3d1515;
      --border-wine:#6b2020;
      --wine:#8b2020;
      --wine-light:#c04040;
      --wine-dim:#4a1515;
      --text:#f5e8e8;
      --text-muted:#a07070;
      --wine-bright:#d45050;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:var(--bg);font-family:'Lora',serif;color:var(--text);
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(139,32,32,.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(139,32,32,.04) 0%, transparent 50%);
    }
    .card{
      background:var(--surface);
      border:1px solid var(--border-wine);
      border-radius:4px;
      padding:44px 40px;
      width:100%;max-width:420px;
      box-shadow:0 0 0 1px var(--border), 0 24px 80px rgba(0,0,0,.7),
                 inset 0 1px 0 rgba(139,32,32,.12);
      position:relative;
    }
    .card::before,.card::after{
      content:'';position:absolute;left:12px;right:12px;height:1px;
      background:linear-gradient(90deg,transparent,var(--border-wine),transparent);
    }
    .card::before{top:10px;}
    .card::after{bottom:10px;}

    /* Logo */
    .logo{text-align:center;margin-bottom:28px;}
    .logo-img{
      height:96px;width:auto;margin:0 auto 16px;display:block;
      filter:drop-shadow(0 0 18px rgba(139,32,32,.35));
    }
    .logo h1{
      font-family:'Cinzel',serif;font-size:20px;font-weight:700;
      color:var(--text);letter-spacing:3px;text-transform:uppercase;
    }
    .logo p{
      font-size:11px;color:var(--text-muted);margin-top:6px;
      font-style:italic;letter-spacing:1px;
    }
    .logo-pascom{
      height:36px;width:auto;margin:14px auto 0;display:block;
      opacity:.75;
      filter:drop-shadow(0 0 6px rgba(139,32,32,.2));
    }

    .ornament{
      text-align:center;color:var(--wine-dim);font-size:13px;
      letter-spacing:6px;margin-bottom:28px;opacity:.6;
    }

    /* Tabs */
    .tabs{display:flex;margin-bottom:28px;border:1px solid var(--border-wine);border-radius:2px;overflow:hidden;}
    .tab-btn{
      flex:1;padding:10px;background:transparent;border:none;
      color:var(--text-muted);cursor:pointer;font-size:12px;
      font-family:'Cinzel',serif;letter-spacing:1px;text-transform:uppercase;
      transition:all .25s;
    }
    .tab-btn:not(:last-child){border-right:1px solid var(--border-wine);}
    .tab-btn.active{
      background:linear-gradient(180deg,rgba(139,32,32,.18),rgba(139,32,32,.08));
      color:var(--text);
    }
    .tab-btn:hover:not(.active){background:rgba(139,32,32,.07);color:var(--text);}

    /* Form */
    label{
      display:block;font-size:11px;color:var(--text-muted);margin-bottom:6px;
      font-family:'Cinzel',serif;letter-spacing:1.5px;text-transform:uppercase;
    }
    input,textarea{
      width:100%;padding:10px 14px;
      background:var(--surface2);
      border:1px solid var(--border);
      border-bottom:1px solid var(--border-wine);
      border-radius:2px;color:var(--text);
      font-size:14px;font-family:'Lora',serif;outline:none;
      transition:all .2s;margin-bottom:18px;
    }
    input:focus,textarea:focus{
      border-color:var(--border-wine);
      box-shadow:0 2px 0 var(--wine-dim), inset 0 1px 4px rgba(0,0,0,.3);
      background:#2a0e0e;
    }
    textarea{resize:vertical;min-height:80px;}

    /* Button */
    .btn{
      width:100%;padding:12px;
      background:linear-gradient(180deg,#902525,#6b1818);
      color:var(--text);border:1px solid var(--wine-dim);
      border-radius:2px;font-size:13px;font-weight:600;cursor:pointer;
      font-family:'Cinzel',serif;letter-spacing:2px;text-transform:uppercase;
      transition:all .25s;
      box-shadow:0 2px 12px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.06);
    }
    .btn:hover{
      background:linear-gradient(180deg,#b03030,#852020);
      box-shadow:0 4px 20px rgba(139,32,32,.3), inset 0 1px 0 rgba(255,255,255,.08);
    }
    .btn:disabled{
      background:var(--surface2);color:var(--wine-dim);
      border-color:var(--border);cursor:not-allowed;box-shadow:none;
    }

    /* Messages */
    .msg{margin-top:14px;padding:10px 14px;border-radius:2px;font-size:13px;display:none;
         font-style:italic;}
    .msg.error{
      background:rgba(90,10,10,.4);color:#e8a0a0;
      border:1px solid rgba(120,20,20,.5);display:block;
    }
    .msg.success{
      background:rgba(20,60,20,.3);color:#a0d4a0;
      border:1px solid rgba(30,90,30,.4);display:block;
    }

    /* Screens */
    .screen{display:none;}
    .screen.active{display:block;}

    @media(max-width:480px){
      .card{padding:32px 24px;}
      .logo-img{height:76px;}
      .logo h1{font-size:16px;}
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img class="logo-img" src="../../midia/logos/Logo%20Igreja%20branco.png" alt="JCBP">
    <h1>Central JCBP</h1>
    <p>Paróquia Jesus Cristo Bom Pastor — Limeira/SP</p>
    <img class="logo-pascom" src="../../midia/logos/Logo%20Pascom%20Branco.png" alt="Pascom">
  </div>
  <div class="ornament">✦ ✦ ✦</div>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('login')">Entrar</button>
    <button class="tab-btn" onclick="showTab('solicitar')">Solicitar Acesso</button>
  </div>

  <div id="screen-login" class="screen active">
    <label>E-mail</label>
    <input type="email" id="login-email" placeholder="seu@email.com">
    <label>Senha</label>
    <input type="password" id="login-senha" placeholder="••••••••"
           onkeydown="if(event.key==='Enter')fazerLogin()">
    <button class="btn" id="btn-login" onclick="fazerLogin()">Entrar</button>
    <div class="msg" id="msg-login"></div>
  </div>

  <div id="screen-solicitar" class="screen">
    <label>Nome completo</label>
    <input type="text" id="sol-nome" placeholder="Seu nome completo">
    <label>E-mail</label>
    <input type="email" id="sol-email" placeholder="seu@email.com">
    <label>Ministério de interesse</label>
    <input type="text" id="sol-grupo" placeholder="Ex: Ministério de Louvor">
    <label>Mensagem (opcional)</label>
    <textarea id="sol-mensagem" placeholder="Conte um pouco sobre você..."></textarea>
    <button class="btn" id="btn-solicitar" onclick="enviarSolicitacao()">Enviar Solicitação</button>
    <div class="msg" id="msg-solicitar"></div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://fttjgsotuosjfrasttds.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0dGpnc290dW9zamZyYXN0dGRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MzU3NjUsImV4cCI6MjA5NTExMTc2NX0.BvofcR2cIXP7Bc3r2V0VOgc-JXPefX7JGGwtzv0d_eA';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function showTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) =>
      b.classList.toggle('active', ['login','solicitar'][i] === tab));
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + tab).classList.add('active');
  }

  async function fazerLogin() {
    const email = document.getElementById('login-email').value.trim();
    const senha = document.getElementById('login-senha').value;
    const msg = document.getElementById('msg-login');
    const btn = document.getElementById('btn-login');
    msg.className = 'msg'; msg.textContent = '';
    if (!email || !senha) {
      msg.className = 'msg error'; msg.textContent = 'Preencha e-mail e senha.'; return;
    }
    btn.disabled = true; btn.textContent = 'Aguarde...';
    const { error } = await sb.auth.signInWithPassword({ email, password: senha });
    if (error) {
      msg.className = 'msg error'; msg.textContent = 'E-mail ou senha incorretos.';
      btn.disabled = false; btn.textContent = 'Entrar'; return;
    }
    window.location.href = 'central.html';
  }

  async function enviarSolicitacao() {
    const nome = document.getElementById('sol-nome').value.trim();
    const email = document.getElementById('sol-email').value.trim();
    const grupo = document.getElementById('sol-grupo').value.trim();
    const mensagem = document.getElementById('sol-mensagem').value.trim();
    const msg = document.getElementById('msg-solicitar');
    const btn = document.getElementById('btn-solicitar');
    msg.className = 'msg'; msg.textContent = '';
    if (!nome || !email) {
      msg.className = 'msg error'; msg.textContent = 'Nome e e-mail são obrigatórios.'; return;
    }
    btn.disabled = true; btn.textContent = 'Enviando...';
    const { error } = await sb.from('access_requests').insert({
      nome, email, grupo_interesse: grupo || null, mensagem: mensagem || null
    });
    if (error) {
      msg.className = 'msg error'; msg.textContent = 'Erro ao enviar. Tente novamente.';
      btn.disabled = false; btn.textContent = 'Enviar Solicitação'; return;
    }
    msg.className = 'msg success';
    msg.textContent = 'Solicitação enviada. Aguarde a aprovação do administrador.';
    btn.disabled = true;
  }

  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = 'central.html';
  });
</script>
</body>
</html>
