<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central JCBP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#0c0404;--surface:#180a0a;--surface2:#220d0d;
      --border:#3d1515;--border-wine:#6b2020;
      --wine:#8b2020;--wine-light:#c04040;--wine-dim:#4a1515;
      --text:#f5e8e8;--text-muted:#a07070;--wine-bright:#d45050;
      --focus-bg:#2a0e0e;
      --shadow-card:0 0 0 1px var(--border),0 24px 80px rgba(0,0,0,.72),inset 0 1px 0 rgba(139,32,32,.12);
    }
    [data-theme="light"]{
      --bg:#f2e8e8;--surface:#fdf6f6;--surface2:#f5e2e2;
      --border:#d4a8a8;--border-wine:#a04040;
      --wine:#7a1515;--wine-light:#5a0e0e;--wine-dim:#c08080;
      --text:#1a0505;--text-muted:#6a3030;--wine-bright:#8a1a1a;
      --focus-bg:#ffe8e8;
      --shadow-card:0 0 0 1px var(--border),0 8px 32px rgba(139,32,32,.12),inset 0 1px 0 rgba(139,32,32,.06);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    body{
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:var(--bg);font-family:'Lora',serif;color:var(--text);
      transition:background .3s,color .3s;
      background-image:
        radial-gradient(ellipse at 20% 50%,rgba(139,32,32,.06) 0%,transparent 60%),
        radial-gradient(ellipse at 80% 20%,rgba(139,32,32,.04) 0%,transparent 50%);
    }
    /* BG SYMBOLS */
    .bg-symbols{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
    .bg-symbol{position:absolute;bottom:-80px;color:var(--wine);opacity:0;animation:bgFloat linear infinite;}
    .bg-symbol svg{width:100%;height:100%;display:block;}
    @keyframes bgFloat{
      0%  {transform:translate(0,0) rotate(0deg);opacity:0;}
      8%  {opacity:var(--sym-op);}
      50% {transform:translate(var(--sym-dx),-55vh) rotate(var(--sym-rh));}
      92% {opacity:var(--sym-op);}
      100%{transform:translate(0,-110vh) rotate(var(--sym-r));opacity:0;}
    }
    /* THEME TOGGLE */
    .theme-toggle{
      position:absolute;top:14px;right:14px;
      background:transparent;border:1px solid var(--border-wine);
      color:var(--text-muted);width:32px;height:32px;border-radius:50%;
      cursor:pointer;font-size:15px;transition:all .2s;
      display:flex;align-items:center;justify-content:center;
    }
    .theme-toggle:hover{border-color:var(--wine-light);color:var(--wine-light);}
    /* CARD */
    .card{
      position:relative;z-index:1;
      background:var(--surface);border:1px solid var(--border-wine);border-radius:4px;
      padding:44px 40px;width:100%;max-width:420px;
      box-shadow:var(--shadow-card);transition:background .3s,border-color .3s,box-shadow .3s;
    }
    .card::before,.card::after{
      content:'';position:absolute;left:12px;right:12px;height:1px;
      background:linear-gradient(90deg,transparent,var(--border-wine),transparent);
    }
    .card::before{top:10px;}.card::after{bottom:10px;}
    /* LOGO */
    .logo{text-align:center;margin-bottom:28px;}
    .logo-img{
      height:92px;width:auto;margin:0 auto 16px;display:block;
      filter:drop-shadow(0 0 16px rgba(139,32,32,.3));transition:filter .3s;
    }
    .page-footer{
      position:fixed;bottom:20px;left:0;right:0;
      text-align:center;z-index:1;pointer-events:none;
    }
    .logo-pascom{
      height:28px;width:auto;display:inline-block;
      opacity:.55;filter:drop-shadow(0 0 4px rgba(139,32,32,.15));transition:filter .3s;
    }
    .logo h1{
      font-family:'Cinzel',serif;font-size:20px;font-weight:700;
      color:var(--text);letter-spacing:3px;text-transform:uppercase;
    }
    .logo p{font-size:11px;color:var(--text-muted);margin-top:6px;font-style:italic;letter-spacing:1px;}
    .ornament{text-align:center;color:var(--wine-dim);font-size:13px;letter-spacing:6px;margin-bottom:28px;opacity:.6;}
    /* TABS */
    .tabs{display:flex;margin-bottom:28px;border:1px solid var(--border-wine);border-radius:2px;overflow:hidden;}
    .tab-btn{
      flex:1;padding:10px;background:transparent;border:none;
      color:var(--text-muted);cursor:pointer;font-size:12px;
      font-family:'Cinzel',serif;letter-spacing:1px;text-transform:uppercase;transition:all .25s;
    }
    .tab-btn:not(:last-child){border-right:1px solid var(--border-wine);}
    .tab-btn.active{background:linear-gradient(180deg,rgba(139,32,32,.18),rgba(139,32,32,.08));color:var(--text);}
    .tab-btn:hover:not(.active){background:rgba(139,32,32,.07);color:var(--text);}
    /* FORM */
    label{
      display:block;font-size:11px;color:var(--text-muted);margin-bottom:6px;
      font-family:'Cinzel',serif;letter-spacing:1.5px;text-transform:uppercase;
    }
    input,textarea{
      width:100%;padding:10px 14px;background:var(--surface2);
      border:1px solid var(--border);border-bottom:1px solid var(--border-wine);
      border-radius:2px;color:var(--text);font-size:14px;font-family:'Lora',serif;
      outline:none;transition:all .2s;margin-bottom:18px;
    }
    input:focus,textarea:focus{
      border-color:var(--border-wine);
      box-shadow:0 2px 0 var(--wine-dim),inset 0 1px 4px rgba(0,0,0,.2);
      background:var(--focus-bg);
    }
    textarea{resize:vertical;min-height:80px;}
    /* BUTTON */
    .btn{
      width:100%;padding:12px;background:linear-gradient(180deg,#902525,#6b1818);
      color:var(--text);border:1px solid var(--wine-dim);border-radius:2px;
      font-size:13px;font-weight:600;cursor:pointer;
      font-family:'Cinzel',serif;letter-spacing:2px;text-transform:uppercase;transition:all .25s;
      box-shadow:0 2px 12px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.06);
    }
    .btn:hover{
      background:linear-gradient(180deg,#b03030,#852020);
      box-shadow:0 4px 20px rgba(139,32,32,.3),inset 0 1px 0 rgba(255,255,255,.08);
    }
    .btn:disabled{background:var(--surface2);color:var(--wine-dim);border-color:var(--border);cursor:not-allowed;box-shadow:none;}
    /* LINK */
    .link-action{
      display:block;text-align:center;margin-top:14px;
      font-size:12px;color:var(--text-muted);cursor:pointer;
      font-family:'Cinzel',serif;letter-spacing:1px;text-decoration:none;transition:color .2s;
    }
    .link-action:hover{color:var(--wine-light);}
    /* MESSAGES */
    .msg{margin-top:14px;padding:10px 14px;border-radius:2px;font-size:13px;display:none;font-style:italic;}
    .msg.error{background:rgba(90,10,10,.35);color:#e8a0a0;border:1px solid rgba(120,20,20,.5);display:block;}
    .msg.success{background:rgba(20,60,20,.25);color:#a0d4a0;border:1px solid rgba(30,90,30,.4);display:block;}
    [data-theme="light"] .msg.error{background:rgba(180,30,30,.08);color:#7a1515;border-color:rgba(130,20,20,.3);}
    [data-theme="light"] .msg.success{background:rgba(20,100,20,.08);color:#1a5a1a;border-color:rgba(30,90,30,.3);}
    /* SCREENS */
    .screen{display:none;}.screen.active{display:block;}
    @media(max-width:480px){
      .card{padding:32px 24px;}
      .logo-img{height:72px;}
      .logo h1{font-size:16px;}
      .logo-pascom{height:22px;}
    }
  </style>
</head>
<body>
<div class="bg-symbols" id="bg-symbols"></div>
<div class="card">
  <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Alternar tema">☀</button>

  <div class="logo">
    <img class="logo-img" id="logo-igreja"
      src="../../midia/logos/Logo%20Igreja%20branco.png"
      data-dark="../../midia/logos/Logo%20Igreja%20branco.png"
      data-light="../../midia/logos/Logo%20Igreja%20colorido.png"
      alt="JCBP">
    <h1>Central JCBP</h1>
    <p>Paróquia Jesus Cristo Bom Pastor — Limeira/SP</p>
  </div>
  <div class="ornament">✦ ✦ ✦</div>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('login')">Entrar</button>
    <button class="tab-btn" onclick="showTab('solicitar')">Solicitar Acesso</button>
  </div>

  <!-- LOGIN -->
  <div id="screen-login" class="screen active">
    <label>E-mail</label>
    <input type="email" id="login-email" placeholder="seu@email.com">
    <label>Senha</label>
    <input type="password" id="login-senha" placeholder="••••••••"
           onkeydown="if(event.key==='Enter')fazerLogin()">
    <button class="btn" id="btn-login" onclick="fazerLogin()">Entrar</button>
    <a class="link-action" onclick="showTab('esqueci')">Esqueci minha senha</a>
    <div class="msg" id="msg-login"></div>
  </div>

  <!-- SOLICITAR ACESSO -->
  <div id="screen-solicitar" class="screen">
    <label>Nome completo</label>
    <input type="text" id="sol-nome" placeholder="Seu nome completo">
    <label>E-mail</label>
    <input type="email" id="sol-email" placeholder="seu@email.com">
    <label>Ministério de interesse</label>
    <input type="text" id="sol-grupo" placeholder="Ex: Ministério de Louvor">
    <label>Mensagem (opcional)</label>
    <textarea id="sol-mensagem" placeholder="Conte um pouco sobre você..."></textarea>
    <button class="btn" id="btn-solicitar" onclick="enviarSolicitacao()">Enviar Solicitação</button>
    <div class="msg" id="msg-solicitar"></div>
  </div>

  <!-- ESQUECI SENHA -->
  <div id="screen-esqueci" class="screen">
    <label>Seu e-mail cadastrado</label>
    <input type="email" id="esc-email" placeholder="seu@email.com"
           onkeydown="if(event.key==='Enter')resetarSenha()">
    <button class="btn" id="btn-esqueci" onclick="resetarSenha()">Enviar Link de Recuperação</button>
    <a class="link-action" onclick="showTab('login')">← Voltar ao login</a>
    <div class="msg" id="msg-esqueci"></div>
  </div>
</div>

<div class="page-footer">
  <img class="logo-pascom" id="logo-pascom"
    src="../../midia/logos/Logo%20Pascom%20Branco.png"
    data-dark="../../midia/logos/Logo%20Pascom%20Branco.png"
    data-light="../../midia/logos/Logo%20Pascom%20Colorido.png"
    alt="Pascom">
</div>

<script>
  // ── THEME ──────────────────────────────────────────────────────────
  function initTheme(){applyTheme(localStorage.getItem('jcbp-theme')||'dark',false);}
  function toggleTheme(){
    applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark',true);
  }
  function applyTheme(theme,save){
    document.documentElement.setAttribute('data-theme',theme);
    if(save)localStorage.setItem('jcbp-theme',theme);
    const btn=document.getElementById('theme-toggle');
    if(btn)btn.textContent=theme==='dark'?'☀':'☾';
    // troca logos
    ['logo-igreja','logo-pascom'].forEach(id=>{
      const img=document.getElementById(id);
      if(img&&img.dataset[theme])img.src=img.dataset[theme];
    });
  }

  // ── BG SYMBOLS ─────────────────────────────────────────────────────
  const _SYMS=[
    '<svg viewBox="0 0 20 28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="10" y1="1" x2="10" y2="27"/><line x1="2" y1="8" x2="18" y2="8"/></svg>',
    '<svg viewBox="0 0 24 30" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 3 L20 3 L16 14 C16 18 18 20 18 20 L6 20 C6 20 8 18 8 14 Z"/><line x1="12" y1="20" x2="12" y2="25"/><line x1="7" y1="25" x2="17" y2="25"/><line x1="7" y1="28" x2="17" y2="28"/></svg>',
    '<svg viewBox="0 0 32 38" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="16" cy="14" r="6"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="16" y1="22" x2="16" y2="26"/><line x1="4" y1="14" x2="8" y2="14"/><line x1="24" y1="14" x2="28" y2="14"/><line x1="7.5" y1="5.5" x2="10.2" y2="8.2"/><line x1="21.8" y1="19.8" x2="24.5" y2="22.5"/><line x1="24.5" y1="5.5" x2="21.8" y2="8.2"/><line x1="10.2" y1="19.8" x2="7.5" y2="22.5"/><line x1="16" y1="26" x2="16" y2="32"/><line x1="10" y1="32" x2="22" y2="32"/><line x1="8" y1="36" x2="24" y2="36"/></svg>',
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="7" x2="12" y2="17"/><line x1="7" y1="12" x2="17" y2="12"/></svg>',
    '<svg viewBox="0 0 32 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 10 C7 3 20 3 26 10 C20 17 7 17 2 10 Z"/><path d="M23 6 L30 10 L23 14"/></svg>',
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="12" y1="2" x2="12" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="5" y1="5" x2="19" y2="19"/><line x1="19" y1="5" x2="5" y2="19"/></svg>',
  ];
  function _parseSVG(str){return new DOMParser().parseFromString(str,'image/svg+xml').documentElement;}
  function initBgSymbols(){
    const c=document.getElementById('bg-symbols');if(!c)return;
    for(let i=0;i<16;i++){
      const el=document.createElement('div');
      el.className='bg-symbol';
      el.appendChild(_parseSVG(_SYMS[i%_SYMS.length]));
      const size=16+Math.random()*52,dur=45+Math.random()*70;
      el.style.cssText=[
        'width:'+size.toFixed(1)+'px','height:'+size.toFixed(1)+'px',
        'left:'+(2+Math.random()*96).toFixed(1)+'%',
        '--sym-op:'+(0.03+Math.random()*0.07).toFixed(3),
        '--sym-dx:'+((Math.random()-.5)*130).toFixed(1)+'px',
        '--sym-rh:'+((Math.random()-.5)*40).toFixed(1)+'deg',
        '--sym-r:'+((Math.random()-.5)*80).toFixed(1)+'deg',
        'animation-duration:'+dur.toFixed(1)+'s',
        'animation-delay:'+(-Math.random()*dur).toFixed(1)+'s',
      ].join(';');
      c.appendChild(el);
    }
  }

  // ── SUPABASE ────────────────────────────────────────────────────────
  const SUPABASE_URL='https://fttjgsotuosjfrasttds.supabase.co';
  const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0dGpnc290dW9zamZyYXN0dGRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MzU3NjUsImV4cCI6MjA5NTExMTc2NX0.BvofcR2cIXP7Bc3r2V0VOgc-JXPefX7JGGwtzv0d_eA';
  const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

  function showTab(tab){
    document.querySelectorAll('.tab-btn').forEach((b,i)=>
      b.classList.toggle('active',['login','solicitar'][i]===tab));
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('screen-'+tab).classList.add('active');
  }

  async function fazerLogin(){
    const email=document.getElementById('login-email').value.trim();
    const senha=document.getElementById('login-senha').value;
    const msg=document.getElementById('msg-login'),btn=document.getElementById('btn-login');
    msg.className='msg';msg.textContent='';
    if(!email||!senha){msg.className='msg error';msg.textContent='Preencha e-mail e senha.';return;}
    btn.disabled=true;btn.textContent='Aguarde...';
    const{error}=await sb.auth.signInWithPassword({email,password:senha});
    if(error){msg.className='msg error';msg.textContent='E-mail ou senha incorretos.';btn.disabled=false;btn.textContent='Entrar';return;}
    window.location.href='central.html';
  }

  async function enviarSolicitacao(){
    const nome=document.getElementById('sol-nome').value.trim();
    const email=document.getElementById('sol-email').value.trim();
    const grupo=document.getElementById('sol-grupo').value.trim();
    const mensagem=document.getElementById('sol-mensagem').value.trim();
    const msg=document.getElementById('msg-solicitar'),btn=document.getElementById('btn-solicitar');
    msg.className='msg';msg.textContent='';
    if(!nome||!email){msg.className='msg error';msg.textContent='Nome e e-mail são obrigatórios.';return;}
    btn.disabled=true;btn.textContent='Enviando...';
    const{error}=await sb.from('access_requests').insert({
      nome,email,grupo_interesse:grupo||null,mensagem:mensagem||null
    });
    if(error){msg.className='msg error';msg.textContent='Erro ao enviar. Tente novamente.';btn.disabled=false;btn.textContent='Enviar Solicitação';return;}
    msg.className='msg success';msg.textContent='Solicitação enviada. Aguarde a aprovação do administrador.';
    btn.disabled=true;
  }

  async function resetarSenha(){
    const email=document.getElementById('esc-email').value.trim();
    const msg=document.getElementById('msg-esqueci'),btn=document.getElementById('btn-esqueci');
    msg.className='msg';msg.textContent='';
    if(!email){msg.className='msg error';msg.textContent='Informe seu e-mail.';return;}
    btn.disabled=true;btn.textContent='Enviando...';
    const redirectTo=window.location.origin+'/central';
    const{error}=await sb.auth.resetPasswordForEmail(email,{redirectTo});
    if(error){msg.className='msg error';msg.textContent='Erro ao enviar. Tente novamente.';btn.disabled=false;btn.textContent='Enviar Link de Recuperação';return;}
    msg.className='msg success';msg.textContent='Link enviado. Verifique seu e-mail.';
    btn.disabled=true;
  }

  sb.auth.getSession().then(({data:{session}})=>{if(session)window.location.href='central.html';});
  initTheme();
  initBgSymbols();
</script>
</body>
</html>
