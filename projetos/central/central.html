<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central JCBP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#0c0404;--surface:#180a0a;--surface2:#220d0d;
      --border:#3d1515;--border-wine:#6b2020;
      --wine:#8b2020;--wine-light:#c04040;--wine-dim:#4a1515;
      --text:#f5e8e8;--text-muted:#a07070;--wine-bright:#d45050;
      --focus-bg:#2a0e0e;
      --shadow-modal:0 0 0 1px var(--border),0 32px 80px rgba(0,0,0,.8),inset 0 1px 0 rgba(139,32,32,.1);
    }
    [data-theme="light"]{
      --bg:#f2e8e8;--surface:#fdf6f6;--surface2:#f5e2e2;
      --border:#d4a8a8;--border-wine:#a04040;
      --wine:#7a1515;--wine-light:#5a0e0e;--wine-dim:#c08080;
      --text:#1a0505;--text-muted:#6a3030;--wine-bright:#8a1a1a;
      --focus-bg:#ffe8e8;
      --shadow-modal:0 0 0 1px var(--border),0 8px 32px rgba(0,0,0,.12),inset 0 1px 0 rgba(139,32,32,.06);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      min-height:100vh;background:var(--bg);
      font-family:'Lora',serif;color:var(--text);
      transition:background .3s,color .3s;
      background-image:
        radial-gradient(ellipse at 10% 0%,rgba(139,32,32,.04) 0%,transparent 50%),
        radial-gradient(ellipse at 90% 100%,rgba(139,32,32,.03) 0%,transparent 50%);
    }
    /* BG SYMBOLS */
    .bg-symbols{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
    .bg-symbol{position:absolute;bottom:-80px;color:var(--wine);opacity:0;animation:bgFloat linear infinite;}
    .bg-symbol svg{width:100%;height:100%;display:block;}
    @keyframes bgFloat{
      0%  {transform:translate(0,0) rotate(0deg);opacity:0;}
      8%  {opacity:var(--sym-op);}
      50% {transform:translate(var(--sym-dx),-55vh) rotate(var(--sym-rh));}
      92% {opacity:var(--sym-op);}
      100%{transform:translate(0,-110vh) rotate(var(--sym-r));opacity:0;}
    }
    /* THEME TOGGLE */
    .theme-toggle{
      background:transparent;border:1px solid var(--border-wine);
      color:var(--text-muted);width:32px;height:32px;border-radius:50%;
      cursor:pointer;font-size:15px;transition:all .2s;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
    }
    .theme-toggle:hover{border-color:var(--wine-light);color:var(--wine-light);}

    /* ── HEADER ── */
    .header{
      background:var(--surface);
      border-bottom:1px solid var(--border-wine);
      padding:0 28px;height:64px;
      display:flex;align-items:center;justify-content:space-between;
      position:sticky;top:0;z-index:10;
      box-shadow:0 2px 20px rgba(0,0,0,.5);
    }
    .header::after{
      content:'';position:absolute;left:0;right:0;bottom:-1px;height:1px;
      background:linear-gradient(90deg,transparent,var(--wine-dim),transparent);
      pointer-events:none;
    }
    .header-logo{
      font-family:'Cinzel',serif;font-size:16px;font-weight:700;
      color:var(--text);letter-spacing:2px;
      display:flex;align-items:center;gap:12px;
    }
    .header-logo img{
      height:38px;width:auto;
      filter:drop-shadow(0 0 8px rgba(139,32,32,.3));
    }
    .header-right{display:flex;align-items:center;gap:16px;}
    .header-pascom img{
      height:24px;width:auto;opacity:.7;
    }
    .header-user{display:flex;align-items:center;gap:14px;font-size:14px;color:var(--text-muted);}
    #user-nome{
      font-family:'Cinzel',serif;font-size:13px;
      letter-spacing:.5px;color:var(--text);
    }
    .header-divider{width:1px;height:28px;background:var(--border-wine);opacity:.5;}
    .btn-sair{
      background:transparent;border:1px solid var(--border-wine);
      color:var(--text-muted);padding:6px 16px;border-radius:2px;
      cursor:pointer;font-size:11px;font-family:'Cinzel',serif;
      letter-spacing:1.5px;text-transform:uppercase;transition:all .2s;
    }
    .btn-sair:hover{border-color:var(--wine-light);color:var(--wine-light);}

    /* ── NAV ── */
    .nav{
      display:flex;padding:0 28px;background:var(--surface);
      border-bottom:1px solid var(--border);overflow-x:auto;
      position:relative;z-index:1;
    }
    .nav-btn{
      padding:14px 22px;background:transparent;border:none;
      border-bottom:2px solid transparent;color:var(--text-muted);
      cursor:pointer;font-size:12px;font-family:'Cinzel',serif;
      letter-spacing:1.5px;text-transform:uppercase;
      transition:all .25s;white-space:nowrap;
    }
    .nav-btn.active{color:var(--text);border-bottom-color:var(--wine-light);}
    .nav-btn:hover:not(.active){color:var(--text);border-bottom-color:var(--border-wine);}

    /* ── SCREENS ── */
    .screen{display:none;padding:36px 28px;max-width:1200px;position:relative;z-index:1;}
    .screen.active{display:block;}
    .page-title{
      font-family:'Cinzel',serif;font-size:20px;font-weight:700;
      color:var(--text);letter-spacing:2px;margin-bottom:28px;
      padding-bottom:14px;border-bottom:1px solid var(--border-wine);
      position:relative;
    }
    .page-title::after{
      content:'';position:absolute;left:0;bottom:-1px;width:80px;height:1px;
      background:var(--wine-light);
    }

    /* ── TOOLS GRID ── */
    .tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px;}
    .tool-card{
      background:var(--surface);border:1px solid var(--border-wine);
      border-radius:3px;padding:24px 20px;cursor:pointer;
      transition:all .25s;text-decoration:none;color:inherit;
      display:block;position:relative;overflow:hidden;
    }
    .tool-card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:1px;
      background:linear-gradient(90deg,transparent,var(--wine-dim),transparent);
    }
    .tool-card:hover{
      border-color:var(--wine-light);transform:translateY(-2px);
      box-shadow:0 6px 24px rgba(139,32,32,.2),
                 inset 0 0 0 1px rgba(139,32,32,.05);
    }
    .tool-icon{font-size:34px;margin-bottom:14px;}
    .tool-name{
      font-family:'Cinzel',serif;font-size:14px;font-weight:600;
      color:var(--text);margin-bottom:8px;letter-spacing:.5px;
    }
    .tool-desc{font-size:13px;color:var(--text-muted);line-height:1.5;font-style:italic;}

    /* ── ADMIN TABS ── */
    .admin-tabs{
      display:flex;border-bottom:1px solid var(--border-wine);
      margin-bottom:28px;overflow-x:auto;
    }
    .admin-tab{
      padding:12px 22px;background:transparent;border:none;
      border-bottom:2px solid transparent;color:var(--text-muted);
      cursor:pointer;font-size:11px;font-family:'Cinzel',serif;
      letter-spacing:1.5px;text-transform:uppercase;
      white-space:nowrap;transition:all .25s;
    }
    .admin-tab.active{color:var(--text);border-bottom-color:var(--wine-light);}
    .admin-tab:hover:not(.active){color:var(--text);}
    .admin-content{display:none;}
    .admin-content.active{display:block;}

    /* ── TABLES ── */
    .table-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;font-size:14px;min-width:560px;}
    th{
      text-align:left;padding:10px 14px;
      font-family:'Cinzel',serif;font-size:11px;letter-spacing:1.5px;
      color:var(--text-muted);font-weight:600;text-transform:uppercase;
      border-bottom:1px solid var(--border-wine);white-space:nowrap;
    }
    td{
      padding:10px 14px;border-bottom:1px solid var(--border);
      color:var(--text);vertical-align:middle;
    }
    tr:hover td{background:rgba(201,168,76,.03);}

    /* ── BADGES ── */
    .badge{
      display:inline-block;padding:2px 10px;border-radius:2px;
      font-size:11px;font-weight:600;font-family:'Cinzel',serif;
      letter-spacing:.5px;text-transform:uppercase;border:1px solid;
    }
    .badge.pendente{background:rgba(180,100,20,.15);color:#d4a060;border-color:rgba(160,90,20,.3);}
    .badge.ativo,.badge.aprovado{background:rgba(30,80,30,.3);color:#86c986;border-color:rgba(40,110,40,.4);}
    .badge.bloqueado,.badge.rejeitado{background:rgba(100,10,10,.4);color:#e8a0a0;border-color:rgba(130,20,20,.5);}
    .badge.admin{background:rgba(139,32,32,.3);color:var(--wine-bright);border-color:rgba(139,32,32,.5);}
    .badge.lider{background:rgba(100,20,20,.2);color:#d47070;border-color:rgba(120,30,30,.4);}
    .badge.membro{background:rgba(50,20,20,.3);color:var(--text-muted);border-color:var(--border);}

    /* ── SMALL BUTTONS ── */
    .btn-sm{
      padding:5px 13px;border-radius:2px;font-size:11px;cursor:pointer;
      font-family:'Cinzel',serif;letter-spacing:1px;text-transform:uppercase;
      font-weight:600;transition:all .2s;border:1px solid;
    }
    .btn-sm:hover{opacity:.85;}
    .btn-sm.green{background:rgba(25,65,25,.5);color:#86c986;border-color:rgba(40,100,40,.5);}
    .btn-sm.red{background:rgba(90,10,10,.5);color:#e8a0a0;border-color:rgba(130,20,20,.6);}
    .btn-sm.blue{
      background:linear-gradient(180deg,#902525,#6b1818);
      color:var(--text);border-color:var(--wine-dim);
    }
    .btn-sm.blue:hover{background:linear-gradient(180deg,#b03030,#852020);opacity:1;}
    .btn-sm.gray{background:var(--surface2);color:var(--text-muted);border-color:var(--border);}
    .btn-sm.orange{background:rgba(100,30,30,.4);color:#d47070;border-color:rgba(130,40,40,.5);}

    .row-actions{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
    .toolbar{display:flex;justify-content:flex-end;margin-bottom:18px;}

    /* ── MODAL ── */
    .modal-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.78);
      display:none;align-items:center;justify-content:center;
      z-index:100;padding:16px;
    }
    .modal-overlay.open{display:flex;}
    .modal{
      background:var(--surface);border:1px solid var(--border-wine);
      border-radius:3px;padding:36px 32px;width:100%;max-width:480px;
      max-height:90vh;overflow-y:auto;position:relative;
      box-shadow:var(--shadow-modal);
    }
    .modal::before{
      content:'';position:absolute;left:12px;right:12px;top:10px;height:1px;
      background:linear-gradient(90deg,transparent,var(--border-wine),transparent);
    }
    .modal h3{
      font-family:'Cinzel',serif;font-size:16px;font-weight:700;
      color:var(--gold-light);letter-spacing:2px;margin-bottom:22px;
      text-transform:uppercase;
    }
    .modal label{
      display:block;font-size:11px;color:var(--text-muted);
      margin-bottom:6px;margin-top:16px;
      font-family:'Cinzel',serif;letter-spacing:1.5px;text-transform:uppercase;
    }
    .modal label:first-of-type{margin-top:0;}
    .modal input,.modal select,.modal textarea{
      width:100%;padding:10px 14px;
      background:var(--surface2);border:1px solid var(--border);
      border-bottom:1px solid var(--border-wine);
      border-radius:2px;color:var(--text);font-size:14px;
      font-family:'Lora',serif;outline:none;transition:all .2s;
      margin-bottom:0;
    }
    .modal input:focus,.modal select:focus,.modal textarea:focus{
      border-color:var(--border-wine);
      box-shadow:0 2px 0 var(--wine-dim),inset 0 1px 4px rgba(0,0,0,.3);
      background:var(--focus-bg);
    }
    .modal select option{background:var(--surface2);}
    .modal textarea{resize:vertical;min-height:80px;}
    .modal-actions{
      display:flex;gap:10px;justify-content:flex-end;
      margin-top:26px;padding-top:20px;border-top:1px solid var(--border);
    }

    /* ── PERM LIST ── */
    .perm-item{
      display:flex;align-items:center;gap:12px;padding:10px 0;
      border-bottom:1px solid var(--border);cursor:pointer;
      transition:background .15s;
    }
    .perm-item:last-child{border-bottom:none;}
    .perm-item:hover{background:rgba(201,168,76,.03);}
    .perm-item input{
      width:16px;height:16px;cursor:pointer;flex-shrink:0;
      accent-color:var(--gold);
    }
    .perm-item span{font-size:14px;color:var(--text);}

    /* ── UTIL ── */
    .empty{
      color:var(--text-muted);font-size:15px;padding:48px 0;
      display:block;font-style:italic;
    }
    .loading{
      color:var(--text-muted);font-size:14px;padding:24px 0;
      display:block;font-style:italic;
    }

    @media(max-width:640px){
      .screen{padding:24px 16px;}
      .tools-grid{grid-template-columns:1fr 1fr;gap:12px;}
      .tool-card{padding:16px 14px;}
      .tool-icon{font-size:26px;}
      .header{padding:0 16px;}
      .nav{padding:0 8px;}
      .modal{padding:28px 20px;}
    }
  </style>
</head>
<body>

<div class="bg-symbols" id="bg-symbols"></div>
<div class="header">
  <span class="header-logo">
    <img id="logo-igreja" style="height:38px;width:auto;filter:drop-shadow(0 0 8px rgba(139,32,32,.3));transition:filter .3s"
      src="../../midia/logos/Logo%20Igreja%20branco.png"
      data-dark="../../midia/logos/Logo%20Igreja%20branco.png"
      data-light="../../midia/logos/Logo%20Igreja%20colorido.png"
      alt="JCBP">
    Central JCBP
  </span>
  <div class="header-right">
    <div class="header-pascom">
      <img id="logo-pascom" style="height:19px;width:auto;opacity:.75;transition:filter .3s"
        src="../../midia/logos/Logo%20Pascom%20Branco.png"
        data-dark="../../midia/logos/Logo%20Pascom%20Branco.png"
        data-light="../../midia/logos/Logo%20Pascom%20Colorido.png"
        alt="Pascom">
    </div>
    <div class="header-divider"></div>
    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Alternar tema">☀</button>
    <div class="header-divider"></div>
    <div class="header-user">
      <span id="user-nome">—</span>
      <button class="btn-sair" onclick="sair()">Sair</button>
    </div>
  </div>
</div>

<div class="nav">
  <button class="nav-btn active" data-screen="home" onclick="showScreen('home')">Início</button>
  <button class="nav-btn" data-screen="admin" id="nav-admin" style="display:none"
          onclick="showScreen('admin')">Administração</button>
</div>

<div id="screen-home" class="screen active">
  <h2 class="page-title">Ferramentas</h2>
  <div class="tools-grid" id="tools-grid">
    <span class="loading">Carregando...</span>
  </div>
</div>

<div id="screen-admin" class="screen"></div>

<script>
  const SUPABASE_URL = 'https://fttjgsotuosjfrasttds.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0dGpnc290dW9zamZyYXN0dGRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MzU3NjUsImV4cCI6MjA5NTExMTc2NX0.BvofcR2cIXP7Bc3r2V0VOgc-JXPefX7JGGwtzv0d_eA';
  const SUPABASE_SERVICE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0dGpnc290dW9zamZyYXN0dGRzIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3OTUzNTc2NSwiZXhwIjoyMDk1MTExNzY1fQ.ejxL-yOGhls3v6J5JQHDkl8wE4GVEKWrSlvgxAvixY8';

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const sbAdmin = window.supabase.createClient(SUPABASE_URL, SUPABASE_SERVICE_KEY);

  let currentUser = null;
  let currentProfile = null;

  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;')
           .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
    const btn = document.querySelector(`.nav-btn[data-screen="${name}"]`);
    if (btn) btn.classList.add('active');
    if (name === 'admin') renderAdmin();
  }

  async function sair() {
    await sb.auth.signOut();
    window.location.href = 'login.html';
  }

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
    currentUser = session.user;
    const { data: profile } = await sb.from('profiles')
      .select('*').eq('id', currentUser.id).single();
    if (!profile) { await sb.auth.signOut(); window.location.href = 'login.html'; return; }
    currentProfile = profile;
    document.getElementById('user-nome').textContent = profile.nome;
    if (profile.role === 'admin') {
      document.getElementById('nav-admin').style.display = '';
    }
    await renderTools();
  }

  // ── HOME ──────────────────────────────────────────────────────────────

  async function renderTools() {
    const grid = document.getElementById('tools-grid');
    grid.textContent = '';
    let tools = [];
    if (currentProfile.role === 'admin') {
      const { data } = await sb.from('tools').select('*').eq('ativo', true).order('nome');
      tools = data || [];
    } else if (currentProfile.group_id) {
      const { data } = await sb.from('group_tools')
        .select('tool_id, tools(*)').eq('group_id', currentProfile.group_id);
      tools = (data || []).map(r => r.tools).filter(t => t && t.ativo);
    }
    if (!tools.length) {
      const em = document.createElement('span');
      em.className = 'empty';
      em.textContent = 'Nenhuma ferramenta disponível.';
      grid.appendChild(em); return;
    }
    tools.forEach(t => {
      const a = document.createElement('a');
      a.className = 'tool-card'; a.href = t.url;
      const icon = document.createElement('div');
      icon.className = 'tool-icon'; icon.textContent = t.icone || '🔧';
      const name = document.createElement('div');
      name.className = 'tool-name'; name.textContent = t.nome;
      const desc = document.createElement('div');
      desc.className = 'tool-desc'; desc.textContent = t.descricao || '';
      a.append(icon, name, desc);
      grid.appendChild(a);
    });
  }

  // ── ADMIN ─────────────────────────────────────────────────────────────

  function renderAdmin() {
    const screen = document.getElementById('screen-admin');
    screen.textContent = '';
    const title = document.createElement('h2');
    title.className = 'page-title'; title.textContent = 'Painel Administrativo';
    const tabsEl = document.createElement('div'); tabsEl.className = 'admin-tabs';
    const tabs = [
      { id: 'solicitacoes', label: 'Solicitações' },
      { id: 'usuarios',     label: 'Usuários'     },
      { id: 'grupos',       label: 'Grupos'       },
      { id: 'ferramentas',  label: 'Ferramentas'  },
    ];
    tabs.forEach((t, i) => {
      const btn = document.createElement('button');
      btn.className = 'admin-tab' + (i === 0 ? ' active' : '');
      btn.textContent = t.label;
      btn.onclick = () => showAdminTab(t.id);
      tabsEl.appendChild(btn);
    });
    screen.append(title, tabsEl);
    tabs.forEach(t => {
      const div = document.createElement('div');
      div.id = 'admin-' + t.id;
      div.className = 'admin-content' + (t.id === 'solicitacoes' ? ' active' : '');
      screen.appendChild(div);
    });
    renderSolicitacoes();
  }

  function showAdminTab(tab) {
    const ids = ['solicitacoes','usuarios','grupos','ferramentas'];
    document.querySelectorAll('.admin-tab').forEach((b, i) =>
      b.classList.toggle('active', ids[i] === tab));
    document.querySelectorAll('.admin-content').forEach(c =>
      c.classList.remove('active'));
    document.getElementById('admin-' + tab).classList.add('active');
    const fns = {
      solicitacoes: renderSolicitacoes,
      usuarios: renderUsuarios,
      grupos: renderGrupos,
      ferramentas: renderFerramentas
    };
    fns[tab]();
  }

  // ── SOLICITAÇÕES ──────────────────────────────────────────────────────

  async function renderSolicitacoes() {
    const el = document.getElementById('admin-solicitacoes');
    el.textContent = '';
    const { data } = await sb.from('access_requests')
      .select('*').order('created_at', { ascending: false });
    if (!data || !data.length) {
      const p = document.createElement('span');
      p.className = 'empty'; p.textContent = 'Nenhuma solicitação.';
      el.appendChild(p); return;
    }
    const wrap = document.createElement('div'); wrap.className = 'table-wrap';
    const table = document.createElement('table');
    const thead = document.createElement('thead');
    const hr = document.createElement('tr');
    ['Nome','Email','Grupo','Status','Data','Ações'].forEach(h => {
      const th = document.createElement('th'); th.textContent = h; hr.appendChild(th);
    });
    thead.appendChild(hr);
    const tbody = document.createElement('tbody');
    data.forEach(r => {
      const tr = document.createElement('tr');
      const tds = [r.nome, r.email, r.grupo_interesse || '—'].map(v => {
        const td = document.createElement('td'); td.textContent = v; return td;
      });
      const tdStatus = document.createElement('td');
      const badge = document.createElement('span');
      badge.className = 'badge ' + r.status; badge.textContent = r.status;

  async function abrirModalPermissoes(toolId, toolNome) {
    const { data: grupos } = await sb.from('groups').select('id,nome').order('nome');
    const { data: ativos } = await sb.from('group_tools')
      .select('group_id').eq('tool_id', toolId);
    const ativosSet = new Set((ativos || []).map(r => r.group_id));
    const modal = document.createElement('div');
    modal.className = 'modal-overlay open'; modal.id = 'modal-permissoes';
    const box = document.createElement('div'); box.className = 'modal';
    const title = document.createElement('h3');
    title.textContent = 'Acesso: ' + toolNome;
    box.appendChild(title);
    const lista = document.createElement('div'); lista.id = 'perm-lista';
    if (!grupos || !grupos.length) {
      const p = document.createElement('p');
      p.style.color = 'var(--text-muted)'; p.textContent = 'Nenhum grupo cadastrado.';
      lista.appendChild(p);
    } else {
      grupos.forEach(g => {
        const item = document.createElement('div'); item.className = 'perm-item';
        const chk = document.createElement('input');
        chk.type = 'checkbox'; chk.value = g.id;
        if (ativosSet.has(g.id)) chk.checked = true;
        const span = document.createElement('span'); span.textContent = g.nome;
        item.append(chk, span);
        item.onclick = e => { if (e.target !== chk) chk.checked = !chk.checked; };
        lista.appendChild(item);
      });
    }
    box.appendChild(lista);
    const actions = document.createElement('div'); actions.className = 'modal-actions';
    const btnC = document.createElement('button');
    btnC.className = 'btn-sm gray'; btnC.textContent = 'Cancelar';
    btnC.onclick = () => fecharModal('modal-permissoes');
    const btnS = document.createElement('button');
    btnS.className = 'btn-sm blue'; btnS.textContent = 'Salvar';
    btnS.onclick = () => salvarPermissoes(toolId);
    actions.append(btnC, btnS); box.appendChild(actions);
    modal.appendChild(box); document.body.appendChild(modal);
  }

  async function salvarPermissoes(toolId) {
    const checks = document.querySelectorAll('#perm-lista input[type=checkbox]');
    const selecionados = [...checks].filter(c => c.checked)
      .map(c => ({ group_id: c.value, tool_id: toolId }));
    await sb.from('group_tools').delete().eq('tool_id', toolId);
    if (selecionados.length) await sb.from('group_tools').insert(selecionados);
    fecharModal('modal-permissoes'); renderFerramentas();
  }

  function _parseSVG(str){return new DOMParser().parseFromString(str,'image/svg+xml').documentElement;}
  function initBgSymbols(){
    const c=document.getElementById('bg-symbols');if(!c)return;
    for(let i=0;i<16;i++){
      const el=document.createElement('div');
      el.className='bg-symbol';
      el.appendChild(_parseSVG(_SYMS[i%_SYMS.length]));
      const size=16+Math.random()*52,dur=45+Math.random()*70;
      el.style.cssText=[
        'width:'+size.toFixed(1)+'px','height:'+size.toFixed(1)+'px',
        'left:'+(2+Math.random()*96).toFixed(1)+'%',
        '--sym-op:'+(0.03+Math.random()*0.07).toFixed(3),
        '--sym-dx:'+((Math.random()-.5)*130).toFixed(1)+'px',
        '--sym-rh:'+((Math.random()-.5)*40).toFixed(1)+'deg',
        '--sym-r:'+((Math.random()-.5)*80).toFixed(1)+'deg',
        'animation-duration:'+dur.toFixed(1)+'s',
        'animation-delay:'+(-Math.random()*dur).toFixed(1)+'s',
      ].join(';');
      c.appendChild(el);
    }
  }

  // ── UTIL ──────────────────────────────────────────────────────────────

  function addField(parent, labelText, inputId, type, value) {
    const lbl = document.createElement('label'); lbl.textContent = labelText;
    const inp = document.createElement('input');
    inp.type = type; inp.id = inputId; inp.value = value;
    parent.append(lbl, inp);
  }

  function fecharModal(id) { document.getElementById(id)?.remove(); }

  initTheme();
  initBgSymbols();
  init();
</script>
